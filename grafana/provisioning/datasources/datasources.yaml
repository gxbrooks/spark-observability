# Configuration file version
apiVersion: 1

datasources:
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: https://es01:9200/
    basicAuth: true
    basicAuthUser: elastic
    isDefault: false
    jsonData:
      esVersion: ${STACK_VERSION}
      timeField: "@timestamp"
      timeout: 300
      tlsSkipVerify: true
      maxConcurrentShardRequests: 5
    secureJsonData:
      basicAuthPassword: changeme