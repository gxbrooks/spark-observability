
inputs:
  - type: datastream
    id: spark-events
    paths:
      - /opt/spark/spark-events/app-*
    processors:
      - decode_json_fields:
          fields:
            log_type: spark-events
          target: ""
          overwrite_keys: false
          add_error_key: true
    output: events
  - type: docker
    id: docker-metrics
    period: 1m
    containers.ids:
      - "*"
    processors:
      - add_docker_metadata: ~
    metricsets:
      - container
      - cpu
      - diskio
      - healthcheck
      - info
      - memory
      - network
    output: metrics

outputs:
  default:
    type: elasticsearch
    hosts:
      - ["es01:9200"]
    ssl:
      certificate_authorities: ["/opt/spark/certs/ca/ca.crt"]
  
  events:
    type: logstash
    hosts: ["${LS_HOST}:${LS_SPARK_EVENTS_PORT}"]
    protocol: http
  metrics:
    type: logstash
    hosts: ["${LS_HOST}:${LS_DOCKER_METRICS_PORT}"]
    protocol: http
