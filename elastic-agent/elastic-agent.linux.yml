---

inputs:
  # System metrics - separate stream per metricset to prevent cross-pollution
  - type: system/metrics
    id: system-metrics-input
    data_stream.namespace: default
    use_output: default
    streams:
      - metricsets:
        - cpu
        data_stream.dataset: system.cpu
      - metricsets:
        - memory
        data_stream.dataset: system.memory
      - metricsets:
        - network
        data_stream.dataset: system.network
      - metricsets:
        - diskio
        data_stream.dataset: system.diskio
      - metricsets:
        - filesystem
        data_stream.dataset: system.filesystem
      - metricsets:
        - load
        data_stream.dataset: system.load
      # Process metricset disabled - not needed for Kubernetes hosts
      # Causes permission errors and index pollution
    processors:
      - add_host_metadata: ~
      - add_cloud_metadata: ~
  # System logs integration
  - type: system/logs
    use_output: default
    enabled: true
    streams:
      - data_stream:
          dataset: system.auth
          type: logs
        paths:
          - /var/log/auth.log
          - /var/log/secure
        processors:
          - add_host_metadata: ~
      - data_stream:
          dataset: system.syslog
          type: logs
        paths:
          - /var/log/syslog
          - /var/log/messages
        processors:
          - add_host_metadata: ~
  # Kubernetes metrics integration
  - type: kubernetes/metrics
    use_output: default
    enabled: true
    hosts: ["https://${KUBERNETES_API_SERVER}:10250"]
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    ssl:
      certificate_authorities: ["${CA_CERT_LINUX_PATH}"]
    period: 10s
    streams:
      - metricset: state_container
        data_stream:
          dataset: kubernetes.container
          type: metrics
      - metricset: state_pod
        data_stream:
          dataset: kubernetes.pod
          type: metrics
      - metricset: state_node
        data_stream:
          dataset: kubernetes.node
          type: metrics
    processors:
      - add_cloud_metadata: ~
  # Spark Section
  # For Spark Events which need to go through Logstash
  - id: filestream-minimal
    type: filestream
    enabled: true
    paths:
      - /tmp/filestream-minimal.log
  - id: spark-events
    type: filestream
    use_output: "spark_events"
    enabled: true
    streams:
      - id: spark-events-json-stream
        data_stream:
          dataset: spark
          namespace: spark
        paths:
          - "/mnt/spark/events/app-*"
        # Only process files that are readable to avoid permission errors
        exclude_files:
          - "*.tmp"
          - "*.lock"
  - id: spark-app-logs
    type: filestream    
    use_output: "default"
    enabled: true
    paths:
      # Spark application logs from all components (mounted from Kubernetes pods to host)
      # Pod-specific subdirectories with distinct filename patterns from GC logs
      - '/mnt/spark/logs/*/executor-app.log*'   # Executor application logs
      - '/mnt/spark/logs/*/component-app.log*'  # Master & History Server application logs
    tags: ["spark-app"]
    data_stream:
      dataset: spark_app
      namespace: default
    ignore_older: 24h
    processors:
      # Extract pod name and component type from file path for better identification
      - dissect:
          tokenizer: "/mnt/spark/logs/%{pod_name}/%{component_type}-app.log"
          field: log.file.path
          target_prefix: spark
          ignore_failure: true
  - id: spark-gc
    type: filestream
    use_output: default
    enabled: true
    paths:
      # GC log files from all Spark components - using natural Spark logging paths
      - '/mnt/spark/logs/*/gc-master.log*'    # Master daemon GC logs (pod-specific)
      - '/mnt/spark/logs/*/gc-worker.log*'    # Worker daemon GC logs (pod-specific)
      - '/mnt/spark/logs/*/gc-history.log*'   # History server GC logs (pod-specific)
      - '/mnt/spark/logs/*/gc-executor.log*'  # Executor GC logs (pod-specific)
      - '/mnt/spark/logs/*/gc-driver.log*'    # Driver GC logs (pod-specific)
    tags: ["spark-gc"]
    data_stream:
      dataset: spark_gc
      namespace: default
    processors:
      # Parse Java 11 G1GC log format - Handle GC pause events with heap info
      # Format: [timestamp][uptime][level][gc] GC(cycle) Pause Type (Kind) BeforeM->AfterM(HeapM) TimeMs
      # Example: [2025-10-03T14:57:00.139-0500][22.525s][info][gc] GC(15) Pause Young (Normal) (G1 Evacuation Pause) 1056M->65M(1508M) 6.290ms
      - dissect:
          tokenizer: "[%{gc_timestamp}][%{uptime|float}s][%{level}][%{gc_tags}] GC(%{cycle|integer}) Pause %{type} (%{kind}) %{before|integer}M->%{after|integer}M(%{heapsize|integer}M) %{millis|float}ms"
          field: message
          target_prefix: gc.paused
          trim_values: 'all'
          ignore_failure: true
      # Handle GC events without kind (Remark, Cleanup, etc.)
      # Format: [timestamp][uptime][level][gc] GC(cycle) Pause Type BeforeM->AfterM(HeapM) TimeMs
      # Example: [2025-10-03T14:30:21.698-0500][61.634s][info][gc] GC(6) Pause Remark 31M->31M(1024M) 1.260ms
      - dissect:
          tokenizer: "[%{gc_timestamp}][%{uptime|float}s][%{level}][%{gc_tags}] GC(%{cycle|integer}) Pause %{type} %{before|integer}M->%{after|integer}M(%{heapsize|integer}M) %{millis|float}ms"
          field: message
          target_prefix: gc.paused
          trim_values: 'all'
          ignore_failure: true
      # Handle GC start events (no heap info)
      # Format: [timestamp][uptime][level][gc,start] GC(cycle) Pause Type (Kind)
      - dissect:
          tokenizer: "[%{gc_timestamp}][%{uptime|float}s][%{level}][%{gc_tags}] GC(%{cycle|integer}) Pause %{type} (%{kind})"
          field: message
          target_prefix: gc.start
          trim_values: 'all'
          ignore_failure: true
      # Extract component and pod info from file path for better identification
      - dissect:
          tokenizer: "/mnt/spark/logs/%{pod_directory}/gc-%{component_type}.log"
          field: log.file.path
          target_prefix: spark
          ignore_failure: true
      # Parse pod directory to extract pod name (simplified approach)
      - dissect:
          tokenizer: "%{pod_name}"
          field: spark.pod_directory
          target_prefix: spark.pod
          ignore_failure: true
      # Preserve original @timestamp as ingestion time for latency measurement
      - add_fields:
          target: gc
          fields:
            ingest_time: "@timestamp"
      # Use GC timestamp as the primary event timestamp
      - timestamp:
          field: gc.paused.gc_timestamp
          target_field: "@timestamp"
          layouts:
            - '2006-01-02T15:04:05.999-0700'
          ignore_failure: true
      # Add standardized metadata fields for both K8s and Docker Compose
      # Temporarily disabled script processor due to syntax error
      # - script:
      #     lang: painless
      #     source: |
      #       // Add host information
      #       if (ctx.spark == null) {
      #         ctx.spark = new HashMap();
      #       }
      #       if (ctx.spark.metadata == null) {
      #         ctx.spark.metadata = new HashMap();
      #       }
      #       ctx.spark.metadata.host = ctx.agent?.hostname;
      #       ctx.spark.metadata.deployment_type = "kubernetes";
      #       // ... rest of script temporarily disabled
      #     ignore_failure: true
      # Add required fields for compatibility with existing index
      - add_fields:
          target: gc
          fields:
            stats: "paused"
            level: "info"
            tags: "gc"
      # Calculate reclaimed memory for GC events with heap info
      # Temporarily disabled script processor due to syntax error
      # - script:
      #     lang: painless
      #     source: |
      #       if (ctx.gc?.paused?.before != null && ctx.gc?.paused?.after != null) {
      #         ctx.gc.paused.reclaimed = ctx.gc.paused.before - ctx.gc.paused.after;
      #       }
      #     ignore_failure: true

# Providers section removed - not needed for standalone Elastic Agent
# providers:
#   kubernetes:
#     enabled: true
#     kube_config: "${KUBECONFIG}"
#     cleanup_timeout: 60

outputs:
  default:
    type: elasticsearch
    hosts: ["${ELASTIC_URL}"]
    username: "${ELASTIC_USER}"
    password: "${ELASTIC_PASSWORD}"
    ssl:
      certificate_authorities: ["${CA_CERT_LINUX_PATH}"]
      verification_mode: full
  # Spark outputs for events
  spark_events:
    type: logstash
    hosts: ["${LS_HOST}:${LS_SPARK_EVENTS_PORT}"]

agent.logging.level: debug
agent.logging.to_files: true

agent:
  monitoring:
    enabled: true
    logs: true
    metrics: true
