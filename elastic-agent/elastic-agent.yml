---

inputs:
  - type: system/metrics
    use_output: default
    streams:
      - metricset: cpu
        data_stream:
          dataset: system.cpu
          type: metrics
      - metricset: memory
        data_stream:
          dataset: system.memory
          type: metrics
      - metricset: network
        data_stream:
          dataset: system.network
          type: metrics
      - metricset: diskio
        data_stream:
          dataset: system.diskio
          type: metrics
      - metricset: filesystem
        data_stream:
          dataset: system.filesystem
          type: metrics
      - metricset: load
        data_stream:
          dataset: system.load
          type: metrics
    processors:
      - add_host_metadata: ~
      - add_cloud_metadata: ~
      - add_docker_metadata: ~

  - type: docker/metrics
    use_output: default
    id: docker-metrics
    name: docker-metrics
    data_stream:
      namespace: default
    # Configuration for Docker provider. This is crucial for Docker metrics.
    # The 'host' parameter points to the Docker daemon socket.
    docker:
      enabled: true
      hosts: 
          - "unix:///var/run/docker.sock"
      cleanup_timeout: 60s # Timeout for cleaning up old container data
    streams:
      - data_stream:
          dataset: docker.container
          type: metrics
        metricset:
          - container
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
        # Optional: Add processors here if you need to modify fields for Docker container metrics
        # processors:
        #   - add_fields:
        #       target: ''
        #       fields:
        #         environment: production
      - data_stream:
          dataset: docker.cpu
          type: metrics
        metricset:
          - cpu
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
      - data_stream:
          dataset: docker.diskio
          type: metrics
        metricset:
          - diskio
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
      - data_stream:
          dataset: docker.healthcheck
          type: metrics
        metricset:
          - healthcheck
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
      - data_stream:
          dataset: docker.info
          type: metrics
        metricset:
          - info
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
      - data_stream:
          dataset: docker.memory
          type: metrics
        metricset:
          - memory
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
      - data_stream:
          dataset: docker.network
          type: metrics
        metricset:
          - network
        hosts:
          - 'unix:///var/run/docker.sock'
        period: 10s
      # - data_stream: # Uncomment if you also want image metrics
      #     dataset: docker.image
      #     type: metrics
      #   metricset:
      #     - image
      #   period: 10s


outputs:
  default:
    type: elasticsearch
    hosts: ["https://localhost:9200"]
    username: "elastic"
    password: "myElastic2025"
    ssl:
      certificate_authorities: ["/etc/ssl/certs/elastic/ca.crt"]
      verification_mode: full

agent:
  monitoring:
    enabled: true
    logs: true
    metrics: true