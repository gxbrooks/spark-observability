

input {
	beats {
		port => "${LS_DOCKER_METRICS_PORT}"
	}
}

filter {}

output {
	elasticsearch {
		hosts => ["${ELASTIC_HOSTS}"]
		user => "${ELASTIC_USER}"
		password => "${ELASTIC_PASSWORD}"
		ssl => true
		ssl_certificate_authorities => [ "/usr/share/logstash/certs/ca/ca.crt" ]
		
		index => "docker-metrics-%{+YYYY.MM.dd}"
	}
}

