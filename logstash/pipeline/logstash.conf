

input {
	beats {
		port => "${SPARK_LS_PORT}"
	}
}
# TODOs
#   - migrate field names to underscores instead of dashes
#   - better error handling for unknown event types in the else clause. 
#   - validate UIDs


filter {
	
	ruby {
		code => '
			require "time"
			  
			eventName = event.get("[spark][Event]")
			  
			# puts "Debug: Running filter on Event=#{eventName}............"
			# puts "Debug: path -" + event.get("[log][file][path]").to_s
			# puts "Debug: host -" + event.get("[host][name]").to_s
			case eventName
			# These events do not have any application timestamps, so we discard them. 
			when "SparkListenerBlockManagerAdded", "SparkListenerEnvironmentUpdate", \
				"SparkListenerLogStart", "SparkListenerResourceProfileAdded",\
				"org.apache.spark.sql.execution.ui.SparkListenerDriverAccumUpdates",\
				"org.apache.spark.sql.execution.ui.SparkListenerSQLAdaptiveExecutionUpdate" then
				event.cancel
			else
				batch_info = {}
				batch_info["source_app"] = "Spark"
				# preserve the beats-logstash timestamp so we can measure latency
				batch_info["log_timestamp"] = event.get("[@timestamp]")
				batch_info["matched"] = false
				batch_info["copied"] = false
				
				case eventName
				when "SparkListenerApplicationStart" then
					# puts "Debug: Start ApplicationStart"
					tsMillis = event.get("[spark][Timestamp]")
					ts = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))		
					batchClass = "App"
					eKind = "Start"
					uidBase = batchClass \
						+ ":" + event.get("[host][name]") \
						+ ":" + event.get("[log][file][path]")
				when "SparkListenerApplicationEnd" then
					# puts "Debug: Start SparkListenerApplicationEnd"
					tsMillis = event.get("[spark][Timestamp]")
					ts = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
					batchClass = "App"
					eKind = "End"
					uidBase = batchClass \
						+ ":" + event.get("[host][name]") \
						+ ":" + event.get("[log][file][path]")
				when "SparkListenerExecutorAdded" then
					# puts "Debug: Start SparkListenerExecutorAdded"
					tsMillis = event.get("[spark][Timestamp]")
					ts = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
					batchClass = "ExecutorAdded"
					eKind = "Point"
					uidBase = batchClass \
						+ ":" + event.get("[host][name]") \
						+ ":" + event.get("[log][file][path]")
				when "SparkListenerJobStart" then
					# puts "Debug: Start SparkListenerJobStart"
					tsMillis = event.get("[spark][Submission Time]")
					ts = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
					# This is backwards from SparkListenerStageSubmitted
					#  < [spark.app.submitTime] < [spark.app.startTime] < [Submission Time] 
					#            1717984607224  <        1717984607830  <    1717984612324 
					#            1717984607224  <        1717984607830  <    1717984612535 
					#            1717984607224  <        1717984607830  <    1717984615049 
					batchClass = "Job"
					eKind = "Start"
					uidBase = batchClass \
						+ ":" + event.get("[host][name]") \
						+ ":" + event.get("[log][file][path]") \
						+ ":" + event.get("[spark][Job ID]").to_s
				when "SparkListenerJobEnd" then
					# puts "Debug: Start SparkListenerJobEnd"
					# No start time on JobEnd, so will need to fill in the duration when we match events. 
					tsMillis = event.get("[spark][Completion Time]")
					ts = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
					batchClass = "Job"
					eKind = "End"
					uidBase = batchClass \
						+ ":" + event.get("[host][name]") \
						+ ":" + event.get("[log][file][path]") \
						+ ":" + event.get("[spark][Job ID]").to_s
				when "SparkListenerStageSubmitted" then
					# puts "Debug: Start SparkListenerStageSubmitted"
					tsMillis = event.get("[spark][Stage Info][Submission Time]")
					ts = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
					# This is backwards from SparkListenerStageSubmitted
					#  < [spark.app.submitTime] < [spark.app.startTime] < [Submission Time] 
					#            1717984607224  <        1717984607830  <    1717984612343 
					#            1717984607224  <        1717984607830  <    1717984612539 
					#            1717984607224  <        1717984607830  <    1717984615053 
					batchClass = "Stage"
					eKind = "Start"
					uidBase = batchClass \
						+ ":" + event.get("[host][name]") \
						+ ":" + event.get("[log][file][path]") \
						+ ":" + event.get("[spark][Stage Info][Stage ID]").to_s \
						+ ":" + event.get("[spark][Stage Info][Stage Attempt ID]").to_s
				when "SparkListenerStageCompleted" then
					# puts "Debug: Start SparkListenerStageCompleted"
					tsMillis = event.get("[spark][Stage Info][Completion Time]")
					ts = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
					batchClass = "Stage"
					eKind = "End"
					uidBase = batchClass \
						+ ":" + event.get("[host][name]") \
						+ ":" + event.get("[log][file][path]") \
						+ ":" + event.get("[spark][Stage Info][Stage ID]").to_s \
						+ ":" + event.get("[spark][Stage Info][Stage Attempt ID]").to_s
				when "SparkListenerTaskStart" then
					# puts "Debug: Start SparkListenerTaskStart"
					tsMillis = event.get("[spark][Task Info][Launch Time]")
					ts = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
					batchClass = "Task"
					eKind = "Start"
					uidBase = batchClass \
						+ ":" + event.get("[host][name]") \
						+ ":" + event.get("[log][file][path]") \
						+ ":" + event.get("[spark][Stage ID]").to_s \
						+ ":" + event.get("[spark][Stage Attempt ID]").to_s \
						+ ":" + event.get("[spark][Task Info][Task ID]").to_s \
						+ ":" + event.get("[spark][Task Info][Attempt]").to_s
				when "SparkListenerTaskEnd" then
					# puts "Debug: Start SparkListenerTaskEnd"
					tsMillis = event.get("[spark][Task Info][Finish Time]")
					ts = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
					batchClass = "Task"
					eKind = "End"
					uidBase = batchClass \
						+ ":" + event.get("[host][name]") \
						+ ":" + event.get("[log][file][path]") \
						+ ":" + event.get("[spark][Stage ID]").to_s \
						+ ":" + event.get("[spark][Stage Attempt ID]").to_s \
						+ ":" + event.get("[spark][Task Info][Task ID]").to_s \
						+ ":" + event.get("[spark][Task Info][Attempt]").to_s
					duration = event.get("[spark][Task Info][Finish Time]") - event.get("[spark][Task Info][Launch Time]")
				when "org.apache.spark.sql.execution.ui.SparkListenerSQLExecutionStart" then
					# puts "Debug: Start SparkListenerSQLExecutionStart"
					tsMillis = event.get("[spark][time]")
					ts = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
					batchClass = "SQLQuery"
					eKind = "Start"
					uidBase = batchClass \
						+ ":" + event.get("[host][name]") \
						+ ":" + event.get("[log][file][path]") \
						+ ":" + event.get("[spark][executionId]").to_s
				when "org.apache.spark.sql.execution.ui.SparkListenerSQLExecutionEnd" then
					# puts "Debug: Start SparkListenerSQLExecutionEnd"
					# No start time on SQLExecutionEnd, so will need to fill in the duration when we match events. 
					tsMillis = event.get("[spark][time]")
					ts = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
					batchClass = "SQLQuery"
					eKind = "End"
					uidBase = batchClass \
						+ ":" + event.get("[host][name]") \
						+ ":" + event.get("[log][file][path]") \
						+ ":" + event.get("[spark][executionId]").to_s
				else
					puts "WARNING: Unknown Event=#{eventName}............"
				end					
				
							
				# we could have used a mutate statement and rename clause, but since we have to sweep through 
				# all the events in Ruby, we do the rename the Ruby way. This will eliminate a full sweep through 
				# the events using a mutate statement
				case eventName 
				when "SparkListenerJobStart", "SparkListenerStageSubmitted"  then
					scope = event.get("[spark][Properties][spark.rdd.scope]")
					if !scope.nil? then 
						#puts "Debug: found RDD scope" + scope.to_s
						event.remove("[spark][Properties][spark.rdd.scope]")
						event.set("[spark][Properties][spark.rdd.scope][id]", scope)
					end
				end

				# puts "Debug: Finished filter on Event=#{eventName}............"

				case eventName 
				when "SparkListenerTaskEnd", "SparkListenerStageCompleted" then
					if event.get("[spark][Task Info][Accumulables]")
						# puts "Debug: Found Task Info "
						array = event.get("[spark][Task Info][Accumulables]")
						array.each_with_index do |item, index|
							if item["Value"]
								v = item["Value"].class
								# puts "Filter Task Info Debug: Found Value #{v}"
								event.set("[spark][Task Info][Accumulables][#{index}][Value]", item["Value"].to_i)	
							end
							if item["Update"]			
								v = item["Update"].class
								# puts "Filter Debug Info Debug: Found Update #{v}"
								event.set("[spark][Task Info][Accumulables][#{index}][Update]", item["Update"].to_i)
							end
						end
					end
					if event.get("[spark][Stage Info][Accumulables]")
						# puts "Debug: Found Stage Info"
						array = event.get("[spark][Stage Info][Accumulables]")
						array.each_with_index do |item, index|
							if item["Value"]
								v = item["Value"].class
								# puts "Debug: Found Stage Info Value #{v}"
								event.set("[spark][Stage Info][Accumulables][#{index}][Value]", item["Value"].to_i)	
							end
							if item["Update"]
								v = item["Update"].class
								# puts "Debug: Found Stage Info Update" #{v}"
								event.set("[spark][Stage Info][Accumulables][#{index}][Update]", item["Update"].to_i)
							end
						end
					end
				end
				
				# Finalize processiong of the Spark event and the Batch Info event
				event.set("[@timestamp]", ts)
				batch_info["@timestamp"] = ts
				batch_info["milliseconds"] = tsMillis
				
				batch_info["uid"] = eKind + ":" + uidBase
				if eKind == "End" 
					batch_info["start_uid"] = "Start" + ":" + uidBase
				end
				
				batch_info["batch_class"] = batchClass
				batch_info["event_kind"] = eKind	
				
				# puts "Debug: Batch: #{batch_info}"
				# Create the batch active event
				batch_active = LogStash::Event.new(batch_info)
				batch_active.tag("batch-active-event")
				new_event_block.call(batch_active)
				
				# add batch_info to the Spark event for convience, if need be
				event.set("[batch_info]", batch_info)
				event.tag("spark-event")
				
			end			
		'
	}
}

output {
	# file {
		# path => "/usr/share/logstash/logs/ls-%{+YYYY-MM-dd}.jsonl"
		# codec => json_lines
		# write_behavior => "append"
	# }
	if "spark-event" in [tags] {
	
		elasticsearch {
			#manage_template => false  # Ensure Logstash does not override your custom template
			hosts => ["${ELASTIC_HOSTS}"]
			user => "${ELASTIC_USER}"
			password => "${ELASTIC_PASSWORD}"
			ssl => true
			ssl_certificate_authorities => [ "/usr/share/logstash/certs/ca/ca.crt" ]
			
			data_stream => "true"
			data_stream_type => "logs"
			data_stream_dataset => "spark"
			data_stream_namespace => "spark"
		}
	} else if "batch-active-event" in [tags] {
		elasticsearch {
			hosts => ["${ELASTIC_HOSTS}"]
			user => "${ELASTIC_USER}"
			password => "${ELASTIC_PASSWORD}"
			ssl => true
			ssl_certificate_authorities => [ "/usr/share/logstash/certs/ca/ca.crt" ]
			
			index => "batch-active-index"  
		}
	}
}
