
#
# System dependencies
# 
# kibana -------------------------------------------------->
#   \
#    \----------------> init-kibana --|
#                  /                  v
#                 / 
# es01 --> init-kibana-password --|
#    \                            v
#     \ 
#      \--> init-index ---> logstash01 ---------------> 
#                       |          \
#                       v           \ --> spark-* ->
#

volumes:
  esdata:
    driver: local
  kibanadata:
    driver: local
  spark-logs:
    driver: local


networks:
  default:
    name: elastic
    external: false

services:

  init-certs:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: init-certs
    labels:
      role: "Init Certs"
    volumes:
      - ./certs:/usr/share/elasticsearch/certs
    user: "0"
    command: bash -f ./certs/init-certs.sh
    env_file:
      - .env
    
  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    labels:
      co.elastic.logs/module: elasticsearch
      role: Elasticsearch
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - ./certs:/usr/share/elasticsearch/config/certs
      # only needed for debugging initializations
      - ./elasticsearch:/usr/share/elasticsearch/elasticsearch
      #   docker exec -it <Container-ID> bash
      # or through the Docker Desktop console
    ports:
      - ${ES_PORT}:9200
    env_file:
      - .env
    environment:
      - node.name=es01
      - cluster.name=${CLUSTER_NAME}
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      # Xpack must be rooted at /usr/share/elasticsearch/config, so start with certs/
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/es01/es01.key
      - xpack.security.http.ssl.certificate=certs/es01/es01.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/es01/es01.key
      - xpack.security.transport.ssl.certificate=certs/es01/es01.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=${LICENSE}
      # For using Watcher as an HTTPS client
      - xpack.http.ssl.certificate_authorities=["/usr/share/elasticsearch/config/certs/ca/ca.crt"]
      # https://handlers.sans.edu/gbruneau/elk/TLS_elasticsearch_configuration.pdf
    mem_limit: ${ES_MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    depends_on:
      init-certs:
        condition: service_completed_successfully 
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120
      

  init-kibana-password:   
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    labels:
      role: "Init Kibana Password"
    volumes:
      - ./elasticsearch:/usr/share/elasticsearch/elasticsearch
      - ./certs:/usr/share/elasticsearch/config/certs
    command: bash -f ./elasticsearch/bin/init-kibana-password.sh 
    env_file:
      - .env
    environment:
      # do we need any of this? Taken from logstash
      # - xpack.monitoring.enabled=false
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_HOSTS=https://es01:9200
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
    depends_on:
      es01:
        condition: service_healthy 
      init-certs:
        condition: service_completed_successfully

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION} 
    container_name: kibana
    volumes:
      - ./certs:/usr/share/kibana/certs
      - ./elasticsearch:/usr/share/kibana/elasticsearch
      - kibanadata:/usr/share/kibana/data
    labels:
      co.elastic.logs/module: kibana
      role: "Kibana"
    ports:
      - ${KIBANA_PORT}:5601
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=https://es01:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=certs/ca/ca.crt
      - XPACK_SECURITY_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${ENCRYPTION_KEY}
    mem_limit: ${KB_MEM_LIMIT}
    depends_on:
      es01:
        condition: service_healthy 
      init-kibana-password:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120    

  grafana:
    image: grafana/grafana-enterprise
    labels:
      role: "Grafana"
    container_name: grafana
    restart: unless-stopped
    env_file:
      - .env
    ports:
     - '3000:3000'
    volumes:
     - "./grafana/data:/var/lib/grafana/data"
     - "./grafana/provisioning:/etc/grafana/provisioning"
     - "./grafana/grafana.ini:/etc/grafana/grafana.ini"
    depends_on:
      es01:
        condition: service_healthy 
      init-index:
        condition: service_completed_successfully
 
  init-kibana:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    volumes:
      - ./elasticsearch:/usr/share/elasticsearch/elasticsearch
      - ./certs:/usr/share/elasticsearch/config/certs
    command: bash -f ./elasticsearch/bin/init-kibana.sh
    env_file:
      - .env
    # environment:
      # do we need any of this? Taken from logstash
      # - xpack.monitoring.enabled=false
      # - KIBANA_PORT=${KIBANA_PORT}
      # - KIBANA_PASSWORD=${KIBANA_PASSWORD}
    depends_on:
      kibana:
        condition: service_healthy
      init-kibana-password:
        condition: service_completed_successfully
      init-certs:
        condition: service_completed_successfully

  init-index:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    command: bash -f ./elasticsearch/bin/init-index.sh 
    labels:
      role: "Init Index"
    volumes:
      - ./elasticsearch:/usr/share/elasticsearch/elasticsearch
      - ./certs:/usr/share/elasticsearch/config/certs
    env_file:
      - .env
    environment:
      # do we need any of this? Taken from logstash
      # - xpack.monitoring.enabled=false
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_HOSTS=https://es01:9200
      # dubious we need kibana here
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
    depends_on:
      es01:
        condition: service_healthy
      init-certs:
        condition: service_completed_successfully

# mine

  logstash01:
    image: docker.elastic.co/logstash/logstash:8.14.3 #${STACK_VERSION} 
    container_name: logstash01
    labels:
      co.elastic.logs/module: logstash
      role: "Logstash"
    user: root
    ports: 
        - "${LS_SPARK_EVENTS_PORT}:${LS_SPARK_EVENTS_PORT}"
        - "${LS_DOCKER_METRICS_PORT}:${LS_DOCKER_METRICS_PORT}"
        - "9600:9600"
    volumes:
      - ./certs:/usr/share/logstash/certs
      - "./logstash/pipeline:/usr/share/logstash/pipeline:ro"
      - "./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml"
      # not used
      - "./logstash/config/debug-logstash.yml:/usr/share/logstash/config/debug-logstash.yml"
    environment:
      - xpack.monitoring.enabled=false
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_HOSTS=https://es01:9200
      - ELASTIC_URL=${ELASTIC_URL}
      - LS_HOST=${LS_HOST}
      - LS_SPARK_EVENTS_PORT=${LS_SPARK_EVENTS_PORT}
      - LS_DOCKER_METRICS_PORT=${LS_DOCKER_METRICS_PORT}
    depends_on:
      es01:
        condition: service_healthy
      init-index:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:9600",
        ]
      interval: 10s
      timeout: 10s
      retries: 120
 
  spark-master:
    container_name: da-spark-master
    build: ./spark
    image: da-spark-image
    entrypoint: ['./entrypoint.sh', 'master']
    labels:
      role: "Spark Master"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - ./spark/data:/opt/spark/data
      - ./spark/apps:/opt/spark/apps
      - ./spark/conf/log4j2.properties:/opt/spark/conf/log4j2.properties
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./spark/conf/spark-env.sh:/opt/spark/conf/spark-env.sh
      - spark-logs:/opt/spark/spark-events
      # - ./spark-events:/opt/spark/spark-events
      - ./elastic-agent/elastic-agent-master.yml:/opt/Elastic/Agent/elastic-agent.yml
      - ./certs:/opt/Elastic/certs
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/var/lib/docker/containers:/var/lib/docker/containers:ro"
    env_file:
      - spark/.env.spark
      - .env
    depends_on:
      # for sending metrics to Elastic
      es01:
        condition: service_healthy
    ports:
      - '9090:8080'
      - '7077:7077'

  spark-history-server:
    container_name: da-spark-history
    image: da-spark-image
    entrypoint: ['./entrypoint.sh', 'history']
    labels:
      role: "Spark Historian"
    depends_on:
      spark-master:
        condition: service_healthy
      # for sending metrics to Elastic
      es01:
        condition: service_healthy
      # Make sure Logstash is running and all indicies are defined before starting Elastic Agent
      logstash01:
        condition: service_healthy
      init-index:
        condition: service_completed_successfully
    env_file:
      - spark/.env.spark
      - .env
    volumes:
      - spark-logs:/opt/spark/spark-events
      # - ./spark-events:/opt/spark/spark-events
      - ./elastic-agent/elastic-agent-history.yml:/opt/Elastic/Agent/elastic-agent.yml
      - ./spark/conf/log4j2.properties:/opt/spark/conf/log4j2.properties
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./spark/conf/spark-env.sh:/opt/spark/conf/spark-env.sh
      - ./certs:/opt/Elastic/certs
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/var/lib/docker/containers:/var/lib/docker/containers:ro"
    ports:
      - '18080:18080'

  spark-worker:
#    container_name: da-spark-worker
    image: da-spark-image
    entrypoint: ['./entrypoint.sh', 'worker']
    labels:
      role: "Spark Worker"
    depends_on:
      spark-master:
        condition: service_healthy
      # for sending metrics to Elastic
      es01:
        condition: service_healthy
    env_file:
      - spark/.env.spark
      - .env
    volumes:
      - ./spark/data:/opt/spark/data
      - ./spark/apps:/opt/spark/apps
      - ./spark/conf/log4j2.properties:/opt/spark/conf/log4j2.properties
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./spark/conf/spark-env.sh:/opt/spark/conf/spark-env.sh
      - spark-logs:/opt/spark/spark-events
      # - ./spark-events:/opt/spark/spark-events
      - ./elastic-agent/elastic-agent-worker.yml:/opt/Elastic/Agent/elastic-agent.yml
      - ./certs:/opt/Elastic/certs
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/var/lib/docker/containers:/var/lib/docker/containers:ro"
