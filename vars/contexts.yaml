# Context Specification File
# Defines how variables from vars/variables.yaml are transformed into context-specific configuration files
#
# Each context specifies:
#   - name: Unique identifier for the context
#   - type: Output file format (env, shell_env, toml, configmap, ansible_vars)
#   - output: Path to the generated file (relative to project root)
#   - description: Purpose of this context

contexts:
  - name: observability
    type: env
    output: vars/contexts/observability/.env
    description: Environment variables for Docker Compose observability stack (Elasticsearch, Kibana, Grafana)

  - name: spark-image
    type: toml
    output: vars/contexts/spark-image/spark-image.toml
    description: Build-time configuration for Spark Docker images

  - name: spark-runtime
    type: configmap
    output: vars/contexts/spark-runtime/spark-configmap.yaml
    description: Kubernetes ConfigMap for Spark runtime environment variables

  - name: ansible
    type: ansible_vars
    output: vars/contexts/ansible/spark_vars.yml
    description: Ansible variables for Spark deployment playbooks and roles

  - name: nfs
    type: ansible_vars
    output: vars/contexts/nfs/nfs_vars.yml
    description: Ansible variables for NFS server configuration

  - name: spark-client
    type: shell_env
    output: vars/contexts/spark-client/spark_env.sh
    description: Developer environment variables for running Spark applications locally

  - name: ispark
    type: shell_env
    output: vars/contexts/ispark/ispark_env.sh
    description: Environment variables for interactive Spark (iPython) sessions

  - name: elastic-agent
    type: shell_env
    output: vars/contexts/elastic-agent/elastic_agent_env.sh
    description: Host-level environment variables for Elastic Agent systemd service

  - name: elastic-agent-ansible
    type: ansible_vars
    output: vars/contexts/elastic-agent-ansible/elastic_agent_vars.yml
    description: Ansible variables for Elastic Agent deployment playbooks

  - name: devops
    type: shell_env
    output: vars/contexts/devops/devops_env.sh
    description: Environment variables for devops client initialization (Python, Java versions)

  - name: managed-node
    type: shell_env
    output: vars/contexts/managed-node/managed_node_env.sh
    description: Environment variables for managed node initialization (Python, Java versions)

# Supported output types and their generators:
#   - env: Simple KEY=VALUE format (no export)
#   - shell_env: Shell environment file with export statements
#   - toml: TOML format with [env] section
#   - configmap: Kubernetes ConfigMap YAML
#   - ansible_vars: Ansible variables YAML with structured formatting

