# Secrets Configuration Template
#
# Copy to secrets.yaml and fill in real values. Never commit secrets.yaml.
#
#   cp vars/secrets.example.yaml vars/secrets.yaml
#   chmod 600 vars/secrets.yaml
#
# Priority: environment variables > secrets.yaml > variables.yaml defaults

# Elasticsearch credentials
ES_PASSWORD: "CHANGE_ME"
ES_USER: "elastic"

# Kibana credentials
KB_PASSWORD: "CHANGE_ME"
KB_USER: "kibana_system"

# Grafana credentials
GF_SECURITY_ADMIN_PASSWORD: "CHANGE_ME"
GF_SECURITY_ADMIN_USER: "admin"

# Elasticsearch encryption key (for Kibana)
EB_ENCRYPTION_KEY: "CHANGE_ME"

# Dynatrace tokens (tenant: see DT_TENANT_URL / DT_API_URL in vars/variables.yaml)
dynatrace:
  # API token admin — create/rotate other tokens via Environment API
  DT_TOKEN_ADMIN_TOKEN: "CHANGE_ME"
  # Platform token (dt0s16.*) — Document API (dashboards/notebooks): document:documents:read/write
  DT_PLATFORM_TOKEN: "CHANGE_ME"
  # PaaS token — cluster/activeGate/operator bootstrap where applicable
  DT_PAAS_TOKEN: "CHANGE_ME"
  # Operator token — Dynatrace Operator / Dynakube on Kubernetes
  DT_OPERATOR_TOKEN: "CHANGE_ME"
  # Environment API token (dt0c01.*) — Settings 2.0, entities, metrics read, classic APIs
  DT_API_TOKEN: "CHANGE_ME"
  # Metrics ingest — GPU sampler REST ingest, OTLP-related ingest scopes
  DT_INGEST_TOKEN: "CHANGE_ME"
  # Platform token (dt0s16.*) — Grail DQL validation (query:execute); read scopes on storage:*
  DT_PLATFORM_TOKEN_GRAIL: "CHANGE_ME"

# ServiceNow instance credentials
servicenow:
  # Instance URL is non-secret: vars/variables.yaml → SN_URL (service-now context)

  # Automation / REST user (Ansible deploy.yml, discover.yml, diagnose.yml, test.yml)
  # Recommended: Machine identity, Web service access.
  # Roles for Discovery CMDB automation (admin_brooks_lab example):
  #   - discovery_admin (schedules, ranges, MID visibility, run Discovery)
  #   - cmdb_inst_admin (cmn_location brooks-lab)
  #   - rest_service / snc_platform_rest_api_access (REST Table API)
  #   - cmdb_query_builder or cmdb_read (CMDB validation in test.yml)
  SN_USER: "admin_brooks_lab"
  SN_PASSWORD: "CHANGE_ME"

  # Dedicated MID Server user — must match mid.instance.username in MID config.xml exactly.
  # User ID may use dots (e.g. mid.brooks.lab) or underscores (mid_brooks_lab); both are valid.
  # Avoid characters that require XML escaping in config.xml (&, <, >, quotes).
  # Identity type: Machine (recommended). Interactive login not required.
  # Required role (only): mid_server
  # Do not grant discovery_admin or admin to the MID user unless ServiceNow support
  # documents a specific integration requirement; least privilege is mid_server alone.
  SN_MID_USER: "mid_brooks_lab"
  SN_MID_PASSWORD: "CHANGE_ME"

  # Dynatrace → ServiceNow SGO-Dynatrace webhook (events/deploy.yml).
  # Written on first events/deploy after SGC install; defaults to SN_USER/SN_PASSWORD.
  # SN_DT_WEBHOOK_USER: "admin_brooks_lab"
  # SN_DT_WEBHOOK_PASSWORD: "CHANGE_ME"

# SSH private key for Discovery credential (brooks-lab-ssh) is generated by
# ansible/playbooks/servicenow/discovery/install.yml and stored at:
#   vars/sn_discovery_id_ed25519   (gitignored; do not copy into secrets.yaml)

# Note: For production environments, consider using:
# - HashiCorp Vault
# - AWS Secrets Manager
# - Azure Key Vault
# - Kubernetes Secrets (for K8s deployments)
# - Ansible Vault (for Ansible-specific secrets)
