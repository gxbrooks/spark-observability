# Hadoop Configuration
HADOOP_NAMENODE:
  value: hdfs-namenode:9000
  contexts: [spark-runtime, ansible]

HADOOP_CONF_DIR:
  value: /opt/hadoop/etc/hadoop
  contexts: [spark-runtime, ansible]

HADOOP_HOME:
  value: /opt/hadoop
  contexts: [spark-runtime, ansible]

# In-cluster NameNode (Spark pods, HDFS namespace). Use FQDN from other namespaces (e.g. spark).
