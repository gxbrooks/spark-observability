# Centralized variable definitins for all contexts
# Each variable has a value and a list of contexts where it is needed
# Contexts: observability, spark-image, spark-runtime


# Global variables
TZ:
  value: America/Chicago
  contexts: [observability, spark-image, spark-runtime]

PYTHON_VERSION:
  value: 3.11
  contexts: [spark-runtime, managed-node, spark-client, spark-image, ansible, devops]

JAVA_VERSION:
  value: 17
  contexts: [devops, managed-node, spark-client]

PYSPARK_PYTHON:
  value: python3.11
  contexts: [spark-runtime, spark-client, devops]

# Avoid Spark UI port exhaustion when many client-mode drivers run on one host (e.g. Lab2).
PYSPARK_SUBMIT_ARGS:
  value: --conf spark.ui.enabled=false pyspark-shell
  contexts: [spark-client, ispark]

# PYSPARK_DRIVER_PYTHON is redundant - use PYSPARK_PYTHON instead
# PYSPARK_DRIVER_PYTHON:
#   value: python3.8
#   contexts: [spark-runtime, spark-client]


# Elasticsearch Stack Version
STACK_VERSION:
  value: 8.15.0
  contexts: [observability]

# Force certificate regeneration (set to non-empty to force)
FORCE_REGEN:
  value: ""
  contexts: [observability]

# Observability platform switch (default keeps current behavior)
OBSERVABILITY_PLATFORM:
  value: elastic
  contexts: [ansible, devops]

# Dynatrace tenant and partitioning defaults
DT_TENANT_URL:
  value: https://pdt20158.apps.dynatrace.com
  contexts: [ansible, devops]

DT_API_URL:
  value: https://pdt20158.live.dynatrace.com/api
  contexts: [ansible, devops]

DT_HOST_GROUP:
  value: spark-observability
  contexts: [ansible, devops]

DT_K8S_CLUSTER_NAME:
  value: spark-observability-k8s
  contexts: [ansible, devops]

DT_MANAGEMENT_ZONE:
  value: Spark Observability
  contexts: [ansible, devops]

DT_ENVIRONMENT:
  value: lab
  contexts: [ansible, devops]

DT_OWNED_BY:
  value: gbrooks
  contexts: [ansible, devops]

DT_TOKEN_ADMIN_TOKEN:
  value: ""  # SECRET: REQUIRED for API-driven token creation/rotation
  contexts: [ansible, devops]
  secret: true
  required: false

DT_PAAS_TOKEN:
  value: ""  # SECRET: REQUIRED for OneAgent installer download
  contexts: [ansible, devops]
  secret: true
  required: false

DT_OPERATOR_TOKEN:
  value: ""  # SECRET: REQUIRED for Dynatrace Operator / Dynakube
  contexts: [ansible, devops]
  secret: true
  required: false

DT_API_TOKEN:
  value: ""  # SECRET: REQUIRED for Settings 2.0 management zone / tags automation
  contexts: [ansible, devops]
  secret: true
  required: false

DT_INGEST_TOKEN:
  value: ""  # SECRET: REQUIRED to enable OTel dual-feed to Dynatrace
  contexts: [ansible, devops]
  secret: true
  required: false

# Elasticsearch Data Retention Policies (for downsampling)
# Base metric sampling frequency (Elastic Agent collection period)
ES_METRIC_SAMPLING_INTERVAL:
  value: 10s
  contexts: [observability]

# Base retention is for the original sampling interval data
ES_RETENTION_BASE:
  value: 2d
  contexts: [observability]

# 5-minute downsampled data retention
ES_RETENTION_5MIN:
  value: 4d
  contexts: [observability]

# 15-minute downsampled data retention
ES_RETENTION_15MIN:
  value: 8d
  contexts: [observability]

# 60-minute downsampled data retention (2 years as per Elastic best practice)
ES_RETENTION_60MIN:
  value: 730d
  contexts: [observability]

# Logstash Version
LOGSTASH_VERSION:
  value: 8.15.0
  contexts: [observability]

# unclear why CLUSTER_NAME is needed, see es01 service in docker-compose.yml
CLUSTER_NAME:
  value: dod
  contexts: [observability]

GRAFANA_VERSION:
  value: 11.3.0
  contexts: [observability]

# Observability runtime variables

# Elasticsearch variables
# Standardized naming: ES_* for Elasticsearch (ES already stands for Elasticsearch)
# Inside Docker containers, use service name; for external clients, use DNS hostname
ES_HOST:
  contexts: [observability, spark-runtime, elastic-agent, devops, spark-client]
  values:
    observability: es01
    spark-runtime: Lab3.lan
    devops: Lab3.lan
    elastic-agent: Lab3.lan
    spark-client: Lab3.lan
ES_PORT:
  value: 9200
  contexts: [observability, spark-runtime, elastic-agent, devops, spark-client]
ES_USER:
  value: elastic
  contexts: [observability, spark-runtime, elastic-agent, devops, spark-client, ansible]
ES_PASSWORD:
  value: ""  # SECRET: REQUIRED - Must be set in vars/secrets.yaml or via ES_PASSWORD env var
  contexts: [observability, spark-runtime, elastic-agent, devops, spark-client, ansible]
  secret: true
  required: true
# ES_URL: Consolidated Elasticsearch URL (replaces ELASTIC_URL)
# Used by Docker Compose and Elastic Agent
ES_URL:
  contexts: [observability, elastic-agent, spark-client]
  values:
    observability: https://es01:9200
    elastic-agent: https://Lab3.lan:9200
    spark-client: https://Lab3.lan:9200

# Kubernetes API hostname only (no https://). Used by elastic-agent (kubelet scrape URLs), etc.
# Must match DNS/IP in the apiserver certificate SANs. Align with ansible group kubernetes_master.
KUBERNETES_API_SERVER:
  contexts: [devops, spark-client, elastic-agent, observability]
  values:
    devops: Lab3.lan
    spark-client: Lab3.lan
    elastic-agent: Lab3.lan
    observability: Lab3.lan
# Full URL for kubectl (cluster.server) and devops kubeconfig sync. Not used by elastic-agent templates.
KUBERNETES_API_SERVER_URL:
  contexts: [devops, spark-client]
  values:
    devops: https://Lab3.lan:6443
    spark-client: https://Lab3.lan:6443
# CA Certificate Path
# CA_CERT: Standard path where services expect to find the CA certificate
# This path works for both Docker containers (via mount) and Linux hosts
# All services use this single variable - no need for context-specific paths
CA_CERT:
  value: /etc/ssl/certs/elastic/ca.crt
  contexts: [devops, observability, spark-runtime, elastic-agent]
  comment: "Standard CA certificate path for all services (containers and Linux hosts). Elasticsearch uses /usr/share/elasticsearch/config/certs internally (hardcoded X-Pack requirement)."

# Elasticsearch API Script Environment Variables (ES_* prefix)
# These variables are exported in init-index.sh for developer use with esapi/kapi commands
# Standardized naming: ES_* for Elasticsearch (ES already stands for Elasticsearch)
# Context-specific paths: devops (user dev) vs observability (docker container)
ES_DIR:
  contexts: [devops, observability]
  values:
    devops: ${HOME}/repos/spark-observability/observability/elasticsearch
    observability: /usr/share/elasticsearch/elasticsearch
ES_CONFIG_DIR:
  value: ${ES_DIR}/config
  contexts: [devops, observability]
ES_OUTPUTS_DIR:
  value: ${ES_DIR}/outputs
  contexts: [devops, observability]
ES_BIN_DIR:
  value: ${ES_DIR}/bin
  contexts: [devops, observability]
LICENSE:
  value: trial
  contexts: [observability]
  comment: "Docker xpack.license.self_generated.type. Basic = free forever but Watcher/alerts actions do not run. Trial = full features ~30 days (includes Watcher). Do not call POST /_license/start_basic on a lab cluster that needs Watcher—it cannot be reverted to trial without start_trial (once per cluster) or wiping ES data. See elastic.co/subscriptions and init-index.sh Step 4."

# Kibana variables (KB_* prefix)
EB_ENCRYPTION_KEY:
  value: ""  # SECRET: REQUIRED - Must be set in vars/secrets.yaml or via EB_ENCRYPTION_KEY env var (minimum 32 characters)
  contexts: [observability]
  secret: true
  required: true
KB_HOST:
  contexts: [observability, devops]
  values:
    observability: Lab3.lan  # External hostname for SERVER_PUBLICBASEURL
    devops: Lab3.lan
KB_PORT:
  value: 5601
  contexts: [observability, devops]
KB_USER:
  value: kibana_system
  contexts: [observability]
KB_PASSWORD:
  value: ""  # SECRET: REQUIRED - Must be set in vars/secrets.yaml or via KB_PASSWORD env var
  contexts: [observability, devops]
  secret: true
  required: true

# Logstash variables
LS_HOST:
  contexts: [observability, elastic-agent]
  values:
    observability: logstash01
    elastic-agent: Lab3.lan
LS_PORT:
  value: 5044
  contexts: [observability]
# currently, metrics are sent straight to Elasticsearch, not via Logstash
# TODO: send metrics via regional Logstash servers
LS_DOCKER_METRICS_PORT:
  value: 5051
  contexts: [observability]
LS_SPARK_EVENTS_PORT:
  value: 5050
  contexts: [observability, elastic-agent]

# Grafana variables
GRAFANA_HOST:
  value: Lab3.lan
  contexts: [observability]
GF_SERVER_HTTP_PORT:
  value: 3000
  contexts: [observability]
# See docker-compose.yml for admin user/password setup
GF_SECURITY_ADMIN_USER:
  value: admin
  contexts: [observability, ansible]
GF_SECURITY_ADMIN_PASSWORD:
  value: ""  # SECRET: REQUIRED - Must be set in vars/secrets.yaml or via GF_SECURITY_ADMIN_PASSWORD env var
  contexts: [observability, ansible]
  secret: true
  required: true

# Elastic Agent variables
# Currently we use systemd env.conf file format for Elastic Agent on Linux.
# env.con is in elastic-agent/env.conf
# there is a playbook to inject env.conf into the Elastic Agent service environment.
# Linux hosts use env.conf via systemd EnvironmentFile
# All this needs to be integrated with vars/generate_contexts.py
ELASTIC_AGENT_VERSION:
  value: 8.15.0
  contexts: [elastic-agent-ansible]
 

# Spark runtime variables (moved from deprecated spark-image context)
SPARK_VERSION:
  value: 4.0.1
  contexts: [spark-runtime, ansible, spark-image, devops, spark-client]

# System location of the Spark installation
SPARK_HOME:
  value: /opt/spark
  contexts: [spark-runtime, ansible]

# Google data access
# A relative path may not be consistent between iPython and spark submit
# (but should be)
GOOGLE_APPLICATION_CREDENTIALS:
  value: /opt/spark/apps/bq-api-key.json
  contexts: [spark-runtime]

# SPARK_MASTER_HOST: The hostname the Spark master binds to and advertises
# - For K8s pods (spark-runtime): NOT included - workers use SPARK_MASTER connection string
# - For external clients: Lab3.lan (NodePort access)
# - For Ansible templates: Lab3.lan (used in spark-master.yaml.j2)
SPARK_MASTER_HOST:
  contexts: [observability, ispark, spark-client, ansible]
  values:
    observability: Lab3.lan
    ispark: Lab3.lan
    spark-client: Lab3.lan
    ansible: Lab3.lan
SPARK_MASTER_PORT:
  contexts: [spark-runtime, observability, ispark, spark-client, ansible]
  values:
    spark-runtime: 7077
    observability: 31686
    ispark: 31686
    spark-client: 31686
    ansible: 31686

SPARK_REGISTRY_HOST:
  value: Lab3.lan:5000
  # elastic-agent-ansible uses write_ansible_vars (same as ansible); registry must be in merged context
  contexts: [ansible, devops, elastic-agent-ansible]

# Spark master URL: in-cluster for ConfigMap; NodePort URL for external clients (PySpark on LAN)
SPARK_MASTER:
  contexts: [spark-runtime, spark-client]
  values:
    spark-runtime: spark://spark-master-0.spark-master-headless.spark.svc.cluster.local:7077
    spark-client: spark://${SPARK_MASTER_HOST}:${SPARK_MASTER_PORT}

# Spark network and timeout settings
# Increased timeouts to handle connection resets and network instability
SPARK_NETWORK_TIMEOUT:
  value: 900s
  contexts: [spark-runtime, ansible]
SPARK_RPC_ASK_TIMEOUT:
  value: 120s
  contexts: [spark-runtime, ansible]
SPARK_RPC_LOOKUP_TIMEOUT:
  value: 120s
  contexts: [spark-runtime, ansible]
SPARK_EXECUTOR_HEARTBEAT_INTERVAL:
  value: 60s
  contexts: [spark-runtime, ansible]

# Spark worker memory configuration
# Set to 12g to leave ~2GB headroom within the 14GB pod limit
SPARK_WORKER_MEMORY:
  value: 12g
  contexts: [spark-runtime]

SPARK_EVENTS_DIR:
  value: /mnt/spark/events
  contexts: [spark-runtime, ansible, elastic-agent, spark-client]
SPARK_CONF_DIR:
  value: /home/gxbrooks/repos/spark-observability/spark/conf
  contexts: [spark-client]

# Spark client JAR paths (for spark-defaults.conf)
SPARK_OTEL_LISTENER_JAR:
  value: ~/repos/spark-observability/spark/otel-listener/spark-otel-listener-1.0.0.jar
  contexts: [spark-client]
SPARK_EVENT_CSV:
  value: true
  contexts: [spark-runtime, spark-client]
SPARK_NO_DAEMONIZE:
  value: true
  contexts: [spark-runtime]
SPARK_DAEMON_JAVA_OPTS:
  value: -Dlog4j2.configurationFile=file:///opt/spark/conf-extra/log4j2-cluster.properties
  contexts: [spark-runtime]

# Spark user specific variables
# TODO: Utilize these variables in the spark playbooks
SPARK_USER:
  value: ansible
  contexts: [spark-runtime, ansible]

USER_SPARK_HOME:
  value: /home/ansible/spark
  contexts: [ansible]

# OpenTelemetry Configuration for Spark
OTEL_EXPORTER_OTLP_ENDPOINT:
  contexts: [spark-client, devops, spark-runtime]
  values:
    spark-client: http://Lab3.lan:4317
    devops: http://Lab3.lan:4317
    spark-runtime: http://otel-collector.observability.svc.cluster.local:4317

OTEL_SERVICE_NAME:
  value: spark-application
  contexts: [spark-runtime]

OTEL_SERVICE_NAMESPACE:
  value: spark
  contexts: [spark-runtime]

OTEL_DEPLOYMENT_ENVIRONMENT:
  value: production
  contexts: [spark-runtime]

# NFS Configuration
NFS_SERVER:
  value: Lab3.lan
  contexts: [spark-runtime, nfs, devops]

# Spark Mount Points
SPARK_MOUNT_BASE:
  value: /mnt/spark
  contexts: [spark-runtime, nfs]

# SPARK_EVENTS_MOUNT: Removed - using local /var/log/spark/events instead of NFS

SPARK_DATA_MOUNT:
  value: /mnt/spark/data
  contexts: [spark-runtime, nfs, spark-client]

# Spark Data Source
# TODO: This is wrong. Spark data is now in /mnt/spark/data. Must be unused.
SPARK_DATA_SOURCE:
  value: /home/gxbrooks/repos/spark-observability/spark/data
  contexts: [spark-runtime, nfs]

# NFS Export Paths
