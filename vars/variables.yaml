# Centralized variable definitions for all contexts
# Each variable has a value and a list of contexts where it is needed
# Contexts: observability, spark-image, spark-runtime


# Global variables
TZ:
  value: America/Chicago
  contexts: [observability, spark-image, spark-runtime]

PYTHON_VERSION:
  value: 3.11
  contexts: [spark-runtime, managed-node, spark-client, spark-image, ansible, devops]

JAVA_VERSION:
  value: 17
  contexts: [devops, managed-node, spark-client]

PYSPARK_PYTHON:
  value: python3.11
  contexts: [spark-runtime, spark-client, devops]

# PYSPARK_DRIVER_PYTHON is redundant - use PYSPARK_PYTHON instead
# PYSPARK_DRIVER_PYTHON:
#   value: python3.8
#   contexts: [spark-runtime, spark-client]


# Elasticsearch Stack Version
STACK_VERSION:
  value: 8.15.0
  contexts: [observability]

# Elasticsearch Data Retention Policies (for downsampling)
# Base retention is for the original 30-second sampling interval
ES_RETENTION_BASE:
  value: 2d
  contexts: [observability]

# 5-minute downsampled data retention
ES_RETENTION_5MIN:
  value: 4d
  contexts: [observability]

# 15-minute downsampled data retention
ES_RETENTION_15MIN:
  value: 8d
  contexts: [observability]

# 60-minute downsampled data retention
ES_RETENTION_60MIN:
  value: 12d
  contexts: [observability]

# Logstash Version
LOGSTASH_VERSION:
  value: 8.15.0
  contexts: [observability]

# unclear why CLUSTER_NAME is needed, see es01 service in docker-compose.yml
CLUSTER_NAME:
  value: dod
  contexts: [observability]

GRAFANA_VERSION:
  value: 11.3.0
  contexts: [observability]

# Observability runtime variables

# Elasticsearch variables
# Standardized naming: ES_* for Elasticsearch (ES already stands for Elasticsearch)
# Inside Docker containers, use service name; for external clients, use DNS hostname
ES_HOST:
  contexts: [observability, spark-runtime, elastic-agent, devops]
  values:
    observability: es01
    spark-runtime: GaryPC.lan
    devops: GaryPC.lan
    elastic-agent: GaryPC.lan
ES_PORT:
  value: 9200
  contexts: [observability, spark-runtime, elastic-agent, devops]
ES_USER:
  value: elastic
  contexts: [observability, spark-runtime, elastic-agent, devops]
ES_PASSWORD:
  value: myElastic2025
  contexts: [observability, spark-runtime, elastic-agent, devops]
# ES_URL: Consolidated Elasticsearch URL (replaces ELASTIC_URL)
# Used by Docker Compose and Elastic Agent
ES_URL:
  contexts: [observability, elastic-agent]
  values:
    observability: https://es01:9200
    elastic-agent: https://GaryPC.lan:9200

KUBERNETES_API_SERVER:
  value: Lab2.lan
  contexts: [elastic-agent]
# CA Certificate Paths
# CA_CERT: Path where services expect to find the certificate
# (same path for Docker containers and Linux hosts)
CA_CERT:
  value: /etc/ssl/certs/elastic/ca.crt
  contexts: [devops, observability, spark-runtime, elastic-agent]

# CA_CERT_PUBLISHED_PATH: Where init-certs publishes the CA certificate
# Services fetch from this location during install/start (pull-based model)
CA_CERT_PUBLISHED_PATH:
  value: /mnt/c/Volumes/certs/Elastic/ca.crt
  contexts: [observability, elastic-agent]

# Elasticsearch API Script Environment Variables (ES_* prefix)
# These variables are exported in init-index.sh for developer use with esapi/kapi commands
# Standardized naming: ES_* for Elasticsearch (ES already stands for Elasticsearch)
# Context-specific paths: devops (user dev) vs observability (docker container)
ES_DIR:
  contexts: [devops, observability]
  values:
    devops: ${HOME}/repos/elastic-on-spark/observability/elasticsearch
    observability: /usr/share/elasticsearch/elasticsearch
ES_CONFIG_DIR:
  value: ${ES_DIR}/config
  contexts: [devops, observability]
ES_OUTPUTS_DIR:
  value: ${ES_DIR}/outputs
  contexts: [devops, observability]
ES_BIN_DIR:
  value: ${ES_DIR}/bin
  contexts: [devops, observability]
LICENSE:
  value: basic
  contexts: [observability]

# Kibana variables (KB_* prefix)
EB_ENCRYPTION_KEY:
  value: c34d38b3a14956121ff2170e5030b471551370178f43e5626eec58b04a30fae2
  contexts: [observability] 
KB_HOST:
  contexts: [observability, devops]
  values:
    observability: kibana
    devops: GaryPC.lan
KB_PORT:
  value: 5601
  contexts: [observability, devops]
KB_USER:
  value: kibana_system
  contexts: [observability]
KB_PASSWORD:
  value: myElastic2025
  contexts: [observability, devops]
KB_MEM_LIMIT:
  value: 1073741824
  contexts: [observability]

# Logstash variables
LS_HOST:
  contexts: [observability, elastic-agent]
  values:
    observability: logstash01
    elastic-agent: GaryPC.lan
LS_PORT:
  value: 5044
  contexts: [observability]
# currently, metrics are sent straight to Elasticsearch, not via Logstash
# TODO: send metrics via regional Logstash servers
LS_DOCKER_METRICS_PORT:
  value: 5051
  contexts: [observability]
LS_SPARK_EVENTS_PORT:
  value: 5050
  contexts: [observability, elastic-agent]

# Grafana variables
GRAFANA_HOST:
  value: GaryPC.lan
  contexts: [observability]
GF_SERVER_HTTP_PORT:
  value: 3000
  contexts: [observability]
# See docker-compose.yml for admin user/password setup
GF_SECURITY_ADMIN_USER:
  value: admin
  contexts: [observability]
GF_SECURITY_ADMIN_PASSWORD:
  value: mysecretpassword
  contexts: [observability]

# Elastic Agent variables
# Currently we use systemd env.conf file format for Elastic Agent on Linux.
# env.con is in elastic-agent/env.conf
# there is a playbook to inject env.conf into the Elastic Agent service environment.
# for Windows there is a task to populate environment variables from the Linux version
# All this needs to be integrated with vars/generate_env.py
ELASTIC_AGENT_VERSION:
  value: 8.15.0
  contexts: [elastic-agent-ansible]
 

# Spark runtime variables (moved from deprecated spark-image context)
SPARK_VERSION:
  value: 4.0.1
  contexts: [spark-runtime, ansible, spark-image, devops, spark-client]

# System location of the Spark installation
SPARK_HOME:
  value: /opt/spark
  contexts: [spark-runtime, ansible]

# Google data access
# A relative path may not be consistent between iPython and spark submit
# (but should be)
GOOGLE_APPLICATION_CREDENTIALS:
  value: /opt/spark/apps/bq-api-key.json
  contexts: [spark-runtime]

# Spark runtime variables (for K8s ConfigMap)
SPARK_MASTER:
  value: spark://spark-master-0.spark-master-headless.spark.svc.cluster.lan:7077
  contexts: [spark-runtime]
SPARK_MASTER_HOST:
  contexts: [spark-runtime, observability, ispark, spark-client]
  values:
    spark-runtime: spark-master-0.spark-master-headless.spark.svc.cluster.lan
    observability: Lab2.lan
    ispark: Lab2.lan
    spark-client: Lab2.lan
SPARK_MASTER_PORT:
  contexts: [spark-runtime, observability, ispark, spark-client]
  values:
    spark-runtime: 7077
    observability: 31686
    ispark: 31686
    spark-client: 31686
  
# Spark network and timeout settings
# Increased timeouts to handle connection resets and network instability
SPARK_NETWORK_TIMEOUT:
  value: 900s
  contexts: [spark-runtime]
SPARK_RPC_ASK_TIMEOUT:
  value: 120s
  contexts: [spark-runtime]
SPARK_RPC_LOOKUP_TIMEOUT:
  value: 120s
  contexts: [spark-runtime]
SPARK_EXECUTOR_HEARTBEAT_INTERVAL:
  value: 60s
  contexts: [spark-runtime]
SPARK_EVENTS_DIR:
  value: /mnt/spark/events
  contexts: [spark-runtime, ansible, elastic-agent, spark-client]
SPARK_CONF_DIR:
  value: /home/gxbrooks/repos/elastic-on-spark/spark/conf
  contexts: [spark-client, devops]

# Spark client JAR paths (for spark-defaults.conf)
SPARK_OTEL_LISTENER_JAR:
  value: ~/repos/elastic-on-spark/spark/otel-listener/spark-otel-listener-1.0.0.jar
  contexts: [devops, spark-client]
SPARK_NO_DAEMONIZE:
  value: true
  contexts: [spark-runtime]
SPARK_DAEMON_JAVA_OPTS:
  value: -Dlog4j2.configurationFile=file:///opt/spark/conf-extra/log4j2-cluster.properties
  contexts: [spark-runtime]

# Spark user specific variables
# TODO: Utilize these variables in the spark playbooks
SPARK_USER:
  value: ansible
  contexts: [spark-runtime, ansible]

USER_SPARK_HOME:
  value: /home/ansible/spark
  contexts: [ansible]

# OpenTelemetry Configuration for Spark
OTEL_EXPORTER_OTLP_ENDPOINT:
  contexts: [spark-client, devops, spark-runtime]
  values:
    spark-client: http://GaryPC.lan:4317
    devops: http://GaryPC.lan:4317
    spark-runtime: http://otel-collector.observability.svc.cluster.lan:4317

OTEL_SERVICE_NAME:
  value: spark-application
  contexts: [spark-runtime]

OTEL_SERVICE_NAMESPACE:
  value: spark
  contexts: [spark-runtime]

OTEL_DEPLOYMENT_ENVIRONMENT:
  value: production
  contexts: [spark-runtime]

# NFS Configuration
NFS_SERVER:
  value: Lab2.lan
  contexts: [spark-runtime, nfs]

# Spark Mount Points
SPARK_MOUNT_BASE:
