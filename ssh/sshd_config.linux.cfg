# from ./ssh/sshd_config.linux.cfg
# SSH Demon Linux configuration 

# /etc/ssh/sshd_config - Hardened SSH configuration with best practices

# This is the sshd server system-wide configuration file.  See
# sshd_config(5) for more information.

# This sshd was compiled with PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games

# The strategy used for options in the default sshd_config shipped with
# OpenSSH is to specify options with their default value where
# possible, but leave them commented.  Uncommented options override the
# default value.

# Include /etc/ssh/sshd_config.d/*.conf

# Use SSH protocol 2 exclusively to ensure modern security (best practice).
# Protocol 2

# Specify the listening port.
# Replace <PORT> with the actual port number during installation.
Port <PORT>
# Port 22

#AddressFamily any
#ListenAddress 0.0.0.0
#ListenAddress ::

# Specify strong host keys for server authentication.
# RSA key for server identity.
# HostKey /etc/ssh/ssh_host_rsa_key
# HostKey /etc/ssh/ssh_host_ecdsa_key
# HostKey /etc/ssh/ssh_host_ed25519_key

# Ciphers and keying
#RekeyLimit default none

# Logging
#SyslogFacility AUTH
#LogLevel INFO

# Authentication:

#LoginGraceTime 2m
#PermitRootLogin prohibit-password
#StrictModes yes
#MaxAuthTries 6
#MaxSessions 10

# Disable direct root login to force users to log in with non-root accounts.
# Security note: Enforcing non-root logins increases accountability.
# PermitRootLogin no

# Enable password authentication to allow for the key delivery mechanism.
# Note: Although key-based authentication is preferred, this is enabled for setup purposes.
PasswordAuthentication yes

PubkeyAuthentication yes
# Expect .ssh/authorized_keys2 to be disregarded by default in future.
AuthorizedKeysFile	.ssh/authorized_keys .ssh/authorized_keys2

# AuthorizedKeysFile %h/.ssh/authorized_keys
# Set logging to a detailed level for audit and troubleshooting purposes.
# Logs detailed connection information for security auditing.
# LogLevel INFO

# Restrict SSH access to users in the "sshusers" group only.
# AllowGroups sshusers
# AllowUsers gxbrooks

# Change to yes to enable challenge-response passwords (beware issues with
# some PAM modules and threads)
KbdInteractiveAuthentication no

# Disable challenge-response authentication as it is generally less secure.
# ChallengeResponseAuthentication no

# Limit the maximum number of authentication attempts per connection to reduce brute-force risks.
# Helps mitigate brute-force attacks by limiting retries.
# MaxAuthTries 3

# Set the login grace time (the amount of time allowed for login before disconnecting idle attempts).
# A short grace time minimizes the window for unauthorized access attempts.
# LoginGraceTime 20s

# Configure client keep-alive settings to drop idle sessions.
# Sends a keepalive message every 5 minutes.
# ClientAliveInterval 300

# Disconnects if two consecutive keepalive messages are not responded to.
# ClientAliveCountMax 2

#AuthorizedKeysCommand none
#AuthorizedKeysCommandUser nobody

# For this to work you will also need host keys in /etc/ssh/ssh_known_hosts
#HostbasedAuthentication no
# Change to yes if you don't trust ~/.ssh/known_hosts for
# HostbasedAuthentication
#IgnoreUserKnownHosts no
# Don't read the user's ~/.rhosts and ~/.shosts files
#IgnoreRhosts yes

# To disable tunneled clear text passwords, change to no here!
#PasswordAuthentication yes
#PermitEmptyPasswords no

#Kerberos options
#KerberosAuthentication no
#KerberosOrLocalPasswd yes
#KerberosTicketCleanup yes
#KerberosGetAFSToken no

# GSSAPI options
#GSSAPIAuthentication no
#GSSAPICleanupCredentials yes
#GSSAPIStrictAcceptorCheck yes
#GSSAPIKeyExchange no
# Set this to 'yes' to enable PAM authentication, account processing,
# and session processing. If this is enabled, PAM authentication will
# be allowed through the KbdInteractiveAuthentication and
# PasswordAuthentication.  Depending on your PAM configuration,
# PAM authentication via KbdInteractiveAuthentication may bypass
# the setting of "PermitRootLogin prohibit-password".
# If you just want the PAM account and session checks to run without
# PAM authentication, then enable this but set PasswordAuthentication
# and KbdInteractiveAuthentication to 'no'.
UsePAM no

#AllowAgentForwarding yes
#AllowTcpForwarding yes
#GatewayPorts no

# Disable X11 forwarding unless required.
# Reduces the attack surface by not allowing X11 sessions.
X11Forwarding yes
#X11DisplayOffset 10
#X11UseLocalhost yes
#PermitTTY yes
PrintMotd no

#PrintLastLog yes
#TCPKeepAlive yes
#PermitUserEnvironment no
#Compression delayed
#ClientAliveInterval 0
#ClientAliveCountMax 3
#UseDNS no
#PidFile /run/sshd.pid
#MaxStartups 10:30:100
#PermitTunnel no
#ChrootDirectory none
#VersionAddendum none

# Use privilege separation
# UsePrivilegeSeparation sandbox

# Enable TCP keepalive
TCPKeepAlive yes

# Disable TCP/IP port forwarding if not explicitly needed.
# Limits the ability to tunnel other connections via SSH.
# AllowTcpForwarding no

# Allow client to pass locale environment variables
AcceptEnv LANG LC_*

# Enable scp
# This line ensures that the SFTP subsystem is enabled, which SCP also uses indirectly.
Subsystem sftp /usr/lib/openssh/sftp-server


# Define strong cryptographic settings for algorithms used during the SSH session.
# Only allow strong symmetric ciphers.
# Ciphers aes256-ctr,aes192-ctr,aes128-ctr

# Use strong message authentication codes.
# MACs hmac-sha2-512,hmac-sha2-256

# Use secure key exchange methods.
# KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org
