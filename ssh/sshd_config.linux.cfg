# WSL sshd_config template for GaryPC (mirrored networking)
#
# Deployed by Assert-All.ps1 to ~/repos/spark-observability/ssh/sshd_config.linux.cfg
# before assert_ssh_server.sh runs.  The script then copies this to /etc/ssh/sshd_config.
#
# Port assignment in the mirrored-networking stack:
#   22   - Windows OpenSSH (holds this on the shared IP stack; cannot be reused)
#   2222 - WSL sshd (directly accessible from the LAN and from within WSL)
#
# Port 22 cannot be used because Windows OpenSSH already owns it on the shared IP stack.
# Port 2222 is used directly by sshd with no portproxy in front of it.
# External machines (and WSL itself) connect to garypc.lan:2222 directly.
# Windows-local connections should use 127.0.0.1:2222 (mirrored networking loopback).

# /etc/ssh/sshd_config - Hardened SSH configuration for WSL (mirrored networking)

Port 2222

#AddressFamily any
ListenAddress 0.0.0.0
ListenAddress ::

# Ciphers and keying
#RekeyLimit default none

# Logging
#SyslogFacility AUTH
#LogLevel INFO

# Authentication

# Enable password authentication to allow for the initial key delivery mechanism.
PasswordAuthentication yes

PubkeyAuthentication yes
AuthorizedKeysFile	%h/.ssh/authorized_keys .ssh/authorized_keys2

# Challenge-response authentication disabled (less secure).
KbdInteractiveAuthentication no

# Restrict SSH access: uncomment and set to the required users when ready.
# AllowUsers gxbrooks ansible

# UsePAM disabled to avoid PAM complexity in WSL.
UsePAM no

#AllowAgentForwarding yes
#AllowTcpForwarding yes
#GatewayPorts no

X11Forwarding yes
PrintMotd no

# Enable TCP keepalive
TCPKeepAlive yes

# Keep-alive settings
ClientAliveInterval 300
ClientAliveCountMax 2

# Allow client to pass locale environment variables
AcceptEnv LANG LC_*

# Enable SFTP subsystem
Subsystem sftp /usr/lib/openssh/sftp-server
