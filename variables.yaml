# Centralized variable definitions for all contexts
# Each variable has a value and a list of contexts where it is needed
# Contexts: observability, spark-image, spark-runtime


# Global variables
TZ:
  value: America/Chicago
  contexts: [observability, spark-image, spark-runtime]

PYTHON_VERSION:
  value: 3.11
  contexts: [spark-runtime, client, managed-node, spark-client, spark-image, ansible, devops]

JAVA_VERSION:
  value: 17
  contexts: [devops, managed-node, spark-client]

PYSPARK_PYTHON:
  value: python3.11
  contexts: [spark-runtime, spark-client, devops]

# PYSPARK_DRIVER_PYTHON is redundant - use PYSPARK_PYTHON instead
# PYSPARK_DRIVER_PYTHON:
#   value: python3.8
#   contexts: [spark-runtime, spark-client]


# Elasticsearch Stack Version
STACK_VERSION:
  value: 8.15.0
  contexts: [observability]

# Elasticsearch Data Retention Policies (for downsampling)
# Base retention is for the original 30-second sampling interval
ES_RETENTION_BASE:
  value: 2d
  contexts: [observability]

# 5-minute downsampled data retention
ES_RETENTION_5MIN:
  value: 4d
  contexts: [observability]

# 15-minute downsampled data retention
ES_RETENTION_15MIN:
  value: 8d
  contexts: [observability]

# 60-minute downsampled data retention
ES_RETENTION_60MIN:
  value: 12d
  contexts: [observability]

# Logstash Version
LOGSTASH_VERSION:
  value: 8.15.0
  contexts: [observability]

# unclear why CLUSTER_NAME is needed, see es01 service in docker-compose.yml
CLUSTER_NAME:
  value: dod
  contexts: [observability]

GRAFANA_VERSION:
  value: 11.3.0
  contexts: [observability]

# Observability runtime variables

# Elasticsearch variables
# Inside Docker containers, use service name; for external clients, use DNS hostname
ELASTIC_HOST:
  contexts: [observability, devops]
  values:
    devops: ${ELASTIC_HOST_CLIENT}
    observability: es01
ELASTIC_HOST_CLIENT:
  value: GaryPC.local
  contexts: [spark-runtime, devops]
# For Elastic Agent on hosts, use GaryPC WSL
ELASTIC_HOST_EXTERNAL:
  value: GaryPC.local
  contexts: [elastic-agent]
ELASTIC_PORT:
  value: 9200
  contexts: [observability, spark-runtime, devops]
ELASTIC_USER:
  value: elastic
  contexts: [observability, spark-runtime, elastic-agent, devops]
ELASTIC_PASSWORD:
  value: myElastic2025
  contexts: [observability, spark-runtime, elastic-agent, devops]
ELASTIC_URL:
  value: https://es01:9200
  contexts: [observability]
ELASTIC_URL_EXTERNAL:
  value: https://GaryPC.local:9200
  contexts: [elastic-agent]

KUBERNETES_API_SERVER:
  value: Lab2.local
  contexts: [elastic-agent]
CA_CERT:
  value: /etc/ssl/certs/elastic/ca.crt
  contexts: [devops]
CA_CERT_LINUX_PATH:
  value: /etc/ssl/certs/elastic/ca.crt
  contexts: [observability, spark-runtime, elastic-agent]
# Not clear where needed.
CA_CERT_WINDOWS_PATH:
  value: C:\\Volumes\\certs\\ca.crt
  contexts: [observability]
ES_CA_CERT_PATH:
  value: /usr/share/elasticsearch/config/certs/ca/ca.crt
  contexts: [observability]

# Elasticsearch API Script Environment Variables (ES_* prefix)
# These variables are exported in init-index.sh for developer use with esapi/kapi commands
# Standardized naming: ES_* for Elasticsearch (ES already stands for Elasticsearch)
# Context-specific paths: devops (user dev) vs observability (docker container)
ES_DIR:
  contexts: [devops, observability]
  values:
    devops: ${HOME}/repos/elastic-on-spark/observability/elasticsearch
    observability: /usr/share/elasticsearch/elasticsearch
ES_CONFIG_DIR:
  value: ${ES_DIR}/config
  contexts: [devops, observability]
ES_OUTPUTS_DIR:
  value: ${ES_DIR}/outputs
  contexts: [devops, observability]
ES_BIN_DIR:
  value: ${ES_DIR}/bin
  contexts: [devops, observability]
# ES_* variables for Elasticsearch connection (ES already stands for Elasticsearch)
ES_HOST:
  contexts: [devops, observability]
  values:
    devops: ${ELASTIC_HOST_CLIENT}
    observability: ${ELASTIC_HOST}
ES_PORT:
  value: ${ELASTIC_PORT}
  contexts: [devops, observability]
ES_USER:
  value: ${ELASTIC_USER}
  contexts: [devops, observability]
ES_PASSWORD:
  value: ${ELASTIC_PASSWORD}
  contexts: [devops, observability]
# CA_CERT path for Elasticsearch API scripts (context-specific)
ES_CA_CERT:
  contexts: [devops, observability]
  values:
    devops: ${CA_CERT}
    observability: /usr/share/elasticsearch/config/certs/ca/ca.crt
LICENSE:
  value: basic
  contexts: [observability]

