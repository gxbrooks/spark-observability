# Centralized variable definitions for all contexts
# Each variable has a value and a list of contexts where it is needed
# Contexts: observability, spark-image, spark-runtime


# Global variables
TZ:
  value: America/Chicago
  contexts: [observability, spark-image, spark-runtime]


# unclear why CLUSTER_NAME is needed, see es01 service in docker-compose.yml
CLUSTER_NAME:
  value: docker-custer
  contexts: [observability]

# Elasticsearch image build variables
STACK_VERSION:
  value: 8.7.1
  contexts: [observability]

# Observability runtime variables

# Elasticsearch variables
ELASTIC_HOST:
  value: es01
  contexts: [observability, spark-runtime]
ELASTIC_PORT:
  value: 9200
  contexts: [observability, spark-runtime]
ELASTIC_USER:
  value: elastic
  contexts: [observability, spark-runtime]
ELASTIC_PASSWORD:
  value: myElastic2025
  contexts: [observability, spark-runtime]
ELASTIC_URL:
  value: https://es01:9200
  contexts: [observability]
CA_CERT_LINUX_PATH:
  value: /etc/ssl/certs/elastic/ca.crt
  contexts: [observability, spark-runtime]
# Not clear where needed.
CA_CERT_WINDOWS_PATH:
  value: C:\\Volumes\\certs\\ca.crt
  contexts: [observability]
ES_CA_CERT_PATH:
  value: /usr/share/elasticsearch/config/certs/ca/ca.crt
  contexts: [observability]
LICENSE:
  value: basic
  contexts: [observability]

# Kibana variables
ENCRYPTION_KEY:
  value: c34d38b3a14956121ff2170e5030b471551370178f43e5626eec58b04a30fae2
  contexts: [observability] 
KIBANA_HOST:
  value: kibana
  contexts: [observability]
KIBANA_PORT:
  value: 5601
  contexts: [observability]
KIBANA_USER:
  value: kibana_system
  contexts: [observability]
KIBANA_PASSWORD:
  value: myElastic2025
  contexts: [observability]
KB_MEM_LIMIT:
  value: 1073741824
  contexts: [observability]

# Logstash variables
LS_HOST:
  value: logstash01
  contexts: [observability]
LOGSTASH_PORT:
  value: 5044
  contexts: [observability]
# currently, metrics are sent straight to Elasticsearch, not via Logstash
# TODO: send metrics via regional Logstash servers
LS_DOCKER_METRICS_PORT:
  value: 5051
  contexts: [observability]
LS_SPARK_EVENTS_PORT:
  value: 5050
  contexts: [observability]

# Grafana variables
GRAFANA_HOST:
  value: GaryPC.lan
  contexts: [observability]
GF_SERVER_HTTP_PORT:
  value: 3000
  contexts: [observability]
# See docker-compose.yml for admin user/password setup
GF_SECURITY_ADMIN_USER:
  value: admin
  contexts: [observability]
GF_SECURITY_ADMIN_PASSWORD:
  value: mysecretpassword
  contexts: [observability]

# Elastic Agent variables
# Currently we use systemd env.conf file format for Elastic Agent on Linux.
# env.con is in elastic-agent/env.conf
# there is a playbook to inject env.conf into the Elastic Agent service environment.
# for Windows there is a task to populate environment variables from the Linux version
# All this needs to be integrates with linux/generate_env.py
ELASTIC_AGENT_STACK_VERSION:
  value: 8.15.0
  contexts: []
 
# TODO: may not be referenced yet
ELASTIC_AGENT_HOME:
  value: /usr/share/elastic-agent
  contexts: []

# Spark image build-time and installation variables
SPARK_VERSION:
  value: 3.5.1
  contexts: [spark-image, ansible]

# System location of the Spark installation
SPARK_HOME:
  value: /opt/spark
  contexts: [spark-image, ansible]
HADOOP_HOME:
  value: /opt/spark
  contexts: [spark-image]
PYSPARK_PYTHON:
  value: python3
  contexts: [spark-image]

# Google data accesss
# A relative path may not be consistent between iPython and spark submit
# (but should be)
GOOGLE_APPLICATION_CREDENTIALS:
  value: /opt/spark/apps/bq-api-key.json
  contexts: [spark-image]

# Spark runtime variables (for K8s ConfigMap)
SPARK_MASTER:
  value: spark://spark-master-0.spark-master-headless.spark.svc.cluster.local:7077
  contexts: [spark-runtime]
SPARK_MASTER_HOST:
  value: spark-master-0.spark-master-headless.spark.svc.cluster.local
  contexts: [spark-runtime]
SPARK_MASTER_PORT:
  value: 7077
  contexts: [spark-runtime]
  
# Spark network and timeout settings
SPARK_NETWORK_TIMEOUT:
  value: 600s
  contexts: [spark-runtime]
SPARK_RPC_ASK_TIMEOUT:
  value: 60s
  contexts: [spark-runtime]
SPARK_RPC_LOOKUP_TIMEOUT:
  value: 60s
  contexts: [spark-runtime]
SPARK_EXECUTOR_HEARTBEAT_INTERVAL:
  value: 120s
  contexts: [spark-runtime]
SPARK_EVENTS_DIR:
  value: /mnt/spark-events
  contexts: [spark-runtime, ansible]
SPARK_NO_DAEMONIZE:
  value: true
  contexts: [spark-runtime]

# Spark user specific variables
# TODO: Utilize these variables in the spark playbooks
SPARK_USER:
  value: ansible
  contexts: [spark-runtime, ansible]

USER_SPARK_HOME:
  value: /home/ansible/spark
  contexts: [ansible]

