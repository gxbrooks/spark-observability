apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: spark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
        - name: spark-worker
          image: "localhost:5000/spark:${SPARK_VERSION}"
          imagePullPolicy: Always
          command: ["./entrypoint.sh", "worker"]
          envFrom:
            - configMapRef:
                name: spark-configmap
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: spark-events
              mountPath: /mnt/spark-events
      volumes:
        - name: spark-events
          hostPath:
            path: /mnt/spark-events
            type: DirectoryOrCreate
