apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: spark
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
        - name: spark-worker
          image: myrepo/spark:3.5.5
          command: ["./entrypoint.sh", "worker"]
          envFrom:
            - configMapRef:
                name: spark-configmap
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "6"
              memory: "40Gi"
            limits:
              cpu: "6"
              memory: "40Gi"
