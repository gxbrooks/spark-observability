#
# Log4j2 configuration for Spark cluster/server components
# Used by: Master, Worker, History Server, Executors in Kubernetes
#
# Follows logging guidelines:
# - File logging ONLY (no console)
# - 10 files × 20 MB rotation policy
# - 30 day retention
#

# RollingFileAppender - file logging only
appender.rolling.type = RollingFile
appender.rolling.name = RollingFile
appender.rolling.fileName = ${env:SPARK_LOG_DIR:-/opt/spark/logs}/spark-app.log
appender.rolling.filePattern = ${env:SPARK_LOG_DIR:-/opt/spark/logs}/spark-app-%d{yyyy-MM-dd}-%i.log
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n%ex

# Rotation policies
appender.rolling.policies.type = Policies

# Time-based: Daily rotation
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.policies.time.modulate = true

# Size-based: 20 MB per file
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 20MB

# Retention: Keep 10 files maximum
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 10
appender.rolling.strategy.fileIndex = min

# Delete files older than 30 days
appender.rolling.strategy.delete.type = Delete
appender.rolling.strategy.delete.basePath = ${env:SPARK_LOG_DIR:-/opt/spark/logs}
appender.rolling.strategy.delete.maxDepth = 1
appender.rolling.strategy.delete.ifLastModified.type = IfLastModified
appender.rolling.strategy.delete.ifLastModified.age = 30d

# EventEmitterAppender - separate log file for OTel Listener and Event Emitter
appender.event-rolling.type = RollingFile
appender.event-rolling.name = EventRollingFile
appender.event-rolling.fileName = ${env:SPARK_LOG_DIR:-/opt/spark/logs}/event-otel-listener.log
appender.event-rolling.filePattern = ${env:SPARK_LOG_DIR:-/opt/spark/logs}/event-otel-listener-%d{yyyy-MM-dd}-%i.log
appender.event-rolling.layout.type = PatternLayout
appender.event-rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n%ex

# Rotation policies (same as main appender)
appender.event-rolling.policies.type = Policies
appender.event-rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.event-rolling.policies.time.interval = 1
appender.event-rolling.policies.time.modulate = true
appender.event-rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.event-rolling.policies.size.size = 20MB

# Retention: Keep 10 files maximum
appender.event-rolling.strategy.type = DefaultRolloverStrategy
appender.event-rolling.strategy.max = 10
appender.event-rolling.strategy.fileIndex = min

# Delete files older than 30 days
appender.event-rolling.strategy.delete.type = Delete
appender.event-rolling.strategy.delete.basePath = ${env:SPARK_LOG_DIR:-/opt/spark/logs}
appender.event-rolling.strategy.delete.maxDepth = 1
appender.event-rolling.strategy.delete.ifLastModified.type = IfLastModified
appender.event-rolling.strategy.delete.ifLastModified.age = 30d

# Root logger - FILE ONLY (no console)
rootLogger.level = info
rootLogger.appenderRefs = rolling
rootLogger.appenderRef.rolling.ref = RollingFile

# OTel Listener and Event Emitter loggers - use separate file
logger.otel.name = com.elastic.spark.otel
logger.otel.level = info
logger.otel.appenderRefs = event-rolling
logger.otel.appenderRef.event-rolling.ref = EventRollingFile
logger.otel.additivity = false  # Don't send to root logger

# Set the default spark-shell/spark-sql log level to WARN
logger.repl.name = org.apache.spark.repl.Main
logger.repl.level = warn

logger.thriftserver.name = org.apache.spark.sql.hive.thriftserver.SparkSQLCLIDriver
logger.thriftserver.level = warn

# Settings to quiet third party logs that are too verbose
logger.jetty1.name = org.sparkproject.jetty
logger.jetty1.level = warn
logger.jetty2.name = org.sparkproject.jetty.util.component.AbstractLifeCycle
logger.jetty2.level = error
logger.replexprTyper.name = org.apache.spark.repl.SparkIMain$exprTyper
logger.replexprTyper.level = info
logger.replSparkILoopInterpreter.name = org.apache.spark.repl.SparkILoop$SparkILoopInterpreter
logger.replSparkILoopInterpreter.level = info
logger.parquet1.name = org.apache.parquet
logger.parquet1.level = error
logger.parquet2.name = parquet
logger.parquet2.level = error

# SPARK-9183: Settings to avoid annoying messages when looking up nonexistent UDFs
logger.RetryingHMSHandler.name = org.apache.hadoop.hive.metastore.RetryingHMSHandler
logger.RetryingHMSHandler.level = fatal
logger.FunctionRegistry.name = org.apache.hadoop.hive.ql.exec.FunctionRegistry
logger.FunctionRegistry.level = error

# Suppress Hadoop native library warning (libraries not installed in Docker images)
logger.NativeCodeLoader.name = org.apache.hadoop.util.NativeCodeLoader
logger.NativeCodeLoader.level = error

# Suppress "Got status update for unknown executor" warnings
# This happens during normal executor shutdown when an executor sends a status update
# after the master has already removed it from tracking. It's harmless but noisy.
logger.CoarseGrainedSchedulerBackend.name = org.apache.spark.scheduler.cluster.CoarseGrainedSchedulerBackend
logger.CoarseGrainedSchedulerBackend.level = warn

