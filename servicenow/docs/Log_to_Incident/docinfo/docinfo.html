<style>
/* HTML export + preview: listings 8pt; tables 9pt. */
.listingblock > .content > pre,
.listingblock > .content > pre > code,
.literalblock > pre,
.literalblock > pre > code {
  font-size: 8pt !important;
  line-height: 1.25 !important;
}

table.tableblock {
  font-size: 9pt !important;
  line-height: 1.3 !important;
}
table.tableblock th,
table.tableblock td {
  font-size: 9pt !important;
}

/* Figure 1 — 0.5in indent */
.imageblock.figure-indent,
div.content div.imageblock.figure-indent {
  margin-left: 0.5in;
}

/*
 * Inline literals for standalone HTML (browser). Preview uses
 * .vscode/asciidoc-preview.css via asciidoc.preview.additionalStyles — not this file.
 */
code {
  color: inherit !important;
}
:not(pre):not([class^=L]) > code {
  background: color-mix(in srgb, currentColor 14%, transparent) !important;
}
</style>
