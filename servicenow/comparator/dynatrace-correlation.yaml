---
# Dynatrace partitioning correlation for compare diagnostics.
#
# Declares expected observability boundaries — not a catalog of Dynatrace entities
# (those are dynamically discovered). Values align with:
#   - vars/variables.yaml (dynatrace-ansible context: DT_*)
#   - observability/dynatrace/tenants/pdt20158/management-zones/spark-observability/
#
# Applied on tenant by observability/dynatrace/deploy.yml (partitioning tags).

partitioning:
  management_zone: Spark Observability
  host_group: spark-observability
  environment: lab
  owned_by: gbrooks

kubernetes_clusters:
  - dynatrace_name: spark-observability-k8s
    servicenow_name: brooks-lab
    cmdb_location: brooks-lab

auto_tags:
  - key: Project
    value: spark-observability
  - key: Environment
    value: lab
  - key: OwnedBy
    value: gbrooks

management_zone_expected_for:
  - HOST
  - PROCESS_GROUP
  - SERVICE
  - KUBERNETES_CLUSTER
  - KUBERNETES_NODE

reference_host_names:
  - lab1
  - lab2
  - lab3

recommendations:
  missing_management_zone: >-
    Re-apply management zone rules: cd ansible && ansible-playbook -i inventory.yml
    playbooks/observability/dynatrace/deploy.yml --tags partitioning
  missing_cluster_management_zone: >-
    Verify KUBERNETES_CLUSTER_NAME in management-zone.json matches
    kubernetes_clusters[].dynatrace_name; re-run apply_management_zone.yml
  missing_process_group_management_zone: >-
    Project hosts are in the expected management zone but process groups are not —
    verify hostToPGPropagation on the HOST rule in management-zone.json and
    that OneAgent assigns host group spark-observability
  sn_location_mismatch: >-
    CMDB host location does not match scope unit cmdb_location hint — update cmn_location
    on the CI or adjust the scope correlation registry
  missing_canonical_tag: >-
    Run discovery playbooks and fix cmdb_key_value ACLs (servicenow/docs/install.md §6.3)
