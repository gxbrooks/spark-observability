---
# Dynatrace monitoring — CSDM specification
# Runtime labels: Dynakube OneAgent pod labels (single source of truth)
# Business Application Observability Platform is defined in observability-platform.csdm.yaml

business_services:
  - name: Dynatrace Monitoring
    identifier: dynatrace-monitoring
    short_description: Dynatrace SaaS tenant, OneAgent, and Kubernetes monitoring
    operational_status: "1"
    parent_business_application: Observability Platform
    owned_by: gbrooks
    business_criticality: "4 - not critical"

application_services:
  - name: Dynatrace Tenant
    identifier: dynatrace-tenant
    short_description: Dynatrace SaaS environment — problems, metrics, and event ingest
    operational_status: "1"
    parent_business_service: Dynatrace Monitoring
    platform: saas
    service_mapping: manual
    discover: false
    owned_by: gbrooks
    business_criticality: "4 - not critical"

  - name: "Dynatrace OneAgent ({host})"
    identifier: "dynatrace-oneagent-{host_lower}"
    short_description: "Dynatrace OneAgent pod on Kubernetes node {host}"
    operational_status: "1"
    parent_business_service: Dynatrace Monitoring
    platform: kubernetes
    service_mapping: tags
    discover: false
    environment: on-prem
    location: brooks-lab
    owned_by: gbrooks
    business_criticality: "4 - not critical"
    depends_on:
      - Dynatrace Tenant
    expand:
      inventory_group: k8s_nodes
