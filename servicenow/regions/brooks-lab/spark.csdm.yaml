---
# Spark — CSDM specification
# Runtime labels: ansible/roles/spark/templates/*.yaml.j2 (single source of truth)

business_applications:
  - name: Data and Analytic Services
    identifier: data-and-analytic-services
    short_description: Data processing and analytics platform services
    operational_status: "1"
    active: "true"
    business_owner: gbrooks
    it_application_owner: gbrooks

business_services:
  - name: Apache Spark
    identifier: apache-spark
    short_description: Distributed data processing cluster
    operational_status: "1"
    parent_business_application: Data and Analytic Services
    owned_by: gbrooks
    business_criticality: "4 - not critical"

application_services:
  - name: Spark Master
    identifier: spark-master
    short_description: Spark master — Kubernetes StatefulSet
    operational_status: "1"
    parent_business_service: Apache Spark
    platform: kubernetes
    service_mapping: tags
    discover: false
    service_tier: app
    environment: on-prem
    location: brooks-lab
    cluster: brooks-lab
    namespace: spark
    owned_by: gbrooks
    business_criticality: "4 - not critical"
    depends_on:
      - OpenTelemetry Collector
      - Logstash
      - Elasticsearch
      - name: lab3
        type: nfs_server

  - name: Spark History Server
    identifier: spark-history-server
    short_description: Spark history server — completed application UI
    operational_status: "1"
    parent_business_service: Apache Spark
    platform: kubernetes
    service_mapping: tags
    discover: false
    service_tier: web
    environment: on-prem
    location: brooks-lab
    cluster: brooks-lab
    namespace: spark
    owned_by: gbrooks
    business_criticality: "4 - not critical"
    depends_on:
      - OpenTelemetry Collector
      - Logstash
      - Elasticsearch
      - name: lab3
        type: nfs_server

  - name: Spark Client
    identifier: spark-client
    short_description: PySpark client-mode driver — logical service across all client hosts (enterprise)
    operational_status: "1"
    parent_business_service: Apache Spark
    platform: host
    service_mapping: manual
    discover: false
    service_tier: app
    environment: on-prem
    location: brooks-lab
    owned_by: gbrooks
    business_criticality: "4 - not critical"
    depends_on:
      - Spark Master
      - name: lab3
        type: nfs_server

  - name: Spark Worker
    identifier: spark-worker
    short_description: Spark workers — Kubernetes Deployment fleet (horizontally scaled)
    operational_status: "1"
    parent_business_service: Apache Spark
    platform: kubernetes
    service_mapping: tags
    discover: false
    service_tier: compute
    environment: on-prem
    location: brooks-lab
    cluster: brooks-lab
    namespace: spark
    owned_by: gbrooks
    business_criticality: "4 - not critical"
    depends_on:
      - OpenTelemetry Collector
      - Logstash
      - Elasticsearch
      - name: lab3
        type: nfs_server

  # Remove legacy per-node worker Application Services (replaced by single Spark Worker above).
  - name: Spark Worker (Lab1)
    identifier: spark-worker-lab1
    csdm_op: delete

  - name: Spark Worker (Lab2)
    identifier: spark-worker-lab2
    csdm_op: delete
