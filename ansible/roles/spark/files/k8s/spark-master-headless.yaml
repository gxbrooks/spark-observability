apiVersion: v1
kind: Service
metadata:
  name: spark-master-headless
  namespace: spark
  labels:
    app: spark-master
spec:
  clusterIP: None  # This makes it a headless service
  selector:
    app: spark-master
  ports:
    - name: spark
      protocol: TCP
      port: 7077
      targetPort: 7077
    - name: webui
      protocol: TCP
      port: 8080
      targetPort: 8080
