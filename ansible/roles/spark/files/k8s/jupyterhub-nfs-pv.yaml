---
# PersistentVolume for JupyterHub database using NFS on Lab2
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jupyterhub-db-pv
  labels:
    app: jupyterhub
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: Lab2.lan
    path: /srv/nfs/jupyterhub
  mountOptions:
    - nfsvers=4.1
    - hard
    - timeo=600
    - retrans=2
---
# PersistentVolumeClaim for JupyterHub database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hub-db-dir
  namespace: spark
  labels:
    app: jupyterhub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  selector:
    matchLabels:
      app: jupyterhub

