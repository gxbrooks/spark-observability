spark.master                           spark://spark-master-0.spark-master-headless.spark.svc.cluster.local:7077
spark.eventLog.enabled                 true
spark.eventLog.dir                     /mnt/spark-events
spark.history.fs.logDirectory          /mnt/spark-events
spark.executor.memory                  8g
spark.driver.memory                    4g

# Network configuration for better DNS resolution
spark.driver.host                      ${SPARK_LOCAL_HOSTNAME}
spark.driver.bindAddress               ${SPARK_LOCAL_IP}
spark.network.timeout                  120s
spark.rpc.askTimeout                   60s
spark.rpc.lookupTimeout                60smaster                           spark://spark-master:7077
spark.eventLog.enabled                 true
spark.eventLog.dir                     /mnt/spark-events
spark.history.fs.logDirectory          /mnt/spark-events
spark.executor.memory                  8g
spark.driver.memory                    4g
# DNS resolution settings
spark.driver.bindAddress               0.0.0.0
spark.driver.host                      ${SPARK_LOCAL_HOSTNAME}
spark.driver.port                      7078
spark.blockManager.port                7079
# Network timeout settings
spark.network.timeout                  600s
spark.executor.heartbeatInterval       120s

spark.executor.extraJavaOptions        -Xlog:gc*:file=/opt/spark/logs/executor.gc.log:utctime,uptime,level,tags,hostname,pid,tid:filecount=5,filesize=100m 
spark.driver.extraJavaOptions          -Xlog:gc*:file=/opt/spark/logs/executor.gc.log:utctime,uptime,level,tags,hostname,pid,tid:filecount=5,filesize=100m
