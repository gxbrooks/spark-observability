---
# Default variables for the spark_ipython role

# Pod naming
pyspark_ipython_pod_name: pyspark-ipython

# Resource allocation for the pod
pyspark_ipython_cpu_request: "1"
pyspark_ipython_memory_request: "2Gi"
pyspark_ipython_cpu_limit: "2"
pyspark_ipython_memory_limit: "4Gi"

# Launch shell automatically (set to false to just create the pod)
launch_shell: true

# Allow interactive mode for the shell (when false, will not use -it flags)
allow_interactive: true
