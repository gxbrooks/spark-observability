all:
  vars:
    # elastic_agent_version: "8.11.1"
    # elastic_agent_download_url: "https://artifacts.elastic.co/downloads/beats/elastic-agent/elastic-agent-{{ elastic_agent_version }}-{{ elastic_agent_os }}-{{ elastic_agent_arch }}.{{ elastic_agent_extension }}"
    # elastic_agent_enrollment_url: "http://your-enrollment-url"
    # elastic_agent_enrollment_token: "your-enrollment-token"
    ansible_user: ansible
    ansible_connection: ssh
    ansible_ssh_private_key_file: /home/gxbrooks/.ssh/id_ed25519_ansible  # Control-node key for Ansible SSH

    # Expected IP addresses (for documentation/reference only - DO NOT USE IN CONFIGS)
    # Always use DNS names (*.lan) instead of IPs
    # These should match DHCP reservations if possible
    expected_ips:
      Lab1.lan: 192.168.1.76     # Kubernetes worker
      Lab2.lan: 192.168.1.48     # Kubernetes master, NFS server
      Lab3.lan: 192.168.1.49     # Observability (native Ubuntu); update to match Lab3 DHCP reservation

    # Critical: Define which host runs observability stack (Docker Compose + ELK, etc.)
    observability_host: Lab3
  children:
    linux:
      vars:
        elastic_agent_os: "linux"
        elastic_agent_arch: "x86_64"
        elastic_agent_extension: "tar.gz"
        ansible_python_interpreter: "/usr/bin/python3"
        ansible_shell_type: sh
        ansible_shell_executable: /bin/sh
      children:
        native:
          vars:
            ansible_port: 22
          children:
            nfs_servers:  # NFS is independent of Kubernetes
              hosts:
                Lab2:  # Using Lab2 as NFS server for now
                  ansible_host: Lab2.lan
            hadoop:  # Hadoop cluster for Spark data storage
              hosts:
                Lab2:
                  ansible_host: Lab2.lan
            jupyter_servers:  # JupyterHub for interactive Spark development
              hosts:
                Lab2:
                  ansible_host: Lab2.lan
            observability:  # Observability stack (Docker Engine on native Ubuntu)
              hosts:
                Lab3:
                  ansible_host: Lab3.lan
            spark_kubernetes:
              children:
                kubernetes_master:
                  hosts:
                    Lab2:
                      ansible_host: Lab2.lan
                kubernetes_workers:
                  hosts:
                    Lab2:  # Same host is both master and worker for now
                      ansible_host: Lab2.lan
                    Lab1:  # New worker node
                      ansible_host: Lab1.lan
                # All nodes that run Kubernetes workloads (OTel JAR copy, etc.)
                k8s_nodes:
                  children:
                    kubernetes_master:
                    kubernetes_workers:
