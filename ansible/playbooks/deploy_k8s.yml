---
- name: Deploy Kubernetes resources for Spark
  hosts: kubernetes_master
  become: false
  vars:
    kubeconfig: "/home/{{ ansible_user }}/.kube/config"
    k8s_config_dir: "/home/{{ ansible_user }}/kubernetes"
  tasks:
    - name: Create Kubernetes config directory for ansible user
      become: true
      file:
        path: "{{ k8s_config_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy Spark configuration
      copy:
        src: "{{ playbook_dir | dirname | dirname }}/kubernetes/spark.yml"
        dest: "{{ k8s_config_dir }}/spark.yml"
        mode: '0644'

    - name: Create Spark namespace
      command: kubectl create namespace spark
      register: create_ns
      failed_when: 
        - create_ns.rc != 0 
        - '"already exists" not in create_ns.stderr'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      
    - name: Apply Spark RBAC and ConfigMaps
      command: kubectl apply -f {{ k8s_config_dir }}/spark.yml
      register: apply_spark
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      
    - name: Verify Spark resources
      command: kubectl get serviceaccount spark -n spark
      register: verify_sa
      until: verify_sa.rc == 0
      retries: 6
      delay: 10
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      when: inventory_hostname == groups['spark_kubernetes'][0]

    - name: Apply Calico manifest
      command: kubectl apply -f https://docs.projectcalico.org/manifests/calico.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      when: inventory_hostname == groups['spark_kubernetes'][0]

    - name: Join worker nodes to cluster
      command: kubeadm join {{ hostvars[groups['spark_kubernetes'][0]].ansible_host }}:6443 --token {{ k8s.join_token }} --discovery-token-ca-cert-hash {{ k8s.discovery_token_hash }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      when: inventory_hostname != groups['spark_kubernetes'][0]

    - name: Apply initial manifests (if any)
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ k8s_config_dir }}/spark.yml"
      when: inventory_hostname == groups['spark_kubernetes'][0]
