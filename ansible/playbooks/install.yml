---
# Global installation playbook — host packages, NFS, Kubernetes, Elastic Agent
# Does not deploy K8s workloads or observability Docker stack; run deploy.yml after this
# Usage: cd ansible && ansible-playbook -i inventory.yml playbooks/install.yml

- name: Display installation banner
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Display installation information
      ansible.builtin.debug:
        msg: |
          ================================================
          Spark Observability Platform — Install
          ================================================
          This playbook installs/configures:
            1. Docker Engine (Lab3 observability host)
            2. NFS server (inventory nfs_servers) and clients on K8s nodes
            3. Kubernetes cluster (containerd)
            4. Elastic Agent on native Linux hosts (Lab1–Lab3)
          Next: deploy workloads with playbooks/deploy.yml, then start with playbooks/start.yml
          ================================================

- import_playbook: docker/install.yml

- import_playbook: nfs/install.yml

- import_playbook: k8s/install.yml

- import_playbook: elastic-agent/install.yml

- name: Display installation completion
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Display completion message
      ansible.builtin.debug:
        msg: |
          ================================================
          Install playbook complete
          ================================================
          Deploy manifests, Compose stack, Spark, JupyterHub:
            cd ansible && ansible-playbook -i inventory.yml playbooks/deploy.yml
          Then start services:
            cd ansible && ansible-playbook -i inventory.yml playbooks/start.yml
          Diagnose:
            cd ansible && ansible-playbook -i inventory.yml playbooks/diagnose.yml
          ================================================
