---
# Global installation playbook for Spark Observability Platform
# Idempotent - installs and configures all components
# Usage: cd ansible && ansible-playbook -i inventory.yml playbooks/install.yml

- name: Display installation banner
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Display installation information
      debug:
        msg: |
          ================================================
          Spark Observability Platform - Installation
          ================================================
          
          This playbook will install/configure:
          1. Docker (Lab2 only - for building Spark images)
          2. NFS Server and Clients
          3. Kubernetes Cluster (uses containerd runtime)
          4. Observability Platform (GaryPC-WSL with Docker Desktop)
          5. Spark on Kubernetes
          6. JupyterHub for Spark Development
          7. Elastic Agent (host-level on Lab1, Lab2, GaryPC)
          
          All operations are idempotent and safe to re-run.
          
          Prerequisites:
          - Ansible control machine has SSH access to all hosts
          - Docker Desktop manually started on GaryPC (for WSL)
          
          ================================================

# Step 1: Install Docker (Lab2 only for image builds)
- import_playbook: docker/install.yml

# Step 2: Install NFS Server and Clients
- import_playbook: nfs/install.yml

# Step 3: Install Kubernetes Cluster
- import_playbook: k8s/install.yml

# Step 4: Install Observability Platform
- import_playbook: observability/install.yml

# Step 5: Deploy Spark to Kubernetes
- import_playbook: spark/deploy.yml

# Step 6: Deploy JupyterHub for Spark Development (deferred to Spark 4.0)
# - import_playbook: jupyter/deploy_jupyterhub_helm.yml

# Step 7: Install Elastic Agent
- import_playbook: elastic-agent/install.yml

# Step 7: Display completion status
- name: Display installation completion
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Display completion message
      debug:
        msg: |
          ================================================
          Spark Observability Platform - Installation Complete!
          ================================================
          
          All components have been installed and configured:
          ✓ Docker (Lab2 for image builds; K8s uses containerd)
          ✓ NFS Server (Lab2) and Clients (Lab1, Lab2)
          ✓ Kubernetes Cluster (Master: Lab2, Workers: Lab1+Lab2)
          ✓ Observability Platform (GaryPC-WSL)
          ✓ Spark on Kubernetes
          ✓ JupyterHub for Spark Development
          ✓ Elastic Agent (host-level: Lab1, Lab2, GaryPC)
          
          Next Steps:
          ================================================
          
          To start all services, run:
            cd ansible && ansible-playbook -i inventory.yml playbooks/start.yml
          
          To check status of all components, run:
            cd ansible && ansible-playbook -i inventory.yml playbooks/status.yml
          
          To access services:
          - Elasticsearch: https://GaryPC.lan:9200 (elastic / myElastic2025)
          - Kibana: http://GaryPC.lan:5601 (elastic / myElastic2025)
          - Grafana: http://GaryPC.lan:3000
          - Spark History: http://Lab2.lan:31534
          - JupyterHub: https://Lab2.lan:32443 (signup + approval)
          
          ================================================

