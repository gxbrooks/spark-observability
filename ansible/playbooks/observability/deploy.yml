---
# Deploy Observability Platform
# Orchestrates per-subsystem file deployment, then builds Docker images.
#
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/observability/deploy.yml

- name: Regenerate observability Docker env on controller
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Skip elastic deploy path when dynatrace platform is selected
      ansible.builtin.meta: end_play
      when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'dynatrace'

    - name: Run generate_contexts for observability context
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/regenerate_contexts.yml"
      vars:
        regenerate_contexts_root: "{{ playbook_dir | dirname | dirname | dirname }}"
        regenerate_context_names: ['observability']

- name: Deploy common observability infrastructure
  hosts: observability
  become: false
  gather_facts: true
  vars:
    observability_dir: "/home/ansible/ops/observability"
    ops_dir: "/home/ansible/ops"
    env_source_file: "{{ playbook_dir }}/../../../vars/contexts/observability_docker.env"
    observability_host_fqdn: "{{ hostvars[groups['observability'][0]]['ansible_host'] | default(groups['observability'][0]) }}"
    observability_host_short: "{{ (hostvars[groups['observability'][0]]['ansible_host'] | default(groups['observability'][0])) | regex_replace('\\..*$', '') }}"
    observability_host_ip: "{{ hostvars[groups['observability'][0]]['ansible_default_ipv4']['address'] | default('') }}"
    kubernetes_api_server_host: "{{ hostvars[groups['kubernetes_master'][0]]['ansible_host'] | default(groups['kubernetes_master'][0]) }}"
  tasks:
    - name: Skip elastic deploy path when dynatrace platform is selected
      ansible.builtin.meta: end_play
      when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'dynatrace'

    - name: Detect host OS
      ansible.builtin.set_fact:
        is_linux: "{{ ansible_os_family in ['Debian', 'RedHat'] }}"

    - name: Create directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ ops_dir }}"
        - "{{ observability_dir }}"
        - "{{ observability_dir }}/logs"

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../observability/docker-compose.yml"
        dest: "{{ observability_dir }}/docker-compose.yml"
        mode: '0644'

    - name: Copy .env file
      ansible.builtin.copy:
        src: "{{ env_source_file }}"
        dest: "{{ observability_dir }}/.env"
        mode: '0644'

    - name: Synchronize certificates directory
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../../observability/certs/"
        dest: "{{ observability_dir }}/certs/"
        delete: false
        recursive: true

    - name: Render observability host placeholders into cert instances config
      ansible.builtin.replace:
        path: "{{ observability_dir }}/certs/instances.yml"
        regexp: "{{ item.pattern }}"
        replace: "{{ item.value }}"
      loop:
        - { pattern: "__OBSERVABILITY_HOST_FQDN__", value: "{{ observability_host_fqdn }}" }
        - { pattern: "__OBSERVABILITY_HOST_SHORT_UPPER__", value: "{{ observability_host_short }}" }
        - { pattern: "__OBSERVABILITY_HOST_SHORT_LOWER__", value: "{{ observability_host_short | lower }}" }
        - { pattern: "__OBSERVABILITY_HOST_IP__", value: "{{ observability_host_ip }}" }

    - name: Synchronize shared directory
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../../observability/shared/"
        dest: "{{ observability_dir }}/shared/"
        delete: false
        recursive: true

    - name: Synchronize Prometheus directory
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../../observability/prometheus/"
        dest: "{{ observability_dir }}/prometheus/"
        delete: false
        recursive: true

    - name: Render Kubernetes API server host into Prometheus config
      ansible.builtin.replace:
        path: "{{ observability_dir }}/prometheus/prometheus.yml"
        regexp: "__KUBERNETES_API_SERVER__"
        replace: "{{ kubernetes_api_server_host }}"

    - name: Create k8s-certs directory
      ansible.builtin.file:
        path: "{{ observability_dir }}/k8s-certs"
        state: directory
        mode: '0755'

    - name: Fetch Kubernetes CA from master
      ansible.builtin.fetch:
        src: "/etc/kubernetes/pki/ca.crt"
        dest: "/tmp/observability-k8s-certs/"
        flat: true
      delegate_to: "{{ groups['kubernetes_master'][0] }}"
      run_once: true
      become: true
      when: (groups['kubernetes_master'] | default([]) | length) > 0

    - name: Fetch Kubernetes client cert from master
      ansible.builtin.fetch:
        src: "/etc/kubernetes/pki/apiserver-kubelet-client.crt"
        dest: "/tmp/observability-k8s-certs/"
        flat: true
      delegate_to: "{{ groups['kubernetes_master'][0] }}"
      run_once: true
      become: true
      when: (groups['kubernetes_master'] | default([]) | length) > 0

    - name: Fetch Kubernetes client key from master
      ansible.builtin.fetch:
        src: "/etc/kubernetes/pki/apiserver-kubelet-client.key"
        dest: "/tmp/observability-k8s-certs/"
        flat: true
      delegate_to: "{{ groups['kubernetes_master'][0] }}"
      run_once: true
      become: true
      when: (groups['kubernetes_master'] | default([]) | length) > 0

    - name: Copy K8s certs to observability host
      ansible.builtin.copy:
        src: "/tmp/observability-k8s-certs/{{ item.src }}"
        dest: "{{ observability_dir }}/k8s-certs/{{ item.dest }}"
        mode: '0644'
      loop:
        - { src: "ca.crt", dest: "ca.crt" }
        - { src: "apiserver-kubelet-client.crt", dest: "client.crt" }
        - { src: "apiserver-kubelet-client.key", dest: "client.key" }
      when: (groups['kubernetes_master'] | default([]) | length) > 0

    - name: Copy .bashrc to ops directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../.bashrc"
        dest: "{{ ops_dir }}/.bashrc"
        mode: '0644'
      failed_when: false

    - name: Copy .bash_aliases to ops directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../.bash_aliases"
        dest: "{{ ops_dir }}/.bash_aliases"
        mode: '0644'
      failed_when: false

    - name: Check if ansible user .bashrc exists
      ansible.builtin.stat:
        path: "/home/ansible/.bashrc"
      register: ansible_bashrc_stat
      become: true

    - name: Create ansible user .bashrc if needed
      ansible.builtin.copy:
        content: |
          if [ -f {{ ops_dir }}/.bashrc ]; then source {{ ops_dir }}/.bashrc; fi
          if [ -f {{ ops_dir }}/.bash_aliases ]; then source {{ ops_dir }}/.bash_aliases; fi
        dest: "/home/ansible/.bashrc"
        mode: '0644'
        owner: ansible
        group: ansible
      when: not ansible_bashrc_stat.stat.exists
      become: true

    - name: Ensure .bashrc sources ops files
      ansible.builtin.lineinfile:
        path: "/home/ansible/.bashrc"
        line: "{{ item }}"
        state: present
        insertafter: EOF
      loop:
        - "source {{ ops_dir }}/.bashrc"
        - "source {{ ops_dir }}/.bash_aliases"
      when: ansible_bashrc_stat.stat.exists
      become: true

    - name: Check Docker availability
      ansible.builtin.command: docker --version
      register: docker_check
      failed_when: false
      changed_when: false

    - name: Fail if Docker is not available
      ansible.builtin.fail:
        msg: "Docker is not available."
      when: docker_check.rc != 0

    - name: Create Docker network
      ansible.builtin.command: docker network create elastic
      failed_when: false

- import_playbook: elasticsearch/deploy.yml
  when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'elastic'
- import_playbook: grafana/deploy.yml
  when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'elastic'
- import_playbook: logstash/deploy.yml
  when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'elastic'
- import_playbook: otel-collector/deploy.yml
  when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'elastic'
- import_playbook: tempo/deploy.yml
  when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'elastic'

- name: Build Docker images and finalize
  hosts: observability
  become: false
  gather_facts: false
  vars:
    observability_dir: "/home/ansible/ops/observability"
  tasks:
    - name: Skip elastic deploy path when dynatrace platform is selected
      ansible.builtin.meta: end_play
      when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'dynatrace'

    - name: Build custom Docker images
      ansible.builtin.command: docker compose build
      args:
        chdir: "{{ observability_dir }}"

    - name: Display deployment status
      ansible.builtin.debug:
        msg: |
          Observability Platform Deployed
          ===============================
          Files deployed to {{ observability_dir }}.
          Docker images built.

          Next: ansible-playbook -i inventory.yml playbooks/observability/start.yml

- import_playbook: prometheus/deploy.yml
  when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'elastic'

- import_playbook: dynatrace/deploy.yml
  when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'dynatrace'
