---
# Shutdown Observability Platform
# This playbook completely shuts down and removes the observability platform on GaryPC WSL

- name: Shutdown Observability Platform
  hosts: observability
  become: false
  gather_facts: true
  
  vars:
    observability_dir: "/home/ansible/observability"
    docker_compose_file: "{{ observability_dir }}/docker-compose.yml"
    
  tasks:
    - name: Check if observability directory exists
      stat:
        path: "{{ observability_dir }}"
      register: obs_dir_stat
      
    - name: Fail if observability directory doesn't exist
      fail:
        msg: "Observability directory {{ observability_dir }} does not exist."
      when: not obs_dir_stat.stat.exists
      
    - name: Check current service status
      command: docker-compose -f "{{ docker_compose_file }}" ps
      args:
        chdir: "{{ observability_dir }}"
      register: current_status
      
    - name: Display current status
      debug:
        var: current_status.stdout_lines
        
    - name: Shutdown observability platform (remove containers and networks)
      command: docker-compose -f "{{ docker_compose_file }}" down
      args:
        chdir: "{{ observability_dir }}"
      register: shutdown_result
      
    - name: Remove volumes (optional - uncomment if you want to remove data)
      # command: docker-compose -f "{{ docker_compose_file }}" down -v
      # args:
      #   chdir: "{{ observability_dir }}"
      # register: volume_removal
      debug:
        msg: "Volume removal skipped. Uncomment the above tasks if you want to remove all data volumes."
        
    - name: Check final service status
      command: docker-compose -f "{{ docker_compose_file }}" ps
      args:
        chdir: "{{ observability_dir }}"
      register: final_status
      
    - name: Display final status
      debug:
        var: final_status.stdout_lines
        
    - name: Show cleanup status
      debug:
        msg: "Observability platform has been shut down. Containers and networks have been removed."
