---
# End-to-end observability behavior test.
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/observability/test.yml
# Tags: test, observability

- name: Test observability platform behavior
  hosts: observability
  gather_facts: false
  tags: [test, observability]
  vars:
    timeout_seconds: 20
    recent_window: "now-30m"
    observability_env_file: "/home/ansible/ops/observability/.env"
    required_recent_indices:
      - { name: "system-metrics", index: "metrics-system.cpu-default" }
      - { name: "spark-logs", index: "logs-spark-default" }
    optional_recent_indices:
      - { name: "gpu-metrics", index: "metrics-gpu-default" }
  tasks:
    - name: Read Elasticsearch password from observability .env
      ansible.builtin.shell: |
        awk -F= '/^ES_PASSWORD=/{print substr($0, index($0,$2)); exit}' "{{ observability_env_file }}"
      register: es_password_file
      changed_when: false
      failed_when: false

    - name: Resolve Elasticsearch password
      ansible.builtin.set_fact:
        es_password_resolved: "{{ (ES_PASSWORD | default('')) if (ES_PASSWORD | default('')) | length > 0 else (es_password_file.stdout | default('myElastic2025')) }}"

    - name: Check Elasticsearch cluster health
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/_cluster/health"
        method: GET
        user: elastic
        password: "{{ es_password_resolved }}"
        validate_certs: false
        force_basic_auth: true
        timeout: "{{ timeout_seconds }}"
      register: es_health
      failed_when: false

    - name: Assert Elasticsearch HTTP API is reachable (success response)
      ansible.builtin.assert:
        that:
          - es_health.status is defined
          - es_health.status | int == 200
        fail_msg: |
          Fault: Elasticsearch HTTP API did not return HTTP 200 for _cluster/health (unreachable, TLS, or bad credentials).
          HTTP status={{ es_health.status | default('n/a') }}; module message={{ es_health.msg | default('n/a') }}.
          {% if es_health.status | default(0) | int in [401, 403] %}→ Auth failure: verify ES_PASSWORD in {{ observability_env_file }} matches the elastic user.
          {% elif es_health.status | default(0) | int <= 0 %}→ No HTTP response: check es01 container, :9200, TLS, DNS, and firewall on {{ ansible_host }}.
          {% else %}→ Non-success HTTP status from API (not a green/yellow cluster issue — the request itself failed).
          {% endif %}
          To skip observability tests: ansible-playbook ... playbooks/test.yml --tags k8s,spark
        success_msg: "Elasticsearch _cluster/health returned HTTP 200"

    - name: Assert Elasticsearch cluster status is green or yellow
      ansible.builtin.assert:
        that:
          - es_health.json is defined
          - es_health.json.status is defined
          - es_health.json.status in ['green', 'yellow']
        fail_msg: |
          Fault: Elasticsearch is reachable (HTTP 200) but cluster health is not green/yellow.
          Reported status="{{ es_health.json.status | default('unknown') }}".
          Cluster summary={{ es_health.json | to_json }}.
          If unassigned_shards is positive, use GET /_cluster/allocation/explain, check disk watermarks, and node count; red usually means primaries cannot allocate.
          To skip observability tests: ansible-playbook ... playbooks/test.yml --tags k8s,spark
        success_msg: "Elasticsearch cluster status is green or yellow"

    - name: Check recent data for required indices
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/{{ item.index }}/_search"
        method: POST
        body_format: json
        body:
          size: 1
          query:
            range:
              "@timestamp":
                gte: "{{ recent_window }}"
          sort:
            - "@timestamp": "desc"
        user: elastic
        password: "{{ es_password_resolved }}"
        validate_certs: false
        force_basic_auth: true
        timeout: "{{ timeout_seconds }}"
      loop: "{{ required_recent_indices }}"
      register: required_recent_results

    - name: Assert required indices have recent documents
      ansible.builtin.assert:
        that:
          - item.json.hits.total.value | int > 0
        fail_msg: "Required index {{ item.item.name }} ({{ item.item.index }}) has no docs in {{ recent_window }}"
        success_msg: "Required index {{ item.item.name }} has recent docs"
      loop: "{{ required_recent_results.results }}"

    - name: Check recent data for optional indices
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/{{ item.index }}/_search"
        method: POST
        body_format: json
        body:
          size: 1
          query:
            range:
              "@timestamp":
                gte: "{{ recent_window }}"
          sort:
            - "@timestamp": "desc"
        user: elastic
        password: "{{ es_password_resolved }}"
        validate_certs: false
        force_basic_auth: true
        timeout: "{{ timeout_seconds }}"
      loop: "{{ optional_recent_indices }}"
      register: optional_recent_results
      failed_when: false

    - name: Print optional index freshness
      ansible.builtin.debug:
        msg: >-
          Optional index {{ item.item.name }}: {{
          'recent data found' if (item.json is defined and item.json.hits.total.value | int > 0)
          else 'no recent data'
          }}
      loop: "{{ optional_recent_results.results | default([]) }}"
