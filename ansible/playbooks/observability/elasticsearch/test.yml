---
# Test Elasticsearch health and data freshness.
# Standalone: ansible-playbook -i inventory.yml playbooks/observability/elasticsearch/test.yml
# Or imported from the top-level test.yml.

- name: Test Elasticsearch
  hosts: observability
  gather_facts: false
  tags: [test, elasticsearch]
  vars_files:
    - ../../../../vars/contexts/spark_ansible_vars.yml
  vars:
    timeout_seconds: 20
    recent_window: "now-30m"
    required_recent_indices:
      - { name: "system-metrics", index: "metrics-system.cpu-default" }
      - { name: "spark-logs", index: "logs-spark-default" }
    optional_recent_indices:
      - { name: "gpu-metrics", index: "metrics-gpu-default" }
  tasks:
    - name: Check Elasticsearch cluster health
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/_cluster/health"
        method: GET
        user: elastic
        password: "{{ ES_PASSWORD }}"
        validate_certs: false
        force_basic_auth: true
        timeout: "{{ timeout_seconds }}"
      register: es_health
      failed_when: false

    - name: Assert Elasticsearch HTTP API is reachable
      ansible.builtin.assert:
        that:
          - es_health.status is defined
          - es_health.status | int == 200
        fail_msg: |
          Elasticsearch HTTP API did not return HTTP 200 for _cluster/health.
          HTTP status={{ es_health.status | default('n/a') }}; message={{ es_health.msg | default('n/a') }}.
          {% if es_health.status | default(0) | int in [401, 403] %}Check ES_PASSWORD in {{ observability_env_file }}.
          {% elif es_health.status | default(0) | int <= 0 %}No response: check es01 container, port 9200, TLS, DNS.
          {% endif %}
        success_msg: "Elasticsearch _cluster/health returned HTTP 200"

    - name: Assert cluster status is green or yellow
      ansible.builtin.assert:
        that:
          - es_health.json is defined
          - es_health.json.status in ['green', 'yellow']
        fail_msg: |
          Elasticsearch cluster health is {{ es_health.json.status | default('unknown') }}.
          Summary={{ es_health.json | to_json }}.
          If unassigned_shards > 0 check disk watermarks and node count.
        success_msg: "Elasticsearch cluster status is {{ es_health.json.status }}"

    - name: Check recent data for required indices
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/{{ item.index }}/_search"
        method: POST
        body_format: json
        body:
          size: 1
          query:
            range:
              "@timestamp":
                gte: "{{ recent_window }}"
          sort:
            - "@timestamp": "desc"
        user: elastic
        password: "{{ ES_PASSWORD }}"
        validate_certs: false
        force_basic_auth: true
        timeout: "{{ timeout_seconds }}"
      loop: "{{ required_recent_indices }}"
      register: required_recent_results

    - name: Assert required indices have recent documents
      ansible.builtin.assert:
        that:
          - item.json.hits.total.value | int > 0
        fail_msg: "Required index {{ item.item.name }} ({{ item.item.index }}) has no docs in {{ recent_window }}"
        success_msg: "Required index {{ item.item.name }} has recent docs"
      loop: "{{ required_recent_results.results }}"

    - name: Check recent data for optional indices
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/{{ item.index }}/_search"
        method: POST
        body_format: json
        body:
          size: 1
          query:
            range:
              "@timestamp":
                gte: "{{ recent_window }}"
          sort:
            - "@timestamp": "desc"
        user: elastic
        password: "{{ ES_PASSWORD }}"
        validate_certs: false
        force_basic_auth: true
        timeout: "{{ timeout_seconds }}"
      loop: "{{ optional_recent_indices }}"
      register: optional_recent_results
      failed_when: false

    - name: Print optional index freshness
      ansible.builtin.debug:
        msg: >-
          Optional index {{ item.item.name }}: {{
          'recent data found' if (item.json is defined and item.json.hits.total.value | int > 0)
          else 'no recent data'
          }}
      loop: "{{ optional_recent_results.results | default([]) }}"
