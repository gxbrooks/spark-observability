---
# Test Elasticsearch health and data freshness.
# Standalone: ansible-playbook -i inventory.yml playbooks/observability/elasticsearch/test.yml
# Or imported from the top-level test.yml.

- name: Test Elasticsearch
  hosts: observability
  gather_facts: false
  tags: [test, elasticsearch]
  vars_files:
    - ../../../../vars/contexts/spark_ansible_vars.yml
  vars:
    timeout_seconds: 20
    es_probe_host: "localhost"
    observability_dir: "/home/ansible/ops/observability"
    observability_env_file: "{{ observability_dir }}/.env"
  tasks:
    - name: Run shared health checks
      ansible.builtin.include_tasks: common/health_check_tasks.yml

    - name: Run shared index checks
      ansible.builtin.include_tasks: common/index_checks_tasks.yml
