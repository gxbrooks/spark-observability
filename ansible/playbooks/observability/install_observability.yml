---
# Install Observability Platform
# This playbook installs prerequisites and sets up the observability platform on GaryPC WSL

- name: Install Observability Platform
  hosts: observability
  become: false
  gather_facts: true
  
  vars:
    observability_dir: "/home/ansible/observability"
    docker_compose_file: "{{ observability_dir }}/docker-compose.yml"
    env_file: "{{ observability_dir }}/.env"
    
  tasks:
    - name: Check if observability directory exists
      stat:
        path: "{{ observability_dir }}"
      register: obs_dir_stat
      
    - name: Fail if observability directory doesn't exist
      fail:
        msg: "Observability directory {{ observability_dir }} does not exist. Please ensure the observability platform files are available."
      when: not obs_dir_stat.stat.exists
      
    - name: Check if Docker is installed
      command: docker --version
      register: docker_version
      failed_when: false
      
    - name: Fail if Docker is not installed
      fail:
        msg: "Docker is not installed on {{ inventory_hostname }}. Please install Docker Desktop."
      when: docker_version.rc != 0
      
    - name: Check if Docker Compose is available
      command: docker-compose --version
      register: compose_version
      failed_when: false
      
    - name: Fail if Docker Compose is not available
      fail:
        msg: "Docker Compose is not available on {{ inventory_hostname }}. Please install Docker Compose."
      when: compose_version.rc != 0
      
    - name: Check if Docker is running
      command: docker ps
      register: docker_status
      failed_when: false
      
    - name: Fail if Docker is not running
      fail:
        msg: "Docker is not running on {{ inventory_hostname }}. Please start Docker Desktop."
      when: docker_status.rc != 0
      
    - name: Create elastic network if it doesn't exist
      command: docker network create elastic
      register: network_create
      failed_when: false
      
    - name: Check if .env file exists
      stat:
        path: "{{ env_file }}"
      register: env_file_stat
      
    - name: Fail if .env file doesn't exist
      fail:
        msg: "Environment file {{ env_file }} does not exist. Please run generate_env.py to create it."
      when: not env_file_stat.stat.exists
      
    - name: Display installation status
      debug:
        msg: |
          Observability Platform Installation Status:
          - Docker: {{ docker_version.stdout if docker_version.rc == 0 else 'Not installed' }}
          - Docker Compose: {{ compose_version.stdout if compose_version.rc == 0 else 'Not available' }}
          - Docker Status: {{ 'Running' if docker_status.rc == 0 else 'Not running' }}
          - Network: {{ 'Created' if network_create.rc == 0 else 'Already exists' }}
          - Environment file: {{ 'Found' if env_file_stat.stat.exists else 'Missing' }}
          
    - name: Show next steps
      debug:
        msg: |
          Installation prerequisites check completed.
          Next steps:
          1. Run 'deploy_observability.yml' to deploy the platform
          2. Run 'start_observability.yml' to start the services
