---
# DEPRECATED: Use diagnose.yml instead.
# This playbook is retained for backward compatibility but simply delegates
# to the diagnose playbook. All unique status checks have been migrated.
#
# Usage (preferred):
#   ansible-playbook -i inventory.yml playbooks/observability/diagnose.yml

- name: "DEPRECATED: status.yml -- use diagnose.yml"
  hosts: observability
  gather_facts: false
  tasks:
    - name: Deprecation notice
      ansible.builtin.debug:
        msg: |
          WARNING: status.yml is deprecated. Use diagnose.yml instead:
            ansible-playbook -i inventory.yml playbooks/observability/diagnose.yml
          
          All status checks have been migrated to per-subsystem diagnose playbooks.

- import_playbook: diagnose.yml
