---
# Start Observability Platform with Proper Certificate Management
# This playbook follows a layered architecture approach:
# 1. Generate/validate certificates (container layer)
# 2. Distribute certificates (infrastructure layer)  
# 3. Start services (container layer)
# 4. Verify health (validation layer)

# First, ensure Windows Firewall is configured (if observability runs on WSL)
- name: Ensure Windows Firewall is Configured for Observability Services
  hosts: windows
  gather_facts: true
  vars:
    observability_ports:
      - { port: 9200, name: "Elasticsearch HTTP", service: "Elasticsearch" }
      - { port: 9300, name: "Elasticsearch Transport", service: "Elasticsearch" }
      - { port: 5601, name: "Kibana", service: "Kibana" }
      - { port: 3000, name: "Grafana", service: "Grafana" }
      - { port: 5050, name: "Logstash Spark Events", service: "Logstash" }
      - { port: 5051, name: "Logstash Metrics", service: "Logstash" }
      - { port: 4317, name: "OTel Collector gRPC", service: "OTel Collector" }
      - { port: 4318, name: "OTel Collector HTTP", service: "OTel Collector" }
      - { port: 8888, name: "OTel Collector Prometheus", service: "OTel Collector" }
      - { port: 13133, name: "OTel Collector Health", service: "OTel Collector" }
  tasks:
    - name: Check if Windows Firewall rule exists for observability ports
      win_shell: |
        Get-NetFirewallRule -DisplayName "{{ item.name }} (Observability)" -ErrorAction SilentlyContinue | Select-Object -First 1
      register: firewall_rule_check
      loop: "{{ observability_ports }}"
      loop_control:
        label: "{{ item.name }} ({{ item.port }})"
      changed_when: false
      failed_when: false
    
    - name: Create Windows Firewall rule for observability ports
      win_shell: |
        $ruleName = "{{ port_info.name }} (Observability)"
        $port = {{ port_info.port }}
        $service = "{{ port_info.service }}"
        
        # Check if rule already exists
        $existingRule = Get-NetFirewallRule -DisplayName $ruleName -ErrorAction SilentlyContinue
        
        if (-not $existingRule) {
          Write-Host "Creating firewall rule: $ruleName for port $port"
          New-NetFirewallRule `
            -DisplayName $ruleName `
            -Direction Inbound `
            -LocalPort $port `
            -Protocol TCP `
            -Action Allow `
            -Description "Allow inbound traffic for $service on port $port"
        } else {
          Write-Host "Firewall rule already exists: $ruleName"
        }
      vars:
        port_info: "{{ item.item }}"
      register: firewall_rule_result
      loop: "{{ firewall_rule_check.results }}"
      loop_control:
        label: "{{ item.item.name }} ({{ item.item.port }})"
      when: item.stdout == "" or item.stdout is not defined
      changed_when: "'Creating firewall rule' in firewall_rule_result.stdout"

- name: Start Observability Platform
  hosts: observability
  become: false
  gather_facts: true
  
  vars:
    observability_dir: "/home/ansible/ops/observability"
    docker_compose_file: "{{ observability_dir }}/docker-compose.yml"
    env_file: "{{ observability_dir }}/.env"
    env_source_file: "{{ playbook_dir }}/../../../vars/contexts/observability_docker.env"
    # Standard CA certificate path (from vars/variables.yaml CA_CERT variable)
    # This is the path where init-certs publishes the CA certificate
    ca_cert_path: "/etc/ssl/certs/elastic/ca.crt"
    
  tasks:
    # === CRITICAL: Validate running on correct host ===
    - name: Verify we are on the designated observability host
      fail:
        msg: |
          ❌ FATAL: Wrong host! Observability stack must run on {{ observability_host }}.
          
          Current host: {{ inventory_hostname }}
          Expected host: {{ observability_host }}
          
          This playbook MUST run on {{ observability_host }} (Docker Desktop on Windows/WSL).
          
          Did you mean to run:
            ssh ansible@GaryPC.lan -p 2222
            cd ~/repos/elastic-on-spark
            ansible-playbook -i ansible/inventory.yml ansible/playbooks/observability/start.yml
      when: inventory_hostname != observability_host
    
    - name: Detect host OS
      set_fact:
        is_windows: "{{ ansible_os_family == 'Windows' }}"
        is_linux: "{{ ansible_os_family == 'Debian' or ansible_os_family == 'RedHat' }}"
        
    - name: Check if observability directory exists
      stat:
        path: "{{ observability_dir }}"
      register: obs_dir_stat
      
    - name: Fail if observability directory doesn't exist
      fail:
        msg: "Observability directory not found. Run 'install.yml' first."
      when: not obs_dir_stat.stat.exists
    
    # =====================================================================
    # STEP 0.5: Ensure .env file is up to date with all required variables
    # =====================================================================
    - name: Set .env file paths
      set_fact:
        env_file: "{{ observability_dir }}/.env"
        env_source_file: "{{ playbook_dir }}/../../../vars/contexts/observability_docker.env"
      when: is_linux
    
    - name: Check if .env file exists
      stat:
        path: "{{ env_file }}"
      register: env_file_stat
      when: is_linux
    
    - name: Copy updated .env file
      copy:
        src: "{{ env_source_file }}"
        dest: "{{ env_file }}"
        mode: '0644'
      when: is_linux
      register: env_file_updated
    
    - name: Display .env file update status
      debug:
        msg: "{{ 'Updated .env file with latest variables' if env_file_updated.changed else '.env file is up to date' }}"
      when: is_linux
      
    # === WINDOWS TASKS ===
    - name: Start Docker Desktop service (Windows)
      win_service:
        name: "Docker Desktop Service"
        state: started
      when: is_windows
      ignore_errors: true
      
    - name: Wait for Docker Desktop to be ready (Windows)
      wait_for:
        timeout: 60
        delay: 5
      when: is_windows
    
      
    # === LINUX TASKS ===
    - name: Check if Docker is available
      command: docker --version
      register: docker_check
      ignore_errors: true
      when: is_linux
      
    - name: Fail if Docker is not available
      fail:
        msg: "Docker is not available. Please install Docker Desktop."
      when: is_linux and docker_check.rc != 0
      
    - name: Check if Docker network 'elastic' exists
      command: docker network inspect elastic
      register: network_check
      ignore_errors: true
      when: is_linux
      changed_when: false
      
    - name: Create Docker network 'elastic' if it doesn't exist
      command: docker network create elastic
      when: is_linux and network_check.rc != 0
      register: network_create
      changed_when: network_create.rc == 0
      
    - name: Create elasticsearch outputs directory
      file:
        path: "{{ observability_dir }}/elasticsearch/outputs"
        state: directory
        mode: '0755'
      when: is_linux
      
    # =====================================================================
    # STEP 1: Initialize Certificates (Container Layer)
    # =====================================================================
    - name: Initialize certificates only
      command: docker compose up init-certs
      args:
        chdir: "{{ observability_dir }}"
      environment:
        FORCE_REGEN: "{{ force_cert_regen | default('') }}"
      when: is_linux
      register: init_certs_result
      
    - name: Display certificate initialization result
      debug:
        msg: "Certificate initialization {{ 'completed' if init_certs_result.rc == 0 else 'failed' }}"
      
    # =====================================================================
    # STEP 2: Validate CA Certificate
    # =====================================================================
    # Check certificate in Docker volume (source of truth)
    - name: Get Docker volume mount point for certs
      shell: |
        docker volume inspect observability_certs --format '{{ "{{" }} .Mountpoint {{ "}}" }}' 2>/dev/null || \
        docker volume inspect {{ observability_dir | basename }}_certs --format '{{ "{{" }} .Mountpoint {{ "}}" }}' 2>/dev/null || \
        echo ""
      register: cert_volume_path
      changed_when: false
      failed_when: false
      when: is_linux
      
    - name: Check if CA certificate was generated in Docker volume
      stat:
        path: "{{ cert_volume_path.stdout }}/ca/ca.crt"
      register: ca_cert_stat
      when: is_linux and cert_volume_path.stdout != ""
      
    - name: Check if CA certificate exists at published path (fallback - Windows/WSL mount)
      stat:
        path: "/mnt/c/Volumes/certs/Elastic/ca.crt"
      register: ca_cert_published_stat
      when: is_linux
      
    - name: Fail if CA certificate not found
      fail:
        msg: |
          CA certificate not found. Certificate generation may have failed.
          Checked locations:
          - Docker volume: {{ cert_volume_path.stdout }}/ca/ca.crt
          - Published path (WSL): /mnt/c/Volumes/certs/Elastic/ca.crt
          Check init-certs logs: cd {{ observability_dir }} && docker compose logs init-certs
      when: 
        - is_linux
        - (cert_volume_path.stdout == "" or not ca_cert_stat.stat.exists)
        - not ca_cert_published_stat.stat.exists
      
    - name: Set certificate path for validation
      set_fact:
        cert_path_to_validate: "{{ cert_volume_path.stdout }}/ca/ca.crt"
      when: is_linux and cert_volume_path.stdout != "" and ca_cert_stat.stat.exists
      
    - name: Set certificate path for validation (fallback to WSL mount)
      set_fact:
        cert_path_to_validate: "/mnt/c/Volumes/certs/Elastic/ca.crt"
      when: is_linux and (cert_volume_path.stdout == "" or not ca_cert_stat.stat.exists) and ca_cert_published_stat.stat.exists
      
    - name: Validate CA certificate integrity
      shell: |
        if ! openssl x509 -in "{{ cert_path_to_validate }}" -noout -text > /dev/null 2>&1; then
          echo "INVALID"
          exit 1
        fi
        echo "Issuer: $(openssl x509 -in "{{ cert_path_to_validate }}" -noout -issuer)"
        echo "Validity: $(openssl x509 -in "{{ cert_path_to_validate }}" -noout -dates)"
        echo "Fingerprint: $(openssl x509 -in "{{ cert_path_to_validate }}" -noout -fingerprint -sha256)"
      register: ca_cert_validation
      changed_when: false
      when: is_linux and cert_path_to_validate is defined
      
    - name: Display CA certificate details
      debug:
        msg: "{{ ca_cert_validation.stdout_lines }}"
      
    # =====================================================================
    # STEP 2.5: Reminder for Service Restarts (Pull-Based Model)
    # Services fetch certificates from standard location on install/start.
    # After cert regeneration, services must be restarted to pull new cert.
    # =====================================================================
    - name: Display certificate update instructions
      debug:
        msg: |
          ✅ CA Certificate Published: {{ ca_cert_path }}
          
          If certificates were regenerated, restart services to pull new cert:
          
          # Elastic Agent (stop + start pattern)
          ansible-playbook -i ansible/inventory.yml ansible/playbooks/elastic-agent/stop.yml
          ansible-playbook -i ansible/inventory.yml ansible/playbooks/elastic-agent/start.yml
          
          # Spark or other services follow same pattern
          
          Services will automatically fetch the latest certificate from the published location.
      
    # =====================================================================
    # STEP 3: Start Observability Services (Container Layer)
    # =====================================================================
    - name: Start observability services (ignore init-index failures)
      command: docker compose up -d
      args:
        chdir: "{{ observability_dir }}"
      when: is_linux
      register: docker_up
      failed_when: false  # Don't fail if init-index fails
      changed_when: "'Created' in docker_up.stderr or 'Started' in docker_up.stderr or 'Up' in docker_up.stderr"
      
    - name: Display service startup info
      debug:
        msg: |
          Services starting...
          - Docker Compose starting all services in dependency order
          - Elasticsearch → Kibana → init-index → Logstash → Grafana
          - init-index handles password setup and index initialization
          - Note: init-index failures are non-critical and won't block other services
      
    # =====================================================================
    # STEP 3.5: Ensure All Core Services Are Running
    # =====================================================================
    - name: Define core services that must be running
      set_fact:
        core_services:
          - { name: "es01", display: "Elasticsearch", required: true }
          - { name: "kibana", display: "Kibana", required: true }
          - { name: "grafana", display: "Grafana", required: true }
          - { name: "logstash01", display: "Logstash", required: true }
          - { name: "otel-collector", display: "OTel Collector", required: false }
      when: is_linux
    
    - name: Check current service status
      command: docker compose ps --format "{{ '{{.Service}}' }}:{{ '{{.State}}' }}"
      args:
        chdir: "{{ observability_dir }}"
      register: service_status_raw
      when: is_linux
      changed_when: false
    
    - name: Parse service status into dictionary
      set_fact:
        service_states: "{{ service_states | default({}) | combine({item.split(':')[0]: item.split(':')[1]}) }}"
      loop: "{{ service_status_raw.stdout_lines }}"
      when: 
        - is_linux
        - service_status_raw.stdout_lines is defined
        - "':' in item"
    
    - name: Start services that are not running (with dependencies)
      command: docker compose up -d {{ item.name }}
      args:
        chdir: "{{ observability_dir }}"
      loop: "{{ core_services }}"
      loop_control:
        label: "{{ item.display }}"
      when: 
        - is_linux
        - service_states[item.name] is not defined or service_states[item.name] != "running"
        - item.name not in ['grafana', 'logstash01']  # These have init-index dependency issues
      register: service_start_result
      failed_when: false
      changed_when: "'Created' in service_start_result.stderr or 'Started' in service_start_result.stderr or 'Up' in service_start_result.stderr"
    
    - name: Start Grafana and Logstash without init-index dependency
      command: docker compose up -d --no-deps {{ item }}
      args:
        chdir: "{{ observability_dir }}"
      loop:
        - grafana
        - logstash01
      when: 
        - is_linux
        - service_states[item] is not defined or service_states[item] != "running"
      register: service_start_no_deps
      failed_when: false
      changed_when: "'Created' in service_start_no_deps.stderr or 'Started' in service_start_no_deps.stderr or 'Up' in service_start_no_deps.stderr"
    
    - name: Verify services are actually running after start attempt
      command: docker compose ps --format "{{ '{{.Service}}' }}:{{ '{{.State}}' }}"
      args:
        chdir: "{{ observability_dir }}"
      register: service_status_after_start
      when: is_linux
      changed_when: false
    
    - name: Wait a bit for services to fully start
      wait_for:
        timeout: 15
      when: is_linux
    
    - name: Final check of service status
      command: docker compose ps --format "{{ '{{.Service}}' }}:{{ '{{.State}}' }}"
      args:
        chdir: "{{ observability_dir }}"
      register: final_service_check
      when: is_linux
      changed_when: false
    
    - name: Check if any required services failed to start
      set_fact:
        failed_services: "{{ failed_services | default([]) + [item.name] }}"
      loop: "{{ core_services }}"
      when: 
        - is_linux
        - item.required
        - final_service_check.stdout is defined
        - "item.name + ':running' not in final_service_check.stdout"
        - "item.name + ':Up' not in final_service_check.stdout"
    
    - name: Warn if required services didn't start (but don't fail)
      debug:
        msg: "⚠ Warning: Some services may not be running: {{ failed_services | join(', ') }}. Check logs for details."
      when: 
        - is_linux
        - failed_services is defined
        - failed_services | length > 0
    
    - name: Wait for services to stabilize
      wait_for:
        timeout: 10
      when: is_linux
    
    # =====================================================================
    # STEP 4: Verify Service Health (Validation Layer)
    # =====================================================================
    
    - name: Wait for Elasticsearch to be ready
      uri:
        url: "https://localhost:9200"
        method: GET
        user: elastic
        password: "{{ lookup('env', 'ELASTIC_PASSWORD') | default('myElastic2025', true) }}"
        validate_certs: false
        status_code: [200, 401]
      register: es_health
      until: es_health.status in [200, 401]
      retries: 30
      delay: 5
      ignore_errors: true
      when: is_linux
      
    - name: Wait for Kibana to be ready
      uri:
        url: "http://localhost:5601/api/status"
        method: GET
        status_code: [200, 302, 401]
      register: kibana_health
      until: kibana_health.status in [200, 302, 401]
      retries: 30
      delay: 5
      ignore_errors: true
      when: is_linux
      
    - name: Get final service status
      command: docker compose ps --format "table {{ '{{.Service}}' }}\t{{ '{{.Status}}' }}"
      args:
        chdir: "{{ observability_dir }}"
      register: final_service_status
      when: is_linux
      changed_when: false
    
    - name: Display service health status
      debug:
        msg: |
          Observability Platform Health:
          - Elasticsearch: {{ 'Healthy' if es_health.status in [200, 401] else 'Not Ready' }}
          - Kibana: {{ 'Healthy' if kibana_health.status in [200, 302, 401] else 'Not Ready' }}
          
          All Services Status:
          {{ final_service_status.stdout }}
          
    - name: Display start status
      debug:
        msg: |
          ========================================
          Observability Platform Started!
          ========================================
          
          Services:
          - Elasticsearch: https://{{ ansible_hostname }}:9200
          - Kibana: http://{{ ansible_hostname }}:5601
          - Grafana: http://{{ ansible_hostname }}:3000
          - Logstash: {{ ansible_hostname }}:5050
          
          Credentials:
          - Username: elastic
          - Password: {{ lookup('env', 'ELASTIC_PASSWORD') | default('(set in .env)', true) }}
          
          Next Steps:
          - If certs regenerated, restart Elastic Agent on managed hosts:
            ansible-playbook -i ansible/inventory.yml ansible/playbooks/elastic-agent/stop.yml
            ansible-playbook -i ansible/inventory.yml ansible/playbooks/elastic-agent/start.yml
          - Verify metrics flowing:
            curl -k -u elastic:password https://localhost:9200/_cat/indices/metrics-*
