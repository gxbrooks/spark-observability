---
# Start Observability Platform with Proper Certificate Management
#
# Architecture:
#   1. Generate .env (localhost)
#   2. Infrastructure setup: .env, Docker, network, certificates (observability host)
#   3. Per-subsystem start + health check (imported playbooks)
#   4. Prometheus K8s exporters (imported playbook)
#
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/observability/start.yml

- name: Regenerate observability Docker env on controller
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run generate_contexts for observability context
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/regenerate_contexts.yml"
      vars:
        regenerate_contexts_root: "{{ playbook_dir | dirname | dirname | dirname }}"
        regenerate_context_names: ['observability']

- name: Observability infrastructure setup
  hosts: observability
  become: false
  gather_facts: true
  vars:
    observability_dir: "/home/ansible/ops/observability"
    env_source_file: "{{ playbook_dir }}/../../../vars/contexts/observability_docker.env"
    ca_cert_path: "/etc/ssl/certs/elastic/ca.crt"
  tasks:
    - name: Verify we are on the designated observability host
      ansible.builtin.fail:
        msg: "FATAL: Observability stack must run on {{ observability_host }}, not {{ inventory_hostname }}."
      when: inventory_hostname != observability_host

    - name: Detect host OS
      ansible.builtin.set_fact:
        is_linux: "{{ ansible_os_family in ['Debian', 'RedHat'] }}"

    - name: Check if observability directory exists
      ansible.builtin.stat:
        path: "{{ observability_dir }}"
      register: obs_dir_stat

    - name: Fail if observability directory doesn't exist
      ansible.builtin.fail:
        msg: "Observability directory not found. Run install.yml first."
      when: not obs_dir_stat.stat.exists

    - name: Copy updated .env file
      ansible.builtin.copy:
        src: "{{ env_source_file }}"
        dest: "{{ observability_dir }}/.env"
        mode: '0644'
      register: env_file_updated

    - name: Check Docker availability
      ansible.builtin.command: docker --version
      register: docker_check
      failed_when: false
      changed_when: false

    - name: Fail if Docker is not available
      ansible.builtin.fail:
        msg: "Docker is not available. Run ansible/playbooks/docker/install.yml first."
      when: docker_check.rc != 0

    - name: Ensure Docker network 'elastic' exists
      ansible.builtin.command: docker network create elastic
      register: network_create
      failed_when: false
      changed_when: network_create.rc == 0

    - name: Create Elasticsearch outputs directory
      ansible.builtin.file:
        path: "{{ observability_dir }}/elasticsearch/outputs"
        state: directory
        mode: '0755'

    - name: Remove obsolete Logstash pipeline config
      ansible.builtin.file:
        path: "{{ observability_dir }}/logstash/pipeline/prometheus-remote-write.conf"
        state: absent

    - name: Initialize certificates
      ansible.builtin.command: docker compose up init-certs
      args:
        chdir: "{{ observability_dir }}"
      environment:
        FORCE_REGEN: "{{ force_cert_regen | default('') }}"
      register: init_certs_result
      failed_when: false

    - name: Validate CA certificate in Docker volume
      ansible.builtin.shell: |
        docker run --rm -v observability_certs:/certs:ro alpine sh -c \
          "test -f /certs/ca.crt && echo EXISTS || test -f /certs/ca/ca.crt && echo EXISTS || echo NOT_FOUND"
      register: ca_cert_check
      changed_when: false
      failed_when: false

    - name: Warn if CA certificate not found
      ansible.builtin.debug:
        msg: "CA certificate not found in Docker volume. Check init-certs logs."
      when: "'EXISTS' not in (ca_cert_check.stdout | default(''))"

    - name: Start all services via Docker Compose
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ observability_dir }}"
      register: docker_up
      failed_when: false
      changed_when: "'Created' in docker_up.stderr or 'Started' in docker_up.stderr"

    - name: Start Grafana and Logstash without init-index dependency
      ansible.builtin.command: "docker compose up -d --no-deps {{ item }}"
      args:
        chdir: "{{ observability_dir }}"
      loop: [grafana, logstash01]
      failed_when: false
      changed_when: false

    - name: Wait for services to stabilize
      ansible.builtin.wait_for:
        timeout: 15

    - name: Wait for Elasticsearch to be ready
      ansible.builtin.uri:
        url: "https://localhost:9200"
        method: GET
        user: elastic
        password: "{{ lookup('env', 'ELASTIC_PASSWORD') | default('myElastic2025', true) }}"
        validate_certs: false
        status_code: [200, 401]
      register: es_health
      until: es_health.status | default(0) | int in [200, 401]
      retries: 30
      delay: 5
      failed_when: false

    - name: Wait for Kibana to be ready
      ansible.builtin.uri:
        url: "http://localhost:5601/api/status"
        method: GET
        status_code: [200, 302, 401]
      register: kibana_health
      until: kibana_health.status | default(0) | int in [200, 302, 401]
      retries: 30
      delay: 5
      failed_when: false

    - name: Get final service status
      ansible.builtin.command: "docker compose ps --format table"
      args:
        chdir: "{{ observability_dir }}"
      register: final_status
      changed_when: false

    - name: Display startup summary
      ansible.builtin.debug:
        msg: |
          Observability Platform Started
          ==============================
          Elasticsearch: {{ 'Ready' if es_health.status | default(0) | int in [200, 401] else 'Not Ready' }}
          Kibana:        {{ 'Ready' if kibana_health.status | default(0) | int in [200, 302, 401] else 'Not Ready' }}

          {{ final_status.stdout }}

          URLs:
            Elasticsearch  https://{{ ansible_hostname }}:9200
            Kibana         http://{{ ansible_hostname }}:5601
            Grafana        http://{{ ansible_hostname }}:3000
            Logstash       {{ ansible_hostname }}:5050
            Prometheus     http://{{ ansible_hostname }}:9090
            Tempo          http://{{ ansible_hostname }}:3200

- import_playbook: prometheus/start.yml
