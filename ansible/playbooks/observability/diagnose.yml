---
# Diagnose the full observability platform.
# Orchestrates per-subsystem diagnose playbooks, then shows Docker overview.
#
# OBSERVABILITY_PLATFORM (vars/variables.yaml → dynatrace-ansible context):
#   elastic | dynatrace | elastic&dynatrace
#
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/observability/diagnose.yml

- import_playbook: common/resolve_platform.yml

- import_playbook: elastic-stack/diagnose.yml
  when: hostvars['localhost']['observability_elastic_enabled'] | bool

- import_playbook: dynatrace/diagnose.yml
  when: hostvars['localhost']['observability_dynatrace_enabled'] | bool
