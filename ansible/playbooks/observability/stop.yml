---
# Stop Observability Platform
# Stops all Docker Compose services. Use -e delete_volumes=true to also remove volumes.
#
# To stop a single subsystem, use the per-subsystem stop playbook:
#   ansible-playbook -i inventory.yml playbooks/observability/elasticsearch/stop.yml

- name: Stop Observability Platform
  hosts: observability
  become: false
  gather_facts: true
  vars:
    observability_dir: "/home/ansible/ops/observability"
    delete_volumes: false
  tasks:
    - name: Skip elastic stop path when dynatrace platform is selected
      ansible.builtin.meta: end_play
      when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'dynatrace'

    - name: Verify we are on the designated observability host
      ansible.builtin.fail:
        msg: "FATAL: Observability stack must run on {{ observability_host }}, not {{ inventory_hostname }}."
      when: inventory_hostname != observability_host

    - name: Check if observability directory exists
      ansible.builtin.stat:
        path: "{{ observability_dir }}"
      register: obs_dir_stat

    - name: Stop services (preserve volumes)
      ansible.builtin.command: docker compose down
      args:
        chdir: "{{ observability_dir }}"
      when: obs_dir_stat.stat.exists and not (delete_volumes | bool)
      failed_when: false

    - name: Stop services and delete volumes
      ansible.builtin.command: docker compose down -v
      args:
        chdir: "{{ observability_dir }}"
      when: obs_dir_stat.stat.exists and (delete_volumes | bool)
      failed_when: false

    - name: Clean up orphaned containers
      ansible.builtin.command: docker container prune -f
      failed_when: false

    - name: Clean up orphaned networks
      ansible.builtin.command: docker network prune -f
      failed_when: false

    - name: Display stop summary
      ansible.builtin.debug:
        msg: |
          Observability Platform Stopped
          ==============================
          Volumes: {{ 'DELETED' if (delete_volumes | bool) else 'preserved' }}

          To stop a single subsystem:
            ansible-playbook -i inventory.yml playbooks/observability/<subsystem>/stop.yml

          To restart:
            ansible-playbook -i inventory.yml playbooks/observability/start.yml

- import_playbook: dynatrace/stop.yml
  when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'dynatrace'
