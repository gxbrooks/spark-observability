---
# Diagnose Kibana connectivity, container status, and API health.

- name: Diagnose Kibana
  hosts: observability
  gather_facts: false
  tags: [diagnose, kibana]
  vars:
    timeout_seconds: 15
    observability_dir: "/home/ansible/ops/observability"
  tasks:
    - name: Test Kibana connectivity
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:5601"
        method: GET
        timeout: "{{ timeout_seconds }}"
      register: kibana_test
      failed_when: false

    - name: Check Kibana container status
      ansible.builtin.shell: >
        cd {{ observability_dir }} &&
        docker compose ps kibana --format json |
        python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('State','unknown'))"
      register: kibana_container
      changed_when: false
      failed_when: false

    - name: Check Kibana API status
      ansible.builtin.shell: |
        curl -s -m 10 "http://{{ ansible_host }}:5601/api/status" |
        python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',{}).get('overall',{}).get('level','unavailable'))"
      register: kibana_api_status
      changed_when: false
      failed_when: false

    - name: Display Kibana status
      ansible.builtin.debug:
        msg: |
          Kibana
          ======
          HTTP:      {{ 'UP (HTTP ' ~ kibana_test.status ~ ')' if kibana_test.status | default(0) | int == 200 else 'DOWN' }}
          Container: {{ kibana_container.stdout | default('unknown') }}
          API level: {{ kibana_api_status.stdout | default('unknown') }}
