---
# Resolve Elasticsearch and Grafana credentials from the observability .env file.
# Include this in any play that needs es_password_resolved or grafana_password_resolved.
#
# Required variable: observability_env_file (path to .env on remote host)

- name: Read credentials from observability .env
  ansible.builtin.shell: |
    awk -F= '
      /^ES_PASSWORD=/{es=substr($0, index($0,$2))}
      /^GF_SECURITY_ADMIN_PASSWORD=/{gf=substr($0, index($0,$2))}
      END{
        if (es != "") print "ES_PASSWORD=" es
        if (gf != "") print "GF_SECURITY_ADMIN_PASSWORD=" gf
      }
    ' "{{ observability_env_file }}"
  register: _obs_env_creds
  changed_when: false
  failed_when: false

- name: Resolve runtime credentials
  ansible.builtin.set_fact:
    es_password_resolved: >-
      {{ (ES_PASSWORD | default('')) if (ES_PASSWORD | default('')) | length > 0
         else ((_obs_env_creds.stdout_lines | default([]) | select('match','^ES_PASSWORD=') | first | default('ES_PASSWORD=myElastic2025')).split('=',1)[1]) }}
    grafana_password_resolved: >-
      {{ (GF_SECURITY_ADMIN_PASSWORD | default('')) if (GF_SECURITY_ADMIN_PASSWORD | default('')) | length > 0
         else ((_obs_env_creds.stdout_lines | default([]) | select('match','^GF_SECURITY_ADMIN_PASSWORD=') | first | default('GF_SECURITY_ADMIN_PASSWORD=mysecretpassword')).split('=',1)[1]) }}
