---
# Test Elastic Agent telemetry: verify system metrics are flowing from all hosts.

- name: Test Elastic Agent Telemetry
  hosts: observability
  gather_facts: false
  tags: [test, elastic-agent]
  vars_files:
    - ../../../../vars/contexts/spark_ansible_vars.yml
  vars:
    timeout_seconds: 20
    recent_window: "now-30m"
  tasks:
    - name: Check system CPU metrics freshness
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/metrics-system.cpu-default/_search"
        method: POST
        body_format: json
        body:
          size: 1
          query:
            range:
              "@timestamp":
                gte: "{{ recent_window }}"
          sort:
            - "@timestamp": "desc"
        user: elastic
        password: "{{ ES_PASSWORD }}"
        validate_certs: false
        force_basic_auth: true
        timeout: "{{ timeout_seconds }}"
      register: cpu_check
      failed_when: false

    - name: Check system memory metrics freshness
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/metrics-system.memory-default/_search"
        method: POST
        body_format: json
        body:
          size: 1
          query:
            range:
              "@timestamp":
                gte: "{{ recent_window }}"
          sort:
            - "@timestamp": "desc"
        user: elastic
        password: "{{ ES_PASSWORD }}"
        validate_certs: false
        force_basic_auth: true
        timeout: "{{ timeout_seconds }}"
      register: memory_check
      failed_when: false

    - name: Assert system CPU metrics are recent
      ansible.builtin.assert:
        that:
          - cpu_check.json is defined
          - cpu_check.json.hits.total.value | int > 0
        fail_msg: |
          No recent system.cpu metrics in {{ recent_window }}.
          Check Elastic Agent status on all hosts:
            ansible all -i inventory.yml -m shell -a "sudo systemctl status elastic-agent" -b
        success_msg: "System CPU metrics are flowing from Elastic Agent"

    - name: Assert system memory metrics are recent
      ansible.builtin.assert:
        that:
          - memory_check.json is defined
          - memory_check.json.hits.total.value | int > 0
        fail_msg: "No recent system.memory metrics in {{ recent_window }}."
        success_msg: "System memory metrics are flowing from Elastic Agent"
