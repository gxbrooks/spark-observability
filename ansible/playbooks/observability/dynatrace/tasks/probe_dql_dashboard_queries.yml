---
# Validate DQL tiles in the Spark System Metrics New Dashboard.
#
# Two validation stages run in sequence:
#
# Stage 1 — Static (always runs):
#   Reads the content JSON from /tmp/spark_system_dashboard_content.json
#   (written by the preceding copy task) and checks each data tile for
#   known DQL anti-patterns: backticks in query strings, SQL-style `in` lists,
#   `| fields` after `timeseries`, and custom lookup prefixes.
#
# Stage 2 — Live DQL execute (runs only when DT_PLATFORM_TOKEN_GRAIL is set):
#   POSTs each tile query to /platform/storage/query/v1/query:execute and
#   reports state + row count or error message.
#   Requires a platform token with scopes: storage:metrics:read, storage:entities:read
#   Create one at: Settings → Access Tokens → Generate new token
#   Then add to vars/secrets.yaml:
#     dynatrace:
#       DT_PLATFORM_TOKEN_GRAIL: "dt0s16...."
#
# Usage:
#   ansible-playbook deploy.yml -i ansible/inventory.yml -e @vars/secrets.yaml --tags probe_dql

- name: Resolve tokens for DQL probe
  ansible.builtin.set_fact:
    dql_grail_token: "{{ (dynatrace | default({})).DT_PLATFORM_TOKEN_GRAIL | default('') }}"
    dt_tenant_url_resolved: >-
      {{ (DT_TENANT_URL.value if (DT_TENANT_URL is mapping and 'value' in DT_TENANT_URL)
          else DT_TENANT_URL) | default('') }}
  delegate_to: localhost
  run_once: true

# ── Stage 1: Static JSON validation ──────────────────────────────────────────
- name: Static-validate dashboard tile DQL queries
  ansible.builtin.shell:
    cmd: |
      python3 - << 'PYEOF'
      import json, re, sys

      path = "/tmp/spark_system_dashboard_content.json"
      try:
          d = json.load(open(path))
      except Exception as e:
          print(f"FAIL  cannot load {path}: {e}")
          sys.exit(1)

      tiles = d.get("tiles", {})
      errors = []

      anti_patterns = [
          (r"`",                        "backtick in DQL query"),
          (r"\|\s*fields\s+timeframe",  "| fields after timeseries (use fieldsAdd/fieldsRemove instead)"),
          (r'prefix:"[^"]*"',           "custom lookup prefix (use default lookup. prefix)"),
          (r'\w+\s+in\s+\(',            "SQL-style 'field in (list)' (use DQL in(field, v1, v2) form)"),
          (r'\btimestamp\b',            "field 'timestamp' (timeseries outputs 'timeframe', not 'timestamp')"),
          (r'managementZones|\.tags\b', "managementZones/tags inside lookup subquery (not allowed)"),
      ]

      for tile_id, tile in sorted(tiles.items(), key=lambda x: int(x[0])):
          if tile.get("type") != "data":
              continue
          q = tile.get("query", "")
          title = tile.get("title", f"tile {tile_id}")
          for pattern, msg in anti_patterns:
              if re.search(pattern, q):
                  errors.append(f"  tile {tile_id} [{title}]: {msg}")

      if errors:
          print(f"Static validation FAILED - {len(errors)} issue(s):")
          for e in errors:
              print(e)
          sys.exit(1)
      else:
          data_count = sum(1 for t in tiles.values() if t.get("type") == "data")
          print(f"Static validation PASSED - {data_count} DQL tiles, 0 issues.")
      PYEOF
    executable: /bin/bash
  register: static_probe
  changed_when: false
  failed_when: static_probe.rc != 0
  delegate_to: localhost
  run_once: true

- name: Show static validation result
  ansible.builtin.debug:
    msg: "{{ static_probe.stdout_lines }}"
  run_once: true

# ── Stage 2: Live DQL execute (optional, needs storage:metrics:read scope) ───
- name: Skip live DQL probe (DT_PLATFORM_TOKEN_GRAIL not set)
  ansible.builtin.debug:
    msg: >-
      Live DQL probe skipped — DT_PLATFORM_TOKEN_GRAIL not set.
      To enable: create a platform token with storage:metrics:read + storage:entities:read
      scopes and add it to vars/secrets.yaml under dynatrace.DT_PLATFORM_TOKEN_GRAIL.
  when: dql_grail_token | length == 0
  run_once: true

# Grail query:execute is asynchronous (returns state=RUNNING + requestToken) and
# requires ISO-8601 timeframes (relative "now()-1h" yields INVALID_TIMEFRAME).
# This step executes each representative tile query, polls query:poll until the
# query reaches a terminal state, and reports per-query pass/fail. The nic-envelope
# and disk-envelope queries exercise the `tx[] * -1` / `write[] * -1` negation used
# by the dashboard's envelope panels. Token is passed via environment (never on the
# command line); no_log hides it, results are shown by the following debug task.
- name: Run live DQL probe (execute + poll) against Grail
  ansible.builtin.shell:
    cmd: |
      python3 - << 'PYEOF'
      import json, os, sys, time, urllib.request, urllib.error, urllib.parse
      from datetime import datetime, timedelta, timezone

      base = os.environ["DT_TENANT_URL"].rstrip("/")
      token = os.environ["DQL_GRAIL_TOKEN"]
      now = datetime.now(timezone.utc)
      tf_to = now.strftime("%Y-%m-%dT%H:%M:%S.000Z")
      tf_from = (now - timedelta(hours=2)).strftime("%Y-%m-%dT%H:%M:%S.000Z")

      queries = [
          ("entity-fetch", 'fetch dt.entity.host | fields id, entity.name | limit 2'),
          ("host-cpu", 'timeseries cpu=avg(dt.host.cpu.usage), by:{dt.entity.host} | fieldsAdd host=entityName(dt.entity.host) | filter in(host, "Lab1", "Lab2", "Lab3") | fieldsRemove dt.entity.host'),
          ("nic-envelope", 'timeseries {rx=avg(dt.host.net.nic.bytes_rx), tx=avg(dt.host.net.nic.bytes_tx)}, by:{dt.entity.host} | fieldsAdd host=entityName(dt.entity.host) | filter in(host, "Lab1", "Lab2", "Lab3") | fieldsRemove dt.entity.host | fieldsAdd tx = tx[] * -1'),
          ("disk-envelope", 'timeseries {read=avg(dt.host.disk.bytes_read), write=avg(dt.host.disk.bytes_written)}, by:{dt.entity.host} | fieldsAdd host=entityName(dt.entity.host) | filter in(host, "Lab1", "Lab2", "Lab3") | fieldsRemove dt.entity.host | fieldsAdd write = write[] * -1'),
          ("gpu-utilization", 'timeseries core=avg(system.gpu.utilization.core_percent), by:{host.name, gpu.card}'),
          ("jvm-gc", 'timeseries gc_ms=sum(dt.runtime.jvm.gc.total_collection_time), by:{dt.entity.process_group_instance} | fieldsAdd process=entityName(dt.entity.process_group_instance) | filter isNotNull(process) | fieldsRemove dt.entity.process_group_instance'),
      ]

      def call(method, url, body=None):
          data = json.dumps(body).encode() if body is not None else None
          headers = {"Authorization": "Bearer " + token}
          if data is not None:
              headers["Content-Type"] = "application/json"
          req = urllib.request.Request(url, data=data, headers=headers, method=method)
          with urllib.request.urlopen(req, timeout=30) as r:
              return json.load(r)

      execute_url = base + "/platform/storage/query/v1/query:execute"
      poll_url = base + "/platform/storage/query/v1/query:poll"
      failures = 0
      for label, q in queries:
          try:
              resp = call("POST", execute_url, {"query": q, "defaultTimeframeStart": tf_from, "defaultTimeframeEnd": tf_to})
              state = resp.get("state")
              rtoken = resp.get("requestToken")
              polls = 0
              while state == "RUNNING" and polls < 20:
                  time.sleep(2); polls += 1
                  resp = call("GET", poll_url + "?request-token=" + urllib.parse.quote(rtoken))
                  state = resp.get("state")
              if state == "SUCCEEDED":
                  rows = len(resp.get("result", {}).get("records", []))
                  flag = "PASS" if rows > 0 else "WARN"
                  note = "" if rows > 0 else " (no data in 2h window)"
                  print(f"  {flag}  {label:16} state=SUCCEEDED rows={rows}{note}")
              else:
                  err = resp.get("error", {})
                  msg = err.get("message", str(err)) if isinstance(err, dict) else str(err)
                  print(f"  FAIL  {label:16} state={state} error={msg[:120]}")
                  failures += 1
          except urllib.error.HTTPError as e:
              print(f"  FAIL  {label:16} HTTP {e.code}: {e.read().decode()[:120]}")
              failures += 1
          except Exception as e:
              print(f"  FAIL  {label:16} {type(e).__name__}: {str(e)[:120]}")
              failures += 1

      print(f"\nLive DQL probe: {len(queries) - failures}/{len(queries)} queries succeeded.")
      sys.exit(1 if failures else 0)
      PYEOF
    executable: /bin/bash
  environment:
    DT_TENANT_URL: "{{ dt_tenant_url_resolved }}"
    DQL_GRAIL_TOKEN: "{{ dql_grail_token }}"
  register: live_probe
  changed_when: false
  failed_when: false
  no_log: true
  when: dql_grail_token | length > 0
  delegate_to: localhost
  run_once: true

- name: Show live DQL probe results
  ansible.builtin.debug:
    msg: "{{ live_probe.stdout_lines | default(['(no output)']) }}"
  when: dql_grail_token | length > 0
  run_once: true

- name: Assert all live DQL tile queries succeeded
  ansible.builtin.assert:
    that:
      - live_probe.rc | default(1) | int == 0
    fail_msg: "One or more dashboard DQL tile queries failed against Grail (see probe output above)."
    success_msg: "All live DQL tile queries succeeded against Grail."
  when: dql_grail_token | length > 0
  run_once: true
