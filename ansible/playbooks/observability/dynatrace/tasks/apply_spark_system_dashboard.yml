- name: Create Spark System Metrics dashboard
  ansible.builtin.uri:
    url: "{{ dt_base_url_resolved }}/api/config/v1/dashboards"
    method: POST
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: "application/json"
    body_format: json
    body: "{{ spark_system_dashboard_payload }}"
    status_code: [200, 201, 400, 401, 403, 409]
  register: spark_system_dashboard_create
  failed_when: false
  when: (spark_system_dashboard_existing | length) == 0
  delegate_to: localhost
  run_once: true

- name: Assert dashboard create succeeded
  ansible.builtin.assert:
    that:
      - spark_system_dashboard_create.status | default(0) in [200, 201]
    fail_msg: >-
      Spark System Metrics dashboard create failed:
      HTTP {{ spark_system_dashboard_create.status | default('unknown') }}.
  when: (spark_system_dashboard_existing | length) == 0
  run_once: true

- name: Update Spark System Metrics dashboard
  ansible.builtin.uri:
    url: "{{ dt_base_url_resolved }}/api/config/v1/dashboards/{{ spark_system_dashboard_existing.id }}"
    method: PUT
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: "application/json"
    body_format: json
    body: "{{ spark_system_dashboard_payload | combine({'id': spark_system_dashboard_existing.id}) }}"
    status_code: [200, 204, 400, 401, 403, 404, 409]
  register: spark_system_dashboard_update
  failed_when: false
  when: (spark_system_dashboard_existing | length) > 0
  delegate_to: localhost
  run_once: true

- name: Assert dashboard update succeeded
  ansible.builtin.assert:
    that:
      - spark_system_dashboard_update.status | default(0) in [200, 204]
    fail_msg: >-
      Spark System Metrics dashboard update failed:
      HTTP {{ spark_system_dashboard_update.status | default('unknown') }}.
  when: (spark_system_dashboard_existing | length) > 0
  run_once: true
