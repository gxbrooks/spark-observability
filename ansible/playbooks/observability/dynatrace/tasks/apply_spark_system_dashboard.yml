- name: Resolve Dynatrace API token from flat or nested secrets
  ansible.builtin.set_fact:
    dt_base_url_resolved: "{{ ((DT_API_URL.value if (DT_API_URL is mapping and 'value' in DT_API_URL) else DT_API_URL) | default('')) | regex_replace('/api/?$', '') }}"
    dt_api_token_resolved: "{{ ((DT_API_TOKEN.value if (DT_API_TOKEN is mapping and 'value' in DT_API_TOKEN) else DT_API_TOKEN) | default('', true)) | default((dynatrace | default({})).DT_API_TOKEN | default(''), true) }}"
  delegate_to: localhost
  run_once: true

- name: List existing Dynatrace dashboards
  ansible.builtin.uri:
    url: "{{ dt_base_url_resolved }}/api/config/v1/dashboards"
    method: GET
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
    status_code: [200, 401, 403]
  register: dt_dashboards
  failed_when: false
  delegate_to: localhost
  run_once: true

- name: Assert dashboards are readable
  ansible.builtin.assert:
    that:
      - dt_dashboards.status | default(0) == 200
    fail_msg: >-
      Cannot list Dynatrace dashboards (HTTP {{ dt_dashboards.status | default('unknown') }}).
      DT_API_TOKEN requires ReadConfig.
  run_once: true

- name: Resolve existing Spark System Metrics dashboard
  ansible.builtin.set_fact:
    spark_system_dashboard_existing: >-
      {{ (dt_dashboards.json.dashboards | default([])
          | selectattr('name', 'equalto', 'Spark System Metrics')
          | list | first) | default({}, true) }}
  delegate_to: localhost
  run_once: true

- name: Build Spark System Metrics dashboard payload
  ansible.builtin.set_fact:
    spark_system_dashboard_payload:
      dashboardMetadata:
        name: "Spark System Metrics"
        shared: true
        owner: "admin"
        preset: false
        tags:
          - spark
          - system
          - metrics
      tiles:
        - name: "Spark System Metrics Overview"
          tileType: "MARKDOWN"
          configured: true
          bounds: { top: 0, left: 0, width: 760, height: 76 }
          tileFilter: { timeframe: null, managementZone: null }
          isAutoRefreshDisabled: false
          markdown: |
            ## Spark System Metrics
            Global high-level Spark environment signals with OOB-first Dynatrace metrics.
            Custom GPU/GC/computed active-job panels are added as telemetry plumbing matures.
        - name: "Active Spark Applications"
          tileType: "DATA_EXPLORER"
          configured: true
          bounds: { top: 76, left: 0, width: 380, height: 228 }
          tileFilter: { timeframe: "Last 2 hours", managementZone: null }
          isAutoRefreshDisabled: false
          customName: "Data explorer results"
          queries:
            - id: "A"
              metricSelector: "builtin:tech.jvm.spark.apps.gauge:splitBy():sum"
              spaceAggregation: "SUM"
              timeAggregation: "DEFAULT"
              splitBy: []
              rate: "NONE"
              enabled: true
          visualConfig:
            type: "SINGLE_VALUE"
            global: { hideLegend: false }
            rules: []
            axes: { xAxis: { visible: true }, yAxes: [] }
            singleValueSettings: { showTrend: true, showSparkLine: true, linkTileColorToThreshold: false }
            thresholds:
              - axisTarget: "LEFT"
                queryId: ""
                visible: true
                rules:
                  - { value: null, color: "#7dc540" }
          queriesSettings:
            resolution: ""
            foldTransformation: "LAST_VALUE"
          metricExpressions:
            - "resolution=null&(builtin:tech.jvm.spark.apps.gauge:splitBy():sum):limit(100):names:last"
        - name: "Alive Spark Workers"
