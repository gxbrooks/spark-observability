---
# Restore Operator/webhook replicas (stop.yml scales them to zero) and renew
# expired webhook TLS certs before status probes.
- name: Dynatrace start (operator + webhook)
  hosts: kubernetes_master
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../../../vars/contexts/dynatrace_ansible_vars.yml"
    - "{{ playbook_dir }}/../../../../vars/secrets.yaml"
  tasks:
    - name: Ensure Dynatrace Operator and webhook are running with valid certs
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/ensure_operator_webhook.yml"

- name: Dynatrace start/status (Kubernetes-managed OneAgent)
  hosts: kubernetes_master:kubernetes_workers:observability
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../../../vars/contexts/dynatrace_ansible_vars.yml"
    - "{{ playbook_dir }}/../../../../vars/secrets.yaml"
  tasks:
    - name: Activate cluster in Dynatrace Kubernetes app
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/activate_k8s_app.yml"

    - name: Check host OneAgent service status (informational)
      ansible.builtin.command: systemctl is-active oneagent
      register: oneagent_status
      changed_when: false
      failed_when: false
      become: true

    - name: Show host OneAgent status expectation
      ansible.builtin.debug:
        msg: >-
          host oneagent on {{ inventory_hostname }} => {{ oneagent_status.stdout | default('unknown') }}
          (expected inactive when Dynakube daemonset manages OneAgent on Kubernetes nodes).
