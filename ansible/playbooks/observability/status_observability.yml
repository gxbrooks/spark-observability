---
# Status Observability Platform
# This playbook checks the status of the observability platform on GaryPC WSL

- name: Status Observability Platform
  hosts: observability
  become: false
  gather_facts: true
  
  vars:
    observability_dir: "/home/ansible/observability"
    docker_compose_file: "{{ observability_dir }}/docker-compose.yml"
    
  tasks:
    - name: Check if observability directory exists
      stat:
        path: "{{ observability_dir }}"
      register: obs_dir_stat
      
    - name: Fail if observability directory doesn't exist
      fail:
        msg: "Observability directory {{ observability_dir }} does not exist."
      when: not obs_dir_stat.stat.exists
      
    - name: Check Docker status
      command: sudo docker ps
      register: docker_ps
      failed_when: false
      
    - name: Check observability service status
      command: sudo docker-compose -f "{{ docker_compose_file }}" ps
      args:
        chdir: "{{ observability_dir }}"
      register: service_status
      
    - name: Check service health
      command: sudo docker-compose -f "{{ docker_compose_file }}" ps
      args:
        chdir: "{{ observability_dir }}"
      register: health_status
      
    - name: Check network status
      command: sudo docker network ls
      register: network_status
      
    - name: Check volume status
      command: sudo docker volume ls
      register: volume_status
      
    - name: Display service status
      debug:
        msg: |
          Observability Platform Status:
          =============================
          
          Services:
          {{ service_status.stdout }}
          
          Health Status:
          {{ health_status.stdout }}
          
          Networks:
          {{ network_status.stdout }}
          
          Volumes:
          {{ volume_status.stdout }}
          
    - name: Show service URLs
      debug:
        msg: |
          Service URLs:
          - Elasticsearch: https://{{ inventory_hostname }}:9200
          - Kibana: http://{{ inventory_hostname }}:5601
          - Grafana: http://{{ inventory_hostname }}:3000
          - Logstash: {{ inventory_hostname }}:9600
