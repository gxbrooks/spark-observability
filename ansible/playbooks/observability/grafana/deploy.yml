---
# Deploy Grafana configuration files to the observability host.

- name: Deploy Grafana
  hosts: observability
  gather_facts: false
  tags: [deploy, grafana]
  vars:
    observability_dir: "/home/ansible/ops/observability"
  tasks:
    - name: Synchronize Grafana directory
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../../../observability/grafana/"
        dest: "{{ observability_dir }}/grafana/"
        delete: false
        recursive: true
        rsync_opts:
          - "--exclude=plugins/"

    # rsync uses delete: false so files removed from the repo are not deleted on
    # the host; explicitly drop retired provisioned dashboards.
    - name: Remove retired provisioned dashboard files
      ansible.builtin.file:
        path: "{{ observability_dir }}/grafana/provisioning/dashboards/{{ item }}"
        state: absent
      loop:
        - spark-application-logs.json
        - batch-job-dashboard4.json

    - name: Create Grafana plugins directory
      ansible.builtin.file:
        path: "{{ observability_dir }}/grafana/plugins"
        state: directory
        mode: '0755'
        owner: '472'
        group: '472'
      become: true
