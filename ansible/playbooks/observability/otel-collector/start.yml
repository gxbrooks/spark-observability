---
# Start OTel Collector container.

- name: Start OTel Collector
  hosts: observability
  gather_facts: false
  tags: [start, otel-collector]
  vars:
    observability_dir: "/home/ansible/ops/observability"
  tasks:
    - name: Start OTel Collector container
      ansible.builtin.command: docker compose up -d otel-collector
      args:
        chdir: "{{ observability_dir }}"
      register: otel_start
      changed_when: "'Started' in otel_start.stderr or 'Created' in otel_start.stderr"
      failed_when: false

    - name: Wait for OTel Collector health endpoint
      ansible.builtin.uri:
        url: "http://localhost:13133"
        method: GET
        status_code: [200]
      register: otel_collector_health
      until: otel_collector_health.status | default(0) | int == 200
      retries: 30
      delay: 5
      failed_when: false

    - name: Report
      ansible.builtin.debug:
        msg: >-
          OTel Collector: {{ 'healthy' if otel_collector_health.status | default(0) | int == 200 else 'NOT READY' }}
          (Spark OTel listener requires :4317 before client-mode jobs run)
