---
# Uninstall Observability Platform
# Removes all Docker containers, volumes, and deployed files.
#
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/observability/uninstall.yml

- name: Uninstall Observability Platform
  hosts: observability
  become: false
  gather_facts: true
  vars:
    observability_dir: "/home/ansible/ops/observability"
  tasks:
    - name: Skip elastic uninstall path when dynatrace platform is selected
      ansible.builtin.meta: end_play
      when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'dynatrace'

    - name: Display uninstall warning
      ansible.builtin.debug:
        msg: |
          WARNING: This will completely remove the observability platform!
          - Stop all services
          - Remove all Docker containers and volumes
          - Delete all observability files and data

    - name: Pause for confirmation
      ansible.builtin.pause:
        prompt: "Press ENTER to continue with uninstall, or Ctrl+C to cancel"

    - name: Stop all services and remove volumes
      ansible.builtin.command: docker compose down -v
      args:
        chdir: "{{ observability_dir }}"
      failed_when: false

    - name: Remove orphaned containers
      ansible.builtin.command: docker container prune -f
      failed_when: false

    - name: Remove orphaned volumes
      ansible.builtin.command: docker volume prune -f
      failed_when: false

    - name: Remove orphaned networks
      ansible.builtin.command: docker network prune -f
      failed_when: false

    - name: Remove observability directory
      ansible.builtin.file:
        path: "{{ observability_dir }}"
        state: absent
      failed_when: false

    - name: Display uninstall summary
      ansible.builtin.debug:
        msg: |
          Observability Platform Uninstalled
          ==================================
          All services and data removed from {{ inventory_hostname }}.
          K8s exporters will be removed next.

          To reinstall:
            ansible-playbook -i inventory.yml playbooks/observability/install.yml

- import_playbook: prometheus/uninstall.yml
  vars:
    skip_confirmation: true
  when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'elastic'

- import_playbook: dynatrace/uninstall.yml
  when: (observability_platform | default(OBSERVABILITY_PLATFORM | default('elastic'))) == 'dynatrace'
