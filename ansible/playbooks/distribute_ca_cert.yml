---
- name: Distribute Elastic CA certificate to Windows hosts
  hosts: windows
  gather_facts: false
  vars:
    ca_cert_src: "{{ playbook_dir }}/../../docker/certs/elastic/certs/ca/ca.crt"
    ca_cert_dest: "C:/Volumes/certs/ca.crt"
    force_cert: false
  tasks:
    - name: Ensure destination directory exists (Windows)
      ansible.windows.win_file:
        path: "{{ ca_cert_dest | dirname }}"
        state: directory

    - name: Copy CA certificate to Windows host
      ansible.windows.win_copy:
        src: "{{ ca_cert_src }}"
        dest: "{{ ca_cert_dest }}"
        force: "{{ force_cert }}"

- name: Distribute Elastic CA certificate to Linux hosts
  hosts: linux
  become: true
  gather_facts: false
  vars:
    ca_cert_src: "{{ playbook_dir }}/../../docker/certs/elastic/certs/ca/ca.crt"
    ca_cert_dest: "/mnt/c/Volumes/certs/ca.crt"
    force_cert: false
  tasks:
    - name: Ensure destination directory exists (Linux)
      file:
        path: "{{ ca_cert_dest | dirname }}"
        state: directory
        mode: '0755'

    - name: Copy CA certificate to Linux host
      copy:
        src: "{{ ca_cert_src }}"
        dest: "{{ ca_cert_dest }}"
        mode: '0644'
        force: "{{ force_cert }}"
