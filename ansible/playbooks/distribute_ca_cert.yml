---
- name: Distribute Elastic CA certificate to Windows hosts (SSH+cmd compatible)
  hosts: windows
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir | dirname | dirname | dirname }}"
    ca_cert_src: "{{ project_root }}/docker/certs/elastic/certs/ca/ca.crt"
    ca_cert_dest: "C:/Volumes/certs/ca.crt"
    ca_cert_dir: "C:/Volumes/certs"
    force_cert: false
  tasks:
    - name: Ensure destination directory exists (Windows)
      raw: cmd.exe /c "if not exist {{ ca_cert_dir }} mkdir {{ ca_cert_dir }}"

    - name: Copy CA certificate to Windows host (using Python)
      raw: python -c "import shutil; shutil.copyfile(r'{{ ca_cert_src }}', r'{{ ca_cert_dest }}')"

- name: Distribute Elastic CA certificate to Linux hosts
  hosts: linux
  become: true
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir | dirname | dirname | dirname }}"
    ca_cert_src: "{{ project_root }}/docker/certs/elastic/certs/ca/ca.crt"
    ca_cert_dest: "/mnt/c/Volumes/certs/ca.crt"
    force_cert: false
  tasks:
    - name: Ensure destination directory exists (Linux)
      file:
        path: "{{ ca_cert_dest | dirname }}"
        state: directory
        mode: '0755'

    - name: Copy CA certificate to Linux host
      copy:
        src: "{{ ca_cert_src }}"
        dest: "{{ ca_cert_dest }}"
        mode: '0644'
        force: "{{ force_cert }}"
