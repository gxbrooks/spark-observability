---
- name: Install and Configure NFS Server
  hosts: nfs_servers
  become: true
  vars:
    nfs_export_dir: /srv/nfs/spark-events
    nfs_export_opts: "*(rw,sync,no_root_squash)"
  tasks:
    - name: Install NFS server packages
      apt:
        name: 
          - nfs-kernel-server
          - nfs-common
        state: present
        update_cache: yes

    - name: Create NFS export directory
      file:
        path: "{{ nfs_export_dir }}"
        state: directory
        mode: '0777'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Add export to /etc/exports
      lineinfile:
        path: /etc/exports
        line: "{{ nfs_export_dir }} {{ nfs_export_opts }}"
        create: yes

    - name: Apply NFS exports
      command: exportfs -ra

    - name: Start and enable NFS server
      systemd:
        name: nfs-server
        state: started
        enabled: yes

- name: Configure NFS Clients
  hosts: kubernetes_master:kubernetes_workers
  become: true
  vars:
    nfs_server: "{{ groups['nfs_servers'][0] }}"
    nfs_export_dir: /srv/nfs/spark-events
    nfs_mount_point: /mnt/spark-events
  tasks:
    - name: Install NFS client packages
      apt:
        name: nfs-common
        state: present
        update_cache: yes

    - name: Create NFS mount point
      file:
        path: "{{ nfs_mount_point }}"
        state: directory
        mode: '0777'

    - name: Mount NFS share
      mount:
        path: "{{ nfs_mount_point }}"
        src: "{{ nfs_server }}:{{ nfs_export_dir }}"
        fstype: nfs
        opts: rw,sync
        state: mounted
