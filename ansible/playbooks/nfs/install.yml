---
- name: Regenerate NFS Ansible vars on controller
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run generate_contexts for nfs context
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/regenerate_contexts.yml"
      vars:
        regenerate_contexts_root: "{{ playbook_dir | dirname | dirname | dirname }}"
        regenerate_context_names: ['nfs']

- name: Install and Configure NFS Server
  hosts: nfs_servers
  become: true
  vars_files:
    - "{{ playbook_dir | dirname | dirname | dirname }}/vars/contexts/nfs_ansible_vars.yml"
  vars:
    nfs_export_opts: "*(rw,sync,no_root_squash,no_subtree_check,insecure)"
    nfs_export_root: "{{ nfs_spark_data_export | dirname }}"
    spark_mount_base_resolved: "{{ spark_mount_base }}"
    spark_data_mount_resolved: "{{ spark_data_mount }}"
    spark_events_mount_resolved: "{{ spark_mount_base_resolved }}/events"
    spark_logs_mount_resolved: "{{ spark_mount_base_resolved }}/logs"
    spark_checkpoints_mount_resolved: "{{ spark_mount_base_resolved }}/checkpoints"
    spark_jupyter_mount_resolved: "{{ spark_mount_base_resolved }}/jupyter"
    nfs_export_dirs:
      - "{{ nfs_export_root }}/events"
      - "{{ nfs_spark_data_export }}"
      - "{{ nfs_export_root }}/logs"
      - "{{ nfs_export_root }}/checkpoints"
      - /srv/nfs/jupyterhub
      - /srv/nfs/jupyterhub-users
  tasks:
    - name: Fail if required NFS variables are missing from generated nfs context
      fail:
        msg: "Required variable '{{ item }}' is missing from vars/variables.yaml nfs context."
      when: vars[item] is not defined or (vars[item] | string | trim) == ''
      loop:
        - spark_mount_base
        - spark_data_mount
        - nfs_spark_data_export

    - name: Install NFS server packages
      apt:
        name: 
          - nfs-kernel-server
          - nfs-common
        state: present
        update_cache: yes

    - name: Create NFS Spark export root
      file:
        path: "{{ nfs_export_root }}"
        state: directory
        mode: '2775'
        owner: spark
        group: spark

    - name: Create NFS export directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '2775'
        owner: spark
        group: spark
      loop: "{{ nfs_export_dirs }}"

    - name: Add exports to /etc/exports
      lineinfile:
        path: /etc/exports
        line: "{{ item }} {{ nfs_export_opts }}"
        create: yes
      loop: "{{ nfs_export_dirs }}"

    - name: Apply NFS exports
      command: exportfs -ra
      changed_when: false

    - name: Start and enable NFS server
      systemd:
        name: nfs-server
        state: started
        enabled: yes

- name: Configure NFS Server Local Mounts (Bind Mounts)
  hosts: nfs_servers
  become: true
  vars_files:
    - "{{ playbook_dir | dirname | dirname | dirname }}/vars/contexts/nfs_ansible_vars.yml"
  vars:
    nfs_export_root: "{{ nfs_spark_data_export | dirname }}"
    spark_mount_base_resolved: "{{ spark_mount_base }}"
    spark_data_mount_resolved: "{{ spark_data_mount }}"
    spark_events_mount_resolved: "{{ spark_mount_base_resolved }}/events"
    spark_logs_mount_resolved: "{{ spark_mount_base_resolved }}/logs"
    spark_checkpoints_mount_resolved: "{{ spark_mount_base_resolved }}/checkpoints"
    spark_jupyter_mount_resolved: "{{ spark_mount_base_resolved }}/jupyter"
    bind_mounts:
      - { mount: "{{ spark_events_mount_resolved }}", src: "{{ nfs_export_root }}/events" }
      - { mount: "{{ spark_data_mount_resolved }}", src: "{{ nfs_spark_data_export }}" }
      - { mount: "{{ spark_logs_mount_resolved }}", src: "{{ nfs_export_root }}/logs" }
      - { mount: "{{ spark_checkpoints_mount_resolved }}", src: "{{ nfs_export_root }}/checkpoints" }
      - { mount: "{{ spark_jupyter_mount_resolved }}", src: '/srv/nfs/jupyterhub' }
  tasks:
    - name: Fail if required NFS variables are missing from generated nfs context
      fail:
        msg: "Required variable '{{ item }}' is missing from vars/variables.yaml nfs context."
      when: vars[item] is not defined or (vars[item] | string | trim) == ''
      loop:
        - spark_mount_base
        - spark_data_mount
        - nfs_spark_data_export

    - name: Create spark mount base on NFS server
      file:
        path: "{{ spark_mount_base_resolved }}"
        state: directory
        mode: '2775'
        owner: spark
        group: spark

    - name: Stat NFS server bind mount points (detect legacy symlinks)
      stat:
        path: "{{ item.mount }}"
        follow: false
      loop: "{{ bind_mounts }}"
      register: nfs_server_bind_mount_stats

    - name: Remove legacy symlinks at NFS server bind mount points
      file:
        path: "{{ item.item.mount }}"
        state: absent
      loop: "{{ nfs_server_bind_mount_stats.results }}"
      when: item.stat.exists | default(false) and item.stat.islnk | default(false)

    - name: Create local mount points on NFS server
      file:
        path: "{{ item.mount }}"
        state: directory
        mode: '2775'
        owner: spark
        group: spark
      loop: "{{ bind_mounts }}"

    - name: Create bind mounts on NFS server
      mount:
        path: "{{ item.mount }}"
        src: "{{ item.src }}"
        fstype: none
        opts: bind
        state: mounted
      loop: "{{ bind_mounts }}"
      changed_when: false

# Kubernetes nodes that mount NFS from nfs_servers (excludes the server host, which uses bind mounts above).
- name: Configure NFS Clients
  hosts: kubernetes_master:kubernetes_workers:!nfs_servers
  become: true
  vars_files:
    - "{{ playbook_dir | dirname | dirname | dirname }}/vars/contexts/nfs_ansible_vars.yml"
  vars:
    nfs_export_root: "{{ nfs_spark_data_export | dirname }}"
    spark_mount_base_resolved: "{{ spark_mount_base }}"
    spark_data_mount_resolved: "{{ spark_data_mount }}"
    spark_events_mount_resolved: "{{ spark_mount_base_resolved }}/events"
    spark_logs_mount_resolved: "{{ spark_mount_base_resolved }}/logs"
    spark_checkpoints_mount_resolved: "{{ spark_mount_base_resolved }}/checkpoints"
    spark_jupyter_mount_resolved: "{{ spark_mount_base_resolved }}/jupyter"
    # Use DNS name (ansible_host) so /etc/fstab and mount(8) resolve the server correctly.
    nfs_server: "{{ hostvars[groups['nfs_servers'][0]]['ansible_host'] | default(groups['nfs_servers'][0], true) }}"
    nfs_mounts:
      - { src: "{{ nfs_export_root }}/events", dest: "{{ spark_events_mount_resolved }}" }
      - { src: "{{ nfs_spark_data_export }}", dest: "{{ spark_data_mount_resolved }}" }
      - { src: "{{ nfs_export_root }}/logs", dest: "{{ spark_logs_mount_resolved }}" }
      - { src: "{{ nfs_export_root }}/checkpoints", dest: "{{ spark_checkpoints_mount_resolved }}" }
      - { src: '/srv/nfs/jupyterhub', dest: "{{ spark_jupyter_mount_resolved }}" }
  tasks:
    - name: Fail if required NFS variables are missing from generated nfs context
      fail:
        msg: "Required variable '{{ item }}' is missing from vars/variables.yaml nfs context."
      when: vars[item] is not defined or (vars[item] | string | trim) == ''
      loop:
        - spark_mount_base
        - spark_data_mount
        - nfs_spark_data_export

    - name: Install NFS client packages
      apt:
        name: nfs-common
        state: present
        update_cache: yes

    - name: Create spark mount base on clients
      file:
        path: "{{ spark_mount_base_resolved }}"
        state: directory
        mode: '2775'
        owner: spark
        group: spark

    - name: Stat NFS client mount points (detect legacy symlinks)
      stat:
        path: "{{ item.dest }}"
        follow: false
      loop: "{{ nfs_mounts }}"
      register: nfs_client_mount_stats

    - name: Remove legacy symlinks at NFS client mount points
      file:
        path: "{{ item.item.dest }}"
        state: absent
      loop: "{{ nfs_client_mount_stats.results }}"
      when: item.stat.exists | default(false) and item.stat.islnk | default(false)

    - name: Create NFS mount points
      file:
        path: "{{ item.dest }}"
        state: directory
        mode: '2775'
        owner: spark
        group: spark
      loop: "{{ nfs_mounts }}"

    - name: Mount NFS shares
      mount:
        path: "{{ item.dest }}"
        src: "{{ nfs_server }}:{{ item.src }}"
        fstype: nfs
        # NFSv4 over TCP only (avoids legacy RPC/UDP issues; matches UFW allowing 2049/tcp on the server).
        opts: rw,sync,nfsvers=4
        state: mounted
      loop: "{{ nfs_mounts }}"
      changed_when: false
