---
- name: Setup Spark Data Directory on NFS
  hosts: nfs_servers
  become: true
  vars:
    spark_data_dir: /srv/nfs/spark-data
    nfs_export_opts: "*(rw,sync,no_root_squash,no_subtree_check)"
  tasks:
    - name: Create NFS export directory
      file:
        path: "{{ spark_data_dir }}"
        state: directory
        mode: '0777'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Add Spark data export to /etc/exports
      lineinfile:
        path: /etc/exports
        line: "{{ spark_data_dir }} {{ nfs_export_opts }}"
        create: yes

    - name: Apply NFS exports
      command: exportfs -ra

- name: Mount Spark Data on Kubernetes Nodes
  hosts: kubernetes_master:kubernetes_workers
  become: true
  vars:
    nfs_server: "{{ groups['nfs_servers'][0] }}"
    spark_data_dir: /srv/nfs/spark-data
    spark_data_mount: /mnt/spark-data
  tasks:
    - name: Create Spark data mount point
      file:
        path: "{{ spark_data_mount }}"
        state: directory
        mode: '0777'

    - name: Mount Spark data NFS share
      mount:
        path: "{{ spark_data_mount }}"
        src: "{{ nfs_server }}:{{ spark_data_dir }}"
        fstype: nfs
        opts: rw,sync
        state: mounted
