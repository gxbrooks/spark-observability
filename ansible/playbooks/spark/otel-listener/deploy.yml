---
# Deploy Spark OTel listener JAR to Kubernetes nodes.
#
# Cluster mode (K8s): copies to SPARK_JARS_MOUNT on k8s_nodes — the hostPath mount
# referenced by ansible/roles/spark/templates/spark-defaults.conf.j2 (spark.jars).
# Application data stays on /mnt/spark/data; runtime JARs use /mnt/spark/jars.
#
# Client mode (run-chapters.sh on a workstation): uses the repo path in
# spark/conf/spark-defaults.conf (generated from SPARK_OTEL_LISTENER_JAR in
# spark_client_env.sh). build_jar.yml copies target/*.jar to that path; deploy
# here does NOT update the workstation copy unless you re-run build locally.
#
# Usage: cd ansible && ansible-playbook -i inventory.yml playbooks/spark/otel-listener/deploy.yml

- name: Regenerate devops context for SPARK_JARS_MOUNT
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run generate_contexts for devops context
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../tasks/regenerate_contexts.yml"
      vars:
        regenerate_contexts_root: "{{ playbook_dir | dirname | dirname | dirname | dirname }}"
        regenerate_context_names: ['devops']

- name: Resolve or build OTel listener JAR on controller
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir | dirname | dirname | dirname | dirname }}"
    otel_listener_dir: "{{ project_root }}/spark/otel-listener"
    otel_listener_jar: "{{ SPARK_OTEL_LISTENER_JAR_NAME.value | default('spark-otel-listener-1.0.0.jar') }}"
  vars_files:
    - "{{ playbook_dir | dirname | dirname | dirname | dirname }}/vars/variables.yaml"
  tasks:
    - name: Stat JAR in Maven target directory
      ansible.builtin.stat:
        path: "{{ otel_listener_dir }}/target/{{ otel_listener_jar }}"
      register: st_target

    - name: Stat JAR at distribution path (artifact next to pom)
      ansible.builtin.stat:
        path: "{{ otel_listener_dir }}/{{ otel_listener_jar }}"
      register: st_dist

    - name: Choose existing JAR path (prefer Maven target over distribution copy)
      ansible.builtin.set_fact:
        otel_jar_path: "{{ otel_listener_dir }}/target/{{ otel_listener_jar }}"
      when: st_target.stat.exists

    - name: Choose distribution JAR path when target is missing
      ansible.builtin.set_fact:
        otel_jar_path: "{{ otel_listener_dir }}/{{ otel_listener_jar }}"
      when: not st_target.stat.exists and st_dist.stat.exists

    - name: Build JAR on controller when missing
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/build_jar.yml"
      vars:
        otel_mvn_clean: false
      when: not st_target.stat.exists and not st_dist.stat.exists

    - name: Set JAR path after build
      ansible.builtin.set_fact:
        otel_jar_path: "{{ otel_listener_dir }}/target/{{ otel_listener_jar }}"
      when: not st_target.stat.exists and not st_dist.stat.exists

    - name: Verify resolved JAR exists
      ansible.builtin.stat:
        path: "{{ otel_jar_path }}"
      register: st_final

    - name: Sync target JAR to client-mode path (spark/otel-listener/*.jar)
      ansible.builtin.copy:
        src: "{{ otel_listener_dir }}/target/{{ otel_listener_jar }}"
        dest: "{{ otel_listener_dir }}/{{ otel_listener_jar }}"
        mode: "0644"
      when: st_target.stat.exists

    - name: Fail if OTel JAR is still missing
      ansible.builtin.fail:
        msg: "OTel listener JAR missing after build resolution: {{ otel_jar_path }}"
      when: not st_final.stat.exists

- name: Copy OTel listener JAR to node paths visible inside Spark pods
  hosts: k8s_nodes
  become: true
  gather_facts: false
  vars_files:
    - "{{ playbook_dir | dirname | dirname | dirname | dirname }}/vars/variables.yaml"
  vars:
    otel_listener_jar: "{{ SPARK_OTEL_LISTENER_JAR_NAME.value | default('spark-otel-listener-1.0.0.jar') }}"
    spark_jars_mount: "{{ SPARK_JARS_MOUNT.value | default('/mnt/spark/jars') }}"
    dest_jar: "{{ spark_jars_mount }}/{{ otel_listener_jar }}"
    legacy_jar: "/mnt/spark/data/{{ otel_listener_jar }}"
  tasks:
    - name: Ensure Spark runtime JAR mount directory exists
      ansible.builtin.file:
        path: "{{ spark_jars_mount }}"
        state: directory
        mode: "0755"
        owner: spark
        group: spark

    - name: Copy OpenTelemetry Listener JAR to runtime JAR mount
      ansible.builtin.copy:
        src: "{{ hostvars['localhost']['otel_jar_path'] }}"
        dest: "{{ dest_jar }}"
        mode: "0644"
        owner: spark
        group: spark
      register: jar_copy

    - name: Remove legacy OTel JAR from application data mount if present
      ansible.builtin.file:
        path: "{{ legacy_jar }}"
        state: absent

    - name: Verify JAR on node
      ansible.builtin.stat:
        path: "{{ dest_jar }}"
      register: dest_jar_stat

    - name: Display deployment status
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "JAR: {{ dest_jar }}"
          - "Size: {{ (dest_jar_stat.stat.size / 1024 / 1024) | round(2) }} MB"
          - "Status: {{ 'Updated' if jar_copy.changed else 'Already up-to-date' }}"
      when: dest_jar_stat.stat.exists

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "OpenTelemetry listener JAR deployed to k8s_nodes"
          - "Path: {{ dest_jar }} (must match spark.jars in spark-defaults)"
          - "Restart Spark workloads if you need them to reload the JAR."
          - "============================================"
      run_once: true
