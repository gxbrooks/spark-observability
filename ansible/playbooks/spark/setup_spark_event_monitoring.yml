---
- name: Setup Complete Spark Event Monitoring Pipeline
  hosts: all
  become: false
  gather_facts: true
  
  vars:
    nfs_server: "Lab2.lan"
    nfs_path: "/mnt/spark/events"
    spark_history_path: "/mnt/spark/events/spark-history"
    
  tasks:
    - name: Setup NFS directories for Spark event logs
      include_tasks: setup_nfs_directories.yml
      when: "'nfs_servers' in group_names"
      
    - name: Configure Spark History Server
      include_tasks: configure_spark_history_server.yml
      when: "'spark_kubernetes' in group_names"
      
    - name: Deploy Elastic Agents for Spark monitoring
      include_tasks: install_elastic_agent.yml
      when: "'spark_kubernetes' in group_names or 'native' in group_names or 'windows' in group_names"
      
    - name: Display Spark Event Monitoring Architecture
      debug:
        msg: |
          Spark Event Monitoring Architecture:
          ====================================
          
          Components:
          - NFS Server: {{ nfs_server }}
          - NFS Path: {{ nfs_path }}
          - Spark History Path: {{ spark_history_path }}
          
          Event Log Flow:
          1. Spark Workers (Lab1/Lab2 k8s) → Write event logs to {{ spark_history_path }}
          2. Spark History Server (Lab1/Lab2) → Reads from {{ spark_history_path }}
          3. Elastic Agent (Lab1/Lab2) → Monitors {{ spark_history_path }} for new logs
          4. Logstash (GaryPC WSL) → Processes logs from all Elastic Agents
          5. Elasticsearch (GaryPC WSL) → Stores processed data
          
          Access Points:
          - Spark History Server UI: http://Lab1.lan:18080, http://Lab2.lan:18080
          - Elasticsearch: https://GaryPC.lan:9200
          - Kibana: http://GaryPC.lan:5601
          - Grafana: http://GaryPC.lan:3000
          
          NFS Directory Structure:
          {{ nfs_path }}/
          └── spark-history/
              ├── app-logs/         (Spark application event logs)
              ├── driver-logs/      (Spark driver event logs)
              └── executor-logs/    (Spark executor event logs)
          
          Benefits:
          - Centralized event log storage via NFS
          - Spark History Server provides web UI for job monitoring
          - Elastic Agent collects and forwards logs to observability stack
          - Complete observability pipeline from Spark to Elasticsearch
