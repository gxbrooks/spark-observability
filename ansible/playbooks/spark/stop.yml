---
- name: Stop Spark on Kubernetes
  hosts: kubernetes_master
  become: false
  vars_files:
    - "{{ playbook_dir | dirname | dirname | dirname }}/vars/contexts/ansible/spark_vars.yml"
  vars:
    # Use user's home directory for k8s configs, not /opt/spark
    user_spark_home: "/home/{{ ansible_user }}/spark"
    k8s_config_dir: "{{ user_spark_home }}/k8s"
    project_root: "{{ playbook_dir | dirname | dirname | dirname }}"
  tasks:
    # Step 1: Stop workers first to ensure graceful disconnection from master
    - name: Stop Spark Workers
      k8s:
        kubeconfig: /home/{{ ansible_user }}/.kube/config
        state: absent
        kind: Deployment
        name: spark-worker
        namespace: default

    # Step 2: Stop history server as it's independent of master/worker relationship
    - name: Stop Spark History Server
      k8s:
        kubeconfig: /home/{{ ansible_user }}/.kube/config
        state: absent
        kind: Deployment
        name: spark-history
        namespace: default
        
    # Step 2.5: Remove the history service
    - name: Remove Spark History Service
      k8s:
        kubeconfig: /home/{{ ansible_user }}/.kube/config
        state: absent
        kind: Service
        name: spark-history
        namespace: default

    # Step 3: Stop the master deployment after workers are gone
    - name: Stop Spark Master
      k8s:
        kubeconfig: /home/{{ ansible_user }}/.kube/config
        state: absent
        kind: Deployment
        name: spark-master
        namespace: default

    # Step 4: Remove the master service after the deployment is gone
    - name: Remove Spark Master Service
      k8s:
        kubeconfig: /home/{{ ansible_user }}/.kube/config
        state: absent
        kind: Service
        name: spark-master
        namespace: default
        
    # Step 5: Remove the headless service
    - name: Remove Spark Master Headless Service
      k8s:
        kubeconfig: /home/{{ ansible_user }}/.kube/config
        state: absent
        kind: Service
        name: spark-master-headless
        namespace: default

    # Step 6: Finally remove the configmap after all pods are gone
    - name: Remove Spark ConfigMap
      k8s:
        kubeconfig: /home/{{ ansible_user }}/.kube/config
        state: absent
        kind: ConfigMap
        name: spark-config
        namespace: default