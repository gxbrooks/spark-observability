---
- name: Deploy Spark OpenTelemetry Listener to Managed Nodes
  hosts: k8s_nodes
  become: yes
  become_user: ansible
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir }}/../../.."
    otel_listener_jar: "spark-otel-listener-1.0.0.jar"
    source_jar: "{{ project_root }}/spark/otel-listener/{{ otel_listener_jar }}"
    dest_dir: "/home/ansible/spark/otel"
    dest_jar: "{{ dest_dir }}/{{ otel_listener_jar }}"
  
  tasks:
    - name: Check if source JAR exists
      local_action:
        module: stat
        path: "{{ source_jar }}"
      register: source_jar_stat
      run_once: true

    - name: Fail if source JAR does not exist
      fail:
        msg: "Source JAR not found: {{ source_jar }}. Run build-otel-listener.yml first."
      when: not source_jar_stat.stat.exists
      run_once: true

    - name: Create OpenTelemetry directory on managed nodes
      file:
        path: "{{ dest_dir }}"
        state: directory
        mode: '0755'
        owner: ansible
        group: ansible

    - name: Copy OpenTelemetry Listener JAR to managed nodes
      copy:
        src: "{{ source_jar }}"
        dest: "{{ dest_jar }}"
        mode: '0644'
        owner: ansible
        group: ansible
      register: jar_copy

    - name: Verify JAR was copied
      stat:
        path: "{{ dest_jar }}"
      register: dest_jar_stat

    - name: Display deployment status
      debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "JAR: {{ dest_jar }}"
          - "Size: {{ (dest_jar_stat.stat.size / 1024 / 1024) | round(2) }} MB"
          - "Status: {{ 'Updated' if jar_copy.changed else 'Already up-to-date' }}"
      when: dest_jar_stat.stat.exists

    - name: Deployment summary
      debug:
        msg:
          - "============================================"
          - "OpenTelemetry Listener Deployment Complete"
          - "============================================"
          - "Deployed to: {{ groups['k8s_nodes'] | join(', ') }}"
          - "Location: {{ dest_jar }}"
          - "Next Steps:"
          - "  1. Deploy OpenTelemetry Collector: kubectl apply -f observability/otel-collector/otel-collector-deployment.yaml"
          - "  2. Configure Spark: Integrated into spark-configmap.yaml"
          - "  3. Restart Spark: ansible-playbook -i inventory.yml playbooks/spark/stop.yml && ansible-playbook -i inventory.yml playbooks/spark/start.yml"
          - "============================================"
      run_once: true

