---
# Main playbook for secure Spark deployment on Kubernetes

- name: Validate prerequisites for deployment
  hosts: localhost
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir | dirname | dirname | dirname }}"
  tasks:
    - name: Display deployment information
      debug:
        msg: "Starting secure Spark deployment on Kubernetes"
        
    - name: Check kubectl on Kubernetes master (control node may not have kubectl)
      command: kubectl version --client
      delegate_to: "{{ groups['kubernetes_master'][0] }}"
      register: kubectl_result
      ignore_errors: true

    - name: Fail if kubectl not available on master
      fail:
        msg: >
          kubectl must be installed on {{ groups['kubernetes_master'][0] }}
          (kubernetes_master). Install it there or fix PATH before deploying.
      when: kubectl_result.rc != 0

# Replace missing distribute_k8s_certs.yml with an inline play
- name: Set up Kubernetes certificates for secure communication
  hosts: kubernetes_master:kubernetes_workers
  become: true
  tasks:
    - name: Include kubernetes certificate distribution tasks
      include_tasks: "{{ playbook_dir | dirname | dirname }}/roles/k8s_certs/tasks/distribute_certs.yml"

- name: Validate NFS mounts on all cluster nodes
  hosts: kubernetes_master:kubernetes_workers
  become: true
  tasks:
    - name: Verify Spark events directory is available on {{ inventory_hostname }}
      shell: |
        test -d /mnt/spark/events && test -w /mnt/spark/events || (echo "Spark events directory not found or not writable on {{ inventory_hostname }}" && exit 1)
      register: spark_events_check
      ignore_errors: true

    - name: Fail if Spark events directory is not available
      fail:
        msg: "Spark events directory /mnt/spark/events is not available or not writable on {{ inventory_hostname }}. Please set up the directory first."
      when: spark_events_check.rc != 0

- name: Ensure Spark and image contexts are generated
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir | dirname | dirname | dirname }}"
  tasks:
    - name: Run generate_contexts for Spark deploy (ansible, spark-runtime, spark-image)
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/regenerate_contexts.yml"
      vars:
        regenerate_contexts_root: "{{ project_root }}"
        regenerate_context_names: ['ansible', 'spark-runtime', 'spark-image']
        regenerate_context_force: "{{ force_env_generation | default(false) }}"

- name: Build Spark Docker image on observability host
  hosts: observability
  become: false
  # Parameters:
  #  - force_rebuild: (bool) Force rebuild of Spark image even if sources haven't changed
  #  - force_download: (bool) Force redownload of Spark archive even if it exists locally
  vars:
    force_download: false
    force_rebuild: false
    user_spark_home: "/home/{{ ansible_user }}/spark"
    project_root: "{{ playbook_dir | dirname | dirname | dirname }}"
  vars_files:
    - "{{ playbook_dir | dirname | dirname | dirname }}/vars/contexts/spark_ansible_vars.yml"
  tasks:
    - name: Display Spark version and image for build
      debug:
        msg: "Building on {{ inventory_hostname }} — Spark {{ spark_version }}, image {{ spark_image }}:{{ spark_tag }} (registry {{ registry_host }})"

    - name: Ensure spark directory exists on observability host
      file:
        path: "{{ user_spark_home }}"
        state: directory
        mode: '0755'

    - name: Ensure spark images directory exists on controller
      delegate_to: localhost
      file:
        path: "{{ project_root }}/spark/images"
        state: directory
        mode: '0755'

    - name: Check if Spark archive exists locally in images directory
      delegate_to: localhost
      stat:
        path: "{{ project_root }}/spark/images/spark-{{ spark_version }}-bin-hadoop3.tgz"
      register: spark_archive

    - name: Download Spark archive if not present or force_download is true
      delegate_to: localhost
      get_url:
        url: "https://archive.apache.org/dist/spark/spark-{{ spark_version }}/spark-{{ spark_version }}-bin-hadoop3.tgz"
        dest: "{{ project_root }}/spark/images/spark-{{ spark_version }}-bin-hadoop3.tgz"
        mode: '0644'
        timeout: 600
      register: download_result
      when: force_download | bool or not spark_archive.stat.exists

    - name: Display download result
      debug:
        msg: "Spark archive {{ 'downloaded' if (download_result.changed | default(false)) else 'already present' }} in images directory"
      when: not (force_download | bool or not spark_archive.stat.exists) or download_result is defined

    - name: Copy spark tree to observability host for docker build
      become: true
      copy:
        src: "{{ project_root }}/spark/"
        dest: "{{ user_spark_home }}/"
        mode: preserve
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Check if Spark image exists locally
      shell: docker images -q {{ spark_image }}:{{ spark_tag }}
      register: image_exists
      ignore_errors: true

    - name: Check if source files have changed (controller checkout)
      delegate_to: localhost
      find:
        paths: "{{ project_root }}/spark"
        recurse: yes
        file_type: file
      register: spark_sources

    - name: Set file modification check timestamp on observability host
      stat:
        path: "{{ user_spark_home }}/.last_build_timestamp"
      register: last_build
      ignore_errors: true

    - name: Get latest source modification time
      set_fact:
        latest_mtime: "{{ spark_sources.files | map(attribute='mtime') | sort | last }}"
        last_build_time: "{{ last_build.stat.mtime | default(0) }}"

    - name: Determine if sources changed
      set_fact:
        sources_changed: "{{ latest_mtime > last_build_time }}"

    - name: Set build flag
      set_fact:
        force_build: "{{ force_rebuild or (sources_changed | default(true)) }}"

    - name: Display build decision
      debug:
        msg: "Will {{ (image_exists.stdout == '' or force_build | bool) | ternary('BUILD', 'SKIP building') }} Spark image (image_exists={{ image_exists.stdout != '' }}, force_build={{ force_build | bool }}, sources_changed={{ sources_changed | default('unknown') }}, force_download={{ force_download | bool }})"
      when: image_exists is defined and image_exists.stdout is defined

    - name: Check if Spark archive exists on observability host
      stat:
        path: "{{ user_spark_home }}/images/spark-{{ spark_version }}-bin-hadoop3.tgz"
      register: remote_spark_archive

    - name: Fail if Spark archive not found on observability host
      fail:
        msg: "Spark archive not found under {{ user_spark_home }}/images. Re-run with force_download=true or copy the tarball."
      when: image_exists is defined and image_exists.stdout is defined and ((image_exists.stdout == "" or force_build | bool) and not remote_spark_archive.stat.exists)

    - name: Build Spark Docker image
      shell: |
        cd {{ user_spark_home }} && \
        echo "Building with args:" && \
        BUILD_ARGS=$(sed 's/^[[:space:]]*//; s/[[:space:]]*=[[:space:]]*/=/' spark-image.toml | awk -F'=' '/^[A-Z]/{gsub(/"/, "", $2); printf "--build-arg %s=%s ", $1, $2}') && \
        echo "$BUILD_ARGS" && \
        docker build . -t {{ spark_image }}:{{ spark_tag }} \
          $BUILD_ARGS {{ (force_build | bool) | ternary('--no-cache', '') }}
      register: docker_build
      when: image_exists is defined and image_exists.stdout is defined and (image_exists.stdout == "" or force_build | bool)
      async: 900
      poll: 15

    - name: Show Docker build output when built
      debug:
        var: docker_build.stdout_lines
      when: docker_build is changed

    - name: Update build timestamp file
      shell: touch {{ user_spark_home }}/.last_build_timestamp
      when: docker_build is changed

    - name: Ensure local registry container is running on observability host
      command: docker inspect -f {% raw %}'{{.State.Running}}'{% endraw %} registry
      register: registry_status
      ignore_errors: true

    - name: Start local registry if not running
      command: docker start registry
      when: registry_status.rc == 0 and registry_status.stdout != "true"

    - name: Create local registry if it does not exist
      command: docker run -d -p 5000:5000 --restart=always --name registry registry:2
      when: registry_status.rc != 0

    - name: Check for existing Docker daemon.json
      become: true
      stat:
        path: /etc/docker/daemon.json
      register: docker_daemon_stat

    - name: Read Docker daemon.json for insecure registry merge
      become: true
      slurp:
        path: /etc/docker/daemon.json
      register: docker_daemon_slurp
      when: docker_daemon_stat.stat.exists

    - name: Parse existing Docker daemon settings
      set_fact:
        docker_daemon_existing: "{{ (docker_daemon_slurp.content | b64decode | from_json) if docker_daemon_stat.stat.exists else {} }}"

    - name: Ensure Docker allows insecure HTTP for local registry (docker push)
      become: true
      copy:
        dest: /etc/docker/daemon.json
        content: "{{ docker_daemon_merged | to_nice_json }}\n"
        mode: '0644'
      vars:
        _prev_regs: "{{ docker_daemon_existing['insecure-registries'] | default([]) }}"
        _merged_regs: "{{ (_prev_regs + [registry_host]) | unique }}"
        docker_daemon_merged: "{{ docker_daemon_existing | combine({'insecure-registries': _merged_regs}) }}"
      register: docker_daemon_insecure

    - name: Restart Docker after daemon.json change
      become: true
      service:
        name: docker
        state: restarted
      when: docker_daemon_insecure.changed

    - name: Ensure local registry container is running after Docker restart
      command: docker start registry
      when: docker_daemon_insecure.changed
      ignore_errors: true

    - name: Push Spark image to local registry
      shell: docker push {{ spark_image }}:{{ spark_tag }}
      when: >
        (docker_build is defined and docker_build is changed) or (force_build | bool)
        or ((image_exists.stdout | default('')) | length > 0)

- name: Deploy Spark on Kubernetes
  hosts: kubernetes_master
  become: false
  # Parameters:
  #  - force_rebuild / force_download: only affect the observability build play above
  vars:
    force_download: false
    force_rebuild: false
    user_spark_home: "/home/{{ ansible_user }}/spark"
    kubeconfig: "/home/{{ ansible_user }}/.kube/config"
    project_root: "{{ playbook_dir | dirname | dirname | dirname }}"
    k8s_config_dir: "{{ user_spark_home }}/k8s"
  vars_files:
    - "{{ playbook_dir | dirname | dirname | dirname }}/vars/contexts/spark_ansible_vars.yml"
  pre_tasks:
    - name: Display Spark version being used
      debug:
        msg: "Deploying Spark {{ spark_version }} with image {{ spark_image }}:{{ spark_tag }} (built on observability host; registry {{ registry_host }})"

  tasks:
    - name: Ensure Kubernetes certificates are properly configured
      include_tasks: "{{ playbook_dir | dirname | dirname }}/roles/k8s_certs/tasks/main.yml"
      vars:
        k8s_cert_check_only: true
    - name: Ensure spark directory exists on Kubernetes master
      file:
        path: "/home/{{ ansible_user }}/spark"
        state: directory
        mode: '0755'

    - name: Copy spark tree to Kubernetes master (configs, not image build)
      become: true
      copy:
        src: "{{ project_root }}/spark/"
        dest: "/home/{{ ansible_user }}/spark/"
        mode: preserve
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Register generated ConfigMap for pod env
      delegate_to: localhost
      slurp:
        src: "{{ project_root }}/vars/contexts/spark-configmap.yaml"
      register: spark_configmap

    - name: Create Spark Kubernetes directory
      become: true
      file:
        path: "{{ k8s_config_dir }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        
    - name: Copy Kubernetes core config (namespace/RBAC)
      copy:
        src: "{{ playbook_dir | dirname | dirname }}/roles/spark/files/k8s/spark-rbac.yaml"
        dest: "{{ k8s_config_dir }}/spark-rbac.yaml"
        mode: '0644'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Apply Kubernetes core config (namespace/RBAC)
      command: kubectl apply -f {{ k8s_config_dir }}/spark-rbac.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      
    - name: Verify service account exists
      command: kubectl get serviceaccount spark -n spark
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 6
      delay: 5
      register: result
      until: result.rc == 0
      
    - name: Verify role binding
      command: kubectl get rolebinding spark-role-binding -n spark
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 6
      delay: 5
      register: result
      until: result.rc == 0

    - name: Create spark-defaults.conf from template
      template:
        src: "{{ playbook_dir | dirname | dirname }}/roles/spark/templates/spark-defaults.conf.j2"
        dest: "/home/{{ ansible_user }}/spark/conf/spark-defaults.conf"
        mode: '0644'
      vars:
        spark_network_timeout: "{{ SPARK_NETWORK_TIMEOUT | default('600s') }}"
        spark_rpc_ask_timeout: "{{ SPARK_RPC_ASK_TIMEOUT | default('60s') }}"
        spark_rpc_lookup_timeout: "{{ SPARK_RPC_LOOKUP_TIMEOUT | default('60s') }}"
        spark_executor_heartbeat_interval: "{{ SPARK_EXECUTOR_HEARTBEAT_INTERVAL | default('120s') }}"

    - name: Create ConfigMap from spark configuration files
      shell: |
        kubectl create configmap spark-defaults-conf \
        --from-file=/home/{{ ansible_user }}/spark/conf/spark-defaults.conf \
        --from-file=/home/{{ ansible_user }}/spark/conf/log4j2-cluster.properties \
        -n spark --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Include spark deployment role
      include_role:
        name: "{{ playbook_dir | dirname | dirname }}/roles/spark"

    - name: Apply generated env ConfigMap for pods
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        definition: "{{ (spark_configmap.content | b64decode) | from_yaml }}"
        state: present
      when: spark_configmap is defined

    # Apply registry config first if using a local registry
    - name: Copy registry config
      copy:
        src: "{{ playbook_dir | dirname | dirname }}/roles/spark/files/k8s/spark-registry-config.yaml"
        dest: "{{ k8s_config_dir }}/spark-registry-config.yaml"
        mode: '0644'

    - name: Apply registry config
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ k8s_config_dir }}/spark-registry-config.yaml"

    # Deployments and services are now handled by the spark role

# OTel listener JAR: resolve/build on controller, copy to /mnt/spark/data on k8s nodes (see otel-listener/deploy.yml)
- import_playbook: otel-listener/deploy.yml
