---
# Build Spark Components
# This playbook builds JARs and other artifacts for Spark deployment
# Run from: ansible/
# Command: ansible-playbook -i inventory.yml playbooks/spark/build.yml

- name: Build Spark OpenTelemetry Listener
  hosts: localhost
  gather_facts: yes
  vars_files:
    - ../../vars/spark_vars.yml
  
  tasks:
    - name: Check if Maven is installed
      command: mvn --version
      register: maven_check
      changed_when: false
      failed_when: false

    - name: Fail if Maven is not installed
      fail:
        msg: |
          Maven is not installed. Please install Maven 3.6+ to build the SparkListener.
          On Ubuntu/Debian: sudo apt install maven
          On macOS: brew install maven
      when: maven_check.rc != 0

    - name: Display Maven version
      debug:
        msg: "Maven version: {{ maven_check.stdout_lines[0] }}"
      when: maven_check.rc == 0

    - name: Check if spark-otel-listener project exists
      stat:
        path: "{{ playbook_dir }}/../../spark/otel/listener/pom.xml"
      register: otel_listener_pom

    - name: Fail if spark-otel-listener project not found
      fail:
        msg: "SparkListener project not found at spark/otel/listener/"
      when: not otel_listener_pom.stat.exists

    - name: Build SparkListener JAR with Maven
      command: mvn clean package -DskipTests
      args:
        chdir: "{{ playbook_dir }}/../../spark/otel/listener"
      register: maven_build
      changed_when: "'BUILD SUCCESS' in maven_build.stdout"

    - name: Display build output (last 30 lines)
      debug:
        msg: "{{ maven_build.stdout_lines[-30:] }}"
      when: maven_build is defined

    - name: Check if JAR was created
      stat:
        path: "{{ playbook_dir }}/../../spark/otel/listener/target/spark-otel-listener-1.0.0.jar"
      register: otel_jar

    - name: Display JAR information
      debug:
        msg: |
          JAR created successfully!
          Path: spark/otel/listener/target/spark-otel-listener-1.0.0.jar
          Size: {{ (otel_jar.stat.size / 1024 / 1024) | round(2) }} MB
      when: otel_jar.stat.exists

    - name: Fail if JAR was not created
      fail:
        msg: "Maven build completed but JAR was not found at expected location"
      when: not otel_jar.stat.exists

    - name: Create local otel artifacts directory
      file:
        path: "{{ playbook_dir }}/../../spark/otel/artifacts"
        state: directory
        mode: '0755'

    - name: Copy JAR to artifacts directory
      copy:
        src: "{{ playbook_dir }}/../../spark/otel/listener/target/spark-otel-listener-1.0.0.jar"
        dest: "{{ playbook_dir }}/../../spark/otel/artifacts/spark-otel-listener-1.0.0.jar"
        mode: '0644'

    - name: Build summary
      debug:
        msg: |
          ========================================
          Build Complete!
          ========================================
          Artifact: spark/otel/artifacts/spark-otel-listener-1.0.0.jar
          Next step: Run deploy playbook to distribute to managed nodes
          Command: ansible-playbook -i inventory.yml playbooks/spark/deploy.yml

