---
# Usage:
# Standard start: ansible-playbook -i inventory.yml playbooks/spark/start_spark.yml
# Start specific component: ansible-playbook -i inventory.yml playbooks/spark/start_spark.yml -e "spark_component=history"
# Restart component(s): ansible-playbook -i inventory.yml playbooks/spark/start_spark.yml -e "spark_component=master restart=true"
# Restart all: ansible-playbook -i inventory.yml playbooks/spark/start_spark.yml -e "restart=true"
#
# Valid spark_component values: 'all' (default), 'master', 'worker', 'history'
# Note: The variable is used internally as spark_component_var to avoid templating issues
- name: Start Spark on Kubernetes
  hosts: kubernetes_master
  become: false
  vars_files:
    - "{{ playbook_dir | dirname | dirname }}/vars/spark_vars.yml"
  vars:
    # Use user's home directory for k8s configs, not /opt/spark
    user_spark_home: "/home/{{ ansible_user }}/spark"
    k8s_config_dir: "{{ user_spark_home }}/k8s"
    kubeconfig: "/home/{{ ansible_user }}/.kube/config"
    project_root: "{{ playbook_dir | dirname | dirname | dirname }}"
    # Use spark_component_var to avoid circular reference
    spark_component_var: "{{ spark_component | default('all') }}"
  pre_tasks:
    - name: Run generate_env.py to ensure configuration files are up-to-date
      delegate_to: localhost
      become: false
      shell: "python3 linux/generate_env.py {{ '-f' if force_env_generation | default(false) else '' }}"
      args:
        chdir: "{{ project_root }}"
      register: generate_result
      changed_when: "'Generating' in generate_result.stdout"
    
    # Check if Docker is running and operational with a simple command
    - name: Check if Docker is running and operational
      command: docker info
      register: docker_info_result
      changed_when: false
      
    - name: Fail if Docker is not running or responding
      fail:
        msg: >
          Docker is not running or responding properly.
          
          Use the following playbooks to manage Docker:
          - Check status: ansible-playbook -i inventory.yml playbooks/docker/status_docker.yml
          - Start Docker: ansible-playbook -i inventory.yml playbooks/docker/start_docker.yml
          - Diagnose issues: ansible-playbook -i inventory.yml playbooks/docker/diagnose_docker.yml
      when: docker_info_result.rc != 0
        
    # We now use the centralized spark_vars.yml file, which is already loaded via vars_files
    # This task is kept for backward compatibility but simplified
    - name: Ensure we have the proper Spark version
      debug:
        msg: "Using Spark version: {{ spark_version }}"
        
    - name: Check if Kubernetes API is accessible
      command: kubectl cluster-info
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: k8s_status
      failed_when: false
      changed_when: false
      
    - name: Fail if Kubernetes API is not accessible
      fail:
        msg: "Kubernetes API is not accessible. Please check if Kubernetes is running properly."
      when: k8s_status.rc != 0
  
  tasks:
    - name: Ensure Spark namespace exists
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: spark

    - name: Ensure Spark k8s directory exists
      file:
        path: "{{ k8s_config_dir }}"
        state: directory
        mode: '0755'

    - name: Copy RBAC manifest
      copy:
        src: "{{ playbook_dir | dirname | dirname }}/roles/spark/files/k8s/spark-rbac.yaml"
        dest: "{{ k8s_config_dir }}/spark-rbac.yaml"
        mode: '0644'

    - name: Ensure RBAC exists (apply spark/k8s/spark-rbac.yaml)
      command: kubectl apply -f {{ k8s_config_dir }}/spark-rbac.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Template and copy Spark deployment files
      template:
        src: "{{ playbook_dir | dirname | dirname }}/roles/spark/templates/{{ item }}.j2"
        dest: "{{ k8s_config_dir }}/{{ item }}"
        mode: '0644'
      vars:
        SPARK_VERSION: "{{ spark_version }}"
      with_items:
        - spark-master-deployment.yaml
        - spark-worker-deployment.yaml
        - spark-history-deployment.yaml

    - name: Copy Spark service and env ConfigMap manifests
      copy:
        src: "{{ playbook_dir | dirname | dirname }}/roles/spark/files/k8s/{{ item }}"
        dest: "{{ k8s_config_dir }}/{{ item }}"
        mode: '0644'
      loop:
        - spark-master-service.yaml
        - spark-history-service.yaml
        - spark-configmap.yaml

    - name: Copy ConfigMap to a temporary file
      copy:
        src: "{{ playbook_dir | dirname | dirname }}/roles/spark/files/k8s/spark-configmap.yaml"
        dest: "{{ k8s_config_dir }}/spark-configmap.yaml"
        mode: '0644'
        
    - name: Apply env ConfigMap for pods
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ k8s_config_dir }}/spark-configmap.yaml"

    # First, stop any components that need to be restarted
    - name: Stop Spark Master for restart
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: absent
        src: "{{ k8s_config_dir }}/spark-master-deployment.yaml"
      when: spark_component_var in ['master', 'all'] and restart | default(false)

    - name: Stop Spark History Server for restart
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: absent
        src: "{{ k8s_config_dir }}/spark-history-deployment.yaml"
      when: spark_component_var in ['history', 'all'] and restart | default(false)

    - name: Stop Spark Workers for restart
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: absent
        src: "{{ k8s_config_dir }}/spark-worker-deployment.yaml"
      when: spark_component_var in ['worker', 'all'] and restart | default(false)

    - name: Wait for pods to terminate when restarting
      pause:
        seconds: 10
      when: restart | default(false)

    # Start services first
    - name: Start Master Service
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ k8s_config_dir }}/spark-master-service.yaml"
      when: spark_component_var in ['master', 'all']

    - name: Start History Service
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ k8s_config_dir }}/spark-history-service.yaml"
      when: spark_component_var in ['history', 'all']

    # Then start deployments
    - name: Start Spark Master
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ k8s_config_dir }}/spark-master-deployment.yaml"
      when: spark_component_var in ['master', 'all']
    
    - name: Start Spark History Server
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ k8s_config_dir }}/spark-history-deployment.yaml"
      when: spark_component_var in ['history', 'all']
    
    - name: Start Spark Workers
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ k8s_config_dir }}/spark-worker-deployment.yaml"
      when: spark_component_var in ['worker', 'all']
      
    # Debug tasks to check component status
    - name: Check pod status
      command: kubectl get pods -n spark
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: pod_status
      
    - name: Display pod status
      debug:
        var: pod_status.stdout_lines
        
    - name: Check service status
      command: kubectl get svc -n spark
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: svc_status
      
    - name: Display service status
      debug:
        var: svc_status.stdout_lines
        
    - name: Wait for pods to be ready (with timeout)
      shell: |
        kubectl wait --namespace spark --for=condition=ready pod --selector=app={{ item }} --timeout=60s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: pod_ready_status
      failed_when: false
      changed_when: false
      when: spark_component_var in [item, 'all']
      with_items:
        - spark-master
        - spark-worker
        - spark-history
        
    - name: Check Spark pod status in detail (if pods not ready)
      shell: |
        kubectl describe pods --namespace spark -l app={{ item }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: pod_details
      when: >
        (spark_component_var in [item, 'all']) and 
        (pod_ready_status.results | selectattr('item', 'equalto', item) | 
         map(attribute='rc') | list | first | default(1) != 0)
      with_items:
        - spark-master
        - spark-worker
        - spark-history
        
    - name: Display pod details if not ready
      debug:
        var: pod_details.results | selectattr('skipped', 'undefined') | map(attribute='stdout_lines') | list
      when: pod_details.results is defined and pod_details.results | selectattr('skipped', 'undefined') | list | length > 0
      
    - name: Fail if Spark History Server is not ready (when specifically requested)
      fail:
        msg: >
          Spark History Server pods are not ready. Check for ImagePullBackOff or other errors.
          Common causes: Docker not running, image not available, or network issues.
          Run 'kubectl describe pods -n spark -l app=spark-history' for more details.
      when: >
        spark_component_var in ['history', 'all'] and
        (pod_ready_status.results | selectattr('item', 'equalto', 'spark-history') |
         map(attribute='rc') | list | first | default(1) != 0)
