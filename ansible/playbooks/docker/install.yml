---
# Install Docker Engine (Docker CE) on the observability host (Lab3) from Docker Inc.
# Usage: ansible-playbook -i inventory.yml playbooks/docker/install.yml
#
# Ubuntu/Debian: installs docker-ce + buildx + compose plugin from download.docker.com
# (not the distro docker.io package), so you get a current engine and BuildKit-capable CLI.
#
# Architecture Notes:
# - Lab1/Lab2: containerd for Kubernetes (no Docker via this playbook)
# - Lab3: Docker Engine for observability (Compose) and local registry

- name: Install Docker Engine on observability host
  hosts: observability
  become: true
  gather_facts: true
  vars:
    docker_apt_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64', 'armv7l': 'armhf'}.get(ansible_architecture, ansible_architecture) }}"
  tasks:
    - name: Check if Docker CLI responds
      ansible.builtin.command: docker --version
      register: docker_version_check
      failed_when: false
      changed_when: false

    - name: Display Docker status if already installed
      ansible.builtin.debug:
        msg: "Docker CLI present: {{ docker_version_check.stdout }}"
      when: docker_version_check.rc == 0

    - name: Check if Docker service unit exists
      ansible.builtin.stat:
        path: /lib/systemd/system/docker.service
      register: docker_service_file

    - name: Set fact for broken install (binary without systemd unit)
      ansible.builtin.set_fact:
        need_docker_reinstall: "{{ docker_version_check.rc == 0 and not docker_service_file.stat.exists }}"

    - name: Query docker-ce package (Debian family)
      ansible.builtin.command: dpkg-query -W -f='${Status}' docker-ce
      register: dq_docker_ce
      failed_when: false
      changed_when: false
      when: ansible_os_family == "Debian"

    - name: Query docker.io package (Debian family)
      ansible.builtin.command: dpkg-query -W -f='${Status}' docker.io
      register: dq_docker_io
      failed_when: false
      changed_when: false
      when: ansible_os_family == "Debian"

    - name: Set package presence facts (Debian family)
      ansible.builtin.set_fact:
        docker_ce_installed: "{{ 'install ok installed' in (dq_docker_ce.stdout | default('')) }}"
        docker_io_installed: "{{ 'install ok installed' in (dq_docker_io.stdout | default('')) }}"
      when: ansible_os_family == "Debian"

    - name: Default package facts when not Debian
      ansible.builtin.set_fact:
        docker_ce_installed: false
        docker_io_installed: false
      when: ansible_os_family != "Debian"

    - name: Decide whether to apply Docker CE apt packages (Debian)
      ansible.builtin.set_fact:
        debian_apply_docker_ce: "{{ ansible_os_family == 'Debian' and (
          (docker_version_check.rc != 0) or (need_docker_reinstall | bool)
          or (docker_io_installed | bool and not (docker_ce_installed | bool))
          ) }}"

    - name: Assert Ubuntu for Docker CE apt repository (this playbook targets Lab3 Ubuntu)
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
        fail_msg: >
          Docker CE install tasks use download.docker.com/linux/ubuntu. For Debian or other
          distros, extend this playbook or install Docker manually.
      when: debian_apply_docker_ce | bool

    - name: Remove Ubuntu docker.io / compose-v2 before Docker CE (Debian)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: absent
        purge: true
      when:
        - debian_apply_docker_ce | bool
        - docker_io_installed | bool

    - name: Ensure Docker CE prerequisites (Debian)
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true
      when: debian_apply_docker_ce | bool

    - name: Ensure apt keyrings directory exists (Debian)
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      when: debian_apply_docker_ce | bool

    - name: Install Docker CE archive key (Debian)
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      when: debian_apply_docker_ce | bool

    - name: Add Docker CE apt repository (Debian)
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
        update_cache: true
      when: debian_apply_docker_ce | bool

    - name: Install Docker Engine CE and plugins (Debian)
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      when: debian_apply_docker_ce | bool

    - name: Install Docker packages on RHEL family (unchanged baseline)
      ansible.builtin.yum:
        name:
          - docker
          - docker-compose
        state: present
      when:
        - ansible_os_family == "RedHat"
        - (docker_version_check.rc != 0) or (need_docker_reinstall | bool)

    - name: Reload systemd after package changes
      ansible.builtin.systemd:
        daemon_reload: true
      when: debian_apply_docker_ce | bool or need_docker_reinstall | bool

    # Docker CE on Ubuntu expects socket activation; starting only docker.service fails with
    # "no sockets found via socket activation" unless docker.socket is active.
    - name: Enable and start docker.socket
      ansible.builtin.systemd:
        name: docker.socket
        state: started
        enabled: true
        daemon_reload: true

    - name: Start and enable Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
        daemon_reload: true

    - name: Add ansible user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Add extra users to docker group (interactive devs on observability host)
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_group_extra_users | default([]) }}"
      when: (docker_group_extra_users | default([])) | length > 0

    - name: Check Docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Display Docker version
      ansible.builtin.debug:
        var: docker_version.stdout

    - name: Check if Docker registry container exists
      ansible.builtin.command: docker ps -a --filter "name=registry" --format "{{ '{{' }}.State{{ '}}' }}"
      register: registry_status
      failed_when: false
      changed_when: false

    - name: Start Docker registry if not running
      ansible.builtin.command: docker start registry
      when: registry_status.stdout != "running" and registry_status.stdout != ""
      register: registry_start
      failed_when: false

    - name: Create Docker registry if it does not exist
      ansible.builtin.command: docker run -d -p 5000:5000 --restart=always --name registry registry:2
      when: registry_status.stdout == ""
      register: registry_create
      failed_when: false

    - name: Verify Docker registry is reachable locally
      ansible.builtin.uri:
        url: http://localhost:5000/v2/_catalog
        status_code: 200
      register: registry_check
      failed_when: false
      changed_when: false

    - name: Display installation summary
      ansible.builtin.debug:
        msg: >
          Docker {{ 'was already present' if docker_version_check.rc == 0 and not (debian_apply_docker_ce | default(false)) else 'has been configured' }}.
          Version: {{ docker_version.stdout }}.
          Local registry: {{ 'OK' if registry_check.status | default(0) == 200 else 'Not responding' }}.

    - name: Reset SSH connection so ansible user picks up docker group
      ansible.builtin.meta: reset_connection
