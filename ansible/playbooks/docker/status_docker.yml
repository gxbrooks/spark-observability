---
# This playbook checks Docker status on native Linux machines
# Usage: ansible-playbook -i inventory.yml playbooks/docker/status_docker.yml
#
# This playbook will:
# 1. Check if Docker is installed
# 2. Check Docker service status
# 3. Display Docker version
# 4. Check Docker registry status
# 5. Show running containers
# 6. Display available images

- name: Check Docker Status
  hosts: native:!wsl
  become: true
  gather_facts: true
  pre_tasks:
    - name: Verify SSH connectivity
      ping:
      register: ping_result
      failed_when: false
      
    - name: Skip hosts with SSH connectivity issues
      meta: end_host
      when: ping_result is failed
  tasks:
    - name: Check if Docker is installed
      stat:
        path: "/usr/bin/docker"
      register: docker_bin
      
    - name: Display Docker installation status
      debug:
        msg: "Docker {{ 'is' if docker_bin.stat.exists else 'is not' }} installed."
        
    - name: Check if Docker service unit file exists
      stat:
        path: "/lib/systemd/system/docker.service"
      register: docker_service_lib
      when: docker_bin.stat.exists
      
    - name: Check if Docker service unit file exists in etc
      stat:
        path: "/etc/systemd/system/docker.service"
      register: docker_service_etc
      when: docker_bin.stat.exists and not docker_service_lib.stat.exists
      
    - name: Display Docker service file status
      debug:
        msg: >
          Docker service unit file 
          {{ 'found at /lib/systemd/system/docker.service' if docker_service_lib.stat.exists | default(false) else
             'found at /etc/systemd/system/docker.service' if docker_service_etc.stat.exists | default(false) else
             'not found - Docker service may be improperly installed' }}
      when: docker_bin.stat.exists
        
    - name: Check Docker service status
      command: systemctl status docker
      register: docker_service_status
      failed_when: false
      changed_when: false
      when: docker_bin.stat.exists and (docker_service_lib.stat.exists or docker_service_etc.stat.exists | default(false))
      
    - name: Display Docker service status
      debug:
        msg: "Docker service status:"
      when: docker_bin.stat.exists and (docker_service_lib.stat.exists or docker_service_etc.stat.exists | default(false))
      
    - name: Output Docker service details
      debug:
        var: docker_service_status.stdout_lines
      when: docker_bin.stat.exists and (docker_service_lib.stat.exists or docker_service_etc.stat.exists | default(false)) and docker_service_status.stdout_lines is defined
      
    - name: Get Docker version
      command: docker version
      register: docker_version
      failed_when: false
      changed_when: false
      when: docker_bin.stat.exists
      
    - name: Display Docker version
      debug:
        msg: "Docker version:"
      when: docker_bin.stat.exists
      
    - name: Output Docker version details
      debug:
        var: docker_version.stdout_lines
      when: docker_bin.stat.exists and docker_version.stdout_lines is defined
        
    - name: Check if Docker registry is running
      command: docker ps --filter "name=registry"
      register: registry_status
      failed_when: false
      changed_when: false
      when: docker_bin.stat.exists and docker_service_status.rc == 0
      
    - name: Display Docker registry status
      debug:
        msg: "Docker Registry:"
      when: docker_bin.stat.exists and docker_service_status.rc == 0
      
    - name: Output Docker registry details
      debug:
        var: registry_status.stdout_lines
      when: docker_bin.stat.exists and docker_service_status.rc == 0 and registry_status.stdout_lines is defined
      
    - name: Check running containers
      command: docker ps
      register: containers
      failed_when: false
      changed_when: false
      when: docker_bin.stat.exists and docker_service_status.rc == 0
      
    - name: Display running containers
      debug:
        msg: "Running containers:"
      when: docker_bin.stat.exists and docker_service_status.rc == 0
      
    - name: Output running containers details
      debug:
        var: containers.stdout_lines
      when: docker_bin.stat.exists and docker_service_status.rc == 0 and containers.stdout_lines is defined
      
    - name: List available images
      command: docker images
      register: images
      failed_when: false
      changed_when: false
      when: docker_bin.stat.exists and docker_service_status.rc == 0
      
    - name: Display available images
      debug:
        msg: "Available Docker images:"
      when: docker_bin.stat.exists and docker_service_status.rc == 0
      
    - name: Output available images details
      debug:
        var: images.stdout_lines
      when: docker_bin.stat.exists and docker_service_status.rc == 0 and images.stdout_lines is defined
