---
# This playbook stops Docker service on native Linux machines
# Usage: ansible-playbook -i inventory.yml playbooks/docker/stop_docker.yml
#
# This playbook will:
# 1. Check if Docker is installed
# 2. Stop Docker service if running
# 3. Stop docker.socket so nothing can socket-activate dockerd (and containerd)
#    again until playbooks/docker/start.yml runs.

- name: Stop Docker Service
  hosts: observability
  become: true
  gather_facts: true
  pre_tasks:
    - name: Verify SSH connectivity
      ping:
      register: ping_result
      failed_when: false
      
    - name: Skip hosts with SSH connectivity issues
      meta: end_host
      when: ping_result is failed
  tasks:
    - name: Check if Docker is installed
      stat:
        path: "/usr/bin/docker"
      register: docker_bin
      
    - name: Exit gracefully if Docker is not installed
      debug:
        msg: "Docker is not installed. Nothing to stop."
      when: not docker_bin.stat.exists
      
    - name: Check Docker service status
      command: systemctl is-active docker
      register: docker_status
      failed_when: false
      changed_when: false
      when: docker_bin.stat.exists
      
    - name: Stop Docker service if running
      systemd:
        name: docker
        state: stopped
      when: docker_bin.stat.exists and docker_status.stdout == "active"

    # Docker CE on Ubuntu enables docker.socket; any client (docker ps, compose,
    # IDE plugins) connecting to the API triggers systemd to start docker again,
    # which restarts containerd. Stopping the socket after docker is required
    # for a stable full-stack stop on hosts that share containerd with Kubernetes.
    - name: Stop Docker socket (disable socket activation until next start.yml)
      ansible.builtin.command: systemctl stop docker.socket
      register: docker_socket_stop
      changed_when: docker_socket_stop.rc == 0
      failed_when: false
      when: docker_bin.stat.exists

    - name: Display Docker status
      debug:
        msg: "Docker service and docker.socket are stopped (docker cannot auto-start until start.yml)."
      when: docker_bin.stat.exists
