---
# This playbook starts Docker service on native Linux machines
# Usage: ansible-playbook -i inventory.yml playbooks/docker/start_docker.yml
#
# This playbook will:
# 1. Check if Docker is installed
# 2. Start Docker service if not running
# 3. Verify Docker is operational
# 4. Start Docker registry if needed
#
# Socket permission: non-root users need group `docker`. The install playbook adds ansible_user and
# optional `docker_group_extra_users` (see inventory). Re-run install after changing that list.

- name: Start Docker Service
  hosts: observability
  become: true
  gather_facts: true
  pre_tasks:
    - name: Verify SSH connectivity
      ping:
      register: ping_result
      failed_when: false
      
    - name: Skip hosts with SSH connectivity issues
      meta: end_host
      when: ping_result is failed
  tasks:
    - name: Check if Docker is installed
      stat:
        path: "/usr/bin/docker"
      register: docker_bin
      
    - name: Fail if Docker is not installed
      fail:
        msg: >
          Docker is not installed. Run:
          ansible-playbook -i inventory.yml playbooks/docker/install.yml
      when: not docker_bin.stat.exists
      
    - name: Check if Docker service unit file exists
      stat:
        path: "/lib/systemd/system/docker.service"
      register: docker_service_lib
      
    - name: Check if Docker service unit file exists in etc
      stat:
        path: "/etc/systemd/system/docker.service"
      register: docker_service_etc
      when: not docker_service_lib.stat.exists
      
    - name: Fail if Docker service is not properly installed
      fail:
        msg: >
          Docker service unit file not found. Docker appears to be improperly installed.
          Run: ansible-playbook -i inventory.yml playbooks/docker/install.yml
      when: not docker_service_lib.stat.exists and (not docker_service_etc.stat.exists | default(false))
      
    - name: Reset failed state for Docker units (after crash loops)
      ansible.builtin.command: systemctl reset-failed docker docker.socket
      failed_when: false
      changed_when: false

    - name: Enable and start docker.socket (required for Docker CE on Ubuntu)
      ansible.builtin.systemd:
        name: docker.socket
        state: started
        enabled: true
        daemon_reload: true

    - name: Start Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
        daemon_reload: true
        
    - name: Verify Docker is running properly
      command: docker info
      register: docker_info
      failed_when: docker_info.rc != 0
      changed_when: false
      
    - name: Check if Docker registry is running
      command: docker ps -a --filter "name=registry" --format "{{ '{{' }}.State{{ '}}' }}"
      register: registry_status
      failed_when: false
      changed_when: false
      
    - name: Start Docker registry if not running
      command: docker start registry
      when: registry_status.stdout != "running" and registry_status.stdout != ""
      register: registry_start
      failed_when: false
      changed_when: registry_start.rc == 0
      
    - name: Create Docker registry if doesn't exist
      command: docker run -d -p 5000:5000 --restart=always --name registry registry:2
      when: registry_status.stdout == ""
      register: registry_create
      failed_when: false
      changed_when: registry_create.rc == 0
      
    - name: Verify Docker registry is accessible
      uri:
        url: http://localhost:5000/v2/_catalog
        status_code: 200
      register: registry_check
      failed_when: false
      changed_when: false
      
    - name: Display Docker status
      debug:
        msg: >
          Docker service is now running.
          Registry status: {{ "OK" if registry_check.status == 200 else "Not responding" }}
