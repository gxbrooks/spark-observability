---
# Global startup playbook for Spark Observability Platform
# Usage: cd ansible && ansible-playbook -i inventory.yml playbooks/start.yml
# Prerequisites: install.yml + deploy.yml (registry/Spark/Jupyter manifests already applied)

- name: Display startup banner
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Display startup information
      ansible.builtin.debug:
        msg: |
          ================================================
          Spark Observability Platform — Global Start
          ================================================
          Order:
            1. NFS server (nfs_servers host, e.g. Lab3)
            2. Kubernetes cluster
            3. Docker on Lab3 (observability host)
            4. Observability Docker Compose stack
            5. Elastic Agent refresh on Linux hosts
            6. Spark on Kubernetes
          Note: Spark registry client + K8s deploys are in playbooks/deploy.yml
          ================================================

- import_playbook: nfs/start.yml

- import_playbook: k8s/start.yml

- import_playbook: docker/start.yml

- import_playbook: observability/start.yml

- import_playbook: elastic-agent/start.yml

- import_playbook: spark/start.yml

- name: Display startup completion status
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Display completion message
      ansible.builtin.debug:
        msg: |
          ================================================
          Start playbook complete
          ================================================
          Verify:
            cd ansible && ansible-playbook -i inventory.yml playbooks/diagnose.yml
          Elastic Agent quick status:
            cd ansible && ansible-playbook -i inventory.yml playbooks/elastic-agent/status.yml
          ================================================
