---
- name: Setup Kubernetes permissions
  hosts: spark_kubernetes:&linux
  become: true
  vars:
    control_user: "{{ k8s_control_user | default(lookup('env', 'USER')) }}"
    k8s_group: kubernetes
  tasks:
    - name: Create kubernetes group
      group:
        name: "{{ k8s_group }}"
        state: present

    - name: Add users to kubernetes group
      user:
        name: "{{ item }}"
        groups: "{{ k8s_group }}"
        append: yes
      loop:
        - "{{ control_user }}"
        - "{{ ansible_user }}"
        - kubernetes

    - name: Set group ownership and permissions on Kubernetes files
      file:
        path: "{{ playbook_dir | dirname | dirname }}"
        group: "{{ k8s_group }}"
        mode: "g+rX"
        recurse: yes
      when: inventory_hostname == groups['spark_kubernetes'][0]

    - name: Ensure specific directories have group write permissions
      file:
        path: "{{ item }}"
        state: directory
        group: "{{ k8s_group }}"
        mode: "g+rwX"
        recurse: yes
      loop:
        - "/home/{{ ansible_user }}/.kube"
        - "/home/{{ ansible_user }}/kubernetes"
      when: inventory_hostname == groups['spark_kubernetes'][0]
