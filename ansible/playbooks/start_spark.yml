---
- name: Start Spark on Kubernetes
  hosts: Lab2
  become: true
  vars:
    k8s_config_dir: "/home/{{ ansible_user }}/spark-k8s"
    kubeconfig: "/home/{{ ansible_user }}/.kube/config"
  tasks:
    - name: Ensure Spark namespace exists
      k8s:
        kubeconfig: /home/{{ ansible_user }}/.kube/config
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: spark
    - name: Copy Spark deployment files
      copy:
        src: "{{ playbook_dir | dirname | dirname }}/spark/k8s/{{ item }}"
        dest: "{{ k8s_config_dir }}/{{ item }}"
        mode: '0644'
      loop:
        - spark-master-deployment.yaml
        - spark-master-service.yaml
        - spark-worker-deployment.yaml
        - spark-history-deployment.yaml
        - spark-configmap.yaml

    - name: Start Spark Master
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ k8s_config_dir }}/spark-master-deployment.yaml"
    
    - name: Start Spark History Server
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ k8s_config_dir }}/spark-history-deployment.yaml"
    
    - name: Start Spark Workers
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ k8s_config_dir }}/spark-worker-deployment.yaml"
