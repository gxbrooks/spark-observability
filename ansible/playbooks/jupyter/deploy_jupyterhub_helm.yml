---
# Deploy JupyterHub via Helm for multi-user Spark development

- name: Deploy JupyterHub via Helm
  hosts: kubernetes_master
  become: false
  vars:
    project_root: "{{ playbook_dir | dirname | dirname | dirname }}"
    kubeconfig: "/home/{{ ansible_user }}/.kube/config"
    jupyterhub_namespace: "spark"
    jupyterhub_release: "jupyterhub"
    jupyterhub_chart_version: "3.0.0"
    values_file: "/tmp/jupyterhub-values.yaml"
    # Admin user credentials
    jupyterhub_admin_user: "admin"
    jupyterhub_admin_email: "gxbrooks@gmail.com"
    jupyterhub_admin_password: "Bobo4889;;"  # TODO: Move to vault/secrets
  
  pre_tasks:
    - name: Check if kubectl is available
      command: kubectl version --client
      register: kubectl_check
      ignore_errors: true
      
    - name: Fail if kubectl not available
      fail:
        msg: "kubectl is required but not found"
      when: kubectl_check.rc != 0
    
    - name: Check if helm is available
      command: helm version
      register: helm_check
      ignore_errors: true
      changed_when: false
      
    - name: Install Helm if not present
      become: true
      shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        warn: false
      when: helm_check.rc != 0
      register: helm_install
      
    - name: Verify Helm installation
      command: helm version
      register: helm_verify
      when: helm_check.rc != 0
      
    - name: Display Helm version
      debug:
        msg: "Helm is installed: {{ helm_verify.stdout if helm_check.rc != 0 else helm_check.stdout }}"
    
    - name: Check if Spark namespace exists
      command: kubectl get namespace {{ jupyterhub_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: namespace_check
      ignore_errors: true
      
    - name: Fail if namespace doesn't exist
      fail:
        msg: "Namespace {{ jupyterhub_namespace }} does not exist. Please create it first."
      when: namespace_check.rc != 0

  tasks:
    - name: Add JupyterHub Helm repository
      command: helm repo add jupyterhub https://jupyterhub.github.io/helm-chart/
      register: helm_repo_add
      changed_when: "'has been added' in helm_repo_add.stdout"
      failed_when: helm_repo_add.rc != 0 and 'already exists' not in helm_repo_add.stderr
      
    - name: Update Helm repositories
      command: helm repo update
      
    - name: Generate JupyterHub values file from template
      delegate_to: localhost
      template:
        src: "{{ playbook_dir }}/jupyterhub-values.yaml.j2"
        dest: "/tmp/jupyterhub-values.yaml"
        mode: '0644'
    
    - name: Copy values file to remote host
      copy:
        src: "/tmp/jupyterhub-values.yaml"
        dest: "{{ values_file }}"
        mode: '0644'
    
    - name: Create NFS PersistentVolume for JupyterHub database
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolume
          metadata:
            name: jupyterhub-db-pv
            labels:
              app: jupyterhub
          spec:
            capacity:
              storage: 1Gi
            accessModes:
              - ReadWriteOnce
            persistentVolumeReclaimPolicy: Retain
            nfs:
              server: Lab2.lan
              path: /srv/nfs/jupyterhub
            mountOptions:
              - nfsvers=4.1
              - hard
              - timeo=600
              - retrans=2
    
    - name: Ensure certificate directory exists
      file:
        path: "/tmp/jupyterhub-certs"
        state: directory
        mode: '0755'
    
    - name: Check if certificates already exist
      stat:
        path: "/tmp/jupyterhub-certs/tls.crt"
      register: cert_exists
    
    - name: Generate private key for JupyterHub
      command: >
        openssl genrsa -out /tmp/jupyterhub-certs/tls.key 2048
      when: not cert_exists.stat.exists
    
    - name: Generate self-signed certificate for JupyterHub
      command: >
        openssl req -new -x509
        -key /tmp/jupyterhub-certs/tls.key
        -out /tmp/jupyterhub-certs/tls.crt
        -days 3650
        -subj "/C=US/ST=State/L=City/O=Lab/CN=Lab2.lan"
        -addext "subjectAltName=DNS:Lab2.lan,DNS:*.Lab2.lan,IP:192.168.1.48"
      when: not cert_exists.stat.exists
    
    - name: Set certificate file permissions
      file:
        path: "/tmp/jupyterhub-certs/{{ item }}"
        mode: '0600'
      loop:
        - tls.key
        - tls.crt
      when: not cert_exists.stat.exists
    
    - name: Delete existing JupyterHub TLS secret if exists
      command: kubectl delete secret jupyterhub-tls -n {{ jupyterhub_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: secret_delete
      failed_when: false
      changed_when: secret_delete.rc == 0
    
    - name: Create Kubernetes secret with SSL certificates
      command: >
        kubectl create secret tls jupyterhub-tls
        --cert=/tmp/jupyterhub-certs/tls.crt
        --key=/tmp/jupyterhub-certs/tls.key
        -n {{ jupyterhub_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
    
    - name: Display certificate information
      command: >
        openssl x509 -in /tmp/jupyterhub-certs/tls.crt -noout -subject -dates
      register: cert_info
    
    - name: Show SSL certificate details
      debug:
        msg:
          - "SSL Certificate created for HTTPS"
          - "{{ cert_info.stdout }}"
          - "Secret: jupyterhub-tls created in namespace {{ jupyterhub_namespace }}"
    
    - name: Check if JupyterHub is already installed
      command: helm list -n {{ jupyterhub_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: helm_list
      
    - name: Deploy JupyterHub via Helm (if not installed)
      command: >
        helm install {{ jupyterhub_release }}
        jupyterhub/jupyterhub
        --namespace {{ jupyterhub_namespace }}
        --version {{ jupyterhub_chart_version }}
        --values {{ values_file }}
        --timeout 10m
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      when: jupyterhub_release not in helm_list.stdout
      register: helm_install
      
    - name: Upgrade JupyterHub via Helm (if already installed)
      command: >
        helm upgrade {{ jupyterhub_release }}
        jupyterhub/jupyterhub
        --namespace {{ jupyterhub_namespace }}
        --version {{ jupyterhub_chart_version }}
        --values {{ values_file }}
        --timeout 10m
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      when: jupyterhub_release in helm_list.stdout
      register: helm_upgrade
    
    - name: Wait for Hub pod to be ready
      command: >
        kubectl wait --for=condition=ready pod
        -l component=hub
        -n {{ jupyterhub_namespace }}
        --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: hub_wait
      ignore_errors: true
      
    - name: Wait for Proxy pod to be ready
      command: >
        kubectl wait --for=condition=ready pod
        -l component=proxy
        -n {{ jupyterhub_namespace }}
        --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: proxy_wait
      ignore_errors: true
    
    - name: Get JupyterHub pods status
      command: kubectl get pods -n {{ jupyterhub_namespace }} -l app=jupyterhub
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: pods_status
      
    - name: Get JupyterHub service details
      command: kubectl get svc -n {{ jupyterhub_namespace }} -l app=jupyterhub
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: svc_details
    
    - name: Wait for Hub to be fully ready
      pause:
        seconds: 15
      
    - name: Display deployment status
      debug:
        msg:
          - "========================================"
          - "JupyterHub Deployment Complete"
          - "========================================"
          - ""
          - "Pods:"
          - "{{ pods_status.stdout }}"
          - ""
          - "Services:"
          - "{{ svc_details.stdout }}"
          - ""
          - "Access JupyterHub at: https://Lab2.lan:32443"
          - "(Self-signed certificate - accept browser warning)"
          - ""
          - "Default Admin User: admin"
          - "Create password on first signup"
          - ""
          - "Features:"
          - "  - HTTPS enabled with self-signed certificate"
          - "  - Multi-user support with NativeAuthenticator"
          - "  - Per-user isolated notebook servers"
          - "  - PySpark pre-configured (Python 3.11 + Spark 3.5.1)"
          - "  - Access to Spark cluster and NFS data"
          - "  - Resource limits: 1-2 CPU, 2-4G memory per user"
          - ""
          - "Next Steps:"
          - "  1. Access https://Lab2.lan:32443"
          - "  2. Accept self-signed certificate warning in browser"
          - "  3. Click 'Sign Up' to create admin account"
          - "  4. Login as admin"
          - "  5. Authorize other users from admin panel"
          - ""
          - "Note: For production, replace with CA-signed certificate"
          - "========================================"

