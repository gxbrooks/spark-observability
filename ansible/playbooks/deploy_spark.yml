---
- name: Deploy Spark on Kubernetes
  hosts: kubernetes_master
  become: false
  vars:
    k8s_config_dir: "/home/{{ ansible_user }}/spark-k8s"
    kubeconfig: "/home/{{ ansible_user }}/.kube/config"
    project_root: "{{ playbook_dir | dirname | dirname }}"
  pre_tasks:
    - name: Read Spark TOML config directly
      set_fact:
        spark_version: "{{ lookup('file', project_root + '/spark/spark-image.toml') | regex_search('SPARK_VERSION\\s*=\\s*\"([^\"]+)\"', '\\1') | first }}"

    - name: Set Spark image variables
      set_fact:
        spark_image: "myrepo/spark"
        spark_tag: "{{ spark_version }}"

    - name: Clean up existing Docker repository files
      become: true
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/keyrings/docker.gpg
        - /etc/apt/sources.list.d/docker.list
        - /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list

    - name: Install Docker dependencies
      become: true
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present
        update_cache: yes

    - name: Create Docker keyring directory
      become: true
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      become: true
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor | sudo tee /etc/apt/keyrings/docker.gpg > /dev/null
        sudo chmod a+r /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      become: true
      shell: |
        echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable" | sudo tee /etc/apt/sources.list.d/docker.list
        apt-get update

    - name: Install Docker packages
      become: true
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Ensure Docker service is running
      become: true
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      become: true
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Reset connection to allow Docker group changes to take effect
      meta: reset_connection
  tasks:
    - name: Create Spark Kubernetes directory
      file:
        path: "{{ k8s_config_dir }}"
        state: directory
        mode: '0755'
        
    - name: Copy Spark Kubernetes manifests
      copy:
        src: "{{ playbook_dir | dirname | dirname }}/kubernetes/spark.yml"
        dest: "{{ k8s_config_dir }}/spark.yml"
        mode: '0644'
        
    - name: Apply Spark namespace and RBAC
      command: kubectl apply -f {{ k8s_config_dir }}/spark.yml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      
    - name: Verify service account exists
      command: kubectl get serviceaccount spark -n spark
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 6
      delay: 5
      register: result
      until: result.rc == 0
      
    - name: Verify role binding
      command: kubectl get rolebinding spark-role-binding -n spark
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 6
      delay: 5
      register: result
      until: result.rc == 0
      
    - name: Build and push Spark Docker image
      become: true
      shell: |
        docker build \
          --no-cache \
          --progress=plain \
          -t {{ spark_image }}:{{ spark_tag }} \
          -f Dockerfile .
      args:
        chdir: "{{ project_root }}/spark"
      register: docker_build
      retries: 3
      delay: 5
      until: docker_build.rc == 0
      
    - name: Display Docker build output
      debug:
        var: docker_build.stdout_lines
      when: docker_build.stdout is defined
    
    - name: Create ConfigMap from spark-defaults.conf
      command: >
        kubectl create configmap spark-defaults 
        --from-file={{ playbook_dir | dirname | dirname }}/spark/conf/spark-defaults.conf 
        -n spark --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Apply Spark manifests
      k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "{{ k8s_config_dir }}/{{ item }}"
      loop:
        - spark-configmap.yaml
        - spark-master-deployment.yaml
        - spark-history-deployment.yaml
        - spark-worker-deployment.yaml

# This play is now integrated into the main play above
