---
# This playbook updates kubeconfig files to use hostnames instead of IP addresses
# It fetches the master hostname from inventory and updates both the development
# and runtime user's kubeconfig files.

- name: Update kubeconfig to use hostnames instead of IPs
  hosts: kubernetes_master
  become: true
  vars:
    k8s_master_host: "{{ hostvars[groups['kubernetes_master'][0]]['ansible_host'] }}"
    control_user: "{{ lookup('env', 'USER') }}"
    runtime_user: "ansible"
  tasks:
    - name: Display hostname that will be used
      debug:
        msg: "Using hostname {{ k8s_master_host }} for Kubernetes API server"

    - name: Update control user's kubeconfig ({{ control_user }})
      replace:
        path: "/home/{{ control_user }}/.kube/config"
        regexp: 'server: https://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:6443'
        replace: "server: https://{{ k8s_master_host }}:6443"
      become_user: "{{ control_user }}"

    - name: Update runtime user's kubeconfig ({{ runtime_user }})
      replace:
        path: "/home/{{ runtime_user }}/.kube/config"
        regexp: 'server: https://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:6443'
        replace: "server: https://{{ k8s_master_host }}:6443"
      become_user: "{{ runtime_user }}"

    - name: Update /etc/hosts if needed to ensure hostname resolution
      blockinfile:
        path: /etc/hosts
        block: |
          # Kubernetes master hostname mapping
          {{ ansible_default_ipv4.address }} {{ k8s_master_host }}
        marker: "# {mark} ANSIBLE MANAGED BLOCK - KUBERNETES MASTER HOSTNAME"
        create: no
      when: ansible_default_ipv4.address is defined

    - name: Verify connectivity to Kubernetes API
      command: kubectl cluster-info
      register: cluster_info
      ignore_errors: yes
      become_user: "{{ control_user }}"

    - name: Display connectivity result
      debug:
        msg: "{{ 'Connection successful!' if cluster_info.rc == 0 else 'Connection failed. You may need to restart the Kubernetes API server.' }}"
        
    - name: Check certificate validation with openssl
      shell: |
        SERVER=$(kubectl config view --raw -o jsonpath='{.clusters[0].cluster.server}' | grep -o 'https://[^:]*' | sed 's#https://##')
        openssl s_client -connect ${SERVER}:6443 -servername ${SERVER} -showcerts </dev/null 2>&1 | grep -i "Verification"
      register: cert_validation
      ignore_errors: yes
      become_user: "{{ control_user }}"
      
    - name: Display certificate validation status
      debug:
        msg: |
          Certificate validation: {{ 'SUCCESS' if 'Verification: OK' in cert_validation.stdout else 'FAILED' }}
          {% if 'Verification: OK' not in cert_validation.stdout %}
          You need to regenerate certificates with proper hostnames:
          ansible-playbook -i inventory.yml playbooks/k8s/regenerate_k8s_certs.yml
          {% endif %}
          
          Note: Certificate validation includes case-insensitive hostname matching.
