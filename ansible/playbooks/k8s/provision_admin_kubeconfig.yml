---
# Copy /etc/kubernetes/admin.conf from the control plane to every node in k8s_nodes
# so `kubectl --kubeconfig=/etc/kubernetes/admin.conf` works on workers for support.
# Security: full cluster-admin; use only on lab/trusted nodes.
#
# Run via: ansible-playbook -i inventory.yml playbooks/k8s/provision_admin_kubeconfig.yml
# Or pulled in by playbooks/k8s/install.yml and playbooks/deploy.yml

- name: Provision admin kubeconfig on all Kubernetes nodes
  hosts: spark_kubernetes:&linux
  become: true
  tasks:
    - name: Stat admin.conf on control plane
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: admin_kubeconfig_stat
      run_once: true
      delegate_to: "{{ groups['kubernetes_master'][0] }}"

    - name: Slurp admin kubeconfig from control plane
      ansible.builtin.slurp:
        src: /etc/kubernetes/admin.conf
      register: admin_kubeconfig_slurp
      run_once: true
      delegate_to: "{{ groups['kubernetes_master'][0] }}"
      when: admin_kubeconfig_stat.stat.exists | default(false)

    - name: Install admin kubeconfig on every Kubernetes node
      ansible.builtin.copy:
        dest: /etc/kubernetes/admin.conf
        content: "{{ admin_kubeconfig_slurp.content | b64decode }}"
        mode: "0600"
        owner: root
        group: root
      when:
        - admin_kubeconfig_stat.stat.exists | default(false)
        - admin_kubeconfig_slurp.content is defined
