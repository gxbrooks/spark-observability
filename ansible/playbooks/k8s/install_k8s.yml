---
# install_k8s.yml - Installs and initializes a Kubernetes cluster for Spark
# Can also be used to recreate kubeconfig files after network changes with: ansible-playbook -i inventory.yml ansible/playbooks/k8s/install_k8s.yml --tags=kubeconfig

- name: Install and Initialize Kubernetes
  hosts: spark_kubernetes:&linux
  become: true
  vars:
    k8s_group: kubernetes
    control_user: "{{ k8s_control_user | default(lookup('env', 'USER')) }}"
    k8s_master_host: "{{ hostvars[groups['kubernetes_master'][0]]['ansible_host'] }}"
  tasks:
    - name: Display Kubernetes master hostname
      debug:
        msg: "Using hostname {{ k8s_master_host }} for Kubernetes API server"

    # === Kernel Module Configuration ===
    - name: Load required kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay

    - name: Configure kernel parameters for Kubernetes
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        sysctl_set: yes
        reload: yes
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }
    
    - name: Make kernel module changes persistent
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          br_netfilter
          overlay
        mode: 0644
    
    - name: Make sysctl changes persistent
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1
        mode: 0644

    # === Group Setup ===
    - name: Create kubernetes group
      group:
        name: "{{ k8s_group }}"
        state: present

    - name: Add users to kubernetes group
      user:
        name: "{{ item }}"
        groups: "{{ k8s_group }}"
        append: yes
      loop:
        - "{{ control_user }}"
        - "{{ ansible_user }}"
        - kubernetes

    # === Directory Setup ===
    - name: Ensure kubernetes operational directories exist with correct permissions
      file:
        path: "{{ item }}"
        state: directory
        group: "{{ k8s_group }}"
        mode: "g+rwX"
        recurse: yes
      loop:
        - "/home/{{ ansible_user }}/.kube"
        - "/home/{{ control_user }}/.kube"
        - "/home/{{ ansible_user }}/kubernetes"
        - "/etc/kubernetes"
        - "/etc/containerd"

    # === Package Installation ===
    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg2
          - software-properties-common
          - python3-pip
          - python3-kubernetes
        state: present
        update_cache: yes

    # === Kubernetes Repository Setup ===
    - name: Create Kubernetes apt key directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Kubernetes apt key
      get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key
        dest: /tmp/k8s-apt-key
        mode: '0644'

    - name: Add Kubernetes apt key
      apt_key:
        file: /tmp/k8s-apt-key
        state: present

    - name: Add Kubernetes repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /"
        state: present
        filename: kubernetes

    - name: Install Kubernetes packages
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: Hold Kubernetes packages at current version
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    # === Containerd Setup ===
    - name: Install containerd
      apt:
        name: containerd
        state: present
        update_cache: yes

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate default containerd configuration
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Configure containerd to use systemd cgroup driver
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted
        enabled: yes

    # === Initialize Kubernetes Cluster ===
    - name: Check if Kubernetes is already initialized
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: k8s_config_check
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Initialize Kubernetes cluster
      command: kubeadm init --pod-network-cidr=10.244.0.0/16 --apiserver-advertise-address={{ ansible_default_ipv4.address }} --ignore-preflight-errors=NumCPU,Port-10250
      register: kubeadm_init
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - not k8s_config_check.stat.exists | default(true)

    - name: Get join command
      shell: kubeadm token create --print-join-command
      register: join_command
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0

    - name: Store join command for worker nodes
      set_fact:
        k8s_join_command: "{{ join_command.stdout }}"
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - join_command is defined and join_command.stdout is defined

    # === Configure kubectl for users with hostnames directly ===
    - name: Check if Kubernetes certificates exist
      stat:
        path: /etc/kubernetes/pki/ca.crt
      register: k8s_certs_exist
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
      tags: [kubeconfig]

    - name: Fail if Kubernetes certificates don't exist when regenerating kubeconfig
      fail:
        msg: "Kubernetes certificates not found. Please ensure Kubernetes is properly installed first."
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - not k8s_certs_exist.stat.exists
        - "'kubeconfig' in ansible_run_tags"
      tags: [kubeconfig]

    - name: Get CA certificate data
      slurp:
        src: /etc/kubernetes/pki/ca.crt
      register: ca_cert_data
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0
      tags: [kubeconfig]

    - name: Get client certificate data
      slurp:
        src: /etc/kubernetes/pki/apiserver-kubelet-client.crt
      register: client_cert_data
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0
      tags: [kubeconfig]

    - name: Get client key data
      slurp:
        src: /etc/kubernetes/pki/apiserver-kubelet-client.key
      register: client_key_data
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0
      tags: [kubeconfig]

    - name: Create kubectl config for control user with hostname directly
      copy:
        dest: "/home/{{ control_user }}/.kube/config"
        owner: "{{ control_user }}"
        group: "{{ k8s_group }}"
        mode: '0640'
        force: yes  # Always overwrite existing config
        content: |
          apiVersion: v1
          clusters:
          - cluster:
              certificate-authority-data: {{ ca_cert_data.content | default('') }}
              server: https://{{ k8s_master_host }}:6443
            name: kubernetes
          contexts:
          - context:
              cluster: kubernetes
              user: kubernetes-admin
            name: kubernetes-admin@kubernetes
          current-context: kubernetes-admin@kubernetes
          kind: Config
          preferences: {}
          users:
          - name: kubernetes-admin
            user:
              client-certificate-data: {{ client_cert_data.content | default('') }}
              client-key-data: {{ client_key_data.content | default('') }}
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0
      tags: [kubeconfig]

    - name: Create kubectl config for ansible user with hostname directly
      copy:
        dest: "/home/{{ ansible_user }}/.kube/config"
        owner: "{{ ansible_user }}"
        group: "{{ k8s_group }}"
        mode: '0640'
        force: yes  # Always overwrite existing config
        content: |
          apiVersion: v1
          clusters:
          - cluster:
              certificate-authority-data: {{ ca_cert_data.content | default('') }}
              server: https://{{ k8s_master_host }}:6443
            name: kubernetes
          contexts:
          - context:
              cluster: kubernetes
              user: kubernetes-admin
            name: kubernetes-admin@kubernetes
          current-context: kubernetes-admin@kubernetes
          kind: Config
          preferences: {}
          users:
          - name: kubernetes-admin
            user:
              client-certificate-data: {{ client_cert_data.content | default('') }}
              client-key-data: {{ client_key_data.content | default('') }}
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0
      tags: [kubeconfig]

    # === Install Flannel CNI ===
    - name: Install Flannel CNI
      command: kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
      become_user: "{{ ansible_user }}"
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0

    # === Remove control-plane taints to allow workloads on master ===
    - name: Remove any control-plane taints
      shell: |
        for TAINT in "node-role.kubernetes.io/control-plane" "node-role.kubernetes.io/master"; do
          kubectl --kubeconfig=/etc/kubernetes/admin.conf taint nodes --all $TAINT- 2>/dev/null || true
        done
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0

    # === No need to update kubeconfig - we created them with hostnames directly ===

    # === Update /etc/hosts to ensure hostname resolution ===
    - name: Update /etc/hosts to ensure hostname resolution
      blockinfile:
        path: /etc/hosts
        block: |
          # Kubernetes master hostname mapping
          {{ ansible_default_ipv4.address }} {{ k8s_master_host }}
        marker: "# {mark} ANSIBLE MANAGED BLOCK - KUBERNETES MASTER HOSTNAME"
        create: no
      when: 
        - ansible_default_ipv4.address is defined
        - inventory_hostname == groups['kubernetes_master'][0]
      tags: [kubeconfig]

    # === Verify Kubernetes connectivity after kubeconfig creation ===
    - name: Verify connectivity to Kubernetes API with new kubeconfig
      command: kubectl cluster-info
      register: cluster_info
      ignore_errors: yes
      become_user: "{{ control_user }}"
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - "'kubeconfig' in ansible_run_tags"
      tags: [kubeconfig]

    - name: Display connectivity result
      debug:
        msg: "{{ 'Connection successful!' if cluster_info.rc == 0 else 'Connection failed. There may be certificate hostname mismatches or the API server needs to be restarted.' }}"
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - "'kubeconfig' in ansible_run_tags"
      tags: [kubeconfig]
        
    - name: Provide next steps if connection fails
      debug:
        msg: "If connection failed, consider regenerating certificates with the regenerate_k8s_certs.yml playbook."
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - "'kubeconfig' in ansible_run_tags"
        - cluster_info.rc is defined and cluster_info.rc != 0
      tags: [kubeconfig]

    # === Verify Kubernetes cluster status ===
    - name: Wait for cluster to be ready
      shell: kubectl --kubeconfig=/home/{{ ansible_user }}/.kube/config get nodes
      register: node_status
      until: node_status.rc == 0
      retries: 30
      delay: 5
      become_user: "{{ ansible_user }}"
      when: inventory_hostname == groups['kubernetes_master'][0]
      ignore_errors: yes

    - name: Display cluster status
      debug:
        var: node_status.stdout_lines
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - node_status is defined and node_status.stdout_lines is defined
