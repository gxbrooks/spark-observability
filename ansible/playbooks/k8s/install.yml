---
# install_k8s.yml - Installs and initializes a Kubernetes cluster for Spark
# Can also be used to recreate kubeconfig files after network changes with: ansible-playbook -i inventory.yml ansible/playbooks/k8s/install_k8s.yml --tags=kubeconfig

- name: Install and Initialize Kubernetes
  hosts: spark_kubernetes:&linux
  become: true
  vars:
    k8s_group: kubernetes
    control_user: "{{ k8s_control_user | default(lookup('env', 'USER')) }}"
    # Get hostname from inventory
    k8s_master_host: "{{ hostvars[groups['kubernetes_master'][0]]['ansible_host'] }}"
    # Get inventory hostname (usually short name)
    k8s_master_name: "{{ groups['kubernetes_master'][0] }}"
    # Dynamically derive short hostname from FQDN if present
    k8s_short_hostname: "{{ k8s_master_host.split('.')[0] }}"
    # Configurable network settings
    k8s_pod_network_cidr: "10.244.0.0/16"
    k8s_service_cidr: "10.96.0.0/12"
  tasks:
    - name: Display Kubernetes master hostname
      debug:
        msg: "Using hostname {{ k8s_master_host }} for Kubernetes API server"

    # === Swap Configuration ===
    - name: Check current swap status
      shell: swapon --show
      register: swap_status
      failed_when: false

    - name: Display current swap status
      debug:
        msg: "Current swap status: {{ swap_status.stdout_lines }}"

    - name: Disable swap temporarily
      shell: swapoff -a
      when: swap_status.stdout != ""

    - name: Create backup of original fstab before modifying
      copy:
        src: /etc/fstab
        dest: /etc/fstab.orig
        remote_src: yes
      when: swap_status.stdout != ""

    - name: Disable swap permanently
      lineinfile:
        path: /etc/fstab
        regexp: '^.*swap.*'
        state: absent
      when: swap_status.stdout != ""

    - name: Verify swap is disabled
      shell: swapon --show
      register: swap_verify
      failed_when: false

    - name: Display final swap status
      debug:
        msg: "Final swap status: {{ swap_verify.stdout_lines }}"

    # === Kernel Module Configuration ===
    - name: Load required kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay

    - name: Configure kernel parameters for Kubernetes
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        sysctl_set: yes
        reload: yes
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }
    
    - name: Make kernel module changes persistent
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          br_netfilter
          overlay
        mode: 0644
    
    - name: Make sysctl changes persistent
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1
        mode: 0644

    # === Group Setup ===
    - name: Create kubernetes group
      group:
        name: "{{ k8s_group }}"
        state: present

    - name: Add users to kubernetes group
      user:
        name: "{{ item }}"
        groups: "{{ k8s_group }}"
        append: yes
      loop:
        - "{{ control_user }}"
        - "{{ ansible_user }}"
        - kubernetes

    # === Directory Setup ===
    - name: Ensure kubernetes operational directories exist with correct permissions
      file:
        path: "{{ item }}"
        state: directory
        group: "{{ k8s_group }}"
        mode: "g+rwX"
        recurse: yes
      loop:
        - "/home/{{ ansible_user }}/.kube"
        - "/home/{{ control_user }}/.kube"
        - "/home/{{ ansible_user }}/kubernetes"
        - "/etc/kubernetes"
        - "/etc/containerd"
        
    # === Clean up any conflicting Kubernetes repository configurations ===
    - name: Check for conflicting Kubernetes apt sources
      shell: |
        find /etc/apt -name "*.list" -type f -exec grep -l "pkgs.k8s.io\|kubernetes" {} \; 2>/dev/null || echo "No conflicts"
      register: conflicting_sources
      changed_when: false
      
    - name: Show detected conflicting sources
      debug:
        var: conflicting_sources.stdout_lines
      when: conflicting_sources.stdout != "No conflicts"

    - name: Remove conflicting apt sources entries
      lineinfile:
        path: "{{ item }}"
        regexp: ".*pkgs\\.k8s\\.io.*|.*kubernetes.*"
        state: absent
      loop: "{{ conflicting_sources.stdout_lines }}"
      when: conflicting_sources.stdout != "No conflicts"
    
    - name: Check for existing Kubernetes repository files
      find:
        paths: /etc/apt/sources.list.d
        patterns: "*kubernetes*"
      register: k8s_repo_files

    - name: Remove existing Kubernetes repository files
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ k8s_repo_files.files }}"
      when: k8s_repo_files.files | length > 0

    - name: Check for existing Kubernetes keyrings
      find:
        paths: /etc/apt/keyrings
        patterns: "*kubernetes*"
      register: k8s_keyrings

    - name: Remove existing Kubernetes keyrings
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ k8s_keyrings.files }}"
      when: k8s_keyrings.files | length > 0
      
    - name: Update apt cache after cleanup
      apt:
        update_cache: yes
      ignore_errors: yes
      retries: 1
      delay: 5
      timeout: 30
      changed_when: false

    # === Wait for apt to be available ===
    - name: Wait for apt to be available
      shell: |
        while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
          echo "Waiting for apt to be available..."
          sleep 5
        done
      timeout: 120
      ignore_errors: yes

    # === Package Installation ===
    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg2
          - software-properties-common
          - python3-pip
          - python3-kubernetes
        state: present
        update_cache: no
      ignore_errors: yes
      retries: 2
      delay: 5

    # === Kubernetes Repository Setup ===
    - name: Create Kubernetes apt key directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Kubernetes apt key
      get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key
        dest: /tmp/k8s-apt-key
        mode: '0644'

    - name: Check if kubernetes keyring exists
      stat:
        path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      register: k8s_keyring_exists
        
    - name: Create Kubernetes GPG keyring file
      shell: |
        cat /tmp/k8s-apt-key | gpg --dearmor > /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        chmod 644 /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      when: not k8s_keyring_exists.stat.exists

    - name: Add Kubernetes repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /"
        state: present
        filename: kubernetes
        update_cache: no
        
    # Update apt cache after repository configuration
    - name: Update apt cache after repository configuration
      apt:
        update_cache: yes
      ignore_errors: yes
      retries: 1
      delay: 5
      timeout: 30

    - name: Install Kubernetes packages
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: no

    - name: Hold Kubernetes packages at current version
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    # === CNI Plugin Installation ===
    - name: Create CNI plugin directory
      file:
        path: /opt/cni/bin
        state: directory
        mode: '0755'

    - name: Download CNI plugins
      get_url:
        url: https://github.com/containernetworking/plugins/releases/download/v1.3.0/cni-plugins-linux-amd64-v1.3.0.tgz
        dest: /tmp/cni-plugins.tgz
        mode: '0644'
      ignore_errors: yes
      retries: 3
      delay: 5

    - name: Extract CNI plugins
      unarchive:
        src: /tmp/cni-plugins.tgz
        dest: /opt/cni/bin
        remote_src: yes
        creates: /opt/cni/bin/bridge
      ignore_errors: yes

    - name: Set CNI plugin permissions
      file:
        path: /opt/cni/bin
        mode: '0755'
        recurse: yes
      ignore_errors: yes

    - name: Create CNI configuration directory
      file:
        path: /etc/cni/net.d
        state: directory
        mode: '0755'

    # === Containerd Setup ===
    - name: Install containerd
      apt:
        name: containerd
        state: present
        update_cache: yes

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate default containerd configuration
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Configure containerd to use systemd cgroup driver
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted
        enabled: yes

    # === Initialize Kubernetes Cluster ===
    - name: Check if Kubernetes is already initialized
      stat:
        path: /etc/kubernetes/admin.conf
      register: k8s_config_check
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Build certificate SAN list for all nodes
      set_fact:
        cert_sans: "{{ k8s_master_host }},{{ k8s_master_name }},{{ k8s_short_hostname }},{{ k8s_master_name | lower }},{{ k8s_short_hostname | lower }},Lab1.local,Lab1,lab1"
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Initialize Kubernetes cluster
      command: kubeadm init --pod-network-cidr={{ k8s_pod_network_cidr }} --apiserver-advertise-address={{ ansible_default_ipv4.address }} --apiserver-cert-extra-sans={{ cert_sans }} --ignore-preflight-errors=NumCPU,Port-10250
      register: kubeadm_init
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - not k8s_config_check.stat.exists | default(true)

    - name: Display Kubernetes initialization status
      debug:
        msg: "{{ 'Kubernetes was already initialized' if k8s_config_check.stat.exists | default(false) else 'Kubernetes initialized successfully' }}"
      when:
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0

    - name: Wait for Kubernetes API server to become available
      shell: kubectl --kubeconfig=/etc/kubernetes/admin.conf get nodes
      register: api_status
      until: api_status.rc == 0
      retries: 60
      delay: 10
      ignore_errors: yes
      when:
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0

    # Skip token creation during installation as it can cause timeouts
    # This is now an optional manual step after installation completes
    - name: Display information about creating join tokens
      debug:
        msg: |
          Kubernetes cluster is initialized. To add worker nodes later, run:
          
          sudo kubeadm token create --print-join-command
          
          This will output a command that can be run on worker nodes to join the cluster.
      when:
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0

    # === Configure kubectl for users with hostnames directly ===
    - name: Check if Kubernetes certificates exist
      stat:
        path: /etc/kubernetes/pki/ca.crt
      register: k8s_certs_exist
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
      tags: [kubeconfig]

    - name: Fail if Kubernetes certificates don't exist when regenerating kubeconfig
      fail:
        msg: "Kubernetes certificates not found. Please ensure Kubernetes is properly installed first."
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - not k8s_certs_exist.stat.exists
        - "'kubeconfig' in ansible_run_tags"
      tags: [kubeconfig]

    - name: Get CA certificate data
      slurp:
        src: /etc/kubernetes/pki/ca.crt
      register: ca_cert_data
      ignore_errors: yes
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0
      tags: [kubeconfig]

    - name: Get client certificate data
      slurp:
        src: /etc/kubernetes/pki/apiserver-kubelet-client.crt
      register: client_cert_data
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0
      tags: [kubeconfig]

    - name: Get client key data
      slurp:
        src: /etc/kubernetes/pki/apiserver-kubelet-client.key
      register: client_key_data
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0
      tags: [kubeconfig]

    - name: Create kubectl config for control user with hostname directly
      copy:
        dest: "/home/{{ control_user }}/.kube/config"
        owner: "{{ control_user }}"
        group: "{{ k8s_group }}"
        mode: '0640'
        force: yes  # Always overwrite existing config
        content: |
          apiVersion: v1
          clusters:
          - cluster:
              certificate-authority-data: {{ ca_cert_data.content | default('') }}
              server: https://{{ k8s_master_host }}:6443
            name: kubernetes
          contexts:
          - context:
              cluster: kubernetes
              user: kubernetes-admin
            name: kubernetes-admin@kubernetes
          current-context: kubernetes-admin@kubernetes
          kind: Config
          preferences: {}
          users:
          - name: kubernetes-admin
            user:
              client-certificate-data: {{ client_cert_data.content | default('') }}
              client-key-data: {{ client_key_data.content | default('') }}
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0
      tags: [kubeconfig]

    - name: Create kubectl config for ansible user with hostname directly
      copy:
        dest: "/home/{{ ansible_user }}/.kube/config"
        owner: "{{ ansible_user }}"
        group: "{{ k8s_group }}"
        mode: '0640'
        force: yes  # Always overwrite existing config
        content: |
          apiVersion: v1
          clusters:
          - cluster:
              certificate-authority-data: {{ ca_cert_data.content | default('') }}
              server: https://{{ k8s_master_host }}:6443
            name: kubernetes
          contexts:
          - context:
              cluster: kubernetes
              user: kubernetes-admin
            name: kubernetes-admin@kubernetes
          current-context: kubernetes-admin@kubernetes
          kind: Config
          preferences: {}
          users:
          - name: kubernetes-admin
            user:
              client-certificate-data: {{ client_cert_data.content | default('') }}
              client-key-data: {{ client_key_data.content | default('') }}
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0
      tags: [kubeconfig]

    # === Check certificate validity for current hostname ===
    - name: Check if certificate supports current hostname
      shell: |
        openssl x509 -in /etc/kubernetes/pki/apiserver.crt -noout -text | grep -A1 "Subject Alternative Name" | grep -o "DNS:[^,]*" | tr '\n' ' '
      register: cert_sans
      ignore_errors: yes
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
      
    - name: Display certificate SANs
      debug:
        msg: "Certificate SANs: {{ cert_sans.stdout }}"
      when:
        - inventory_hostname == groups['kubernetes_master'][0]
        - cert_sans.rc is defined and cert_sans.rc == 0
      
    - name: Set hostname variants for certificate validation
      set_fact:
        hostname_variants:
          - "{{ k8s_master_host }}"
          - "DNS:{{ k8s_master_host }}"
          - "{{ k8s_short_hostname }}"
          - "DNS:{{ k8s_short_hostname }}"
      when:
        - inventory_hostname == groups['kubernetes_master'][0]
        - cert_sans.rc is defined and cert_sans.rc == 0
      
    - name: Check if any hostname variant is in certificate SANs (case-insensitive)
      set_fact:
        hostname_found: "{{ hostname_found | default(false) or (item | lower in cert_sans.stdout | lower) }}"
      with_items: "{{ hostname_variants }}"
      when:
        - inventory_hostname == groups['kubernetes_master'][0]
        - cert_sans.rc is defined and cert_sans.rc == 0
        - cert_sans.stdout is defined
      
    - name: Check if current hostname is in certificate SANs (case-insensitive)
      fail:
        msg: |
          ERROR: None of the hostname variants [{{ k8s_master_host }}, {{ k8s_short_hostname }}] are in the API server certificate's SANs!
          Certificate SANs: {{ cert_sans.stdout }}
          (Note: This check is case-insensitive, so differences in capitalization should not cause this error)
          
          You must run 'ansible-playbook -i inventory.yml ansible/playbooks/k8s/regenerate_k8s_certs.yml' 
          to regenerate the certificates with the correct hostname.
      when:
        - inventory_hostname == groups['kubernetes_master'][0]
        - cert_sans.rc is defined and cert_sans.rc == 0
        - cert_sans.stdout is defined 
        - "not (hostname_found | default(false))"
      ignore_errors: yes
      tags: [kubeconfig]
      
    # === Install Flannel CNI ===
    - name: Check for Flannel CNI
      shell: kubectl --kubeconfig=/etc/kubernetes/admin.conf get pods -n kube-flannel -o name
      register: flannel_check
      ignore_errors: yes
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0

    - name: Download flannel manifest file
      get_url:
        url: https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
        dest: /tmp/kube-flannel.yml
        mode: '0644'
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0
        - flannel_check.stdout == "" or flannel_check.rc != 0

    - name: Install Flannel CNI if not present
      shell: kubectl apply -f /tmp/kube-flannel.yml
      become_user: "{{ ansible_user }}"
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0
        - flannel_check.stdout == "" or flannel_check.rc != 0

    - name: Wait for CNI to be initialized
      shell: kubectl --kubeconfig=/etc/kubernetes/admin.conf get nodes
      register: node_check
      until: node_check.rc == 0
      retries: 30
      delay: 5
      ignore_errors: yes
      when: inventory_hostname == groups['kubernetes_master'][0]

    # === Remove control-plane taints to allow workloads on master ===
    - name: Remove any control-plane taints
      shell: |
        for TAINT in "node-role.kubernetes.io/control-plane" "node-role.kubernetes.io/master"; do
          kubectl --kubeconfig=/etc/kubernetes/admin.conf taint nodes --all $TAINT- 2>/dev/null || true
        done
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - k8s_config_check.stat.exists | default(false) or kubeadm_init.rc is defined and kubeadm_init.rc == 0

    # === No need to update kubeconfig - we created them with hostnames directly ===

    # === Update /etc/hosts to ensure hostname resolution ===
    - name: Update /etc/hosts to ensure hostname resolution
      blockinfile:
        path: /etc/hosts
        block: |
          # Kubernetes master hostname mapping
          {{ ansible_default_ipv4.address }} {{ k8s_master_host }}
        marker: "# {mark} ANSIBLE MANAGED BLOCK - KUBERNETES MASTER HOSTNAME"
        create: no
      when: 
        - ansible_default_ipv4.address is defined
        - inventory_hostname == groups['kubernetes_master'][0]
      tags: [kubeconfig]

    # === Verify Kubernetes connectivity after kubeconfig creation ===
    - name: Verify connectivity to Kubernetes API with new kubeconfig
      command: kubectl cluster-info
      register: cluster_info
      ignore_errors: yes
      become_user: "{{ control_user }}"
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - "'kubeconfig' in ansible_run_tags"
      tags: [kubeconfig]

    - name: Check certificate hostname validation
      shell: |
        kubectl config view --raw -o jsonpath='{.clusters[0].cluster.server}' | grep -o 'https://[^:]*' | sed 's#https://##' | xargs -I{} openssl s_client -connect {}:6443 -servername {} -showcerts </dev/null 2>&1 | grep -i "Verification"
      register: cert_validation
      ignore_errors: yes
      become_user: "{{ control_user }}"
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - "'kubeconfig' in ansible_run_tags"
      tags: [kubeconfig]

    - name: Display connectivity result
      debug:
        msg: "{{ 'Connection successful!' if cluster_info.rc == 0 else 'Connection failed. There may be certificate hostname mismatches or the API server needs to be restarted.' }}"
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - "'kubeconfig' in ansible_run_tags"
      tags: [kubeconfig]
        
    - name: Display certificate validation status
      debug:
        msg: "Certificate validation: {{ 'SUCCESS - Certificates are properly configured for the current hostname' if 'Verification: OK' in cert_validation.stdout else 'FAILED - Certificate hostname mismatch detected. You MUST run regenerate_k8s_certs.yml to fix this issue.' }}"
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - "'kubeconfig' in ansible_run_tags"
        - cert_validation.stdout is defined
      tags: [kubeconfig]
        
    - name: Provide next steps if connection fails
      debug:
        msg: "If connection failed or certificate validation failed, run the regenerate_k8s_certs.yml playbook to fix certificate issues."
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - "'kubeconfig' in ansible_run_tags"
        - (cluster_info.rc is defined and cluster_info.rc != 0) or ('Verification: OK' not in cert_validation.stdout | default(''))
      tags: [kubeconfig]

    # === Verify Kubernetes cluster status ===
    - name: Wait for cluster to be ready
      shell: kubectl --kubeconfig=/home/{{ ansible_user }}/.kube/config get nodes
      register: node_status
      until: node_status.rc == 0
      retries: 30
      delay: 5
      become_user: "{{ ansible_user }}"
      when: inventory_hostname == groups['kubernetes_master'][0]
      ignore_errors: yes

    - name: Display cluster status
      debug:
        var: node_status.stdout_lines
      when: 
        - inventory_hostname == groups['kubernetes_master'][0]
        - node_status is defined and node_status.stdout_lines is defined
