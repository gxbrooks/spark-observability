---
- name: Distribute Kubernetes certificates and configs for secure communication
  hosts: kubernetes_master:kubernetes_workers
  become: true
  vars:
    k8s_group: kubernetes
    control_user: "{{ k8s_control_user | default(lookup('env', 'USER')) }}"
    k8s_cert_base_dir: "/etc/kubernetes/pki"
    runtime_user: "ansible"
  tasks:
    - name: Ensure kubernetes group exists
      group:
        name: "{{ k8s_group }}"
        state: present

    - name: Add users to kubernetes group
      user:
        name: "{{ item }}"
        groups: "{{ k8s_group }}"
        append: yes
      loop:
        - "{{ control_user }}"
        - "{{ runtime_user }}"

    - name: Ensure kubernetes directories have correct group permissions
      file:
        path: "{{ item }}"
        state: directory
        group: "{{ k8s_group }}"
        mode: "0750"
        recurse: yes
      loop:
        - "/etc/kubernetes"
        - "/etc/kubernetes/pki"

    - name: Set group read permissions on kubernetes certificates
      find:
        paths: "/etc/kubernetes/pki"
        patterns: "*.crt"
      register: cert_files

    - name: Apply group read permissions to certificate files
      file:
        path: "{{ item.path }}"
        mode: "0640"
        group: "{{ k8s_group }}"
      loop: "{{ cert_files.files }}"
      when: cert_files.files | length > 0

    - name: Create .kube directory for control user
      file:
        path: "/home/{{ control_user }}/.kube"
        state: directory
        mode: '0700'
        owner: "{{ control_user }}"
        group: "{{ control_user }}"

    - name: Create .kube directory for runtime user
      file:
        path: "/home/{{ runtime_user }}/.kube"
        state: directory
        mode: '0700'
        owner: "{{ runtime_user }}"
        group: "{{ runtime_user }}"

    - name: Copy kubectl config for control user with proper certificates
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ control_user }}/.kube/config"
        remote_src: yes
        owner: "{{ control_user }}"
        group: "{{ control_user }}"
        mode: '0600'

    - name: Copy kubectl config for runtime user with proper certificates
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ runtime_user }}/.kube/config"
        remote_src: yes
        owner: "{{ runtime_user }}"
        group: "{{ runtime_user }}"
        mode: '0600'

    - name: Create K8s certificate directory for control user
      file:
        path: "/home/{{ control_user }}/.kube/certs"
        state: directory
        mode: '0700'
        owner: "{{ control_user }}"
        group: "{{ control_user }}"
      
    - name: Create K8s certificate directory for runtime user
      file:
        path: "/home/{{ runtime_user }}/.kube/certs"
        state: directory
        mode: '0700'
        owner: "{{ runtime_user }}"
        group: "{{ runtime_user }}"
      
    - name: Copy CA certificate for control user
      copy:
        src: "{{ k8s_cert_base_dir }}/ca.crt"
        dest: "/home/{{ control_user }}/.kube/certs/ca.crt"
        remote_src: yes
        owner: "{{ control_user }}"
        group: "{{ control_user }}"
        mode: '0600'
        
    - name: Copy CA certificate for runtime user
      copy:
        src: "{{ k8s_cert_base_dir }}/ca.crt"
        dest: "/home/{{ runtime_user }}/.kube/certs/ca.crt"
        remote_src: yes
        owner: "{{ runtime_user }}"
        group: "{{ runtime_user }}"
        mode: '0600'

    - name: Update kubeconfig to use local CA certificate path for control user
      become: yes
      become_user: "{{ control_user }}"
      shell: |
        KUBECONFIG=/home/{{ control_user }}/.kube/config kubectl config set-cluster kubernetes \
          --certificate-authority=/home/{{ control_user }}/.kube/certs/ca.crt \
          --embed-certs=true
      args:
        executable: /bin/bash
        
    - name: Update kubeconfig to use local CA certificate path for runtime user
      become: yes
      become_user: "{{ runtime_user }}"
      shell: |
        KUBECONFIG=/home/{{ runtime_user }}/.kube/config kubectl config set-cluster kubernetes \
          --certificate-authority=/home/{{ runtime_user }}/.kube/certs/ca.crt \
          --embed-certs=true
      args:
        executable: /bin/bash

    - name: Validate control user's kubectl configuration
      become: yes
      become_user: "{{ control_user }}"
      shell: |
        KUBECONFIG=/home/{{ control_user }}/.kube/config kubectl get nodes
      register: control_kubectl_test
      ignore_errors: true
      
    - name: Display control user kubectl status
      debug:
        msg: "Control user kubectl status: {{ 'Working' if control_kubectl_test.rc == 0 else 'Failed' }}"
        
    - name: Validate runtime user's kubectl configuration
      become: yes
      become_user: "{{ runtime_user }}"
      shell: |
        KUBECONFIG=/home/{{ runtime_user }}/.kube/config kubectl get nodes
      register: runtime_kubectl_test
      ignore_errors: true
      
    - name: Display runtime user kubectl status
      debug:
        msg: "Runtime user kubectl status: {{ 'Working' if runtime_kubectl_test.rc == 0 else 'Failed' }}"
