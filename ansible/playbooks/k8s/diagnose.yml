---
# diagnose_k8s.yml - Diagnose Kubernetes cluster and node health
# This playbook checks the health of Kubernetes components and provides diagnostics

- name: Diagnose Kubernetes cluster health
  hosts: spark_kubernetes:&linux
  become: true
  tasks:
    - name: Check system requirements
      debug:
        msg: |
          System Information:
          - Hostname: {{ ansible_hostname }}
          - OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          - Kernel: {{ ansible_kernel }}
          - Architecture: {{ ansible_architecture }}
          - Memory: {{ ansible_memtotal_mb }}MB
          - CPU: {{ ansible_processor_vcpus }} cores

    # === Certificate Diagnostics ===
    - name: Check for required Kubernetes certificates
      stat:
        path: "{{ item }}"
      register: required_certs
      loop:
        - /etc/kubernetes/pki/ca.crt
        - /etc/kubernetes/pki/ca.key
        - /etc/kubernetes/pki/apiserver.crt
        - /etc/kubernetes/pki/apiserver.key
        - /etc/kubernetes/pki/apiserver-kubelet-client.crt
        - /etc/kubernetes/pki/apiserver-kubelet-client.key
        - /etc/kubernetes/pki/front-proxy-ca.crt
        - /etc/kubernetes/pki/front-proxy-client.crt
        - /etc/kubernetes/pki/front-proxy-client.key
        - /etc/kubernetes/pki/sa.key
        - /etc/kubernetes/pki/sa.pub
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Display certificate status
      debug:
        msg: |
          Certificate Status:
          {% for cert in required_certs.results | default([]) %}
          - {{ cert.item | basename }}: {{ '✓ EXISTS' if cert.stat.exists else '✗ MISSING' }}
          {% endfor %}
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Check for missing certificates
      set_fact:
        missing_certs: "{{ required_certs.results | default([]) | selectattr('stat.exists', 'equalto', false) | map(attribute='item') | list }}"
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Display missing certificates warning
      debug:
        msg: |
          ⚠️  WARNING: Missing Kubernetes certificates detected!
          
          Missing certificates:
          {% for cert in missing_certs | default([]) %}
          - {{ cert }}
          {% endfor %}
          
          To fix, run:
          ansible-playbook -i inventory.yml playbooks/k8s/regenerate_k8s_certs.yml
          
          Or to regenerate just the missing client certificate:
          kubeadm init phase certs apiserver-kubelet-client
      when:
        - inventory_hostname == groups['kubernetes_master'][0]
        - missing_certs | default([]) | length > 0

    - name: Check swap status
      shell: swapon --show
      register: swap_status
      failed_when: false

    - name: Display swap status
      debug:
        msg: "Swap status: {{ 'DISABLED (OK)' if swap_status.stdout == '' else 'ENABLED (WARNING - Kubernetes requires swap to be disabled)' }}"

    # === CNI Plugin Diagnostics ===
    - name: Check CNI plugin directory
      stat:
        path: /opt/cni/bin
      register: cni_bin_check

    - name: Display CNI plugin status
      debug:
        msg: "CNI plugins: {{ 'INSTALLED' if cni_bin_check.stat.exists else 'MISSING - Run install_k8s.yml to install' }}"

    - name: Check CNI configuration directory
      stat:
        path: /etc/cni/net.d
      register: cni_config_check

    - name: Check for CNI configuration files
      shell: ls /etc/cni/net.d/*.conflist /etc/cni/net.d/*.conf 2>/dev/null | wc -l
      register: cni_config_count
      when: cni_config_check.stat.exists

    - name: Display CNI configuration status
      debug:
        msg: "CNI configuration: {{ 'CONFIGURED (' + cni_config_count.stdout + ' files)' if cni_config_count is defined and cni_config_count.stdout | int > 0 else 'MISSING - CNI plugin may not be initialized' }}"

    # === Pod CIDR Diagnostics ===
    - name: Check if this is a worker node
      set_fact:
        is_worker_node: "{{ inventory_hostname in groups['kubernetes_workers'] and inventory_hostname not in groups['kubernetes_master'] }}"

    # Node names in the API are typically lowercase short hostnames (e.g. lab1), not inventory_hostname (Lab1).
    - name: Check Pod CIDR assignment
      shell: kubectl --kubeconfig=/etc/kubernetes/admin.conf get node {{ inventory_hostname | lower }} -o jsonpath='{.spec.podCIDR}'
      register: pod_cidr_check
      delegate_to: "{{ groups['kubernetes_master'][0] }}"
      when: is_worker_node
      ignore_errors: yes

    - name: Display Pod CIDR status
      debug:
        msg: "Pod CIDR: {{ 'ASSIGNED (' + pod_cidr_check.stdout + ')' if pod_cidr_check is defined and pod_cidr_check.stdout != '' else 'MISSING - Node may not be ready' }}"
      when: is_worker_node

    # === Flannel Pod Diagnostics ===
    - name: Check Flannel pod status
      shell: kubectl --kubeconfig=/etc/kubernetes/admin.conf get pods -n kube-flannel -o wide
      register: flannel_pods
      delegate_to: "{{ groups['kubernetes_master'][0] }}"
      when: inventory_hostname == groups['kubernetes_master'][0]
      ignore_errors: yes

    - name: Display Flannel pod status
      debug:
        msg: "Flannel pods status: {{ flannel_pods.stdout_lines if flannel_pods is defined else 'Not checked' }}"
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Check CoreDNS pod readiness
      shell: kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system get pods -l k8s-app=kube-dns -o wide
      register: coredns_pods
      changed_when: false
      failed_when: false
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Display CoreDNS pod status
      debug:
        msg: "CoreDNS pods status: {{ coredns_pods.stdout_lines if coredns_pods is defined else 'Not checked' }}"
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Check pending pods across all namespaces
      shell: kubectl --kubeconfig=/etc/kubernetes/admin.conf get pods -A --field-selector=status.phase=Pending -o wide
      register: pending_pods
      changed_when: false
      failed_when: false
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Display pending pods
      debug:
        msg: "{{ pending_pods.stdout_lines if pending_pods.stdout_lines | length > 1 else ['No pending pods detected'] }}"
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Check certificate expiration windows
      shell: kubeadm certs check-expiration
      register: cert_expiration
      changed_when: false
      failed_when: false
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Display certificate expiration windows
      debug:
        msg: "Certificate expiration report: {{ cert_expiration.stdout_lines if cert_expiration is defined else 'Not checked' }}"
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Check HDFS namespace health
      shell: |
        kubectl --kubeconfig=/etc/kubernetes/admin.conf get ns hdfs >/dev/null 2>&1 || { echo "hdfs namespace missing"; exit 0; }
        kubectl --kubeconfig=/etc/kubernetes/admin.conf get pods,svc -n hdfs -o wide
      register: hdfs_health
      changed_when: false
      failed_when: false
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Display HDFS namespace health
      debug:
        msg: "HDFS namespace health: {{ hdfs_health.stdout_lines if hdfs_health is defined else 'Not checked' }}"
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Run DNS resolution probe from a temporary pod
      shell: |
        kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system run dns-probe --image=busybox:1.36 --restart=Never --rm -i --quiet -- nslookup kubernetes.default.svc.cluster.local
      register: dns_probe
      changed_when: false
      failed_when: false
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Display DNS resolution probe output
      debug:
        msg: "DNS resolution probe: {{ dns_probe.stdout_lines if dns_probe is defined else 'Not checked' }}"
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Check required kernel modules
      shell: lsmod | grep -E "(br_netfilter|overlay)"
      register: kernel_modules
      failed_when: false

    - name: Display kernel modules
      debug:
        msg: "Loaded kernel modules: {{ kernel_modules.stdout_lines }}"

    - name: Check sysctl settings
      shell: |
        echo "net.bridge.bridge-nf-call-iptables: $(sysctl -n net.bridge.bridge-nf-call-iptables)"
        echo "net.bridge.bridge-nf-call-ip6tables: $(sysctl -n net.bridge.bridge-nf-call-ip6tables)"
        echo "net.ipv4.ip_forward: $(sysctl -n net.ipv4.ip_forward)"
      register: sysctl_settings

    - name: Display sysctl settings
      debug:
        msg: "Sysctl settings: {{ sysctl_settings.stdout_lines }}"

    - name: Check containerd status
      systemd:
        name: containerd
      register: containerd_status

    - name: Display containerd status
      debug:
        msg: "Containerd status: {{ containerd_status.status.ActiveState }}"

    - name: Check kubelet status
      systemd:
        name: kubelet
      register: kubelet_status

    - name: Display kubelet status
      debug:
        msg: "Kubelet status: {{ kubelet_status.status.ActiveState }}"

    - name: Check kubelet logs for errors
      shell: journalctl -u kubelet --no-pager -n 20
      register: kubelet_logs
      failed_when: false

    - name: Display kubelet logs
      debug:
        msg: "Kubelet logs: {{ kubelet_logs.stdout_lines }}"

    - name: Check Kubernetes configuration files
      stat:
        path: "{{ item }}"
      register: k8s_config_files
      loop:
        - /etc/kubernetes/admin.conf
        - /etc/kubernetes/kubelet.conf
        - /etc/kubernetes/bootstrap-kubelet.conf
        - /var/lib/kubelet/config.yaml

    - name: Display Kubernetes configuration files
      debug:
        msg: "K8s config files: {{ k8s_config_files.results | map(attribute='stat.exists') | list }}"

    - name: Check CNI configuration
      shell: ls -la /etc/cni/net.d/
      register: cni_config
      failed_when: false

    - name: Display CNI configuration
      debug:
        msg: "CNI config: {{ cni_config.stdout_lines }}"

    - name: Check network connectivity to master
      shell: ping -c 3 {{ groups['kubernetes_master'][0] }}
      register: master_ping
      failed_when: false

    - name: Display master connectivity
      debug:
        msg: "Master connectivity: {{ master_ping.rc == 0 }}"

    - name: Check Kubernetes API server connectivity
      shell: curl -k https://{{ groups['kubernetes_master'][0] }}:6443/version
      register: api_connectivity
      failed_when: false

    - name: Display API server connectivity
      debug:
        msg: "API server connectivity: {{ api_connectivity.rc == 0 }}"

    - name: Check iptables rules
      shell: iptables -S FORWARD | head -5
      register: iptables_rules
      failed_when: false

    - name: Display iptables rules
      debug:
        msg: "Iptables FORWARD rules: {{ iptables_rules.stdout_lines }}"

    - name: Check rp_filter settings
      shell: |
        echo "all: $(cat /proc/sys/net/ipv4/conf/all/rp_filter)"
        echo "default: $(cat /proc/sys/net/ipv4/conf/default/rp_filter)"
        echo "cni0: $(cat /proc/sys/net/ipv4/conf/cni0/rp_filter 2>/dev/null || echo 'N/A')"
        echo "flannel.1: $(cat /proc/sys/net/ipv4/conf/flannel.1/rp_filter 2>/dev/null || echo 'N/A')"
      register: rp_filter_settings
      failed_when: false

    - name: Display rp_filter settings
      debug:
        msg: "rp_filter settings: {{ rp_filter_settings.stdout_lines }}"

    # === Cgroup Driver Mismatch Detection ===
    - name: Get containerd cgroup driver setting
      shell: grep -E "SystemdCgroup\s*=" /etc/containerd/config.toml 2>/dev/null | tail -1 | awk -F'=' '{print $2}' | tr -d ' '
      register: containerd_cgroup
      failed_when: false

    - name: Get kubelet cgroup driver setting
      shell: grep -E "cgroupDriver:" /var/lib/kubelet/config.yaml 2>/dev/null | awk '{print $2}'
      register: kubelet_cgroup
      failed_when: false

    - name: Set cgroup driver facts
      set_fact:
        containerd_uses_systemd: "{{ containerd_cgroup.stdout | lower == 'true' }}"
        kubelet_uses_systemd: "{{ kubelet_cgroup.stdout | lower == 'systemd' }}"

    - name: Display cgroup driver configuration
      debug:
        msg: |
          Cgroup Driver Configuration:
          - Containerd SystemdCgroup: {{ containerd_cgroup.stdout | default('not found') }}
          - Kubelet cgroupDriver: {{ kubelet_cgroup.stdout | default('not found') }}
          - Status: {{ 'MATCH ✓' if (containerd_uses_systemd == kubelet_uses_systemd) else 'MISMATCH ✗ - CRITICAL!' }}

    - name: CRITICAL - Cgroup driver mismatch detected
      debug:
        msg: |
          ⚠️  CRITICAL: Cgroup Driver Mismatch Detected!
          
          Problem:
          - Containerd is using: {{ 'systemd' if containerd_uses_systemd else 'cgroupfs' }}
          - Kubelet is using: {{ 'systemd' if kubelet_uses_systemd else 'cgroupfs' }}
          
          Impact:
          - Container resource accounting will be incorrect
          - Pods will be killed unexpectedly (exit code 137)
          - Control plane components will crash repeatedly
          - Cascading failures across the cluster
          
          Fix:
          1. Edit /etc/containerd/config.toml:
             Set: SystemdCgroup = {{ 'true' if kubelet_uses_systemd else 'false' }}
          
          2. Restart containerd: sudo systemctl restart containerd
          
          3. Restart kubelet: sudo systemctl restart kubelet
      when: containerd_uses_systemd != kubelet_uses_systemd

    # === Disk Sync Performance Check ===
    - name: Test disk sync write performance (etcd health indicator)
      shell: |
        dd if=/dev/zero of=/tmp/disk_test bs=4k count=100 oflag=dsync 2>&1 | tail -1
        rm -f /tmp/disk_test
      register: disk_perf
      failed_when: false

    - name: Display disk sync performance
      debug:
        msg: "Disk sync performance: {{ disk_perf.stdout }} (etcd requires fast sync writes)"

    # === NFS Data Mount Health ===
    # Detects the failure mode where /mnt/spark mounts are in fstab but have dropped
    # (e.g. after reboot) and Spark pods started before remounting see an empty directory.
    - name: Count active /mnt/spark NFS mounts
      shell: mount | grep -cE '/mnt/spark/(data|events)' || true
      register: nfs_mount_count
      failed_when: false
      changed_when: false

    - name: List active /mnt/spark mounts
      shell: mount | grep '/mnt/spark' || echo "NONE"
      register: nfs_mounts_detail
      failed_when: false
      changed_when: false

    - name: Check /etc/fstab for NFS spark entries
      shell: grep '/mnt/spark' /etc/fstab 2>/dev/null | grep -v '^#' || echo "NONE"
      register: nfs_fstab_entries
      failed_when: false
      changed_when: false

    - name: Count items in /mnt/spark/data
      shell: ls /mnt/spark/data/ 2>/dev/null | wc -l
      register: data_dir_count
      failed_when: false
      changed_when: false

    - name: Count files in /mnt/spark/data/gutenberg_books
      shell: ls /mnt/spark/data/gutenberg_books/ 2>/dev/null | wc -l
      register: gutenberg_count
      failed_when: false
      changed_when: false

    - name: Report NFS data mount health
      debug:
        msg: |
          NFS Data Mount Health — {{ ansible_hostname }}
          ─────────────────────────────────────────────
          Active /mnt/spark mounts (expect 2): {{ nfs_mount_count.stdout | int }}
          {{ nfs_mounts_detail.stdout }}

          fstab entries:
          {{ nfs_fstab_entries.stdout }}

          Data accessibility:
          - /mnt/spark/data:                 {{ '✓  ' + data_dir_count.stdout + ' items' if data_dir_count.stdout | int > 0 else '✗  EMPTY or MISSING' }}
          - /mnt/spark/data/gutenberg_books: {{ '✓  ' + gutenberg_count.stdout + ' files' if gutenberg_count.stdout | int > 0 else '✗  EMPTY or MISSING' }}

    - name: WARN - fstab NFS mounts are configured but not active
      debug:
        msg: |
          ⚠️  WARNING: /mnt/spark NFS mounts are in fstab but NOT mounted on {{ ansible_hostname }}!

          fstab entries present:
          {{ nfs_fstab_entries.stdout }}

          Pods with hostPath volumes that started while the mount was inactive
          will NOT see NFS data — they bind the empty directory at start time and
          host mounts created later do not propagate in (mountPropagation: None default).

          Fix 1 — remount on all K8s nodes:
            ansible kubernetes_workers:kubernetes_master -i ansible/inventory.yml -b -m shell -a "mount -a"

          Fix 2 — restart Spark pods born before the remount so they see the live mount:
            kubectl delete pods -n spark -l app=spark-worker
      when:
        - nfs_fstab_entries.stdout != "NONE"
        - nfs_mount_count.stdout | int == 0

    - name: WARN - data directory inaccessible despite active mount
      debug:
        msg: |
          ⚠️  WARNING: /mnt/spark is mounted but /mnt/spark/data appears empty on {{ ansible_hostname }}!
          NFS export may have an issue or the NFS server may be unreachable.

          Check NFS server exports:
            ansible nfs_servers -i ansible/inventory.yml -b -m shell -a "exportfs -v"
      when:
        - nfs_mount_count.stdout | int > 0
        - data_dir_count.stdout | int == 0

    # === Spark Workload Health (master only) ===
    # Checks for stale pods and image pull policy issues that block pod restarts.
    - name: List all Spark worker/master pods with node and age
      shell: |
        kubectl --kubeconfig=/etc/kubernetes/admin.conf -n spark \
          get pods -l 'app in (spark-worker,spark-master)' \
          -o wide --no-headers 2>/dev/null || echo "No pods found"
      register: spark_pods_list
      failed_when: false
      changed_when: false
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Find Spark pods older than 30 days (risk of stale hostPath mounts)
      shell: |
        kubectl --kubeconfig=/etc/kubernetes/admin.conf -n spark \
          get pods -l 'app in (spark-worker,spark-master)' \
          -o jsonpath='{range .items[*]}{.metadata.creationTimestamp}{" "}{.metadata.name}{" ("}{.spec.nodeName}{")"}{"\n"}{end}' \
          2>/dev/null | \
        awk -v cutoff="$(date -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)" \
          '$1 < cutoff {$1=""; print}' | sed 's/^ //' || true
      register: stale_spark_pods
      failed_when: false
      changed_when: false
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Check imagePullPolicy on all Spark deployments
      shell: |
        kubectl --kubeconfig=/etc/kubernetes/admin.conf -n spark get deployments \
          -o jsonpath='{range .items[*]}{.metadata.name}{"\n  initContainers: "}{.spec.template.spec.initContainers[0].imagePullPolicy}{"\n  containers:      "}{.spec.template.spec.containers[0].imagePullPolicy}{"\n"}{end}' \
          2>/dev/null || echo "No deployments found"
      register: spark_pull_policies
      failed_when: false
      changed_when: false
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Derive local registry endpoint from observability inventory host
      set_fact:
        spark_registry_endpoint: "{{ (hostvars[groups['observability'][0]]['ansible_host'] | default(groups['observability'][0])) | lower }}:5000"
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Check local container registry reachability
      shell: curl -s --max-time 5 "http://{{ spark_registry_endpoint }}/v2/" && echo "REACHABLE" || echo "UNREACHABLE"
      register: registry_status
      failed_when: false
      changed_when: false
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: Report Spark workload health
      debug:
        msg: |
          Spark Workload Health
          ─────────────────────
          Pods:
          {{ spark_pods_list.stdout | default('N/A') }}

          imagePullPolicy per deployment (should be IfNotPresent for local registry):
          {{ spark_pull_policies.stdout | default('N/A') }}

          Local registry {{ spark_registry_endpoint | default('N/A') }}: {{ registry_status.stdout | default('N/A') }}
      when: inventory_hostname == groups['kubernetes_master'][0]

    - name: WARN - Spark pods older than 30 days with hostPath volumes
      debug:
        msg: |
          ⚠️  WARNING: {{ stale_spark_pods.stdout_lines | default([]) | length }} Spark pod(s) older than 30 days.
          hostPath volumes bind their directory at container start time. If an NFS mount was
          (re)activated after a pod started, the pod continues to see the pre-mount state.

          Stale pods:
          {% for pod in stale_spark_pods.stdout_lines | default([]) %}
          - {{ pod }}
          {% endfor %}

          Fix — delete stale pods so the ReplicaSet respawns them against the live mounts:
            kubectl delete pods -n spark -l app=spark-worker
      when:
        - inventory_hostname == groups['kubernetes_master'][0]
        - stale_spark_pods.stdout_lines | default([]) | length > 0

    - name: WARN - imagePullPolicy Always with unreachable local registry
      debug:
        msg: |
          ⚠️  WARNING: imagePullPolicy: Always is set on Spark deployments but the local
          registry {{ spark_registry_endpoint }} is UNREACHABLE. Any new or restarted pod will fail
          with ErrImagePull even though the image is already present on the node.

          Fix — patch all Spark deployments to IfNotPresent:
            kubectl -n spark get deployments -o name | xargs -I{} kubectl -n spark patch {} \
              --type=json -p='[
                {"op":"replace","path":"/spec/template/spec/initContainers/0/imagePullPolicy","value":"IfNotPresent"},
                {"op":"replace","path":"/spec/template/spec/containers/0/imagePullPolicy","value":"IfNotPresent"}
              ]'
      when:
        - inventory_hostname == groups['kubernetes_master'][0]
        - "'Always' in (spark_pull_policies.stdout | default(''))"
        - "'UNREACHABLE' in (registry_status.stdout | default(''))"
