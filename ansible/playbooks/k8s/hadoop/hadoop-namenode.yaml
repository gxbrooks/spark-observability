apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hdfs-namenode
  namespace: hdfs
spec:
  serviceName: hdfs-namenode-headless
  replicas: 1
  selector:
    matchLabels:
      app: hdfs-namenode
  template:
    metadata:
      labels:
        app: hdfs-namenode
    spec:
      # Lab cluster has no default StorageClass; use emptyDir like hdfs-datanode (ephemeral NN metadata).
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
      - name: namenode
        image: apache/hadoop:3.3.6
        command:
        - /bin/bash
        - -c
        - |
          # emptyDir always has the mount dir; format when FS metadata is absent (not merely missing dir)
          if [ ! -f /hadoop/dfs/name/current/VERSION ]; then
            hdfs namenode -format -nonInteractive -force
          fi
          hdfs namenode
        ports:
        - containerPort: 9000
        - containerPort: 9870
        env:
        - name: HADOOP_CONF_DIR
          value: /opt/hadoop/etc/hadoop
        - name: HDFS_NAMENODE_USER
          value: root
        - name: HDFS_DATANODE_USER
          value: root
        - name: HDFS_SECONDARYNAMENODE_USER
          value: root
        volumeMounts:
        - name: namenode-storage
          mountPath: /hadoop/dfs/name
        - name: hadoop-config
          mountPath: /opt/hadoop/etc/hadoop
      volumes:
      - name: hadoop-config
        configMap:
          name: hadoop-config
      - name: namenode-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hdfs-namenode
  namespace: hdfs
spec:
  type: NodePort
  selector:
    app: hdfs-namenode
  ports:
  - port: 9000
    targetPort: 9000
    nodePort: 30900
    name: rpc
  - port: 9870
    targetPort: 9870
    nodePort: 30970
    name: web
---
apiVersion: v1
kind: Service
metadata:
  name: hdfs-namenode-headless
  namespace: hdfs
spec:
  clusterIP: None
  selector:
    app: hdfs-namenode
  ports:
  - port: 9000
    targetPort: 9000
    name: rpc
---
apiVersion: v1
kind: Namespace
metadata:
  name: hdfs
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hadoop-config
  namespace: hdfs
data:
  core-site.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <configuration>
      <property>
        <name>fs.defaultFS</name>
        <value>hdfs://hdfs-namenode:9000</value>
      </property>
    </configuration>
  hdfs-site.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <configuration>
      <property>
        <name>dfs.namenode.name.dir</name>
        <value>/hadoop/dfs/name</value>
      </property>
      <property>
        <name>dfs.datanode.data.dir</name>
        <value>/hadoop/dfs/data</value>
      </property>
      <property>
        <name>dfs.replication</name>
        <value>1</value>
      </property>
      <property>
        <name>dfs.permissions.enabled</name>
        <value>false</value>
      </property>
      <property>
        <name>dfs.namenode.rpc-address</name>
        <value>hdfs-namenode.hdfs.svc.cluster.local:9000</value>
      </property>
      <property>
        <name>dfs.namenode.rpc-bind-host</name>
        <value>0.0.0.0</value>
      </property>
      <property>
        <name>dfs.namenode.http-address</name>
        <value>hdfs-namenode.hdfs.svc.cluster.local:9870</value>
      </property>
      <property>
        <name>dfs.namenode.http-bind-host</name>
        <value>0.0.0.0</value>
      </property>
    </configuration>
