---
# create_join_token.yml - Creates a Kubernetes join token for worker nodes
# Run this playbook when you need to add worker nodes to the cluster

- name: Create Kubernetes Join Token
  hosts: kubernetes_master
  become: true
  tasks:
    - name: Check if Kubernetes is initialized
      stat:
        path: /etc/kubernetes/admin.conf
      register: k8s_admin_conf

    - name: Fail if Kubernetes is not initialized
      fail:
        msg: "Kubernetes is not initialized. Please run install_k8s.yml first."
      when: not k8s_admin_conf.stat.exists

    - name: Wait for Kubernetes API server to become available
      shell: kubectl --kubeconfig=/etc/kubernetes/admin.conf get nodes
      register: api_status
      until: api_status.rc == 0
      retries: 12
      delay: 10
      ignore_errors: yes

    - name: Create join token
      shell: kubeadm token create --print-join-command
      register: join_command
      when: api_status.rc == 0

    - name: Display join command
      debug:
        msg: |
          
          ============================================
          JOIN COMMAND FOR WORKER NODES:
          {{ join_command.stdout }}
          
          Run this command on worker nodes to join the cluster.
          ============================================
      when: join_command is defined and join_command.stdout is defined
    
    - name: Display error if join token couldn't be created
      debug:
        msg: "Failed to create join token. Kubernetes API server may not be ready. Try again later."
      when: api_status.rc != 0 or (join_command is defined and join_command.rc != 0)
