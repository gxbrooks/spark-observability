---
- name: Deploy Kubernetes core prerequisites (deprecated; use setup_kubernetes + init_kubernetes_cluster)
  hosts: kubernetes_master
  become: false
  vars:
    kubeconfig: "/home/{{ ansible_user }}/.kube/config"
    k8s_config_dir: "/home/{{ ansible_user }}/kubernetes"
    project_root: "{{ playbook_dir | dirname | dirname | dirname }}"
  tasks:
    - name: Create Kubernetes config directory for ansible user
      become: true
      file:
        path: "{{ k8s_config_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    # Note: Spark namespace/RBAC are now handled in Spark deploy playbooks.
    # This playbook only ensures cluster-level networking on master.

    - name: Note deprecation
      debug:
        msg: "This playbook is deprecated. Use k8s/setup_kubernetes.yml and k8s/init_kubernetes_cluster.yml. No CNI is applied here to avoid conflicts (Flannel is used in init)."
