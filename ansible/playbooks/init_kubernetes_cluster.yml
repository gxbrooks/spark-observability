---
- name: Initialize Kubernetes cluster
  hosts: kubernetes_master  # We'll add this group to inventory
  become: true
  tasks:
    - name: Initialize Kubernetes cluster
      raw: kubeadm init --pod-network-cidr=10.244.0.0/16
      register: kubeadm_init
      
    - name: Create .kube directory for ansible user
      raw: mkdir -p /home/{{ ansible_user }}/.kube
      
    - name: Copy kube config for ansible user
      raw: |
        cp /etc/kubernetes/admin.conf /home/{{ ansible_user }}/.kube/config
        chown -R {{ ansible_user }}:{{ ansible_user }} /home/{{ ansible_user }}/.kube
        
    - name: Install Flannel CNI
      raw: kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
      become_user: "{{ ansible_user }}"
      
    - name: Get join command
      raw: kubeadm token create --print-join-command
      register: join_command
      
    - name: Store join command
      local_action: copy content="{{ join_command.stdout_lines[0] }}" dest="/tmp/kubernetes_join_command"
      
- name: Join Kubernetes cluster
  hosts: kubernetes_workers  # We'll add this group to inventory
  become: true
  tasks:
    - name: Copy join command from master
      raw: "{{ lookup('file', '/tmp/kubernetes_join_command') }}"
