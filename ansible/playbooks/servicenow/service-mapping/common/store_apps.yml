---
# Required ServiceNow Store applications and plugins for tag-based Service
# Mapping (CSDM + Service Mapping Workspace), in install order.
#
# Local to service-mapping/ (consumed only by install.yml). Pins are advisory;
# install.yml warns on drift but does not auto-upgrade on shared instances.

sn_store_apps:
  - name: CMDB CI Class Model
    scope: sn_cmdb_ci_class
    type: store_app
    version: 1.83.0
  - name: Discovery and Service Mapping Patterns
    scope: sn_itom_pattern
    type: store_app
    version: ""
  - name: Service Mapping (CSDM scoped app)
    scope: sn_service_mapping
    type: store_app
    version: 23.1.3
  - name: Service Mapping – Map
    scope: sn_itom_map_app
    type: store_app
    version: 1.0.0
  - name: Service Mapping (classic plugin)
    scope: com.snc.service-mapping
    type: plugin
    version: ""
