---
# Phase 2: Deploy ServiceNow KVA instance configuration (cluster location + inheritance BR).
# Usage: ansible-playbook -i inventory.yml playbooks/servicenow/discovery/k8s/deploy.yml -e @../vars/secrets.yaml
#
# Prerequisite: k8s/install.yml and KVA full discovery (cluster CI exists in CMDB).

- name: Deploy ServiceNow KVA location configuration
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../../../../vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir }}/../../../../../vars/secrets.yaml"
    - "{{ playbook_dir }}/../common/vars.yml"
  tasks:
    - name: Set location on Kubernetes cluster CIs from cluster-to-location map
      ansible.builtin.include_tasks: tasks/set_k8s_cluster_locations.yml

    - name: Ensure Kubernetes location inheritance business rule
      ansible.builtin.include_tasks: tasks/ensure_k8s_location_business_rule.yml

    - name: Persist K8s deploy context
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../../../../../vars/contexts/servicenow_k8s_discovery_deploy.json"
        mode: "0644"
        content: >-
          {{ {
            'kva_clusters': k8s_kva_clusters | map(attribute='name') | list,
            'location_business_rule': sn_k8s_location_br_name
          } | to_nice_json }}
      delegate_to: localhost
      become: false

    - name: Deploy summary
      ansible.builtin.debug:
        msg: |
          KVA instance configuration complete for {{ k8s_clusters | length }} cluster(s) in K8S_CLUSTERS.
          kva_informer-enabled: {{ k8s_kva_clusters | map(attribute='name') | list }}
          Business rule: {{ sn_k8s_location_br_name }}
          All brooks-lab CIs: {{ sn_cmdb_all_cis_url }}
