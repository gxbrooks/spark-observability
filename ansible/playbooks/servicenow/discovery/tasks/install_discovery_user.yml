---
- name: Ensure sn-discovery group exists
  ansible.builtin.group:
    name: "{{ sn_discovery_user }}"
    state: present
  become: true

- name: Ensure sn-discovery user exists
  ansible.builtin.user:
    name: "{{ sn_discovery_user }}"
    group: "{{ sn_discovery_user }}"
    groups: users
    shell: /bin/bash
    create_home: true
    home: "/home/{{ sn_discovery_user }}"
    state: present
  become: true

- name: Ensure .ssh directory for sn-discovery
  ansible.builtin.file:
    path: "/home/{{ sn_discovery_user }}/.ssh"
    state: directory
    owner: "{{ sn_discovery_user }}"
    group: "{{ sn_discovery_user }}"
    mode: "0700"
  become: true

- name: Install authorized_key for sn-discovery
  ansible.builtin.copy:
    dest: "/home/{{ sn_discovery_user }}/.ssh/authorized_keys"
    content: "{{ lookup('file', sn_discovery_ssh_public_key_path) }}\n"
    owner: "{{ sn_discovery_user }}"
    group: "{{ sn_discovery_user }}"
    mode: "0600"
  become: true

- name: Ensure sn-discovery account is unlocked for SSH key auth (passwordless service account)
  ansible.builtin.command: passwd -S {{ sn_discovery_user }}
  register: sn_discovery_passwd_check
  changed_when: false
  become: true

- name: Unlock sn-discovery when shadow password flag is locked
  ansible.builtin.command: usermod -p '*' {{ sn_discovery_user }}
  become: true
  when: sn_discovery_passwd_check.stdout is search('\\bL\\b')
  register: sn_discovery_unlock_result

- name: Reset faillock for sn-discovery after outage
  ansible.builtin.command: faillock --user {{ sn_discovery_user }} --reset
  become: true
  failed_when: false
  changed_when: false

- name: Deploy ServiceNow Discovery sudoers fragment
  ansible.builtin.copy:
    dest: /etc/sudoers.d/99-servicenow-discovery
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
    content: |
      # Managed by ansible playbooks/servicenow/discovery/install.yml
      # ServiceNow Linux SSH classification probes (lab scope).
      {{ sn_discovery_user }} ALL=(root) NOPASSWD: /usr/sbin/dmidecode, /usr/bin/dmidecode
      {{ sn_discovery_user }} ALL=(root) NOPASSWD: /usr/bin/lscpu, /bin/cat /sys/class/dmi/id/*
      {{ sn_discovery_user }} ALL=(root) NOPASSWD: /usr/bin/lsblk, /sbin/fdisk -l
      {{ sn_discovery_user }} ALL=(root) NOPASSWD: /usr/bin/ip, /sbin/ip
      {{ sn_discovery_user }} ALL=(root) NOPASSWD: /usr/bin/lsof, /usr/bin/ss, /sbin/ss, /bin/netstat, /usr/sbin/netstat, /bin/ps, /usr/bin/ps
  become: true
