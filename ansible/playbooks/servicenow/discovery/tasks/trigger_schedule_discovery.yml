---
# Fire-and-forget brooks-lab Discovery schedule run via Scripted REST (Discover Now).
# Sets sn_discover_triggered, sn_discover_status_number, sn_discover_latest_status when available.
# Caller must set sn_discovery_playbooks_dir (e.g. {{ sn_servicenow_playbooks_dir }}/discovery).

- name: Load deployed schedule sys_id from context file
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/../../../../vars/contexts/servicenow_discovery_deploy.json"
  register: sn_deploy_context_file
  failed_when: false

- name: Parse discovery deploy context
  ansible.builtin.set_fact:
    sn_schedule_sys_id: "{{ (sn_deploy_context_file.content | b64decode | from_json).schedule_sys_id | default('') }}"
    sn_discovery_rest_operation_uri: "{{ (sn_deploy_context_file.content | b64decode | from_json).discovery_rest_operation_uri | default('') }}"
  when: sn_deploy_context_file is succeeded

- name: Resolve Discover Now REST API when missing from deploy context
  ansible.builtin.include_tasks: "{{ sn_discovery_playbooks_dir }}/tasks/deploy_discovery_rest_api.yml"
  when: sn_discovery_rest_operation_uri | default('') | length == 0

- name: Look up schedule by name when context missing
  ansible.builtin.include_tasks: "{{ sn_discovery_playbooks_dir }}/common/sn_rest_get.yml"
  vars:
    sn_rest_table: discovery_schedule
    sn_rest_query: "sysparm_query=name={{ sn_discovery_schedule_name | urlencode }}&sysparm_limit=1"
  when: sn_schedule_sys_id | default('') | length == 0

- name: Set schedule sys_id from lookup
  ansible.builtin.set_fact:
    sn_schedule_sys_id: "{{ sn_rest_json.result[0].sys_id }}"
  when:
    - sn_schedule_sys_id | default('') | length == 0
    - sn_rest_json.result | default([]) | length > 0

- name: Fail when schedule is unknown
  ansible.builtin.fail:
    msg: "Discovery schedule not found. Run playbooks/servicenow/discovery/deploy.yml first."
  when: sn_schedule_sys_id | default('') | length == 0

- name: Snapshot latest discovery_status before trigger
  ansible.builtin.include_tasks: "{{ sn_discovery_playbooks_dir }}/common/sn_rest_get.yml"
  vars:
    sn_rest_table: discovery_status
    sn_rest_query: "sysparm_query=dscheduler={{ sn_schedule_sys_id }}^ORDERBYDESCsys_created_on&sysparm_fields=number,state,sys_created_on&sysparm_limit=1"

- name: Record discovery_status timestamp before trigger
  ansible.builtin.set_fact:
    sn_discover_status_before_ts: >-
      {{ (sn_rest_json.result | default([]) | first | default({})).sys_created_on | default('') }}

- name: Trigger Discovery schedule (Discover Now)
  ansible.builtin.uri:
    url: "{{ sn_url }}{{ sn_discovery_rest_operation_uri }}"
    method: POST
    user: "{{ sn_user }}"
    password: "{{ sn_password }}"
    force_basic_auth: true
    headers: "{{ sn_api_headers }}"
    body_format: json
    body:
      schedule_name: "{{ sn_discovery_schedule_name }}"
    status_code: [200, 202, 403, 404, 500]
    return_content: true
  register: sn_discover_rest
  no_log: true
  failed_when: false
  when: sn_discovery_rest_operation_uri | default('') | length > 0

- name: Fail when Discover Now REST API is not deployed
  ansible.builtin.fail:
    msg: >-
      discovery_rest_operation_uri is missing. Run playbooks/servicenow/discovery/deploy.yml.
  when: sn_discovery_rest_operation_uri | default('') | length == 0

- name: Record REST trigger metadata
  ansible.builtin.set_fact:
    sn_discover_status_number: "{{ sn_discover_rest.json.result.discovery_status_number | default('') }}"
    sn_discover_status_sys_id: "{{ sn_discover_rest.json.result.discovery_status_sys_id | default('') }}"
  when: sn_discover_rest.status | default(0) | int == 202

- name: Brief pause for discovery_status row creation
  ansible.builtin.pause:
    seconds: 5
  when: sn_discover_rest.status | default(0) | int == 202

- name: Check for new discovery_status after trigger
  ansible.builtin.include_tasks: "{{ sn_discovery_playbooks_dir }}/common/sn_rest_get.yml"
  vars:
    sn_rest_table: discovery_status
    sn_rest_query: "sysparm_query=dscheduler={{ sn_schedule_sys_id }}^ORDERBYDESCsys_created_on&sysparm_fields=number,state,sys_created_on,started,completed&sysparm_limit=1"

- name: Determine whether Discovery run started
  ansible.builtin.set_fact:
    sn_discover_triggered: >-
      {{ (sn_discover_rest.status | default(0) | int == 202)
         or ((sn_rest_json.result | default([]) | length > 0)
             and ((sn_rest_json.result | first).sys_created_on | default(''))
                 != (sn_discover_status_before_ts | default(''))) }}
    sn_discover_latest_status: "{{ sn_rest_json.result | default([]) | first | default({}) }}"

- name: Report Discovery schedule trigger
  ansible.builtin.debug:
    msg: >-
      Horizontal Discovery ({{ sn_discovery_schedule_name }}):
      {{ 'started — ' ~ (sn_discover_status_number | default(sn_discover_latest_status.number | default('')))
         if sn_discover_triggered | bool
         else 'NOT started — run discovery/discover.yml or UI Discover Now' }}
      HTTP {{ sn_discover_rest.status | default('skipped') }}
      Monitor: {{ sn_url }}/discovery_status_list.do?sysparm_query=dscheduler%3D{{ sn_schedule_sys_id }}
