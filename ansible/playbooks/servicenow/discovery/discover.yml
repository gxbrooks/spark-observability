---
# Trigger an on-demand ServiceNow Discovery scan for the brooks-lab schedule.
# Usage: ansible-playbook -i inventory.yml playbooks/servicenow/discovery/discover.yml -e @../vars/secrets.yaml

- name: Preflight brooks-lab Discovery targets
  hosts: k8s_nodes
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../../../vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir }}/common/vars.yml"
  tasks:
    - name: Run Discovery preflight on lab hosts
      ansible.builtin.include_tasks: tasks/preflight_discovery.yml

- name: Preflight ServiceNow Discovery configuration
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../../../vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir }}/../../../../vars/secrets.yaml"
    - "{{ playbook_dir }}/common/vars.yml"
  tasks:
    - name: Regenerate service-now context when stale
      ansible.builtin.include_tasks: common/regenerate_context.yml

    - name: Ensure MID Server is validated for Discovery
      ansible.builtin.include_tasks: tasks/validate_mid_server.yml

    - name: Verify brooks-lab schedule is active with MID and range
      ansible.builtin.uri:
        url: >-
          {{ sn_url }}/api/now/table/discovery_schedule?sysparm_query=name={{ sn_discovery_schedule_name | urlencode }}&sysparm_fields=name,active,mid_server,credential_aliases,location,sys_id&sysparm_limit=1
        method: GET
        user: "{{ sn_user }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        headers: "{{ sn_api_headers }}"
        return_content: true
      register: sn_discover_schedule_check
      no_log: true

    - name: Verify brooks-lab subnet range item exists
      ansible.builtin.uri:
        url: >-
          {{ sn_url }}/api/now/table/discovery_range_item?sysparm_query=parent.name={{ sn_discovery_range_name | urlencode }}&sysparm_fields=summary,active&sysparm_limit=5
        method: GET
        user: "{{ sn_user }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        headers: "{{ sn_api_headers }}"
        return_content: true
      register: sn_discover_range_check
      no_log: true

    - name: Fail when schedule is not ready
      ansible.builtin.assert:
        that:
          - sn_discover_schedule_check.json.result | default([]) | length > 0
          - sn_discover_schedule_check.json.result[0].active | default('') | string == 'true'
          - sn_discover_schedule_check.json.result[0].mid_server | default('') | length > 0
          - sn_discover_range_check.json.result | default([]) | length > 0
        fail_msg: |
          brooks-lab Discovery not ready. Run deploy.yml and ensure MID {{ sn_mid_server_name }} is Up.
          Schedule active={{ sn_discover_schedule_check.json.result[0].active | default('missing') if (sn_discover_schedule_check.json.result | default([]) | length > 0) else 'missing' }}
          Range items={{ sn_discover_range_check.json.result | default([]) | length }}

- name: Restart MID Server after validation
  hosts: observability
  become: true
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../../../vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir }}/common/vars.yml"
  tasks:
    - name: Restart MID when validation was just applied
      ansible.builtin.include_tasks: tasks/restart_mid_server.yml
      when: hostvars['localhost'].sn_mid_validation_changed | default(false)

- name: Run ServiceNow Discovery scan
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../../../vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir }}/../../../../vars/secrets.yaml"
    - "{{ playbook_dir }}/common/vars.yml"
  tasks:
    - name: Load deployed schedule sys_id
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/../../../../vars/contexts/servicenow_discovery_deploy.json"
      register: sn_deploy_context_file
      failed_when: false

    - name: Parse deploy context
      ansible.builtin.set_fact:
        sn_schedule_sys_id: "{{ (sn_deploy_context_file.content | b64decode | from_json).schedule_sys_id | default('') }}"
        sn_discovery_rest_operation_uri: "{{ (sn_deploy_context_file.content | b64decode | from_json).discovery_rest_operation_uri | default('') }}"
      when: sn_deploy_context_file is succeeded

    - name: Resolve Discover Now REST API when missing from deploy context
      ansible.builtin.include_tasks: tasks/deploy_discovery_rest_api.yml
      when: sn_discovery_rest_operation_uri | default('') | length == 0

    - name: Look up schedule by name when context missing
      ansible.builtin.include_tasks: common/sn_rest_get.yml
      vars:
        sn_rest_table: discovery_schedule
        sn_rest_query: "sysparm_query=name={{ sn_discovery_schedule_name | urlencode }}&sysparm_limit=1"
      when: sn_schedule_sys_id | default('') | length == 0

    - name: Set schedule sys_id from lookup
      ansible.builtin.set_fact:
        sn_schedule_sys_id: "{{ sn_rest_json.result[0].sys_id }}"
      when:
        - sn_schedule_sys_id | default('') | length == 0
        - sn_rest_json.result | default([]) | length > 0

    - name: Fail when schedule is unknown
      ansible.builtin.fail:
        msg: "Discovery schedule not found. Run deploy.yml after MID Server is validated in ServiceNow."
      when: sn_schedule_sys_id | default('') | length == 0

    - name: Snapshot latest brooks-lab discovery_status before trigger
      ansible.builtin.uri:
        url: >-
          {{ sn_url }}/api/now/table/discovery_status?sysparm_query=dscheduler={{
          sn_schedule_sys_id }}^ORDERBYDESCsys_created_on&sysparm_fields=number,state,sys_created_on&sysparm_limit=1
        method: GET
        user: "{{ sn_user }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        headers: "{{ sn_api_headers }}"
        return_content: true
      register: sn_status_before
      no_log: true

    - name: Record latest discovery_status timestamp before trigger
      ansible.builtin.set_fact:
        sn_discover_status_before_ts: >-
          {{ (sn_status_before.json.result | default([]) | first | default({})).sys_created_on | default('') }}

    - name: Trigger Discovery via Scripted REST API (Discover Now)
      ansible.builtin.uri:
        url: "{{ sn_url }}{{ sn_discovery_rest_operation_uri }}"
        method: POST
        user: "{{ sn_user }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        headers: "{{ sn_api_headers }}"
        body_format: json
        body:
          schedule_name: "{{ sn_discovery_schedule_name }}"
        status_code: [200, 202, 403, 404, 500]
        return_content: true
      register: sn_discover_rest
      no_log: true
      failed_when: false
      when: sn_discovery_rest_operation_uri | default('') | length > 0

    - name: Fail when Discover Now REST API is not deployed
      ansible.builtin.fail:
        msg: >-
          discovery_rest_operation_uri is missing. Run playbooks/servicenow/discovery/deploy.yml
          to create the Discovery Operations API Scripted REST endpoint.
      when: sn_discovery_rest_operation_uri | default('') | length == 0

    - name: Wait briefly for discovery_status row after REST trigger
      ansible.builtin.pause:
        seconds: 10
      when:
        - sn_discover_rest.status | default(0) | int == 202

    - name: Check for new brooks-lab discovery_status after trigger attempt
      ansible.builtin.uri:
        url: >-
          {{ sn_url }}/api/now/table/discovery_status?sysparm_query=dscheduler={{
          sn_schedule_sys_id }}^ORDERBYDESCsys_created_on&sysparm_fields=number,state,sys_created_on&sysparm_limit=1
        method: GET
        user: "{{ sn_user }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        headers: "{{ sn_api_headers }}"
        return_content: true
      register: sn_status_after
      no_log: true

    - name: Determine whether a new Discovery run actually started
      ansible.builtin.set_fact:
        sn_discover_triggered: >-
          {{ (sn_discover_rest.status | default(0) | int == 202)
             or ((sn_status_after.json.result | default([]) | length > 0)
                 and ((sn_status_after.json.result | first).sys_created_on | default(''))
                     != (sn_discover_status_before_ts | default(''))) }}

    - name: Discovery trigger result
      ansible.builtin.debug:
        msg: |
          Preflight passed (sn-discovery SSH on Lab1–Lab3, schedule active, range item present).

          Discover Now REST API for {{ sn_discovery_schedule_name }} ({{ sn_schedule_sys_id }}):
            POST {{ sn_discovery_rest_operation_uri }} HTTP {{ sn_discover_rest.status | default('skipped') }}
            {% if sn_discover_rest.status | default(0) | int == 202 %}
            discovery_status={{ sn_discover_rest.json.result.discovery_status_number | default('') }}
            {% elif sn_discover_rest.status | default(0) | int == 403 %}
            FORBIDDEN — grant discovery_admin (script executes discoverNow).
            {% elif sn_discover_rest.status | default(0) | int == 404 %}
            REST API missing — run discovery/deploy.yml.
            {% endif %}

          discovery_status before: {{ sn_discover_status_before_ts | default('none') }}
          discovery_status after:  {{ (sn_status_after.json.result | default([]) | first | default({})).sys_created_on | default('none') }}
          New run started: {{ sn_discover_triggered | bool }}

          {% if not sn_discover_triggered | bool %}
          WARNING: brooks-lab CI Discovery did not start.
          UI fallback: {{ sn_url }}/discovery_schedule.do?sys_id={{ sn_schedule_sys_id }}
          Monitor: {{ sn_url }}/discovery_status_list.do?sysparm_query=dscheduler%3D{{ sn_schedule_sys_id }}
          {% else %}
          Scan started — wait several minutes, then run discovery/test.yml and cmdb/diagnose.yml.
          {% endif %}

          CMDB (all CIs at brooks-lab): {{ sn_cmdb_all_cis_url }}
          CMDB (Linux servers at brooks-lab): {{ sn_cmdb_linux_servers_url }}
