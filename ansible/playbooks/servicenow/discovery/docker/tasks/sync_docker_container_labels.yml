---
# Sync Docker container labels into cmdb_key_value for tag-based Service Mapping.
# Input: sn_docker_host, sn_docker_containers, sn_docker_host_sys_id

- name: Sync cmdb_key_value labels for each Docker container
  ansible.builtin.include_tasks: sync_one_docker_container_labels.yml
  loop: "{{ sn_docker_containers | default([]) }}"
  loop_control:
    loop_var: sn_docker_container
    label: "{{ sn_docker_container.name }}"

- name: Docker label sync summary
  ansible.builtin.debug:
    msg: >-
      Processed {{ sn_docker_containers | default([]) | length }} container(s) on
      {{ sn_docker_host.name }} for cmdb_key_value label sync.
