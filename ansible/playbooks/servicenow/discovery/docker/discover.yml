---
# Phase 3: Sync Docker containers into CMDB for each container_discovery-enabled
# DOCKER_HOSTS entry.
# Usage: ansible-playbook -i inventory.yml playbooks/servicenow/discovery/docker/discover.yml -e @../vars/secrets.yaml

- name: Sync Docker containers for container_discovery-enabled DOCKER_HOSTS entries
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../../../../vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir }}/../../../../../vars/secrets.yaml"
    - "{{ playbook_dir }}/../common/vars.yml"
  tasks:
    - name: Sync containers for each container_discovery host
      ansible.builtin.include_tasks: tasks/sync_docker_host_containers.yml
      loop: "{{ docker_discovery_hosts }}"
      loop_control:
        loop_var: sn_docker_host
        label: "{{ sn_docker_host.name }}"
