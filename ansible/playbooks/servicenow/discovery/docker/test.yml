---
# Phase 3: Assert Lab3 observability Docker containers in CMDB with brooks-lab location.
# Usage: ansible-playbook -i inventory.yml playbooks/servicenow/discovery/docker/test.yml -e @../vars/secrets.yaml

- name: Test Docker discovery for primary host
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../../../../vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir }}/../../../../../vars/secrets.yaml"
    - "{{ playbook_dir }}/../common/vars.yml"
  tasks:
    - name: Resolve primary Docker host CMDB sys_id
      ansible.builtin.uri:
        url: >-
          {{ sn_url }}/api/now/table/cmdb_ci_linux_server?sysparm_query=name={{ docker_primary_host.cmdb_host_name | urlencode }}&sysparm_fields=sys_id,name&sysparm_limit=1
        method: GET
        user: "{{ sn_user }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        headers: "{{ sn_api_headers }}"
        return_content: true
      register: sn_docker_host_lookup
      no_log: true

    - name: Query Docker containers synced for primary host stack
      ansible.builtin.uri:
        url: >-
          {{ sn_url }}/api/now/table/cmdb_ci_docker_container?sysparm_query=host={{ sn_docker_host_lookup.json.result[0].sys_id | urlencode }}^short_descriptionSTARTSWITH{{ docker_primary_host_name | urlencode }}&sysparm_fields=name,location,location.name,image,short_description&sysparm_limit=50
        method: GET
        user: "{{ sn_user }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        headers: "{{ sn_api_headers }}"
        return_content: true
      register: sn_docker_containers_lookup
      no_log: true
      when: sn_docker_host_lookup.json.result | default([]) | length > 0

    - name: Collect Docker container location names
      ansible.builtin.set_fact:
        sn_docker_location_names: >-
          {{ sn_docker_location_names | default([]) + [item['location.name'] | default('')] }}
      loop: "{{ sn_docker_containers_lookup.json.result | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when: sn_docker_containers_lookup is defined

    - name: Docker discovery summary
      ansible.builtin.debug:
        msg: |
          Docker CMDB test ({{ docker_primary_host_name }})
          Host: {{ docker_primary_host.cmdb_host_name }}
          Containers: {{ sn_docker_containers_lookup.json.result | default([]) | length }}
          Names: {{ sn_docker_containers_lookup.json.result | default([]) | map(attribute='name') | list }}
          Locations: {{ sn_docker_location_names | default([]) | unique | list }}

    - name: Assert observability Docker containers discovered
      ansible.builtin.assert:
        that:
          - sn_docker_containers_lookup.json.result | default([]) | length >= 5
        fail_msg: >-
          Expected Docker containers on {{ docker_primary_host.cmdb_host_name }}.
          Run docker/discover.yml after docker/deploy.yml.

    - name: Assert Docker containers have brooks-lab location
      ansible.builtin.assert:
        that:
          - >-
            (sn_docker_location_names | default([]) | select('equalto', docker_primary_host.location) | list | length)
            >= 5
        fail_msg: >-
          Docker containers missing location {{ docker_primary_host.location }}.
          Ensure docker/deploy.yml business rule is active and re-run discover.yml.
