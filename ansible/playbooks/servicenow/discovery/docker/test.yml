---
# Phase 3: Assert Docker containers in CMDB for each container_discovery-enabled
# DOCKER_HOSTS entry, with the entry's location applied.
# Usage: ansible-playbook -i inventory.yml playbooks/servicenow/discovery/docker/test.yml -e @../vars/secrets.yaml

- name: Test Docker discovery for container_discovery-enabled hosts
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../../../../vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir }}/../../../../../vars/secrets.yaml"
    - "{{ playbook_dir }}/../common/vars.yml"
  tasks:
    - name: Assert CMDB content for each container_discovery host
      ansible.builtin.include_tasks: tasks/test_docker_host_cmdb.yml
      loop: "{{ docker_discovery_hosts }}"
      loop_control:
        loop_var: sn_docker_host
        label: "{{ sn_docker_host.name }}"
