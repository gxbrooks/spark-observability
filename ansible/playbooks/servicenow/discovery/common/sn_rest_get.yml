---
# GET from ServiceNow Table API. Sets sn_rest_status, sn_rest_json, sn_rest_error.
- name: ServiceNow REST GET {{ sn_rest_table }}
  ansible.builtin.uri:
    url: "{{ sn_url }}/api/now/table/{{ sn_rest_table }}?{{ sn_rest_query | default('sysparm_limit=1') }}"
    method: GET
    user: "{{ sn_user }}"
    password: "{{ sn_password }}"
    force_basic_auth: true
    headers: "{{ sn_api_headers }}"
    status_code: [200, 403, 404]
    return_content: true
  register: sn_rest_get_result
  no_log: true
  delegate_to: localhost
  become: false

- name: Record GET response
  ansible.builtin.set_fact:
    sn_rest_status: "{{ sn_rest_get_result.status }}"
    sn_rest_json: "{{ sn_rest_get_result.json | default({}) }}"
    sn_rest_error: "{{ sn_rest_get_result.json.error.detail | default(sn_rest_get_result.json.error.message | default('')) if sn_rest_get_result.status != 200 else '' }}"
