---
# Shared ServiceNow Discovery variables (included by playbooks).
# Non-secret defaults: vars/contexts/servicenow_ansible_vars.yml (service-now context).
# Secrets: vars/secrets.yaml → servicenow: block.
sn_url: "{{ SN_URL | trim }}"
sn_user: "{{ servicenow.SN_USER | default(SN_USER) }}"
sn_password: "{{ servicenow.SN_PASSWORD | default(SN_PASSWORD) }}"
sn_mid_user: "{{ servicenow.SN_MID_USER | default(SN_MID_USER | default('')) }}"
sn_mid_password: "{{ servicenow.SN_MID_PASSWORD | default(SN_MID_PASSWORD | default('')) }}"

sn_lab_location_name: "{{ SN_LAB_LOCATION_NAME | default('brooks-lab') }}"
sn_lab_location_full_name: "{{ SN_LAB_LOCATION_FULL_NAME | default('Brooks Lab') }}"
sn_discovery_subnet: "{{ SN_DISCOVERY_SUBNET | default('192.168.1.0/24') }}"
sn_discovery_user: "{{ SN_DISCOVERY_USER | default('sn-discovery') }}"
sn_discovery_schedule_name: "{{ SN_DISCOVERY_SCHEDULE_NAME | default('Brooks Lab CI Discovery') }}"
sn_discovery_credential_name: brooks-lab-ssh
sn_discovery_range_name: brooks-lab-subnet
sn_mid_server_name: "{{ SN_MID_SERVER_NAME | default('mid-brooks-lab3') }}"
# Linux systemd service name (alphanumeric + underscore only; not the ecc_agent display name)
sn_mid_service_name: "{{ sn_mid_server_name | replace('-', '_') }}"
sn_mid_run_as_user: servicenow-mid
sn_mid_install_dir: "{{ SN_MID_INSTALL_DIR | default('/opt/servicenow/mid-brooks-lab3') }}"
sn_mid_installer_deb_url: "{{ SN_MID_INSTALLER_DEB_URL | default('') }}"

sn_discovery_ssh_private_key_path: "{{ playbook_dir }}/../../../../vars/sn_discovery_id_ed25519"
sn_discovery_ssh_public_key_path: "{{ playbook_dir }}/../../../../vars/sn_discovery_id_ed25519.pub"

# Scripted REST API — Discovery operations (deploy_discovery_rest_api.yml)
sn_discovery_rest_api_name: Discovery Operations API
sn_discovery_rest_api_legacy_names:
  - Brooks Lab Discovery Trigger
sn_discovery_rest_schedule_path: /schedule/run
sn_discovery_rest_quick_path: /quick/run
sn_discovery_rest_operations:
  - name: Run discovery schedule
    relative_path: /schedule/run
    script_file: discovery_run_schedule.js
  - name: Run discovery schedule (legacy path)
    relative_path: /run
    script_file: discovery_run_schedule.js
  - name: Quick discovery
    relative_path: /quick/run
    script_file: discovery_run_quick.js

sn_api_headers:
  Accept: application/json
  Content-Type: application/json

# Kubernetes cluster registry (K8S_CLUSTERS in vars/variables.yaml).
# Capability flags per entry (absent = false):
#   kva_informer: true — KVA informer installed by this repo; CMDB content validated
# Entries with a location are location-mapped in the CMDB regardless of flags.
k8s_clusters: "{{ K8S_CLUSTERS }}"
k8s_kva_clusters: "{{ K8S_CLUSTERS | selectattr('kva_informer', 'defined') | selectattr('kva_informer') | list }}"

# Host-side kubectl/helm tasks run on kubernetes_master, whose kubeconfig
# controls exactly one cluster — the kva_informer-enabled entry for that host.
# (Managing additional KVA clusters requires additional inventory hosts.)
sn_k8s_kva_cluster: "{{ k8s_kva_clusters | first }}"
sn_k8s_cluster_name: "{{ sn_k8s_kva_cluster.name }}"
sn_k8s_location_name: "{{ sn_k8s_kva_cluster.location }}"
sn_k8s_informer_namespace: "{{ sn_k8s_kva_cluster.kva_namespace }}"
sn_k8s_informer_helm_release: "k8s-informer-{{ sn_k8s_kva_cluster.name | replace('_', '-') }}"

# CMDB list views filtered to brooks-lab location (all CI classes vs Linux servers only)
sn_cmdb_location_query: "location.name={{ sn_lab_location_name }}"
sn_cmdb_all_cis_url: >-
  {{ sn_url }}/cmdb_ci_list.do?sysparm_query={{ ('location.name=' ~ sn_lab_location_name) | urlencode }}
sn_cmdb_linux_servers_url: >-
  {{ sn_url }}/cmdb_ci_linux_server_list.do?sysparm_query={{ ('location.name=' ~ sn_lab_location_name) | urlencode }}
sn_cmdb_kubernetes_url: >-
  {{ sn_url }}/cmdb_ci_list.do?sysparm_query={{ ('sys_class_nameSTARTSWITHcmdb_ci_kubernetes^cluster.name=' ~ sn_k8s_cluster_name) | urlencode }}

# Phase 2 — Kubernetes discovery (KVA Informer; cluster registry in vars/variables.yaml)
sn_k8s_informer_helm_repo: "{{ K8S_KVA_HELM_REPO | default('https://install.service-now.com/glide/distribution/builds/package/informer/informer-helm/repo') }}"
sn_k8s_cluster_location_map: "{{ K8S_CLUSTERS }}"
sn_k8s_location_br_name: k8s-inherit-location-from-cluster
sn_instance_short_name: "{{ SN_INSTANCE_SHORT_NAME | default('optimizincdemo1') }}"
sn_k8s_informer_secret_name: "k8s-informer-cred-{{ sn_instance_short_name }}"

# Phase 3 — Docker discovery.
# Capability flags per entry (absent = false):
#   discovery_docker_pattern: true — sn-discovery docker group on host (horizontal Docker Pattern)
#   container_discovery: true — containers synced into cmdb_ci_docker_container and validated
docker_hosts: "{{ DOCKER_HOSTS }}"
docker_pattern_discovery_hosts: >-
  {{ DOCKER_HOSTS
     | selectattr('discovery_docker_pattern', 'defined')
     | selectattr('discovery_docker_pattern')
     | list }}
docker_discovery_hosts: "{{ DOCKER_HOSTS | selectattr('container_discovery', 'defined') | selectattr('container_discovery') | list }}"
sn_docker_location_br_name: docker-inherit-location-from-host
sn_k8s_discovery_namespaces:
  - default
  - kube-system
  - monitoring
  - spark
  - dynatrace
  - hdfs
