---
# Assert brooks-lab Linux servers appear in CMDB after Discovery.
# Usage: ansible-playbook -i inventory.yml playbooks/servicenow/discovery/test.yml -e @../vars/secrets.yaml

- name: Test CMDB for brooks-lab discovered hosts
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../../../vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir }}/../../../../vars/secrets.yaml"
    - "{{ playbook_dir }}/common/vars.yml"
  vars:
    sn_expected_hosts:
      - Lab1.lan
      - Lab2.lan
      - Lab3.lan
  tasks:
    - name: Query CMDB Linux servers at brooks-lab location
      ansible.builtin.uri:
        url: >-
          {{ sn_url }}/api/now/table/cmdb_ci_linux_server?sysparm_query=location.name={{ sn_lab_location_name | urlencode }}^ORnameIN{{ sn_expected_hosts | join(',') | urlencode }}&sysparm_fields=name,host_name,location,discovery_source,sys_class_name&sysparm_limit=20
        method: GET
        user: "{{ sn_user }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        headers: "{{ sn_api_headers }}"
        return_content: true
        status_code: [200, 403]
      register: sn_cmdb_hosts
      no_log: true

    - name: Fail when CMDB query forbidden
      ansible.builtin.fail:
        msg: "Cannot read cmdb_ci_linux_server — grant cmdb_read or cmdb_query_builder to {{ sn_user }}."
      when: sn_cmdb_hosts.status != 200

    - name: List discovered records
      ansible.builtin.debug:
        msg: |
          Linux servers: {{ sn_cmdb_hosts.json.result | map(attribute='name') | list }}
          All CIs at {{ sn_lab_location_name }}: {{ sn_cmdb_all_cis_url }}
          Linux only: {{ sn_cmdb_linux_servers_url }}

    - name: Assert expected lab hostnames are present
      ansible.builtin.assert:
        that:
          - (sn_cmdb_hosts.json.result | map(attribute='name') | list | select('match', item) | list | length > 0) or
            (sn_cmdb_hosts.json.result | map(attribute='host_name') | list | select('match', item) | list | length > 0)
        fail_msg: "CMDB missing discovered host {{ item }}. Run discover.yml and wait for scan completion."
      loop: "{{ sn_expected_hosts }}"
