---
# Build servicenow.io label map from explicit application service specification fields.
# Input: sn_as_spec, sn_as_host (optional, for expand placeholders)
# Output: sn_as_identifier, sn_servicenow_workload_labels

- name: Resolve application service identifier
  ansible.builtin.set_fact:
    sn_as_identifier: >-
      {{ sn_as_spec.identifier
         | replace('{host}', sn_as_host | default(''))
         | replace('{host_lower}', (sn_as_host | default('')) | lower) }}

- name: Build servicenow.io workload labels from explicit specification
  ansible.builtin.set_fact:
    sn_servicenow_workload_labels:
      servicenow.io/application-service-identifier: "{{ sn_as_identifier }}"
      servicenow.io/environment: "{{ sn_as_spec.environment }}"
      servicenow.io/location: "{{ sn_as_spec.location }}"
