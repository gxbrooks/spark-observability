---
# ServiceNow install — Discovery host/MID prerequisites + SGC Store apps/plugins.
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/servicenow/install.yml -e @../vars/secrets.yaml

- name: ServiceNow install banner
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [always, servicenow]
  tasks:
    - name: Display ServiceNow install information
      ansible.builtin.debug:
        msg: |
          ServiceNow install: discovery/install.yml → sgc/install.yml

- import_playbook: discovery/install.yml
  tags: [servicenow]

- import_playbook: sgc/install.yml
  tags: [servicenow]
