---
# ServiceNow ↔ Dynatrace compare (see servicenow/docs/DT_SN_Comparison_Process.md).

sn_url: "{{ SN_URL | trim }}"
sn_user: "{{ servicenow.SN_USER | default(SN_USER) }}"
sn_password: "{{ servicenow.SN_PASSWORD | default(SN_PASSWORD) }}"

sn_api_headers:
  Accept: application/json
  Content-Type: application/json

sn_servicenow_playbooks_dir: "{{ playbook_dir | dirname }}"
sn_compare_dir: "{{ playbook_dir }}"
sn_discovery_common_dir: "{{ sn_servicenow_playbooks_dir }}/discovery/common"
sn_csdm_dir: "{{ sn_servicenow_playbooks_dir }}/csdm"
sn_playbooks_root: "{{ sn_servicenow_playbooks_dir | dirname }}"

# Default: export full ServiceNow and Dynatrace models (scope mode "all" on each side).
# Optional scope filters — set independently per platform:
#   sn_compare_filter_by_cmdb_location=true   → ServiceNow: Linux servers at scope unit cmdb_location
#   sn_compare_filter_by_dynatrace_mz=true    → Dynatrace: entities in scope unit management zone(s)
# Future scope dimensions may add additional flags; see DT_SN_Comparison_Process.md.
sn_compare_filter_by_cmdb_location: false
sn_compare_filter_by_dynatrace_mz: false
sn_compare_dt_page_size: 500
sn_compare_dt_max_pages: 20

# Optional override: -e sn_compare_scope_units='[...]' skips region discovery
sn_compare_scope_units: []

sn_compare_identifier_tag_key: servicenow.io/application-service-identifier
sn_compare_dt_entity_types:
  - HOST
  - PROCESS_GROUP
  - SERVICE
  - KUBERNETES_CLUSTER
  - KUBERNETES_NODE

sn_compare_data: {}
sn_compare_comparisons: []
sn_compare_export_filename: DT_SN_Model_Comparison.json
sn_compare_report_filename: DT_SN_Model_Comparison_Report.json
