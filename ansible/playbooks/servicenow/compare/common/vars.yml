---
# ServiceNow ↔ Dynatrace model comparison (compare.yml).

sn_url: "{{ SN_URL | trim }}"
sn_user: "{{ servicenow.SN_USER | default(SN_USER) }}"
sn_password: "{{ servicenow.SN_PASSWORD | default(SN_PASSWORD) }}"

sn_api_headers:
  Accept: application/json
  Content-Type: application/json

sn_servicenow_playbooks_dir: "{{ playbook_dir | dirname }}"
sn_compare_dir: "{{ playbook_dir }}"
sn_discovery_common_dir: "{{ sn_servicenow_playbooks_dir }}/discovery/common"
sn_csdm_dir: "{{ sn_servicenow_playbooks_dir }}/csdm"
sn_playbooks_root: "{{ sn_servicenow_playbooks_dir | dirname }}"
sn_repo_root: "{{ sn_servicenow_playbooks_dir | dirname | dirname | dirname }}"

# sn_compare_run_id and sn_compare_output_dir are set at runtime in compare/run.yml

# Default: export full ServiceNow and Dynatrace inventories; capture location/MZ as attributes.
# Enable optional repair scope with -e sn_compare_filter_by_cmdb_location=true and/or
# -e sn_compare_filter_by_dynatrace_mz=true (uses correlation hints on the scope unit).
sn_compare_filter_by_cmdb_location: false
sn_compare_filter_by_dynatrace_mz: false
sn_compare_dt_page_size: 500
sn_compare_dt_max_pages: 20

# Scope correlation registry — correlation hints for diffs and optional filters
# (see docs/DT_CN_Comparison_Process.md). Override with -e sn_compare_scope_units='[...]'
# or filter with sn_compare_scope_unit_id.
sn_compare_scope_units:
  - scope_unit_id: "{{ SN_LAB_LOCATION_NAME }}-onprem"
    cmdb_location: "{{ SN_LAB_LOCATION_NAME }}"
    cmdb_environment: on-prem
    dynatrace_management_zones:
      - "{{ DT_MANAGEMENT_ZONE }}"
    kubernetes_clusters:
      - servicenow_name: brooks-lab
        dynatrace_name: spark-observability-k8s
    dynatrace_correlation_file: dynatrace-correlation.yaml
    csdm_spec_files:
      - observability/servicenow/csdm.yaml
      - observability/dynatrace/servicenow/csdm.yaml
      - elastic-agent/servicenow/csdm.yaml
      - spark/servicenow/csdm.yaml

sn_compare_identifier_tag_key: servicenow.io/application-service-identifier
sn_compare_dt_entity_types:
  - HOST
  - PROCESS_GROUP
  - SERVICE
  - KUBERNETES_CLUSTER
  - KUBERNETES_NODE

sn_compare_data: {}
