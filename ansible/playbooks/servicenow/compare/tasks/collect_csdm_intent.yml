---
# Load CSDM specifications for scope unit into sn_compare_unit_result.specified

- name: Initialize specified-model accumulator
  ansible.builtin.set_fact:
    sn_compare_intent_bas: []
    sn_compare_intent_bss: []
    sn_compare_intent_app_services: []

- name: Resolve CSDM specification paths for scope unit
  ansible.builtin.set_fact:
    sn_compare_spec_paths: >-
      {{ sn_compare_scope_unit.csdm_spec_paths | default(
           sn_compare_scope_unit.csdm_spec_files | default([]) | map('regex_replace', '^',
             sn_regions_dir ~ '/' ~ sn_compare_scope_unit.region_id ~ '/') | list
         ) }}

- name: Load each CSDM specification into specified lists
  ansible.builtin.include_tasks: load_one_csdm_spec_intent.yml
  loop: "{{ sn_compare_spec_paths | default([]) }}"
  loop_control:
    loop_var: sn_compare_spec_path
    label: "{{ sn_compare_spec_path | basename }}"

- name: Store CSDM specification on scope unit result
  ansible.builtin.set_fact:
    sn_compare_unit_result: >-
      {{ sn_compare_unit_result | combine({
           'specified': {
             'business_applications': sn_compare_intent_bas,
             'business_services': sn_compare_intent_bss,
             'application_services': sn_compare_intent_app_services,
             'spec_files': sn_compare_scope_unit.csdm_spec_files | default([]),
             'spec_paths': sn_compare_spec_paths | default([])
           },
           'intent': {
             'business_applications': sn_compare_intent_bas,
             'business_services': sn_compare_intent_bss,
             'application_services': sn_compare_intent_app_services,
             'spec_files': sn_compare_scope_unit.csdm_spec_files | default([])
           }
         }, recursive=True) }}
