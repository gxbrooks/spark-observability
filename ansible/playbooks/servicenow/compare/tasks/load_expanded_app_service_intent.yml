---
# Expand one application service per inventory host into intent list.
# Input: sn_compare_app_entry, sn_compare_loaded_spec, sn_compare_spec_path

- name: Append expanded application service instance
  ansible.builtin.set_fact:
    sn_compare_intent_app_services: >-
      {{ sn_compare_intent_app_services + [{
           'name': sn_compare_app_entry.name
             | replace('{host}', expand_host)
             | replace('{host_lower}', expand_host | lower),
           'identifier': sn_compare_app_entry.identifier
             | replace('{host}', expand_host)
             | replace('{host_lower}', expand_host | lower),
           'parent_business_service': sn_compare_app_entry.parent_business_service | default(''),
           'platform': sn_compare_app_entry.platform | default(''),
           'service_mapping': sn_compare_app_entry.service_mapping | default(''),
           'csdm_op': sn_compare_app_entry.csdm_op | default('insert'),
           'spec_file': sn_compare_spec_path | basename,
           'environment': sn_compare_app_entry.environment | default(''),
           'location': sn_compare_app_entry.location | default(''),
           'owned_by': sn_compare_app_entry.owned_by | default(''),
           'busines_criticality': sn_compare_app_entry.busines_criticality | default(''),
           'expand': true,
           'host': expand_host
         }] }}
  loop: "{{ groups[sn_compare_app_entry.expand.inventory_group] | default([]) }}"
  loop_control:
    loop_var: expand_host
    label: "{{ expand_host }}"
  when: sn_compare_app_entry.expand.inventory_group is defined
