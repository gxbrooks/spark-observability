---
# Export all application service CIs from CMDB (full inventory for compare workbook).

- name: Query all ServiceNow application services
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_get.yml"
  vars:
    sn_rest_table: cmdb_ci_service_discovered
    sn_rest_query: "sysparm_fields=name,sys_id,operational_status,process_status,service_status&sysparm_limit=2000"

- name: Store full CMDB application service inventory
  ansible.builtin.set_fact:
    sn_compare_unit_result: >-
      {{ sn_compare_unit_result | combine({
           'servicenow': sn_compare_unit_result.servicenow | default({}) | combine({
             'application_services_cmdb': sn_rest_json.result | default([])
           }, recursive=True)
         }, recursive=True) }}
