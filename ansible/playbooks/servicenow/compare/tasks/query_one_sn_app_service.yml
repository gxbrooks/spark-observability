---
# Look up one application service CI by intent name.
# Input: sn_compare_intent_app

- name: Query application service CI by name
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_get.yml"
  vars:
    sn_rest_table: cmdb_ci_service_discovered
    sn_rest_query: "sysparm_query=name={{ sn_compare_intent_app.name | urlencode }}&sysparm_fields=sys_id,name,operational_status,process_status,service_status&sysparm_limit=1"

- name: Record application service lookup row
  ansible.builtin.set_fact:
    sn_compare_sn_app_services: >-
      {{ sn_compare_sn_app_services + [{
           'intent_name': sn_compare_intent_app.name,
           'intent_identifier': sn_compare_intent_app.identifier | default(''),
           'intent_platform': sn_compare_intent_app.platform | default(''),
           'intent_service_mapping': sn_compare_intent_app.service_mapping | default(''),
           'spec_file': sn_compare_intent_app.spec_file | default(''),
           'present_in_cmdb': (sn_rest_json.result | default([]) | length) > 0,
           'sys_id': (sn_rest_json.result[0].sys_id if (sn_rest_json.result | default([]) | length) > 0 else ''),
           'process_status': (sn_rest_json.result[0].process_status | default('') if (sn_rest_json.result | default([]) | length) > 0 else ''),
           'service_status': (sn_rest_json.result[0].service_status | default('') if (sn_rest_json.result | default([]) | length) > 0 else '')
         }] }}
