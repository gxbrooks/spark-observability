---
# Parse one csdm.yaml into intent lists. Input: sn_compare_spec_path

- name: Load CSDM specification file
  ansible.builtin.set_fact:
    sn_compare_loaded_spec: "{{ lookup('template', sn_compare_spec_path) | from_yaml }}"

- name: Append business applications from specification
  ansible.builtin.set_fact:
    sn_compare_intent_bas: >-
      {{ sn_compare_intent_bas + [{
           'name': item.name,
           'identifier': item.identifier | default(''),
           'csdm_op': item.csdm_op | default(sn_compare_loaded_spec.csdm_defaults.csdm_op | default('insert')),
           'spec_file': sn_compare_spec_path | basename
         }] }}
  loop: "{{ sn_compare_loaded_spec.business_applications | default([]) }}"
  when: item.csdm_op | default(sn_compare_loaded_spec.csdm_defaults.csdm_op | default('insert')) != 'delete'

- name: Append business services from specification
  ansible.builtin.set_fact:
    sn_compare_intent_bss: >-
      {{ sn_compare_intent_bss + [{
           'name': item.name,
           'identifier': item.identifier | default(''),
           'parent_business_application': item.parent_business_application | default(''),
           'platform': '',
           'csdm_op': item.csdm_op | default(sn_compare_loaded_spec.csdm_defaults.csdm_op | default('insert')),
           'spec_file': sn_compare_spec_path | basename
         }] }}
  loop: "{{ sn_compare_loaded_spec.business_services | default([]) }}"
  when: item.csdm_op | default(sn_compare_loaded_spec.csdm_defaults.csdm_op | default('insert')) != 'delete'

- name: Append static application services from specification
  ansible.builtin.set_fact:
    sn_compare_intent_app_services: >-
      {{ sn_compare_intent_app_services + [{
           'name': item.name,
           'identifier': item.identifier | default(''),
           'parent_business_service': item.parent_business_service | default(''),
           'platform': item.platform | default(''),
           'service_mapping': item.service_mapping | default(''),
           'csdm_op': item.csdm_op | default(sn_compare_loaded_spec.csdm_defaults.csdm_op | default('insert')),
           'spec_file': sn_compare_spec_path | basename,
           'expand': false
         }] }}
  loop: "{{ sn_compare_loaded_spec.application_services | default([]) | rejectattr('expand', 'defined') | list }}"
  when: item.csdm_op | default(sn_compare_loaded_spec.csdm_defaults.csdm_op | default('insert')) != 'delete'

- name: Append expanded application service instances from specification
  ansible.builtin.include_tasks: load_expanded_app_service_intent.yml
  loop: "{{ sn_compare_loaded_spec.application_services | default([]) | selectattr('expand', 'defined') | list }}"
  loop_control:
    loop_var: sn_compare_app_entry
    label: "{{ sn_compare_app_entry.name | default('') }}"
  when: sn_compare_app_entry.csdm_op | default(sn_compare_loaded_spec.csdm_defaults.csdm_op | default('insert')) != 'delete'
