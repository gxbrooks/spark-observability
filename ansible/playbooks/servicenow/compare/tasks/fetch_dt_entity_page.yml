---
# Fetch one page of Dynatrace entities. Updates sn_compare_dt_type_entities and sn_compare_dt_next_page_key.
# Input: sn_compare_entity_type, sn_compare_entity_selector (optional override)

- name: Build Dynatrace entity selector
  ansible.builtin.set_fact:
    sn_compare_entity_selector_effective: >-
      {{ sn_compare_entity_selector
         if sn_compare_entity_selector | default('') | length > 0
         else (
           'type(' ~ sn_compare_entity_type ~ '),mzId(' ~ sn_compare_mz_id ~ ')'
           if sn_compare_filter_by_dynatrace_mz | default(false) | bool
              and sn_compare_mz_id | default('') | length > 0
           else 'type(' ~ sn_compare_entity_type ~ ')'
         ) }}

- name: Query Dynatrace entities page
  ansible.builtin.uri:
    url: >-
      {{ dt_api_url_resolved }}/v2/entities?entitySelector={{ sn_compare_entity_selector_effective | urlencode }}&pageSize={{ sn_compare_dt_page_size | default(500) }}&fields=+managementZones{% if sn_compare_dt_next_page_key | default('') | length > 0 %}&nextPageKey={{ sn_compare_dt_next_page_key | urlencode }}{% endif %}
    method: GET
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
    status_code: [200]
    return_content: true
  register: sn_compare_dt_entity_response

- name: Normalize entity page rows
  ansible.builtin.set_fact:
    sn_compare_dt_type_entities: >-
      {{ sn_compare_dt_type_entities | default([]) + [{
           'displayName': ent.displayName | default(''),
           'entityId': ent.entityId | default(''),
           'type': sn_compare_entity_type,
           'managementZones': ent.managementZones | default([]) | map(attribute='name') | list
         }] }}
  loop: "{{ sn_compare_dt_entity_response.json.entities | default([]) }}"
  loop_control:
    loop_var: ent
    label: "{{ ent.displayName | default(ent.entityId) }}"

- name: Record next Dynatrace entity page key
  ansible.builtin.set_fact:
    sn_compare_dt_next_page_key: "{{ sn_compare_dt_entity_response.json.nextPageKey | default('') }}"
