---
# Query CMDB Linux servers. Default: all servers; optional location filter via sn_compare_filter_by_cmdb_location.

- name: Query all ServiceNow Linux servers
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_get.yml"
  vars:
    sn_rest_table: cmdb_ci_linux_server
    sn_rest_query: "sysparm_fields=name,host_name,discovery_source,sys_id,operational_status,location&sysparm_display_value=all&sysparm_limit=2000"
  when: not sn_compare_filter_by_cmdb_location | default(false) | bool

- name: Query ServiceNow Linux servers at scope location
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_get.yml"
  vars:
    sn_rest_table: cmdb_ci_linux_server
    sn_rest_query: "sysparm_query=location.name={{ sn_compare_scope_unit.cmdb_location | urlencode }}&sysparm_fields=name,host_name,discovery_source,sys_id,operational_status,location&sysparm_display_value=all&sysparm_limit=500"
  when: sn_compare_filter_by_cmdb_location | default(false) | bool

- name: Store ServiceNow hosts on scope unit result
  ansible.builtin.set_fact:
    sn_compare_unit_result: >-
      {{ sn_compare_unit_result | combine({
           'servicenow': sn_compare_unit_result.servicenow | default({}) | combine({
             'hosts': sn_rest_json.result | default([]),
             'hosts_scope_mode': 'location_filtered'
               if sn_compare_filter_by_cmdb_location | default(false) | bool
               else 'full_cmdb'
           }, recursive=True)
         }, recursive=True) }}
