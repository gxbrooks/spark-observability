---
# Query cmdb_key_value rows for canonical and common alternate tag keys.

- name: Query canonical application-service-identifier tag bindings
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_get.yml"
  vars:
    sn_rest_table: cmdb_key_value
    sn_rest_query: "sysparm_query=key={{ sn_compare_identifier_tag_key | urlencode }}&sysparm_fields=sys_id,key,value,cmdb_ci,configuration_item&sysparm_limit=500"

- name: Record canonical tag binding query status
  ansible.builtin.set_fact:
    sn_compare_canonical_tag_bindings: "{{ sn_rest_json.result | default([]) }}"
    sn_compare_canonical_tag_query_status: "{{ sn_rest_status | default(0) }}"

- name: Warn when canonical tag binding query is denied
  ansible.builtin.debug:
    msg: >-
      WARNING: cmdb_key_value query for {{ sn_compare_identifier_tag_key }} returned HTTP
      {{ sn_compare_canonical_tag_query_status }}. Tag-based diff may show false
      missing_tag_binding results until table ACLs allow read (see docs/install.md §6.3).
  when: sn_compare_canonical_tag_query_status | int != 200

- name: Query alternate tag keys used by KVA and legacy workloads
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_get.yml"
  vars:
    sn_rest_table: cmdb_key_value
    sn_rest_query: "sysparm_query=key=app.kubernetes.io/name^ORkey=app&sysparm_fields=sys_id,key,value,cmdb_ci,configuration_item&sysparm_limit=500"

- name: Record alternate tag binding query status
  ansible.builtin.set_fact:
    sn_compare_alternate_tag_bindings: "{{ sn_rest_json.result | default([]) }}"
    sn_compare_alternate_tag_query_status: "{{ sn_rest_status | default(0) }}"

- name: Merge canonical and alternate tag bindings
  ansible.builtin.set_fact:
    sn_compare_merged_tag_bindings: >-
      {{ (sn_compare_canonical_tag_bindings | default([]))
         + (sn_compare_alternate_tag_bindings | default([])) }}

- name: Store ServiceNow tag bindings on scope unit result
  ansible.builtin.set_fact:
    sn_compare_unit_result: >-
      {{ sn_compare_unit_result | combine({
           'servicenow': sn_compare_unit_result.servicenow | default({}) | combine({
             'tag_bindings': sn_compare_merged_tag_bindings | default([]),
             'tag_bindings_canonical': sn_compare_canonical_tag_bindings | default([]),
             'tag_bindings_alternate': sn_compare_alternate_tag_bindings | default([]),
             'tag_binding_query': {
               'canonical_key': sn_compare_identifier_tag_key,
               'canonical_status': sn_compare_canonical_tag_query_status | default(0),
               'alternate_status': sn_compare_alternate_tag_query_status | default(0)
             }
           }, recursive=True)
         }, recursive=True) }}
