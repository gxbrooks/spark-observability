---
# Fetch Dynatrace entities for one management zone and entity type (legacy filtered mode).
# Input: sn_compare_mz_name, sn_compare_entity_type

- name: Resolve management zone id for entity query
  ansible.builtin.set_fact:
    sn_compare_mz_id: "{{ sn_compare_mz_name_to_id[sn_compare_mz_name] | default('') }}"

- name: Skip entity collection when management zone id is unknown
  ansible.builtin.debug:
    msg: "Skip Dynatrace {{ sn_compare_entity_type }} collection — unknown MZ '{{ sn_compare_mz_name }}'."
  when: sn_compare_mz_id | length == 0

- name: Initialize Dynatrace entity pagination for management zone and type
  ansible.builtin.set_fact:
    sn_compare_dt_next_page_key: ""
    sn_compare_dt_type_entities: []
  when: sn_compare_mz_id | length > 0

- name: Paginate Dynatrace entity query for management zone and type
  ansible.builtin.include_tasks: fetch_dt_entity_page.yml
  loop: "{{ range(1, (sn_compare_dt_max_pages | default(20) | int) + 1) | list }}"
  loop_control:
    loop_var: sn_compare_dt_page_index
    label: "{{ sn_compare_mz_name }} / {{ sn_compare_entity_type }} page {{ sn_compare_dt_page_index }}"
  when:
    - sn_compare_mz_id | length > 0
    - sn_compare_dt_page_index == 1 or (sn_compare_dt_next_page_key | default('') | length > 0)

- name: Record entities for management zone and type
  ansible.builtin.set_fact:
    sn_compare_dt_entities: >-
      {{ sn_compare_dt_entities | combine({
           sn_compare_mz_name ~ '::' ~ sn_compare_entity_type:
             sn_compare_dt_type_entities | default([])
         }, recursive=True) }}
  when: sn_compare_mz_id | length > 0
