---
# Collect and diff one scope unit. Input: sn_compare_scope_unit
# Appends to sn_compare_comparisons (flattened into DT_SN_Model_Comparison.json after all units run).

- name: Reset per-scope specification path accumulator
  ansible.builtin.set_fact:
    sn_compare_spec_paths: []

- name: Initialize scope unit result
  ansible.builtin.set_fact:
    sn_compare_unit_result:
      registry:
        scope_unit_id: "{{ sn_compare_scope_unit.scope_unit_id | default('') }}"
        region_id: "{{ sn_compare_scope_unit.region_id | default('') }}"
        cmdb_location: "{{ sn_compare_scope_unit.cmdb_location | default('') }}"
        cmdb_environment: "{{ sn_compare_scope_unit.cmdb_environment | default('') }}"
        csdm_spec_files: "{{ sn_compare_scope_unit.csdm_spec_files | default([]) }}"
      generated_at: "{{ lookup('pipe', 'date -Iseconds') }}"
      scope_applied:
        servicenow:
          mode: "{{ 'location_filtered' if sn_compare_filter_by_cmdb_location | default(false) | bool else 'all' }}"
          location: "{{ sn_compare_scope_unit.cmdb_location | default('') if sn_compare_filter_by_cmdb_location | default(false) | bool else '' }}"
        dynatrace:
          mode: "{{ 'management_zone_filtered' if sn_compare_filter_by_dynatrace_mz | default(false) | bool else 'all' }}"
          management_zones: "{{ sn_compare_scope_unit.dynatrace_management_zones | default([]) if sn_compare_filter_by_dynatrace_mz | default(false) | bool else [] }}"
      instance:
        servicenow_url: "{{ SN_URL | trim }}"
        dynatrace_tenant_url: >-
          {{ (DT_TENANT_URL.value if (DT_TENANT_URL is mapping and 'value' in DT_TENANT_URL)
              else DT_TENANT_URL) | default('') | trim }}
        dynatrace_ui_url: >-
          {{ ((DT_API_URL.value if (DT_API_URL is mapping and 'value' in DT_API_URL)
               else DT_API_URL) | default('') | trim | regex_replace('/api/?$', '')) }}
      intent: {}
      servicenow: {}
      dynatrace: {}
      diff: {}

- name: Collect CSDM intent from specification files
  ansible.builtin.include_tasks: collect_csdm_intent.yml

- name: Load Dynatrace correlation spec for diagnostics
  ansible.builtin.include_tasks: load_dynatrace_correlation.yml

- name: Collect ServiceNow CMDB hosts
  ansible.builtin.include_tasks: collect_sn_hosts.yml

- name: Collect ServiceNow application services (intent correlation)
  ansible.builtin.include_tasks: collect_sn_application_services.yml

- name: Collect ServiceNow application services (full CMDB inventory)
  ansible.builtin.include_tasks: collect_sn_cmdb_application_services.yml

- name: Collect ServiceNow tag key values
  ansible.builtin.include_tasks: collect_sn_tag_bindings.yml

- name: Collect Dynatrace entities (full tenant by default)
  ansible.builtin.include_tasks: collect_dt_entities.yml

- name: Build host and application service diffs
  ansible.builtin.include_tasks: build_diffs.yml

- name: Append scope unit compare result
  ansible.builtin.set_fact:
    sn_compare_comparisons: "{{ sn_compare_comparisons | default([]) + [sn_compare_unit_result] }}"
