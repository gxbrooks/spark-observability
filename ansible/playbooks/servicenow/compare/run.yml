---
# Compare ServiceNow CMDB/CSDM models with Dynatrace entities for each scope unit.
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/servicenow/compare.yml -e @../vars/secrets.yaml
#   ansible-playbook ... -e sn_compare_scope_unit_id=brooks-lab-onprem
#
# Optional repair scope (default exports full SN + DT inventories):
#   ansible-playbook ... -e sn_compare_filter_by_cmdb_location=true
#   ansible-playbook ... -e sn_compare_filter_by_dynatrace_mz=true

- name: Compare ServiceNow and Dynatrace models
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../../../vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir }}/../../../../vars/contexts/dynatrace_ansible_vars.yml"
    - "{{ playbook_dir }}/../common/spec_roots.yml"
    - "{{ playbook_dir }}/common/vars.yml"
    - "{{ playbook_dir }}/../../../../vars/secrets.yaml"
  vars:
    sn_compare_scope_units_effective: "{{ sn_compare_scope_units | default([]) }}"
  tasks:
    - name: Discover compare scope units from region descriptors
      ansible.builtin.include_tasks: tasks/discover_compare_scope_units.yml
      when: sn_compare_scope_units_effective | length == 0

    - name: Use explicit compare scope unit override
      ansible.builtin.set_fact:
        sn_compare_scope_units_effective: "{{ sn_compare_scope_units }}"
      when: sn_compare_scope_units | default([]) | length > 0

    - name: Adopt discovered compare scope units
      ansible.builtin.set_fact:
        sn_compare_scope_units_effective: "{{ sn_compare_scope_units_discovered }}"
      when: sn_compare_scope_units | default([]) | length == 0

    - name: Set compare run id
      ansible.builtin.set_fact:
        sn_compare_run_id: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"

    - name: Set compare output directory
      ansible.builtin.set_fact:
        sn_compare_output_dir: "{{ sn_compare_output_base | default(sn_repo_root ~ '/tmp/compare') }}/{{ sn_compare_run_id }}"

    - name: Ensure compare output directory exists
      ansible.builtin.file:
        path: "{{ sn_compare_output_dir }}"
        state: directory
        mode: "0755"

    - name: Initialize compare comparisons accumulator
      ansible.builtin.set_fact:
        sn_compare_comparisons: []

    - name: Resolve Dynatrace API
      ansible.builtin.include_tasks: "{{ sn_servicenow_playbooks_dir }}/sgc/sources/dynatrace/tasks/resolve_dt_api.yml"

    - name: Resolve Dynatrace management zone ids for scope units
      ansible.builtin.include_tasks: tasks/resolve_management_zone_ids.yml

    - name: Compare each scope unit
      ansible.builtin.include_tasks: tasks/compare_scope_unit.yml
      loop: "{{ sn_compare_scope_units_effective }}"
      loop_control:
        loop_var: sn_compare_scope_unit
        label: "{{ sn_compare_scope_unit.scope_unit_id }}"

    - name: Build CSDM intent source list for export
      ansible.builtin.set_fact:
        sn_compare_intent_sources: >-
          {{ sn_compare_intent_sources | default([]) + [{
               'registry': item.registry,
               'intent': item.intent
             }] }}
      loop: "{{ sn_compare_comparisons }}"
      loop_control:
        label: "{{ item.registry.scope_unit_id | default('') }}"
      when: sn_compare_comparisons | length > 0

    - name: Build flattened model comparison export from collected units
      ansible.builtin.set_fact:
        sn_compare_export:
          export_version: "1.2"
          generated_at: "{{ sn_compare_comparisons[-1].generated_at }}"
          scope_applied: "{{ sn_compare_comparisons[-1].scope_applied }}"
          instance: "{{ sn_compare_comparisons[-1].instance }}"
          csdm_intent_sources: "{{ sn_compare_intent_sources | default([]) }}"
          servicenow: "{{ sn_compare_comparisons[-1].servicenow }}"
          dynatrace: "{{ sn_compare_comparisons[-1].dynatrace }}"
          dynatrace_correlation: "{{ sn_compare_comparisons[-1].dynatrace_correlation | default({}) }}"
      when: sn_compare_comparisons | length > 0

    - name: Write model comparison export JSON
      ansible.builtin.copy:
        content: "{{ sn_compare_export | to_nice_json }}"
        dest: "{{ sn_compare_output_dir }}/{{ sn_compare_export_filename }}"
        mode: "0644"
      when: sn_compare_comparisons | length > 0

    - name: Generate annotated model comparison report JSON
      ansible.builtin.command:
        cmd: >-
          python3 {{ sn_compare_dir }}/files/generate_compare_report.py
          {{ sn_compare_output_dir }}/{{ sn_compare_export_filename }}
          {{ sn_compare_output_dir }}/{{ sn_compare_report_filename }}
      register: sn_compare_report
      changed_when: true
      when: sn_compare_comparisons | length > 0

    - name: Report compare output locations
      ansible.builtin.debug:
        msg: |
          Compare complete for {{ sn_compare_comparisons | length }} CSDM intent source(s).
          Output directory: {{ sn_compare_output_dir }}
          Export: {{ sn_compare_output_dir }}/{{ sn_compare_export_filename }}
          Report: {{ sn_compare_output_dir }}/{{ sn_compare_report_filename }}
          {{ sn_compare_report.stdout | default('') }}
