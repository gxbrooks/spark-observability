---
# ServiceNow start — MID Server + Dynatrace SGC import cascade.
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/servicenow/start.yml -e @../vars/secrets.yaml
#
# On-demand Discovery scans are not auto-triggered here; run discovery/discover.yml explicitly.

- name: ServiceNow start banner
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [always, servicenow]
  tasks:
    - name: Display ServiceNow start information
      ansible.builtin.debug:
        msg: |
          ServiceNow start: discovery/start.yml → sgc/sources/dynatrace/start.yml
          For CI Discovery scan: playbooks/servicenow/discovery/discover.yml

- import_playbook: discovery/start.yml
  tags: [servicenow]

- import_playbook: sgc/sources/dynatrace/start.yml
  tags: [servicenow]
