---
# Create ITSM incident from SGO-Dynatrace Spark log alerts bound to Application Service.

- name: Build em_alert create incident business rule payload
  ansible.builtin.set_fact:
    sn_incident_em_alert_br_body:
      name: "{{ sn_incident_em_alert_br_name }}"
      active: "true"
      collection: em_alert
      advanced: "true"
      when: before
      action_insert: "true"
      action_update: "true"
      order: "{{ sn_incident_em_alert_br_order }}"
      filter_condition: source=SGO-Dynatrace^severity<=3
      description: >-
        K8s log alerts (ERROR/WARN): create incident on Application Service via
        spark-client log path or Pattern A Contains from pod CI.
      script: "{{ lookup('file', sn_incident_integrations_dir + '/em_alert_create_k8s_log_incident.br.js') }}"

- name: Look up em_alert create incident business rule
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_get.yml"
  vars:
    sn_rest_table: sys_script
    sn_rest_query: "sysparm_query=name={{ sn_incident_em_alert_br_name | urlencode }}&sysparm_limit=1"

- name: Record em_alert create incident business rule state
  ansible.builtin.set_fact:
    sn_incident_em_alert_br_exists: "{{ (sn_rest_json.result | default([]) | length) > 0 }}"
    sn_incident_em_alert_br_sys_id: "{{ sn_rest_json.result[0].sys_id | default('') }}"

- name: Create em_alert create incident business rule
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_mutate.yml"
  vars:
    sn_rest_method: post
    sn_rest_table: sys_script
    sn_rest_body: "{{ sn_incident_em_alert_br_body }}"
  when: not sn_incident_em_alert_br_exists | bool

- name: Update em_alert create incident business rule
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_mutate.yml"
  vars:
    sn_rest_method: patch
    sn_rest_table: sys_script
    sn_rest_sys_id: "{{ sn_incident_em_alert_br_sys_id }}"
    sn_rest_body: "{{ sn_incident_em_alert_br_body }}"
  when: sn_incident_em_alert_br_exists | bool
