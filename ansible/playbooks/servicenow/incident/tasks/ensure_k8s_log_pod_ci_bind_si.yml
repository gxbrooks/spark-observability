---
# Ensure K8sLogPodCiBind Script Include (global scope).

- name: Build K8sLogPodCiBind script include payload
  ansible.builtin.set_fact:
    sn_incident_si_body:
      name: "{{ sn_incident_pod_bind_si_name }}"
      active: "true"
      access: public
      client_callable: "false"
      description: >-
        Rebind SGO-Dynatrace log events and alerts to cmdb_ci_kubernetes_pod when
        description, resource, or node encodes a pod name from a log path.
      script: "{{ lookup('file', sn_incident_integrations_dir + '/K8sLogPodCiBind.si.js') }}"

- name: Look up K8sLogPodCiBind script include
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_get.yml"
  vars:
    sn_rest_table: sys_script_include
    sn_rest_query: "sysparm_query=name={{ sn_incident_pod_bind_si_name | urlencode }}^sys_scope=global&sysparm_limit=1"

- name: Record K8sLogPodCiBind script include state
  ansible.builtin.set_fact:
    sn_incident_si_exists: "{{ (sn_rest_json.result | default([]) | length) > 0 }}"
    sn_incident_si_sys_id: "{{ sn_rest_json.result[0].sys_id | default('') }}"

- name: Create K8sLogPodCiBind script include
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_mutate.yml"
  vars:
    sn_rest_method: post
    sn_rest_table: sys_script_include
    sn_rest_body: "{{ sn_incident_si_body }}"
  when: not sn_incident_si_exists | bool

- name: Update K8sLogPodCiBind script include
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_mutate.yml"
  vars:
    sn_rest_method: patch
    sn_rest_table: sys_script_include
    sn_rest_sys_id: "{{ sn_incident_si_sys_id }}"
    sn_rest_body: "{{ sn_incident_si_body }}"
  when: sn_incident_si_exists | bool
