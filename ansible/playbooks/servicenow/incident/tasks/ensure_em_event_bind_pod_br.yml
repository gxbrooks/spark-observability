---
# Re-bind SGO-Dynatrace Spark log events from host CI to Kubernetes pod CI when path encodes pod name.

- name: Build em_event bind pod CI business rule payload
  ansible.builtin.set_fact:
    sn_incident_em_event_br_body:
      name: "{{ sn_incident_em_event_br_name }}"
      active: "true"
      collection: em_event
      when: before
      action_insert: "true"
      action_update: "true"
      order: "{{ sn_incident_em_event_br_order }}"
      filter_condition: source=SGO-Dynatrace
      description: >-
        K8s log events: bind cmdb_ci to cmdb_ci_kubernetes_pod when description or
        resource contains a pod segment in the log path.
      script: "{{ lookup('file', sn_incident_integrations_dir + '/em_event_bind_k8s_log_pod_ci.br.js') }}"

- name: Look up em_event bind pod CI business rule
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_get.yml"
  vars:
    sn_rest_table: sys_script
    sn_rest_query: "sysparm_query=name={{ sn_incident_em_event_br_name | urlencode }}&sysparm_limit=1"

- name: Record em_event bind pod CI business rule state
  ansible.builtin.set_fact:
    sn_incident_em_event_br_exists: "{{ (sn_rest_json.result | default([]) | length) > 0 }}"
    sn_incident_em_event_br_sys_id: "{{ sn_rest_json.result[0].sys_id | default('') }}"

- name: Create em_event bind pod CI business rule
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_mutate.yml"
  vars:
    sn_rest_method: post
    sn_rest_table: sys_script
    sn_rest_body: "{{ sn_incident_em_event_br_body }}"
  when: not sn_incident_em_event_br_exists | bool

- name: Update em_event bind pod CI business rule
  ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_mutate.yml"
  vars:
    sn_rest_method: patch
    sn_rest_table: sys_script
    sn_rest_sys_id: "{{ sn_incident_em_event_br_sys_id }}"
    sn_rest_body: "{{ sn_incident_em_event_br_body }}"
  when: sn_incident_em_event_br_exists | bool
