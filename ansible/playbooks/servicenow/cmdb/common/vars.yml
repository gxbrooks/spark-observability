---
# CMDB / CMDB 360 (Multisource CMDB) — shared variables.
# Non-secret context: vars/contexts/servicenow_ansible_vars.yml
# Secrets: vars/secrets.yaml → servicenow:

sn_url: "{{ SN_URL | trim }}"
sn_user: "{{ servicenow.SN_USER | default(SN_USER) }}"
sn_password: "{{ servicenow.SN_PASSWORD | default(SN_PASSWORD) }}"

sn_api_headers:
  Accept: application/json
  Content-Type: application/json

sn_servicenow_playbooks_dir: "{{ playbook_dir | dirname }}"
sn_discovery_common_dir: "{{ sn_servicenow_playbooks_dir }}/discovery/common"

# CMDB 360 (legacy name: Multisource CMDB) — see ServiceNow docs / CMDB 360 Properties UI.
sn_cmdb_itom_discovery_license_plugin: com.snc.itom.discovery.license

sn_cmdb_required_licenses:
  - id: com.snc.itom.discovery.license
    name: ITOM Discovery License
    required_for: CMDB 360 and native Discovery

sn_cmdb_multisource_properties:
  - name: glide.identification_engine.multisource_enabled
    value: "true"
    description: Enables CMDB 360 (Multisource CMDB)
  - name: glide.identification_engine.multisource_cmdb_ci_enabled
    value: "true"
    description: Capture CMDB 360 attribute history for cmdb_ci classes
