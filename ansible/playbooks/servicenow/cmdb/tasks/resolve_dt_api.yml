---
- name: Resolve Dynatrace API URL and token
  ansible.builtin.set_fact:
    dt_api_url_resolved: "{{ (DT_API_URL.value if (DT_API_URL is mapping and 'value' in DT_API_URL) else DT_API_URL) | default('') }}"
    dt_management_zone_resolved: "{{ (DT_MANAGEMENT_ZONE.value if (DT_MANAGEMENT_ZONE is mapping and 'value' in DT_MANAGEMENT_ZONE) else DT_MANAGEMENT_ZONE) | default('Spark Observability') }}"
    dt_api_token_resolved: >-
      {{ ((DT_API_TOKEN.value if (DT_API_TOKEN is mapping and 'value' in DT_API_TOKEN) else DT_API_TOKEN)
          | default('', true))
         | default((dynatrace | default({})).DT_API_TOKEN | default(''), true) }}
  delegate_to: localhost
  run_once: true

- name: Assert Dynatrace API settings are present
  ansible.builtin.assert:
    that:
      - dt_api_url_resolved | length > 0
      - dt_api_token_resolved | length > 0
    fail_msg: "DT_API_URL and DT_API_TOKEN are required (vars/secrets.yaml → dynatrace.DT_API_TOKEN)."
  run_once: true
