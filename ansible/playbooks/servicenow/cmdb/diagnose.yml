---
# Phase 4 — Dynatrace Service Graph Connector (SGC) diagnose
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/servicenow/cmdb/diagnose.yml -e @../vars/secrets.yaml

- name: Diagnose Dynatrace SGC prerequisites and CMDB merge state
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir | dirname | dirname | dirname | dirname | dirname }}/vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir | dirname | dirname | dirname | dirname | dirname }}/vars/contexts/dynatrace_ansible_vars.yml"
    - "{{ playbook_dir }}/common/vars.yml"
  tasks:
    - name: Check SGC application and CMDB source rows
      ansible.builtin.include_tasks: tasks/check_sgc_prerequisites.yml

    - name: List brooks-lab Linux server CIs (Discovery authoritative)
      ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_get.yml"
      vars:
        sn_rest_table: cmdb_ci_linux_server
        sn_rest_query: >-
          sysparm_query=location.name={{ sn_lab_location_name | urlencode }}
          &sysparm_fields=name,host_name,discovery_source,sys_id
          &sysparm_limit=10

    - name: Show Discovery Linux servers
      ansible.builtin.debug:
        var: sn_rest_json.result

    - name: Resolve Dynatrace host display names in Spark Observability zone
      ansible.builtin.include_tasks: tasks/resolve_dt_api.yml

    - name: Query Dynatrace HOST entities (sample)
      ansible.builtin.uri:
        url: "{{ dt_api_url_resolved }}/v2/entities?entitySelector=type(HOST)&pageSize=50&fields=displayName,properties.hostNames,properties.detectedName"
        method: GET
        headers:
          Authorization: "Api-Token {{ dt_api_token_resolved }}"
        status_code: [200]
      register: dt_hosts
      failed_when: false

    - name: Show lab-relevant Dynatrace hosts
      ansible.builtin.debug:
        msg: >-
          {{ dt_hosts.json.entities | default([])
             | selectattr('displayName', 'search', 'Lab')
             | map(attribute='displayName') | list }}

    - name: Hostname alignment note
      ansible.builtin.debug:
        msg: |
          IRE merge requires consistent host identity across Discovery, Dynatrace, and SGC.
          Discovery CMDB uses host_name lab1/lab2/lab3; Dynatrace hosts may appear as Lab1/Lab2/Lab3.
          Align naming or add identification rules before expecting automatic CI binding on events.
