---
# Phase 4 — Dynatrace SGC deploy (instance-side checks; imports via Guided Setup)
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/servicenow/cmdb/deploy.yml -e @../vars/secrets.yaml

- name: Deploy / validate Dynatrace SGC integration prerequisites
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir | dirname | dirname | dirname | dirname | dirname }}/vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir | dirname | dirname | dirname | dirname | dirname }}/vars/contexts/dynatrace_ansible_vars.yml"
    - "{{ playbook_dir }}/common/vars.yml"
  tasks:
    - name: Check SGC application presence
      ansible.builtin.include_tasks: tasks/check_sgc_prerequisites.yml

    - name: Stop when SGC scoped application is not installed
      ansible.builtin.fail:
        msg: |
          Service Graph Connector for Observability – Dynatrace is not installed on {{ sn_url }}.
          Install Store apps and complete Guided Setup (Dynatrace Observability → Setup), then re-run:
            playbooks/servicenow/cmdb/deploy.yml
            playbooks/servicenow/cmdb/events/deploy.yml
          See tmp/Dynatrace-ServiceNow SGC.md and ansible/playbooks/servicenow/cmdb/README.md
      when: not sn_sgc_scope_present | bool

    - name: Remind operator to run SGC scheduled imports
      ansible.builtin.debug:
        msg: |
          SGC application detected. Run scheduled imports from ServiceNow:
            Dynatrace Observability → Scheduled Data Imports → Execute (Hosts, then Processes/Services)
          Wait for Concurrent Import Sets to finish, then verify sys_object_source rows for SGO-Dynatrace.
