---
# Dynatrace → ServiceNow event integration (alerting profiles, detectors, webhook)
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/servicenow/sgc/sources/dynatrace/events/deploy.yml -e @../vars/secrets.yaml

- name: Configure Dynatrace alerting and ServiceNow event webhook for brooks-lab
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir | regex_replace('/ansible/playbooks/.*$', '') }}/vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir | regex_replace('/ansible/playbooks/.*$', '') }}/vars/contexts/dynatrace_ansible_vars.yml"
    - "{{ playbook_dir | regex_replace('^(.*/sgc)(/.*)?$', '\\1') }}/common/vars.yml"
    - "{{ playbook_dir | regex_replace('/ansible/playbooks/.*$', '') }}/vars/secrets.yaml"
  tasks:
    - name: Detect SGC installation (controls webhook source= parameter)
      ansible.builtin.include_tasks: "{{ playbook_dir | dirname }}/tasks/check_sgc_prerequisites.yml"

    - name: Apply brooks-lab alerting profile (Spark Observability management zone)
      ansible.builtin.include_tasks: "{{ playbook_dir | dirname }}/tasks/apply_dt_alerting_profile.yml"

    - name: Register Spark log paths with Dynatrace OneAgent
      ansible.builtin.include_tasks: "{{ playbook_dir | dirname }}/tasks/apply_spark_log_custom_source.yml"

    - name: Apply OpenPipeline Davis extraction for Spark ERROR/WARN logs
      ansible.builtin.include_tasks: "{{ playbook_dir | dirname }}/tasks/apply_spark_openpipeline_log_alerts.yml"

    - name: Apply CPU metric detector (classic log event disabled — OpenPipeline is canonical)
      ansible.builtin.include_tasks: "{{ playbook_dir | dirname }}/tasks/apply_dt_anomaly_detectors.yml"

    - name: Apply brooks-lab problem notification webhook to ServiceNow
      ansible.builtin.include_tasks: "{{ playbook_dir | dirname }}/tasks/apply_dt_problem_notification.yml"

    - name: Optionally disable Demo 1 problem notification (opt-in — avoids duplicate Dynatrace-source alerts on shared tenant)
      ansible.builtin.include_tasks: "{{ playbook_dir | dirname }}/tasks/disable_demo1_problem_notification.yml"
      when:
        - sn_sgc_scope_present | default(false) | bool
        - sn_disable_demo1_problem_notification | default(false) | bool
