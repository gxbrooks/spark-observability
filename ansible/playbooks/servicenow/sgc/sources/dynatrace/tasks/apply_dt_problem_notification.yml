---
- name: Resolve Dynatrace API credentials
  ansible.builtin.include_tasks: resolve_dt_api.yml

- name: Ensure brooks-lab alerting profile exists
  ansible.builtin.include_tasks: apply_dt_alerting_profile.yml
  when: dt_alerting_profile_object_id is not defined or (dt_alerting_profile_object_id | string | trim) == ''

- name: Resolve SGC ConnectionId for webhook payload
  ansible.builtin.include_tasks: resolve_sgc_connection_alias.yml
  when: sn_sgc_scope_present | default(false) | bool

- name: Provision brooks-lab SGO-Dynatrace webhook credentials
  ansible.builtin.include_tasks: ensure_sn_dt_webhook_auth.yml
  when: sn_sgc_scope_present | default(false) | bool

- name: Set ServiceNow inbound event URL (SGC when installed, else legacy)
  ansible.builtin.set_fact:
    sn_dt_event_inbound_url_effective: >-
      {{ sn_dt_event_inbound_url_sgc if (sn_sgc_scope_present | default(false) | bool)
         else sn_dt_event_inbound_url_legacy }}
  run_once: true

- name: List existing problem notifications
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects?schemaIds=builtin:problem.notifications&fields=objectId,value&pageSize=100"
    method: GET
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
    status_code: [200]
  register: dt_problem_notifications
  delegate_to: localhost
  run_once: true

- name: Select existing brooks-lab problem notification
  ansible.builtin.set_fact:
    dt_problem_notification_object_id: "{{ item.objectId }}"
    dt_problem_notification_existing_value: "{{ item.value }}"
    dt_problem_notification_payload_body: "{{ item.value.webHookNotification.payload | default('') }}"
  loop: "{{ dt_problem_notifications.json['items'] | default([]) }}"
  when: item.value.displayName | default('') == dt_sn_problem_notification_name
  run_once: true

- name: Select Demo 1 payload body only when brooks-lab notification is new (legacy path)
  ansible.builtin.set_fact:
    dt_problem_notification_payload_body: "{{ item.value.webHookNotification.payload | default('') }}"
  loop: "{{ dt_problem_notifications.json['items'] | default([]) }}"
  when:
    - not (sn_sgc_scope_present | default(false) | bool)
    - dt_problem_notification_payload_body is not defined or (dt_problem_notification_payload_body | length) == 0
    - item.value.displayName | default('') == 'ServiceNow Demo 1 - Optimiz'
  run_once: true

- name: Build SGC problem notification payload body
  ansible.builtin.set_fact:
    dt_problem_notification_payload_body: >-
      {{ lookup('template', dt_integrations_dir + '/sgc-problem-notification-payload.json.j2') }}
  when: sn_sgc_scope_present | default(false) | bool
  run_once: true

- name: Default problem notification facts
  ansible.builtin.set_fact:
    dt_problem_notification_object_id: "{{ dt_problem_notification_object_id | default('') }}"
    dt_problem_notification_existing_value: "{{ dt_problem_notification_existing_value | default({}) }}"
    dt_problem_notification_payload_body: "{{ dt_problem_notification_payload_body | default('') }}"
  run_once: true

- name: Build brooks-lab webhook Authorization header
  ansible.builtin.set_fact:
    dt_problem_notification_auth_headers: >-
      {{ [{'name': 'Authorization', 'secret': true, 'secretValue': sn_dt_webhook_authorization}]
         if (sn_sgc_scope_present | default(false) | bool)
         else (dt_problem_notification_existing_value.webHookNotification.headers | default([])) }}
  no_log: true
  run_once: true

- name: Build brooks-lab problem notification payload
  ansible.builtin.set_fact:
    dt_problem_notification_doc:
      schemaId: builtin:problem.notifications
      scope: environment
      value:
        enabled: true
        type: WEBHOOK
        displayName: "{{ dt_sn_problem_notification_name }}"
        alertingProfile: "{{ dt_alerting_profile_object_id }}"
        webHookNotification:
          url: "{{ sn_dt_event_inbound_url_effective }}"
          acceptAnyCertificate: false
          notifyEventMergesEnabled: false
          notifyClosedProblems: true
          headers: "{{ dt_problem_notification_auth_headers }}"
          payload: "{{ dt_problem_notification_payload_body }}"
  no_log: true
  run_once: true

- name: Fail when webhook payload template is missing
  ansible.builtin.assert:
    that:
      - dt_problem_notification_doc.value.webHookNotification.payload | length > 0
    fail_msg: >-
      No ServiceNow webhook payload template found. When SGC is installed, run
      resolve_sgc_connection_alias.yml (included above). Otherwise complete SGC
      Guided Setup or ensure 'ServiceNow Demo 1 - Optimiz' exists on the tenant.
  run_once: true

- name: Fail when SGC webhook Authorization is missing
  ansible.builtin.assert:
    that:
      - not (sn_sgc_scope_present | default(false) | bool)
        or (sn_dt_webhook_authorization | default('') | length > 0)
    fail_msg: >-
      SGC is installed but brooks-lab webhook Authorization was not resolved.
      Run ensure_sn_dt_webhook_auth.yml (included when sn_sgc_scope_present).
  run_once: true

# On-needed check: skip update when the existing notification already matches.
- name: Determine whether problem notification change is needed
  ansible.builtin.set_fact:
    dt_problem_notification_change_needed: >-
      {{ (dt_problem_notification_object_id | length) == 0
         or (dt_problem_notification_existing_value.alertingProfile | default('')) != dt_alerting_profile_object_id
         or (dt_problem_notification_existing_value
             | combine(dt_problem_notification_doc.value, recursive=True)) != dt_problem_notification_existing_value }}
  run_once: true

- name: Create brooks-lab problem notification
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects"
    method: POST
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: application/json
    body_format: json
    body:
      - "{{ dt_problem_notification_doc }}"
    status_code: [200, 201]
  when: dt_problem_notification_object_id | length == 0
  register: dt_problem_notification_create
  no_log: true
  delegate_to: localhost
  run_once: true

- name: Update brooks-lab problem notification
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects/{{ dt_problem_notification_object_id }}"
    method: PUT
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: application/json
    body_format: json
    body: "{{ dt_problem_notification_doc }}"
    status_code: [200, 204]
  when:
    - dt_problem_notification_object_id | length > 0
    - dt_problem_notification_change_needed | bool
  no_log: true
  delegate_to: localhost
  run_once: true

- name: Show problem notification configuration
  ansible.builtin.debug:
    msg: |
      Problem notification: {{ dt_sn_problem_notification_name }}
      State: {{ 'created/updated' if dt_problem_notification_change_needed | bool else 'already up to date — no change applied' }}
      Webhook URL: {{ sn_dt_event_inbound_url_effective }}
      Alerting profile: {{ dt_alerting_profile_object_id }}
      SGC installed: {{ sn_sgc_scope_present | default(false) }}
      Auth: {{ 'brooks-lab SN_DT_WEBHOOK_* (SGO-Dynatrace)' if (sn_sgc_scope_present | default(false) | bool) else 'legacy (unchanged)' }}
      Demo 1 notification: not modified
      UI note: this webhook is a Classic builtin:problem.notifications row. It does NOT
      appear under Settings → Connections → ServiceNow until registered there manually.
      Find it via Settings search or Integration → Problem notifications — see
      observability/dynatrace/docs/DT_Problems_to_SN_Event.md § Dynatrace UI navigation.
  run_once: true
