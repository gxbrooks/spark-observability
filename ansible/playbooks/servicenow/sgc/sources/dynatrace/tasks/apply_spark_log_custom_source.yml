---
# Register Spark application log paths with Dynatrace OneAgent (custom log sources).
# Prerequisite for log events — without this, /mnt/spark/logs/* never reaches Grail.

- name: Resolve Dynatrace API credentials
  ansible.builtin.include_tasks: resolve_dt_api.yml

- name: Resolve Dynatrace specification paths
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../../../../../observability/dynatrace/common/resolve_dt_spec_paths.yml"

- name: Render Spark custom log source payload
  ansible.builtin.template:
    src: "{{ dt_integrations_dir }}/spark-log-custom-source.json.j2"
    dest: /tmp/spark-log-custom-source.json
    mode: "0644"
  delegate_to: localhost
  run_once: true

- name: Load Spark custom log source document
  ansible.builtin.set_fact:
    dt_spark_log_source_doc: "{{ lookup('file', '/tmp/spark-log-custom-source.json') | from_json }}"
  run_once: true

- name: List existing custom log sources
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects?schemaIds=builtin:logmonitoring.custom-log-source-settings&fields=objectId,value&pageSize=200"
    method: GET
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
    status_code: [200]
  register: dt_custom_log_sources
  delegate_to: localhost
  run_once: true

- name: Select existing Spark custom log source
  ansible.builtin.set_fact:
    dt_spark_log_source_object_id: "{{ item.objectId }}"
    dt_spark_log_source_existing_value: "{{ item.value }}"
  loop: "{{ dt_custom_log_sources.json['items'] | default([]) }}"
  when: item.value['config-item-title'] | default('') == dt_sn_spark_log_custom_source_name
  run_once: true

- name: Default Spark custom log source facts
  ansible.builtin.set_fact:
    dt_spark_log_source_object_id: "{{ dt_spark_log_source_object_id | default('') }}"
    dt_spark_log_source_existing_value: "{{ dt_spark_log_source_existing_value | default({}) }}"
  run_once: true

- name: Determine whether Spark custom log source change is needed
  ansible.builtin.set_fact:
    dt_spark_log_source_change_needed: >-
      {{ (dt_spark_log_source_object_id | length) == 0
         or (dt_spark_log_source_existing_value
             | combine(dt_spark_log_source_doc.value, recursive=True)) != dt_spark_log_source_existing_value }}
  run_once: true

- name: Create Spark custom log source
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects"
    method: POST
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: application/json
    body_format: json
    body:
      - "{{ dt_spark_log_source_doc }}"
    status_code: [200, 201]
  register: dt_spark_log_source_create
  when: dt_spark_log_source_object_id | length == 0
  delegate_to: localhost
  run_once: true

- name: Record Spark custom log source objectId after create
  ansible.builtin.set_fact:
    dt_spark_log_source_object_id: "{{ dt_spark_log_source_create.json[0].objectId | default('') }}"
  when:
    - dt_spark_log_source_create is defined
    - not dt_spark_log_source_create is skipped
  run_once: true

- name: Update Spark custom log source
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects/{{ dt_spark_log_source_object_id }}"
    method: PUT
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: application/json
    body_format: json
    body: "{{ dt_spark_log_source_doc }}"
    status_code: [200, 204]
  when:
    - dt_spark_log_source_object_id | length > 0
    - dt_spark_log_source_change_needed | bool
  delegate_to: localhost
  run_once: true

- name: Show Spark custom log source state
  ansible.builtin.debug:
    msg: >-
      Custom log source '{{ dt_sn_spark_log_custom_source_name }}' => {{ dt_spark_log_source_object_id }}
      ({{ 'created/updated' if dt_spark_log_source_change_needed | bool else 'already up to date' }})
      Paths: /mnt/spark/logs/*/spark-app.log*, /opt/spark/logs/spark-app.log*
  run_once: true
