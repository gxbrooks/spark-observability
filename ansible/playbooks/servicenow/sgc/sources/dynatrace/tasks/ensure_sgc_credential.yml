---
# Provision the SGC Dynatrace credential end-to-end (idempotent, on-needed):
#   1. Mint a dedicated Dynatrace access token (dt_sgc_api_token_name) via the
#      apiTokens API, authorized by DT_TOKEN_ADMIN_TOKEN (apiTokens.read/write,
#      vars/secrets.yaml dynatrace: block).
#   2. Validate the new token against the Dynatrace entities API.
#   3. Push it into the ServiceNow "Dynatrace API Key" credential record
#      (api_key_credentials) with the literal "api-token " prefix.
#   4. Set the Hostname on the HTTP connection record bound to the app's
#      connection alias (requires connection_admin; reports manual fallback).
#
# Token values are not retrievable after creation, so when the token already
# exists this task assumes the ServiceNow credential holds it and skips
# unless check_sgc_token_remint_needed.yml detects a scoped-app rebuild after
# the last processed Hosts import. Force re-mint + re-push with:
#   -e sgc_rotate_token=true
# Disable auto detection with -e sgc_auto_rotate_token=false.

- name: Detect scoped-app rebuild requiring token re-mint
  ansible.builtin.include_tasks: check_sgc_token_remint_needed.yml

- name: Resolve Dynatrace token-admin token
  ansible.builtin.set_fact:
    dt_token_admin_resolved: >-
      {{ (dynatrace | default({})).DT_TOKEN_ADMIN_TOKEN
         | default(DT_TOKEN_ADMIN_TOKEN | default('')) }}
  no_log: true
  run_once: true

- name: Assert token-admin token is available
  ansible.builtin.assert:
    that:
      - dt_token_admin_resolved | length > 0
    fail_msg: >-
      DT_TOKEN_ADMIN_TOKEN is not set in vars/secrets.yaml (dynatrace: block).
      It must hold a Dynatrace token with apiTokens.read and apiTokens.write.
  run_once: true

- name: List Dynatrace API tokens
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/apiTokens?pageSize=1000"
    method: GET
    headers:
      Authorization: "Api-Token {{ dt_token_admin_resolved }}"
    status_code: [200]
    return_content: true
  register: dt_sgc_token_list
  no_log: true
  delegate_to: localhost
  run_once: true

- name: Record existing SGC token ids
  ansible.builtin.set_fact:
    dt_sgc_token_ids: >-
      {{ dt_sgc_token_list.json.apiTokens | default([])
         | selectattr('name', 'equalto', dt_sgc_api_token_name)
         | map(attribute='id') | list }}
  run_once: true

- name: Report SGC token already provisioned
  ansible.builtin.debug:
    msg: >-
      Dynatrace token '{{ dt_sgc_api_token_name }}' already exists; assuming the
      ServiceNow credential holds its value (token values are not retrievable).
      To re-mint and re-push, re-run with -e sgc_rotate_token=true.
  when:
    - dt_sgc_token_ids | length > 0
    - not (sgc_rotate_token_resolved | default(false) | bool)

- name: Delete existing SGC token (rotation requested)
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/apiTokens/{{ item }}"
    method: DELETE
    headers:
      Authorization: "Api-Token {{ dt_token_admin_resolved }}"
    status_code: [204]
  loop: "{{ dt_sgc_token_ids }}"
  when: sgc_rotate_token_resolved | default(false) | bool
  no_log: true
  delegate_to: localhost
  run_once: true

- name: Mint and push SGC credential (when missing or rotating)
  when: >-
    (dt_sgc_token_ids | length == 0)
    or (sgc_rotate_token_resolved | default(false) | bool)
  block:
    - name: Mint Dynatrace token for the SGC
      ansible.builtin.uri:
        url: "{{ dt_api_url_resolved }}/v2/apiTokens"
        method: POST
        headers:
          Authorization: "Api-Token {{ dt_token_admin_resolved }}"
          Content-Type: application/json
        body_format: json
        body:
          name: "{{ dt_sgc_api_token_name }}"
          personalAccessToken: false
          scopes:
            - entities.read
            - DataExport
            - ReadConfig
        status_code: [201]
        return_content: true
      register: dt_sgc_token_create
      no_log: true
      delegate_to: localhost
      run_once: true

    - name: Validate minted token against the Dynatrace API
      ansible.builtin.uri:
        url: "{{ dt_api_url_resolved }}/v2/entities?entitySelector=type(HOST)&pageSize=1"
        method: GET
        headers:
          Authorization: "Api-Token {{ dt_sgc_token_create.json.token }}"
        status_code: [200]
      no_log: true
      delegate_to: localhost
      run_once: true

    - name: Read ServiceNow Dynatrace API Key credential record
      ansible.builtin.uri:
        url: >-
          {{ sn_url }}/api/now/table/api_key_credentials?sysparm_query=name=Dynatrace%20API%20Key&sysparm_fields=sys_id&sysparm_limit=1
        method: GET
        user: "{{ sn_user }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        headers: "{{ sn_api_headers }}"
        status_code: [200]
        return_content: true
      register: sn_sgc_cred_row
      no_log: true
      delegate_to: localhost
      run_once: true

    - name: Assert credential record exists
      ansible.builtin.assert:
        that:
          - sn_sgc_cred_row.json.result | default([]) | length > 0
        fail_msg: >-
          No 'Dynatrace API Key' record in api_key_credentials — the SGC app
          should pre-create it. Is sn_dynatrace_integ installed?

    - name: Push token into ServiceNow credential (with api-token prefix)
      ansible.builtin.uri:
        url: "{{ sn_url }}/api/now/table/api_key_credentials/{{ (sn_sgc_cred_row.json.result | first).sys_id }}"
        method: PATCH
        user: "{{ sn_user }}"
        password: "{{ sn_password }}"
        force_basic_auth: true
        headers: "{{ sn_api_headers }}"
        body_format: json
        body:
          api_key: "api-token {{ dt_sgc_token_create.json.token }}"
          active: "true"
        status_code: [200]
      no_log: true
      delegate_to: localhost
      run_once: true

    - name: Report credential provisioning
      ansible.builtin.debug:
        msg: >-
          Minted Dynatrace token '{{ dt_sgc_api_token_name }}'
          (scopes entities.read, DataExport, ReadConfig), validated it, and
          pushed it into the ServiceNow 'Dynatrace API Key' credential.

# ----- HTTP connection hostname ------------------------------------------------
- name: Resolve desired Dynatrace hostname
  ansible.builtin.set_fact:
    dt_sgc_hostname: >-
      {{ dt_api_url_resolved | regex_replace('^https?://', '') | regex_replace('/.*$', '') }}
  run_once: true

- name: Read connection alias from the SGC connection row
  ansible.builtin.uri:
    url: >-
      {{ sn_url }}/api/now/table/sn_dynatrace_integ_connections?sysparm_fields=connection_alias&sysparm_limit=1
    method: GET
    user: "{{ sn_user }}"
    password: "{{ sn_password }}"
    force_basic_auth: true
    headers: "{{ sn_api_headers }}"
    status_code: [200]
    return_content: true
  register: sn_sgc_alias_row
  no_log: true
  delegate_to: localhost
  run_once: true

- name: Read HTTP connection record for the alias
  ansible.builtin.uri:
    url: >-
      {{ sn_url }}/api/now/table/http_connection?sysparm_query=connection_alias={{ ((sn_sgc_alias_row.json.result | first | default({})).connection_alias | default({})).value | default('') }}&sysparm_fields=sys_id,name,host,active
    method: GET
    user: "{{ sn_user }}"
    password: "{{ sn_password }}"
    force_basic_auth: true
    headers: "{{ sn_api_headers }}"
    status_code: [200, 403]
    return_content: true
  register: sn_sgc_http_conn
  no_log: true
  delegate_to: localhost
  run_once: true

- name: Report HTTP connection not readable (manual hostname step)
  ansible.builtin.debug:
    msg: >-
      http_connection is not readable by {{ sn_user }} (403). To automate the
      Hostname, grant connection_admin to {{ sn_user }} and re-run; until then
      set Hostname={{ dt_sgc_hostname }} via Guided Setup Basic card task
      "Configure HTTP Connection for Dynatrace" (see docs/deploy.md).
  when: sn_sgc_http_conn.status == 403

- name: Update HTTP connection hostname (on needed)
  ansible.builtin.uri:
    url: "{{ sn_url }}/api/now/table/http_connection/{{ (sn_sgc_http_conn.json.result | first).sys_id }}"
    method: PATCH
    user: "{{ sn_user }}"
    password: "{{ sn_password }}"
    force_basic_auth: true
    headers: "{{ sn_api_headers }}"
    body_format: json
    body:
      host: "{{ dt_sgc_hostname }}"
      active: "true"
    status_code: [200, 403]
    return_content: true
  register: sn_sgc_http_conn_patch
  when:
    - sn_sgc_http_conn.status == 200
    - sn_sgc_http_conn.json.result | default([]) | length > 0
    - (sn_sgc_http_conn.json.result | first).host != dt_sgc_hostname
  no_log: true
  delegate_to: localhost
  run_once: true

- name: Report HTTP connection state
  ansible.builtin.debug:
    msg: >-
      {% if sn_sgc_http_conn.status != 200 %}HTTP connection: not readable (see above).
      {% elif sn_sgc_http_conn.json.result | default([]) | length == 0 %}HTTP connection: no record bound to the alias yet —
      run Guided Setup Basic card task "Configure HTTP Connection for Dynatrace" once to create it.
      {% elif sn_sgc_http_conn_patch is not skipped %}HTTP connection: hostname set to {{ dt_sgc_hostname }} (HTTP {{ sn_sgc_http_conn_patch.status }}).
      {% else %}HTTP connection: hostname already {{ dt_sgc_hostname }} — no update needed.{% endif %}
  run_once: true
