---
# OpenPipeline Davis event extraction for Spark ERROR/WARN logs.
# Required on Grail tenants where logs are routed to a custom OpenPipeline (e.g. Metric Route):
# classic builtin:logmonitoring.log-events no longer evaluate on those records.

- name: Resolve Dynatrace API credentials
  ansible.builtin.include_tasks: resolve_dt_api.yml

- name: Resolve Dynatrace specification paths
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../../../../../observability/dynatrace/common/resolve_dt_spec_paths.yml"

- name: Render Spark OpenPipeline log alerts payload
  ansible.builtin.template:
    src: "{{ dt_integrations_dir }}/spark-openpipeline-log-alerts-pipeline.json.j2"
    dest: /tmp/spark-openpipeline-log-alerts-pipeline.json
    mode: "0644"
  delegate_to: localhost
  run_once: true

- name: Load Spark OpenPipeline log alerts document
  ansible.builtin.set_fact:
    dt_spark_openpipeline_pipeline_doc: "{{ lookup('file', '/tmp/spark-openpipeline-log-alerts-pipeline.json') | from_json }}"
  run_once: true

- name: List existing OpenPipeline logs pipelines
  ansible.builtin.uri:
    url: >-
      {{ dt_api_url_resolved }}/v2/settings/objects?schemaIds=builtin:openpipeline.logs.pipelines&fields=objectId,value&pageSize=200
    method: GET
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
    status_code: [200]
  register: dt_openpipeline_logs_pipelines
  delegate_to: localhost
  run_once: true

- name: Select existing Spark OpenPipeline log alerts pipeline
  ansible.builtin.set_fact:
    dt_spark_openpipeline_pipeline_object_id: "{{ item.objectId }}"
    dt_spark_openpipeline_pipeline_existing_value: "{{ item.value }}"
  loop: "{{ dt_openpipeline_logs_pipelines.json['items'] | default([]) }}"
  when: >-
    item.value.customId | default('') == dt_sn_spark_openpipeline_pipeline_custom_id
    or item.value.displayName | default('') == dt_sn_spark_openpipeline_pipeline_display_name
  run_once: true

- name: Default Spark OpenPipeline pipeline facts
  ansible.builtin.set_fact:
    dt_spark_openpipeline_pipeline_object_id: "{{ dt_spark_openpipeline_pipeline_object_id | default('') }}"
    dt_spark_openpipeline_pipeline_existing_value: "{{ dt_spark_openpipeline_pipeline_existing_value | default({}) }}"
  run_once: true

- name: Determine whether Spark OpenPipeline pipeline change is needed
  ansible.builtin.set_fact:
    dt_spark_openpipeline_pipeline_change_needed: >-
      {{ (dt_spark_openpipeline_pipeline_object_id | length) == 0
         or (dt_spark_openpipeline_pipeline_existing_value
             | combine(dt_spark_openpipeline_pipeline_doc.value, recursive=True)) != dt_spark_openpipeline_pipeline_existing_value }}
  run_once: true

- name: Create Spark OpenPipeline log alerts pipeline
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects"
    method: POST
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: application/json
    body_format: json
    body:
      - "{{ dt_spark_openpipeline_pipeline_doc }}"
    status_code: [200, 201]
  register: dt_spark_openpipeline_pipeline_create
  when: dt_spark_openpipeline_pipeline_object_id | length == 0
  delegate_to: localhost
  run_once: true

- name: Record Spark OpenPipeline pipeline objectId after create
  ansible.builtin.set_fact:
    dt_spark_openpipeline_pipeline_object_id: "{{ dt_spark_openpipeline_pipeline_create.json[0].objectId | default('') }}"
  when:
    - dt_spark_openpipeline_pipeline_create is defined
    - not dt_spark_openpipeline_pipeline_create is skipped
  run_once: true

- name: Update Spark OpenPipeline log alerts pipeline
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects/{{ dt_spark_openpipeline_pipeline_object_id }}"
    method: PUT
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: application/json
    body_format: json
    body: "{{ dt_spark_openpipeline_pipeline_doc }}"
    status_code: [200, 204]
  when:
    - dt_spark_openpipeline_pipeline_object_id | length > 0
    - dt_spark_openpipeline_pipeline_change_needed | bool
  delegate_to: localhost
  run_once: true

- name: List OpenPipeline logs routing configuration
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects?schemaIds=builtin:openpipeline.logs.routing&fields=objectId,value&pageSize=10"
    method: GET
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
    status_code: [200]
  register: dt_openpipeline_logs_routing
  delegate_to: localhost
  run_once: true

- name: Select OpenPipeline logs routing object
  ansible.builtin.set_fact:
    dt_openpipeline_logs_routing_object_id: "{{ dt_openpipeline_logs_routing.json['items'][0].objectId }}"
    dt_openpipeline_logs_routing_existing: "{{ dt_openpipeline_logs_routing.json['items'][0].value }}"
  when: dt_openpipeline_logs_routing.json['items'] | default([]) | length > 0
  run_once: true

- name: Build Spark log routing entry
  ansible.builtin.set_fact:
    dt_spark_openpipeline_routing_entry:
      enabled: true
      pipelineType: custom
      pipelineId: "{{ dt_spark_openpipeline_pipeline_object_id }}"
      matcher: >-
        matchesValue(log.source, "/mnt/spark/logs/*") OR matchesValue(log.source, "/opt/spark/logs/*")
      description: "{{ dt_sn_spark_openpipeline_routing_description }}"
  run_once: true

- name: Compute OpenPipeline routing entries with Spark route first
  ansible.builtin.set_fact:
    dt_openpipeline_routing_entries_new: >-
      {{
        [dt_spark_openpipeline_routing_entry]
        + (
            dt_openpipeline_logs_routing_existing.routingEntries | default([])
            | rejectattr('description', 'equalto', dt_sn_spark_openpipeline_routing_description)
            | list
          )
      }}
    dt_openpipeline_routing_change_needed: >-
      {{
        (dt_openpipeline_logs_routing_existing.routingEntries | default([]) | length == 0)
        or (
          (dt_openpipeline_logs_routing_existing.routingEntries | default([]) | first).pipelineId | default('')
          != dt_spark_openpipeline_pipeline_object_id
        )
        or (
          (dt_openpipeline_logs_routing_existing.routingEntries | default([])
           | selectattr('description', 'equalto', dt_sn_spark_openpipeline_routing_description)
           | list | length) == 0
        )
      }}
  run_once: true

- name: Update OpenPipeline logs routing for Spark log alerts
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects/{{ dt_openpipeline_logs_routing_object_id }}"
    method: PUT
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: application/json
    body_format: json
    body:
      schemaId: builtin:openpipeline.logs.routing
      value:
        routingEntries: "{{ dt_openpipeline_routing_entries_new }}"
    status_code: [200, 204]
  when:
    - dt_openpipeline_logs_routing_object_id | default('') | length > 0
    - dt_openpipeline_routing_change_needed | bool
  delegate_to: localhost
  run_once: true

- name: Show Spark OpenPipeline log alerts state
  ansible.builtin.debug:
    msg: >-
      OpenPipeline log alerts pipeline '{{ dt_sn_spark_openpipeline_pipeline_display_name }}'
      => {{ dt_spark_openpipeline_pipeline_object_id }}
      ({{ 'created/updated' if dt_spark_openpipeline_pipeline_change_needed | bool else 'already up to date' }});
      routing {{ 'updated' if dt_openpipeline_routing_change_needed | default(false) | bool else 'already includes Spark route' }}.
  run_once: true
