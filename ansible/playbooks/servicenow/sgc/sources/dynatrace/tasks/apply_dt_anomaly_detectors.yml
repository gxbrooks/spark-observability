---
- name: Resolve Dynatrace API credentials
  ansible.builtin.include_tasks: resolve_dt_api.yml

- name: Resolve Dynatrace specification paths
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../../../../../observability/dynatrace/common/resolve_dt_spec_paths.yml"

- name: Render CPU metric event payload
  ansible.builtin.template:
    src: "{{ dt_integrations_dir }}/spark-cpu-metric-event.json.j2"
    dest: /tmp/spark-cpu-metric-event.json
    mode: "0644"
  delegate_to: localhost
  run_once: true

- name: Render Spark ERROR log event payload
  ansible.builtin.template:
    src: "{{ dt_integrations_dir }}/spark-error-log-event.json.j2"
    dest: /tmp/spark-error-log-event.json
    mode: "0644"
  delegate_to: localhost
  run_once: true

- name: Load metric and log event documents
  ansible.builtin.set_fact:
    dt_cpu_metric_event_doc: "{{ lookup('file', '/tmp/spark-cpu-metric-event.json') | from_json }}"
    dt_spark_error_log_event_doc: "{{ lookup('file', '/tmp/spark-error-log-event.json') | from_json }}"
  run_once: true

- name: List existing metric events
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects?schemaIds=builtin:anomaly-detection.metric-events&fields=objectId,value&pageSize=200"
    method: GET
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
    status_code: [200]
  register: dt_metric_events
  delegate_to: localhost
  run_once: true

- name: List existing log events
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects?schemaIds=builtin:logmonitoring.log-events&fields=objectId,value&pageSize=200"
    method: GET
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
    status_code: [200]
  register: dt_log_events
  delegate_to: localhost
  run_once: true

- name: Select existing CPU metric event
  ansible.builtin.set_fact:
    dt_cpu_metric_event_object_id: "{{ item.objectId }}"
    dt_cpu_metric_event_existing_value: "{{ item.value }}"
  loop: "{{ dt_metric_events.json['items'] | default([]) }}"
  when: item.value.summary | default('') == dt_sn_cpu_metric_event_summary
  run_once: true

- name: Select existing Spark ERROR log event
  ansible.builtin.set_fact:
    dt_spark_error_log_event_object_id: "{{ item.objectId }}"
    dt_spark_error_log_event_existing_value: "{{ item.value }}"
  loop: "{{ dt_log_events.json['items'] | default([]) }}"
  when: item.value.summary | default('') == dt_sn_spark_error_log_event_summary
  run_once: true

- name: Default anomaly detector facts when not found
  ansible.builtin.set_fact:
    dt_cpu_metric_event_object_id: "{{ dt_cpu_metric_event_object_id | default('') }}"
    dt_cpu_metric_event_existing_value: "{{ dt_cpu_metric_event_existing_value | default({}) }}"
    dt_spark_error_log_event_object_id: "{{ dt_spark_error_log_event_object_id | default('') }}"
    dt_spark_error_log_event_existing_value: "{{ dt_spark_error_log_event_existing_value | default({}) }}"
  run_once: true

# On-needed checks: skip updates when desired config already matches.
- name: Determine whether detector changes are needed
  ansible.builtin.set_fact:
    dt_cpu_metric_event_change_needed: >-
      {{ (dt_cpu_metric_event_object_id | length) == 0
         or (dt_cpu_metric_event_existing_value
             | combine(dt_cpu_metric_event_doc.value, recursive=True)) != dt_cpu_metric_event_existing_value }}
    dt_spark_error_log_event_change_needed: >-
      {{ (dt_spark_error_log_event_object_id | length) == 0
         or (dt_spark_error_log_event_existing_value
             | combine(dt_spark_error_log_event_doc.value, recursive=True)) != dt_spark_error_log_event_existing_value }}
  run_once: true

- name: Create CPU metric event (>80%)
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects"
    method: POST
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: application/json
    body_format: json
    body:
      - "{{ dt_cpu_metric_event_doc }}"
    status_code: [200, 201]
  when: dt_cpu_metric_event_object_id | length == 0
  delegate_to: localhost
  run_once: true

- name: Update CPU metric event (>80%)
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects/{{ dt_cpu_metric_event_object_id }}"
    method: PUT
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: application/json
    body_format: json
    body: "{{ dt_cpu_metric_event_doc }}"
    status_code: [200, 204]
  when:
    - dt_cpu_metric_event_object_id | length > 0
    - dt_cpu_metric_event_change_needed | bool
  delegate_to: localhost
  run_once: true

- name: Report CPU metric event already up to date
  ansible.builtin.debug:
    msg: "CPU metric event '{{ dt_sn_cpu_metric_event_summary }}' already up to date — no change applied."
  when:
    - dt_cpu_metric_event_object_id | length > 0
    - not dt_cpu_metric_event_change_needed | bool
  run_once: true

- name: Create Spark ERROR log event
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects"
    method: POST
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: application/json
    body_format: json
    body:
      - "{{ dt_spark_error_log_event_doc }}"
    status_code: [200, 201]
  register: dt_log_event_create
  when: dt_spark_error_log_event_object_id | length == 0
  delegate_to: localhost
  run_once: true

- name: Record Spark ERROR log event objectId after create
  ansible.builtin.set_fact:
    dt_spark_error_log_event_object_id: "{{ dt_log_event_create.json[0].objectId | default('') }}"
  when:
    - dt_log_event_create is defined
    - not dt_log_event_create is skipped
  run_once: true

- name: Update Spark ERROR log event
  ansible.builtin.uri:
    url: "{{ dt_api_url_resolved }}/v2/settings/objects/{{ dt_spark_error_log_event_object_id }}"
    method: PUT
    headers:
      Authorization: "Api-Token {{ dt_api_token_resolved }}"
      Content-Type: application/json
    body_format: json
    body: "{{ dt_spark_error_log_event_doc }}"
    status_code: [200, 204]
  when:
    - dt_spark_error_log_event_object_id | length > 0
    - dt_spark_error_log_event_change_needed | bool
  delegate_to: localhost
  run_once: true

- name: Report Spark ERROR log event already up to date
  ansible.builtin.debug:
    msg: "Log event '{{ dt_sn_spark_error_log_event_summary }}' already up to date — no change applied."
  when:
    - dt_spark_error_log_event_object_id | length > 0
    - not dt_spark_error_log_event_change_needed | bool
  run_once: true

- name: Show Spark ERROR log event state
  ansible.builtin.debug:
    msg: >-
      Log event '{{ dt_sn_spark_error_log_event_summary }}' => {{ dt_spark_error_log_event_object_id }}
      ({{ 'created/updated' if dt_spark_error_log_event_change_needed | bool else 'already up to date — no change applied' }})
  run_once: true
