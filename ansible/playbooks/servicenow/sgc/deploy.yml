---
# SGC deploy — instance-side validation; topology imports run via Guided Setup.
# Idempotent and on-needed: read-only checks; fails with remediation when the
# SGC scoped application is missing (run install.yml first).
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/servicenow/sgc/deploy.yml -e @../vars/secrets.yaml

- name: Deploy / validate Dynatrace SGC integration prerequisites
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir | regex_replace('/ansible/playbooks/.*$', '') }}/vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir | regex_replace('/ansible/playbooks/.*$', '') }}/vars/contexts/dynatrace_ansible_vars.yml"
    - "{{ playbook_dir | regex_replace('^(.*/sgc)(/.*)?$', '\\1') }}/common/vars.yml"
    - "{{ playbook_dir | regex_replace('/ansible/playbooks/.*$', '') }}/vars/secrets.yaml"
  tasks:
    - name: Check SGC application presence
      ansible.builtin.include_tasks: sources/dynatrace/tasks/check_sgc_prerequisites.yml

    - name: Stop when SGC scoped application is not installed
      ansible.builtin.fail:
        msg: |
          Service Graph Connector for Observability – Dynatrace is not installed on {{ sn_url }}.
          Run playbooks/servicenow/sgc/install.yml (or install manually per docs/install.md §7),
          complete Guided Setup (Dynatrace Observability → Setup), then re-run:
            playbooks/servicenow/sgc/deploy.yml
            playbooks/servicenow/sgc/sources/dynatrace/events/deploy.yml
          See ansible/playbooks/servicenow/sgc/README.md
      when: not sn_sgc_scope_present | bool

    - name: Remind operator to run SGC scheduled imports
      ansible.builtin.debug:
        msg: |
          SGC application detected. Run scheduled imports from ServiceNow:
            Dynatrace Observability → Scheduled Data Imports → Execute (Hosts, then Processes/Services)
          Wait for Concurrent Import Sets to finish, then verify sys_object_source rows for SGO-Dynatrace.
