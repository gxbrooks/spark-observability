---
# SGC diagnose — Store app/plugin versions, SGC state, and CMDB merge state.
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/servicenow/sgc/diagnose.yml -e @../vars/secrets.yaml

- name: Diagnose Dynatrace SGC prerequisites and CMDB merge state
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir | regex_replace('/ansible/playbooks/.*$', '') }}/vars/contexts/servicenow_ansible_vars.yml"
    - "{{ playbook_dir | regex_replace('/ansible/playbooks/.*$', '') }}/vars/contexts/dynatrace_ansible_vars.yml"
    - "{{ playbook_dir | regex_replace('^(.*/sgc)(/.*)?$', '\\1') }}/common/vars.yml"
    - "{{ playbook_dir | regex_replace('^(.*/sgc)(/.*)?$', '\\1') }}/common/store_apps.yml"
    - "{{ playbook_dir | regex_replace('/ansible/playbooks/.*$', '') }}/vars/secrets.yaml"
  tasks:
    # ----- Component versions (installed vs pinned vs latest) -----------------
    - name: Check Store application and plugin versions
      ansible.builtin.include_tasks: common/check_store_apps.yml

    - name: Resolve Dynatrace API
      ansible.builtin.include_tasks: sources/dynatrace/tasks/resolve_dt_api.yml

    - name: Validate platform, dependency, and RTE compatibility
      ansible.builtin.include_tasks: common/validate_compatibility.yml

    - name: Report version pinning and update availability
      ansible.builtin.debug:
        msg: >-
          {{ item.scope }}:
          {{ 'installed v' ~ item.installed_version if item.installed
             else ('not installed' if item.status_known else 'state unknown (insufficient API access)') }}
          | pinned: {{ item.pinned_version if item.pinned_version | length > 0 else 'none' }}
          | latest known: {{ item.latest_version if item.latest_version | length > 0
                             else 'unreadable (sys_store_app requires elevated role)' }}
          | update available: {{ item.update_available if item.update_available | length > 0 else 'unknown' }}
          {{ '| ACTION: align installed version with pin (sgc/common/store_apps.yml)'
             if item.installed and item.pinned_version | length > 0
                and item.installed_version != item.pinned_version else '' }}
      loop: "{{ sn_store_app_status }}"
      loop_control:
        label: "{{ item.scope }}"

    # ----- SGC application and CMDB source rows --------------------------------
    - name: Check SGC application and CMDB source rows
      ansible.builtin.include_tasks: sources/dynatrace/tasks/check_sgc_prerequisites.yml

    - name: List brooks-lab Linux server CIs (Discovery authoritative)
      ansible.builtin.include_tasks: "{{ sn_discovery_common_dir }}/sn_rest_get.yml"
      vars:
        sn_rest_table: cmdb_ci_linux_server
        sn_rest_query: "sysparm_query=location.name={{ sn_lab_location_name | urlencode }}&sysparm_fields=name,host_name,discovery_source,sys_id&sysparm_limit=10"

    - name: Show Discovery Linux servers
      ansible.builtin.debug:
        var: sn_rest_json.result

    # ----- Dynatrace side -------------------------------------------------------
    - name: Query Dynatrace HOST entities (sample)
      ansible.builtin.uri:
        url: "{{ dt_api_url_resolved }}/v2/entities?entitySelector=type(HOST)&pageSize=50"
        method: GET
        headers:
          Authorization: "Api-Token {{ dt_api_token_resolved }}"
        status_code: [200]
      register: dt_hosts
      failed_when: false

    - name: Show lab-relevant Dynatrace hosts
      ansible.builtin.debug:
        msg: >-
          {{ dt_hosts.json.entities | default([])
             | selectattr('displayName', 'search', 'Lab')
             | map(attribute='displayName') | list }}

    - name: Hostname alignment note
      ansible.builtin.debug:
        msg: |
          IRE merge requires consistent host identity across Discovery, Dynatrace, and SGC.
          Name matching is case-insensitive (ServiceNow string queries / IRE lookups), so
          lab1 vs Lab1 alone does not block a merge. What does matter is the name FORM:
          short name vs FQDN (lab1 vs Lab1.lan) and serial/IP identifiers. Verify Dynatrace
          detectedName and Discovery host_name/name resolve to the same form before
          expecting automatic CI binding on events.
