---
# Shared ServiceNow SGC / event integration variables.
#
# Context variables (UPPERCASE) come ONLY from the generated context files
# (vars/contexts/servicenow_ansible_vars.yml, dynatrace_ansible_vars.yml).
# The single source of truth is vars/variables.yaml — do NOT add default(...)
# fallbacks for context variables here; a missing variable must fail the play.
# Secrets: vars/secrets.yaml (servicenow: block).

sn_url: "{{ SN_URL | trim }}"
sn_user: "{{ servicenow.SN_USER | default(SN_USER) }}"
sn_password: "{{ servicenow.SN_PASSWORD | default(SN_PASSWORD) }}"
sn_instance_short_name: "{{ SN_INSTANCE_SHORT_NAME }}"
sn_lab_location_name: "{{ SN_LAB_LOCATION_NAME }}"

sn_api_headers:
  Accept: application/json
  Content-Type: application/json

# Directory anchors — valid from sgc/, sgc/sources/<source>/ and deeper.
sn_sgc_dir: "{{ playbook_dir | regex_replace('^(.*/sgc)(/.*)?$', '\\1') }}"
sn_servicenow_playbooks_dir: "{{ sn_sgc_dir | dirname }}"
sn_discovery_common_dir: "{{ sn_servicenow_playbooks_dir }}/discovery/common"
sn_dynatrace_source_dir: "{{ sn_sgc_dir }}/sources/dynatrace"

# Required Store applications and plugins: common/store_apps.yml (sn_store_apps),
# loaded via vars_files by install.yml and diagnose.yml.

# SGC (2nd gen Observability connector)
sn_sgc_app_scope: sn_dynatrace_integ
sn_sgc_discovery_source: SGO-Dynatrace
sn_sgc_event_source: SGO-Dynatrace

# Legacy EM push connector (pre-SGC / parallel path on demo instances)
sn_dt_legacy_event_source: dynatrace
sn_dt_legacy_connector_sys_id: "{{ SN_DT_LEGACY_CONNECTOR_SYS_ID }}"

sn_dt_event_inbound_url_sgc: >-
  {{ sn_url }}/api/sn_em_connector/em/inbound_event?source={{ sn_sgc_event_source }}
sn_dt_event_inbound_url_legacy: >-
  {{ sn_url }}/api/sn_em_connector/em/inbound_event?source={{ sn_dt_legacy_event_source }}&sys_id={{ sn_dt_legacy_connector_sys_id }}

# SGO-Dynatrace webhook Basic auth (ensure_sn_dt_webhook_auth.yml → secrets.yaml SN_DT_WEBHOOK_*)

# Dynatrace API (resolved in sources/dynatrace/tasks/resolve_dt_api.yml)
dt_api_url_resolved: ""
dt_api_token_resolved: ""
dt_management_zone_resolved: "{{ DT_MANAGEMENT_ZONE }}"
dt_management_zone_object_id: ""
dt_host_group_resolved: "{{ DT_HOST_GROUP }}"

# Dedicated Dynatrace token for the SGC connection (minted by
# sources/dynatrace/tasks/ensure_sgc_credential.yml via DT_TOKEN_ADMIN_TOKEN)
dt_sgc_api_token_name: dynatrace-servicenow-sgc-integration

# SGC credential rotation (sources/dynatrace/tasks/check_sgc_token_remint_needed.yml)
sgc_hosts_import_table: sn_dynatrace_integ_sg_dynatrace_hosts
sgc_auto_rotate_token: true

# SGO-Dynatrace Hosts scheduled import (sources/dynatrace/start.yml)
sgc_hosts_scheduled_import_name: SGO-Dynatrace Hosts
sgc_import_execute: true
sgc_import_monitor: true
sgc_import_skip_if_running: true
sgc_import_restore_schedule: true
sgc_import_start_offset_seconds: 30
sgc_import_queue_retries: 12
sgc_import_queue_delay: 10
sgc_import_poll_interval: 300
sgc_import_poll_retries: 12
sgc_import_lab_feeds:
  - sn_dynatrace_integ_sg_dynatrace_hosts
  - sn_dynatrace_integ_sg_dynatrace_processes
  - sn_dynatrace_integ_sg_dynatrace_process_groups
  - sn_dynatrace_integ_sg_dynatrace_services
  - sn_dynatrace_integ_sg_dynatrace_applications
  - sn_dynatrace_integ_sg_dynatrace_application_relationships
  - sn_dynatrace_integ_sgo_dynatrace_kubernetes_cluster
  - sn_dynatrace_integ_sgo_dynatrace_kubernetes_node
  - sn_dynatrace_integ_sgo_dynatrace_kubernetes_pod
  - sn_dynatrace_integ_sgo_dynatrace_kubernetes_namespace
  - sn_dynatrace_integ_sgo_dynatrace_custom_applications

# Lab alerting / notification object names (idempotent upsert keys)
dt_sn_alerting_profile_name: "Spark Observability - ServiceNow brooks-lab"
dt_sn_problem_notification_name: "ServiceNow brooks-lab - Spark Observability"
dt_sn_cpu_metric_event_summary: "Spark Lab - Host CPU above 80%"
dt_sn_spark_error_log_event_summary: "Spark Lab - ERROR log lines"
