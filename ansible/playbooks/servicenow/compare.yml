---
# Top-level ServiceNow ↔ Dynatrace model comparison.
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/servicenow/compare.yml -e @../vars/secrets.yaml
#
# Process: playbooks/servicenow/docs/DT_SN_Comparison_Process.md

- name: ServiceNow compare banner
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [always, servicenow]
  tasks:
    - name: Display ServiceNow compare information
      ansible.builtin.debug:
        msg: |
          ServiceNow ↔ Dynatrace compare:
            compare/run.yml — DT_SN_Model_Comparison.json (export) + DT_SN_Model_Comparison_Report.json under tmp/compare/
            Optional: -e sn_compare_filter_by_cmdb_location=true -e sn_compare_filter_by_dynatrace_mz=true

- import_playbook: compare/run.yml
  tags: [servicenow]
