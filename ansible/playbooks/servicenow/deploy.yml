---
# ServiceNow deploy — Discovery instance config, CMDB 360, K8s/Docker discovery, Dynatrace SGC.
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/servicenow/deploy.yml -e @../vars/secrets.yaml

- name: ServiceNow deploy banner
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [always, servicenow]
  tasks:
    - name: Display ServiceNow deploy information
      ansible.builtin.debug:
        msg: |
          ServiceNow deploy:
            discovery/deploy → discovery/k8s/deploy → discovery/docker/deploy
            → cmdb/deploy → sgc/deploy → sgc/sources/dynatrace/deploy → events/deploy
            → incident/deploy

- import_playbook: discovery/deploy.yml
  tags: [servicenow]

- import_playbook: discovery/k8s/deploy.yml
  tags: [servicenow]

- import_playbook: discovery/docker/deploy.yml
  tags: [servicenow]

- import_playbook: cmdb/deploy.yml
  tags: [servicenow]

- import_playbook: sgc/deploy.yml
  tags: [servicenow]

- import_playbook: sgc/sources/dynatrace/deploy.yml
  tags: [servicenow]

- import_playbook: sgc/sources/dynatrace/events/deploy.yml
  tags: [servicenow]

- import_playbook: incident/deploy.yml
  tags: [servicenow]
