---
# Deploy CSDM objects from one specification file.
# Input: sn_csdm_spec_path

- name: Load CSDM specification
  ansible.builtin.include_tasks: load_csdm_spec.yml

- name: Validate csdm_op values in specification
  ansible.builtin.include_tasks: validate_csdm_spec_ops.yml

- name: Initialize CSDM registry for this specification
  ansible.builtin.set_fact:
    sn_csdm_registry: "{{ sn_csdm_registry | default({}) | combine({'business_applications': sn_csdm_registry.business_applications | default({}), 'business_services': sn_csdm_registry.business_services | default({}), 'application_services': sn_csdm_registry.application_services | default({})}, recursive=True) }}"
    sn_csdm_app_svc_queue: []
    sn_csdm_app_svc_delete_queue: []
    sn_sm_discover_service_names: "{{ sn_sm_discover_service_names | default([]) }}"
    sn_csdm_runtime_tag_manifest: []

- name: Initialize application service delete queue
  ansible.builtin.set_fact:
    sn_csdm_app_svc_delete_queue: >-
      {{ sn_csdm_app_svc_delete_queue | default([]) + [ {'spec': app_svc_spec, 'host': ''} ] }}
  loop: "{{ sn_csdm_spec.application_services | default([]) | rejectattr('expand', 'defined') | list }}"
  loop_control:
    loop_var: app_svc_spec
    label: "{{ app_svc_spec.name | default('') }}"
  when: app_svc_spec.csdm_op | default(sn_csdm_spec.csdm_defaults.csdm_op | default('insert')) == 'delete'

- name: Use delete queue while expanding application services for delete
  ansible.builtin.set_fact:
    sn_csdm_app_svc_queue: "{{ sn_csdm_app_svc_delete_queue | default([]) }}"

- name: Queue expanded application services for delete
  ansible.builtin.include_tasks: queue_expanded_application_service.yml
  loop: "{{ sn_csdm_spec.application_services | default([]) | selectattr('expand', 'defined') | list }}"
  loop_control:
    loop_var: sn_csdm_app_svc_entry
    label: "{{ sn_csdm_app_svc_entry.name | default('') }}"
  when: sn_csdm_app_svc_entry.csdm_op | default(sn_csdm_spec.csdm_defaults.csdm_op | default('insert')) == 'delete'

- name: Persist expanded application service delete queue
  ansible.builtin.set_fact:
    sn_csdm_app_svc_delete_queue: "{{ sn_csdm_app_svc_queue | default([]) }}"
    sn_csdm_app_svc_queue: []

- name: Delete application services (before business services and business applications)
  ansible.builtin.include_tasks: delete_application_service.yml
  loop: "{{ sn_csdm_app_svc_delete_queue | default([]) }}"
  loop_control:
    loop_var: sn_csdm_app_svc_item
    label: "{{ sn_csdm_app_svc_item.spec.name | default('') }} — {{ sn_csdm_app_svc_item.host | default('') }}"

- name: Delete business services
  ansible.builtin.include_tasks: delete_business_service.yml
  loop: "{{ sn_csdm_spec.business_services | default([]) }}"
  loop_control:
    loop_var: sn_csdm_bs_spec
    label: "{{ sn_csdm_bs_spec.name | default('') }}"
  when: sn_csdm_bs_spec.csdm_op | default(sn_csdm_spec.csdm_defaults.csdm_op | default('insert')) == 'delete'

- name: Delete business applications
  ansible.builtin.include_tasks: delete_business_application.yml
  loop: "{{ sn_csdm_spec.business_applications | default([]) }}"
  loop_control:
    loop_var: sn_csdm_ba_spec
    label: "{{ sn_csdm_ba_spec.name | default('') }}"
  when: sn_csdm_ba_spec.csdm_op | default(sn_csdm_spec.csdm_defaults.csdm_op | default('insert')) == 'delete'

- name: Deploy business applications from specification
  ansible.builtin.include_tasks: deploy_business_application.yml
  loop: "{{ sn_csdm_spec.business_applications | default([]) }}"
  loop_control:
    loop_var: sn_csdm_ba_spec
    label: "{{ sn_csdm_ba_spec.name | default('') }}"
  when: sn_csdm_ba_spec.csdm_op | default(sn_csdm_spec.csdm_defaults.csdm_op | default('insert')) != 'delete'

- name: Deploy business services from specification
  ansible.builtin.include_tasks: deploy_business_service.yml
  loop: "{{ sn_csdm_spec.business_services | default([]) }}"
  loop_control:
    loop_var: sn_csdm_bs_spec
    label: "{{ sn_csdm_bs_spec.name | default('') }}"
  when: sn_csdm_bs_spec.csdm_op | default(sn_csdm_spec.csdm_defaults.csdm_op | default('insert')) != 'delete'

- name: Queue static application services (no inventory expand)
  ansible.builtin.set_fact:
    sn_csdm_app_svc_queue: >-
      {{ sn_csdm_app_svc_queue + [ {'spec': app_svc_spec, 'host': ''} ] }}
  loop: "{{ sn_csdm_spec.application_services | default([]) | rejectattr('expand', 'defined') | list }}"
  loop_control:
    loop_var: app_svc_spec
    label: "{{ app_svc_spec.name | default('') }}"
  when: app_svc_spec.csdm_op | default(sn_csdm_spec.csdm_defaults.csdm_op | default('insert')) != 'delete'

- name: Queue expanded application services (inventory group loop)
  ansible.builtin.include_tasks: queue_expanded_application_service.yml
  loop: "{{ sn_csdm_spec.application_services | default([]) | selectattr('expand', 'defined') | list }}"
  loop_control:
    loop_var: sn_csdm_app_svc_entry
    label: "{{ sn_csdm_app_svc_entry.name | default('') }}"
  when: sn_csdm_app_svc_entry.csdm_op | default(sn_csdm_spec.csdm_defaults.csdm_op | default('insert')) != 'delete'

- name: Deploy application services from queue
  ansible.builtin.include_tasks: deploy_application_service.yml
  loop: "{{ sn_csdm_app_svc_queue }}"
  loop_control:
    loop_var: sn_csdm_app_svc_item
    label: "{{ sn_csdm_app_svc_item.spec.name | default('') }} — {{ sn_csdm_app_svc_item.host | default('') }}"

- name: CSDM specification deploy summary
  ansible.builtin.debug:
    msg: >-
      Processed {{ sn_csdm_spec_path | basename }}:
      {{ sn_csdm_app_svc_delete_queue | default([]) | length }} application service delete(s),
      {{ sn_csdm_app_svc_queue | length }} application service insert(s),
      {{ sn_sm_discover_service_names | length }} vertical discovery trigger(s) queued.

- name: Write runtime tag manifest for specification
  ansible.builtin.copy:
    content: "{{ {'spec_file': sn_csdm_spec_path | basename, 'services': sn_csdm_runtime_tag_manifest | default([])} | to_nice_yaml }}"
    dest: "{{ sn_csdm_runtime_tag_output_dir }}/{{ sn_csdm_spec_path | basename | regex_replace('\\.ya?ml$', '') }}_tags.yml"
    mode: "0644"
  when: sn_csdm_runtime_tag_manifest | default([]) | length > 0
