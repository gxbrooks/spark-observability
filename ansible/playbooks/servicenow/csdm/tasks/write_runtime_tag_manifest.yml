---
# Append one application service entry to the runtime tag manifest.
# Input: sn_csdm_app_svc_item, sn_csdm_merged_kubernetes_labels, sn_csdm_merged_docker_labels

- name: Append runtime tag manifest entry
  ansible.builtin.set_fact:
    sn_csdm_runtime_tag_manifest: >-
      {{ sn_csdm_runtime_tag_manifest | default([]) + [{
           'name': sn_csdm_app_svc_name,
           'identifier': sn_csdm_app_identifier,
           'platform': sn_csdm_app_svc_item.spec.platform,
           'service_mapping': sn_csdm_app_svc_item.spec.service_mapping,
           'kubernetes_labels': sn_csdm_merged_kubernetes_labels | default({}),
           'docker_labels': sn_csdm_merged_docker_labels | default({})
         }] }}
