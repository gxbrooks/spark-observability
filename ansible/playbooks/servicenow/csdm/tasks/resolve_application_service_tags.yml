---
# Merge tag_defaults and application service attributes into runtime label maps.
# Input: sn_csdm_app_svc_item, sn_csdm_spec
# Output: sn_csdm_merged_kubernetes_labels, sn_csdm_merged_docker_labels, sn_csdm_app_identifier

- name: Resolve application service identifier
  ansible.builtin.set_fact:
    sn_csdm_app_identifier: >-
      {{ sn_csdm_app_svc_item.spec.identifier
         | replace('{host}', sn_csdm_app_svc_item.host)
         | replace('{host_lower}', sn_csdm_app_svc_item.host | lower) }}

- name: Resolve business service identifier
  ansible.builtin.set_fact:
    sn_csdm_bs_identifier: >-
      {{ (sn_csdm_spec.business_services | default([])
          | selectattr('name', 'equalto', sn_csdm_app_svc_item.spec.parent_business_service)
          | map(attribute='identifier') | list | first) | default('') }}

- name: Resolve parent business application name
  ansible.builtin.set_fact:
    sn_csdm_bs_ba_name: >-
      {{ (sn_csdm_spec.business_services | default([])
          | selectattr('name', 'equalto', sn_csdm_app_svc_item.spec.parent_business_service)
          | map(attribute='parent_business_application') | list | first) | default('') }}

- name: Resolve business application identifier
  ansible.builtin.set_fact:
    sn_csdm_ba_identifier: >-
      {{ (sn_csdm_spec.business_applications | default([])
          | selectattr('name', 'equalto', sn_csdm_bs_ba_name)
          | map(attribute='identifier') | list | first) | default('') }}

- name: Resolve top-level tag attributes
  ansible.builtin.set_fact:
    sn_csdm_tag_environment: >-
      {{ sn_csdm_app_svc_item.spec.environment
         | default(sn_csdm_spec.tag_defaults.environment | default('')) }}
    sn_csdm_tag_location: >-
      {{ sn_csdm_app_svc_item.spec.location
         | default(sn_csdm_spec.tag_defaults.location | default('')) }}
    sn_csdm_tag_cluster: >-
      {{ sn_csdm_app_svc_item.spec.cluster
         | default(sn_csdm_spec.tag_defaults.cluster | default('')) }}
    sn_csdm_tag_service_tier: "{{ sn_csdm_app_svc_item.spec.service_tier | default('') }}"
    sn_csdm_tag_namespace: "{{ sn_csdm_app_svc_item.spec.namespace | default('') }}"

- name: Build ServiceNow standard labels
  ansible.builtin.set_fact:
    sn_csdm_merged_servicenow_labels: >-
      {{ {
           'servicenow.io/application-identifier': sn_csdm_ba_identifier,
           'servicenow.io/business-service-identifier': sn_csdm_bs_identifier,
           'servicenow.io/application-service-identifier': sn_csdm_app_identifier,
           'servicenow.io/environment': sn_csdm_tag_environment,
           'servicenow.io/location': sn_csdm_tag_location
         }
         | combine(
             {'servicenow.io/service-tier': sn_csdm_tag_service_tier}
             if sn_csdm_tag_service_tier | length > 0 else {},
             {'servicenow.io/cluster': sn_csdm_tag_cluster}
             if sn_csdm_tag_cluster | length > 0 else {},
             {'servicenow.io/namespace': sn_csdm_tag_namespace}
             if sn_csdm_tag_namespace | length > 0 else {},
             recursive=True) }}

- name: Merge Kubernetes workload labels
  ansible.builtin.set_fact:
    sn_csdm_merged_kubernetes_labels: >-
      {{ sn_csdm_merged_servicenow_labels
         | combine(sn_csdm_app_svc_item.spec.tags.kubernetes | default({}), recursive=True) }}

- name: Merge Docker workload labels
  ansible.builtin.set_fact:
    sn_csdm_merged_docker_labels: >-
      {{ sn_csdm_merged_servicenow_labels
         | combine(sn_csdm_app_svc_item.spec.tags.docker | default({}), recursive=True) }}
