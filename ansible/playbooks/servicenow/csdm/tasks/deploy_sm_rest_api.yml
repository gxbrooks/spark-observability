- name: Persist Service Mapping REST URIs to context file
  ansible.builtin.copy:
    dest: "{{ playbook_dir }}/../../../../vars/contexts/servicenow_sm_deploy.json"
    mode: "0644"
    content: >-
      {{ {
        'sm_rest_discover_uri': sn_sm_rest_discover_uri | default(''),
        'sm_rest_populate_tags_uri': sn_sm_rest_populate_tags_uri | default(''),
        'sm_rest_ensure_tag_categories_uri': sn_sm_rest_ensure_tag_categories_uri | default(''),
        'sm_rest_base_uri': sn_sm_rest_base_uri | default('')
      } | to_nice_json }}

- name: Service Mapping REST API summary
  ansible.builtin.debug:
    msg: |
      Service Mapping Operations API:
        POST {{ sn_sm_rest_discover_uri | default('pending') }} — vertical discovery
        POST {{ sn_sm_rest_populate_tags_uri | default('pending') }} — tag_list population
        POST {{ sn_sm_rest_ensure_tag_categories_uri | default('pending') }} — CI tag categories
