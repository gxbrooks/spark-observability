---
- name: Distribute Elastic CA Certificate to all hosts
  hosts: all
  become: true
  vars:
    cert_source_host: "GaryPC-WSL"
    cert_source_path: "/mnt/c/Volumes/certs/Elastic/ca.crt"
    cert_dest_path: "/etc/ssl/certs/elastic/ca.crt"
    cert_dest_dir: "/etc/ssl/certs/elastic"
    
  tasks:
    - name: Create certificate directory
      ansible.builtin.file:
        path: "{{ cert_dest_dir }}"
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Fetch certificate from GaryPC-WSL
      ansible.builtin.fetch:
        src: "{{ cert_source_path }}"
        dest: "/tmp/elastic_ca.crt"
        flat: yes
      delegate_to: "{{ cert_source_host }}"
      when: inventory_hostname != cert_source_host

    - name: Copy certificate to target host
      ansible.builtin.copy:
        src: "/tmp/elastic_ca.crt"
        dest: "{{ cert_dest_path }}"
        mode: '0644'
        owner: root
        group: root
        backup: yes
      when: inventory_hostname != cert_source_host

    - name: Copy certificate locally on GaryPC-WSL
      ansible.builtin.copy:
        src: "{{ cert_source_path }}"
        dest: "{{ cert_dest_path }}"
        mode: '0644'
        owner: root
        group: root
        backup: yes
      when: inventory_hostname == cert_source_host

    - name: Verify certificate
      ansible.builtin.shell: |
        openssl x509 -in {{ cert_dest_path }} -text -noout | head -5
      register: cert_info
      changed_when: false

    - name: Display certificate info
      ansible.builtin.debug:
        msg: "Certificate info for {{ inventory_hostname }}: {{ cert_info.stdout_lines }}"

    - name: Clean up temporary certificate file
      ansible.builtin.file:
        path: "/tmp/elastic_ca.crt"
        state: absent
      when: inventory_hostname != cert_source_host