- name: Install Elastic Agent on Windows and Linux
  hosts: all
  vars:
    elastic_agent_version: "8.11.1"
    elastic_agent_windows_url: "https://artifacts.elastic.co/downloads/beats/elastic-agent/elastic-agent-{{ elastic_agent_version }}-windows-x86_64.zip"
    elastic_agent_linux_url: "https://artifacts.elastic.co/downloads/beats/elastic-agent/elastic-agent-{{ elastic_agent_version }}-linux-x86_64.tar.gz"
    elastic_agent_windows_dest: 'C:\elastic-agent.zip'
    elastic_agent_linux_dest: "/tmp/elastic-agent.tar.gz"
    elastic_agent_linux_extract_dir: "/opt"
    elastic_agent_linux_versioned_dir: "/opt/elastic-agent-{{ elastic_agent_version }}-linux-x86_64"
  tasks:
    - name: Download Elastic Agent (Windows)
      ansible.windows.win_get_url:
        url: "{{ elastic_agent_windows_url }}"
        dest: '{{ elastic_agent_windows_dest }}'
      when: ansible_os_family == "Windows"

    - name: Unzip Elastic Agent (Windows)
      community.windows.win_unzip:
        src: '{{ elastic_agent_windows_dest }}'
        dest: 'C:\elastic-agent'
      when: ansible_os_family == "Windows"

    - name: Check if Elastic Agent is already installed (Windows)
      ansible.windows.win_stat:
        path: 'C:\Program Files\Elastic\Agent'
      register: elastic_agent_installed_win
      when: ansible_os_family == "Windows"

    - name: Install Elastic Agent (Windows)
      ansible.windows.win_command: 'C:\elastic-agent\elastic-agent.exe install'
      when:
        - ansible_os_family == "Windows"
        - not elastic_agent_installed_win.stat.exists

    - name: Remove Elastic Agent archive (Windows)
      ansible.windows.win_file:
        path: '{{ elastic_agent_windows_dest }}'
        state: absent
      when: ansible_os_family == "Windows"

    - name: Download Elastic Agent (Linux)
      ansible.builtin.get_url:
        url: "{{ elastic_agent_linux_url }}"
        dest: "{{ elastic_agent_linux_dest }}"
      when: ansible_os_family != "Windows"
      become: true

    - name: Extract Elastic Agent (Linux)
      ansible.builtin.unarchive:
        src: "{{ elastic_agent_linux_dest }}"
        dest: "{{ elastic_agent_linux_extract_dir }}"
        remote_src: yes
      when: ansible_os_family != "Windows"
      become: true

    - name: Check if Elastic Agent is already installed (Linux)
      ansible.builtin.stat:
        path: "{{ elastic_agent_linux_versioned_dir }}"
      register: elastic_agent_installed_linux
      when: ansible_os_family != "Windows"

    - name: Install Elastic Agent (Linux)
      ansible.builtin.shell: "{{ elastic_agent_linux_versioned_dir }}/elastic-agent install"
      when:
        - ansible_os_family != "Windows"
        - not elastic_agent_installed_linux.stat.exists
      become: true

    - name: Remove Elastic Agent archive (Linux)
      ansible.builtin.file:
        path: "{{ elastic_agent_linux_dest }}"
        state: absent
      when: ansible_os_family != "Windows"
      become: true
