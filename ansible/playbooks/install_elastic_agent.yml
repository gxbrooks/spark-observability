# Windows Play
- name: Install Elastic Agent on Windows hosts (SSH+cmd, raw module only)
  hosts: windows
  vars:
    elastic_agent_version: "9.0.1"
    elastic_agent_windows_url: "https://artifacts.elastic.co/downloads/beats/elastic-agent/elastic-agent-{{ elastic_agent_version }}-windows-x86_64.zip"
    elastic_agent_temp_base: "C:/temp"
    elastic_agent_download_dir: "{{ elastic_agent_temp_base }}/elastic-downloads"
    elastic_agent_extract_dir: "{{ elastic_agent_temp_base }}/elastic-extract"
    elastic_agent_install_dir: "C:/Program Files/Elastic/Agent"
    elastic_agent_config_src: "../../elastic-agent/elastic-agent.windows.yml"
    elastic_agent_service_name: "Elastic Agent"
    elastic_agent_zip: "{{ elastic_agent_download_dir }}/elastic-agent-{{ elastic_agent_version }}.zip"
    elastic_agent_extract_subdir: "{{ elastic_agent_extract_dir }}/elastic-agent-{{ elastic_agent_version }}-windows-x86_64"
  tasks:
    - name: Ensure temp directories exist
      raw: cmd.exe /c "if not exist {{ item }} mkdir {{ item }}"
      loop:
        - "{{ elastic_agent_download_dir }}"
        - "{{ elastic_agent_extract_dir }}"

    - name: Download Elastic Agent zip (using PowerShell Invoke-WebRequest)
      raw: powershell -Command "Invoke-WebRequest -Uri '{{ elastic_agent_windows_url }}' -OutFile '{{ elastic_agent_zip }}' -UseBasicParsing"

    - name: Unzip Elastic Agent (using PowerShell Expand-Archive)
      raw: powershell -Command "Expand-Archive -Path '{{ elastic_agent_zip }}' -DestinationPath '{{ elastic_agent_extract_dir }}' -Force"

    - name: Copy Elastic Agent config (using copy command)
      raw: copy /Y "{{ elastic_agent_config_src }}" "{{ elastic_agent_extract_subdir }}\\elastic-agent.yml"

    - name: Install Elastic Agent
      raw: "{{ elastic_agent_extract_subdir }}\\elastic-agent.exe install -c {{ elastic_agent_extract_subdir }}\\elastic-agent.yml"
      register: install_result
      ignore_errors: true

    - name: Ensure Elastic Agent service is running
      raw: sc query "{{ elastic_agent_service_name }}"
      register: service_status
      changed_when: false

    - name: Debug install result
      debug:
        var: install_result

    - name: Debug service status
      debug:
        var: service_status

    - name: Check if configuration file already exists and get checksum
      ansible.windows.win_stat:
        path: "{{ elastic_agent_install_dir }}\\elastic-agent.yml"
        get_checksum: yes
      register: existing_config

    - name: Get checksum of source configuration file
      ansible.builtin.stat:
        path: "{{ elastic_agent_config_src }}"
        get_checksum: yes
      register: source_config
      delegate_to: localhost

    - name: Stop Elastic Agent service (for configuration)
      win_service:
        name: "{{ elastic_agent_service_name }}"
        state: stopped
      when:
        - elastic_agent_service_check.exists or service_check.exists
        - not existing_config.stat.exists or (existing_config.stat.checksum != source_config.stat.checksum)

    - name: Copy Elastic Agent configuration file
      win_copy:
        src: "{{ elastic_agent_config_src }}"
        dest: "{{ elastic_agent_install_dir }}\\elastic-agent.yml"
        backup: yes
      when: not existing_config.stat.exists or (existing_config.stat.checksum != source_config.stat.checksum)

    - name: Start Elastic Agent service
      win_service:
        name: "{{ elastic_agent_service_name }}"
        state: started
        start_mode: auto
      when: elastic_agent_service_check.exists or service_check.exists

    - name: Check if env.conf already exists and get checksum (Windows)
      ansible.windows.win_stat:
        path: '{{ elastic_agent_install_dir }}\\env.conf'
        get_checksum: yes
      register: existing_envconf

    - name: Get checksum of source env.conf file (Windows)
      ansible.builtin.stat:
        path: "../../elastic-agent/env.conf"
        get_checksum: yes
      register: source_envconf
      delegate_to: localhost

    - name: Copy env.conf to Windows host if changed
      win_copy:
        src: "../../elastic-agent/env.conf"
        dest: '{{ elastic_agent_install_dir }}\\env.conf'
        backup: yes
      when: not existing_envconf.stat.exists or (existing_envconf.stat.checksum != source_envconf.stat.checksum)

    - name: Generate Windows service environment variable string from env.conf
      ansible.builtin.command: >-
        python3 ../../elastic-agent/envconf_to_win_env.py ../../elastic-agent/env.conf
      register: win_env_vars
      delegate_to: localhost
      when: not existing_envconf.stat.exists or (existing_envconf.stat.checksum != source_envconf.stat.checksum)

    - name: Set Elastic Agent service environment variables in registry (Windows)
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Services\{{ elastic_agent_service_name }}
        name: Environment
        data: "{{ win_env_vars.stdout }}"
        type: string
      when: win_env_vars is defined

    - name: Restart Elastic Agent service to pick up new environment or config (Windows)
      win_service:
        name: "{{ elastic_agent_service_name }}"
        state: restarted
      when: >
        (not existing_envconf.stat.exists or existing_envconf.stat.checksum != source_envconf.stat.checksum) or
        (not existing_config.stat.exists or existing_config.stat.checksum != source_config.stat.checksum)

# Linux Play (Native Only)
- name: Install Elastic Agent on Native Linux hosts
  hosts: native
  vars:
    elastic_agent_version: "9.0.1"
    elastic_agent_url: "https://artifacts.elastic.co/downloads/beats/elastic-agent/elastic-agent-{{ elastic_agent_version }}-linux-x86_64.tar.gz"
    elastic_agent_temp_base: "/tmp"
    elastic_agent_download_dir: "{{ elastic_agent_temp_base }}/elastic-downloads"
    elastic_agent_extract_dir: "{{ elastic_agent_temp_base }}/elastic-extract"
    elastic_agent_download_file: "{{ elastic_agent_download_dir }}/elastic-agent-{{ elastic_agent_version }}-linux-x86_64.tar.gz"
    elastic_agent_install_dir: "/opt/Elastic/Agent"
    elastic_agent_config_src: "../../elastic-agent/elastic-agent.linux.yml"
    elastic_agent_envconf_src: "../../elastic-agent/env.conf"
    elastic_agent_envconf_dest: "/etc/systemd/system/elastic-agent.service.d/env.conf"
    elastic_agent_service_name: "elastic-agent"
    elastic_agent_versioned_dir: "{{ elastic_agent_extract_dir }}/elastic-agent-{{ elastic_agent_version }}-linux-x86_64"

  tasks:
    - name: Create download and extract directories (Linux)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ elastic_agent_download_dir }}"
        - "{{ elastic_agent_extract_dir }}"
      become: true

    - name: Check if Elastic Agent archive already exists (Linux)
      ansible.builtin.stat:
        path: "{{ elastic_agent_download_file }}"
      register: elastic_agent_download_exists_linux

    - name: Download Elastic Agent (Linux)
      ansible.builtin.get_url:
        url: "{{ elastic_agent_url }}"
        dest: "{{ elastic_agent_download_file }}"
      when: not elastic_agent_download_exists_linux.stat.exists
      become: true

    - name: Check if Elastic Agent is already extracted (Linux)
      ansible.builtin.stat:
        path: "{{ elastic_agent_versioned_dir }}/elastic-agent"
      register: elastic_agent_extracted_linux

    - name: Extract Elastic Agent (Linux)
      ansible.builtin.unarchive:
        src: "{{ elastic_agent_download_file }}"
        dest: "{{ elastic_agent_extract_dir }}"
        remote_src: yes
      when: not elastic_agent_extracted_linux.stat.exists
      become: true

    - name: Check if Elastic Agent is already installed (Linux)
      ansible.builtin.stat:
        path: "/etc/systemd/system/{{ elastic_agent_service_name }}.service"
      register: elastic_agent_installed_linux

    - name: List contents of extracted Elastic Agent directory (Linux)
      ansible.builtin.shell: "ls -l {{ elastic_agent_versioned_dir }}"
      register: agent_extract_ls
      changed_when: false
      become: true

    - name: Check if Elastic Agent binary is present (Linux)
      ansible.builtin.stat:
        path: "{{ elastic_agent_install_dir }}/elastic-agent"
      register: elastic_agent_binary_linux
      become: true

    - name: Remove stale systemd unit if agent binary is missing (Linux)
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ elastic_agent_service_name }}.service"
        state: absent
      when: not elastic_agent_binary_linux.stat.exists
      become: true

    - name: Check installed Elastic Agent version (Linux)
      ansible.builtin.shell: |
        if [ -x "{{ elastic_agent_install_dir }}/elastic-agent" ]; then
          "{{ elastic_agent_install_dir }}/elastic-agent" version | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+'
        else
          echo "none"
        fi
      register: installed_agent_version_linux
      changed_when: false
      become: true

    - name: Uninstall Elastic Agent if wrong version is installed (Linux)
      ansible.builtin.shell: |
        if [ -x "{{ elastic_agent_install_dir }}/elastic-agent" ]; then
          "{{ elastic_agent_install_dir }}/elastic-agent" uninstall --force || true
        fi
      when: installed_agent_version_linux.stdout != 'none' and installed_agent_version_linux.stdout != elastic_agent_version
      become: true

    - name: Install Elastic Agent (Linux)
      ansible.builtin.shell: "./elastic-agent install --non-interactive"
      args:
        chdir: "{{ elastic_agent_versioned_dir }}"
      when: installed_agent_version_linux.stdout != elastic_agent_version
      register: elastic_agent_install_result
      failed_when:
        - elastic_agent_install_result.rc != 0
        - "'already installed' not in elastic_agent_install_result.stderr"
      become: true

    - name: Check if configuration file already exists and get checksum (Linux)
      ansible.builtin.stat:
        path: "{{ elastic_agent_install_dir }}/elastic-agent.yml"
        get_checksum: yes
      register: existing_config_linux
      become: true

    - name: Get checksum of source configuration file (Linux)
      ansible.builtin.stat:
        path: "{{ elastic_agent_config_src }}"
        get_checksum: yes
      register: source_config_linux
      delegate_to: localhost

    - name: Stop Elastic Agent service (for configuration) (Linux)
      ansible.builtin.systemd:
        name: "{{ elastic_agent_service_name }}"
        state: stopped
      when: not existing_config_linux.stat.exists or (existing_config_linux.stat.checksum != source_config_linux.stat.checksum)
      become: true

    - name: Copy Elastic Agent configuration file (Linux)
      ansible.builtin.copy:
        src: "{{ elastic_agent_config_src }}"
        dest: "{{ elastic_agent_install_dir }}/elastic-agent.yml"
        backup: yes
      when: not existing_config_linux.stat.exists or (existing_config_linux.stat.checksum != source_config_linux.stat.checksum)
      become: true

    - name: Ensure systemd drop-in directory exists for Elastic Agent (Linux)
      ansible.builtin.file:
        path: "{{ elastic_agent_envconf_dest | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      become: true

    - name: Copy Elastic Agent environment file (Linux)
      ansible.builtin.copy:
        src: "{{ elastic_agent_envconf_src }}"
        dest: "{{ elastic_agent_envconf_dest }}"
        owner: root
        group: root
        mode: "0644"
      become: true

    - name: Reload systemd for Elastic Agent (Linux)
      ansible.builtin.systemd:
        daemon_reload: true
      become: true

    - name: Start Elastic Agent service (Linux)
      ansible.builtin.systemd:
        name: "{{ elastic_agent_service_name }}"
        state: restarted
        enabled: yes
      when: elastic_agent_installed_linux.stat.exists or (not existing_config_linux.stat.exists or (existing_config_linux.stat.checksum != source_config_linux.stat.checksum))
      become: true

    - name: Remove Elastic Agent archive (Linux)
      ansible.builtin.file:
        path: "{{ elastic_agent_download_file }}"
        state: absent
      become: true
