---
# Top-level diagnostics — runs each subsystem's diagnose playbook in order.
#
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/diagnose.yml
#
# Subsystems (each has its own playbooks/<area>/diagnose.yml):
#   1. Docker (observability host engine)
#   2. NFS
#   3. Kubernetes
#   4. Observability (Docker Compose stack; includes Prometheus sub-diagnose)
#   5. Spark (K8s workloads + telemetry)
#   6. Elastic Agent
#
# For Prometheus-only metrics pipeline detail, you can also run:
#   playbooks/observability/prometheus/diagnose.yml
#
# Replaces the former top-level status.yml.

- name: Display diagnose banner
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [always]
  tasks:
    - name: Display diagnostic information
      ansible.builtin.debug:
        msg: |
          ================================================
          Spark Observability Platform — Diagnose (top-level)
          ================================================
          Running, in order:
            - docker/diagnose.yml
            - nfs/diagnose.yml
            - k8s/diagnose.yml
            - observability/diagnose.yml (includes prometheus/diagnose.yml)
            - spark/diagnose.yml
            - elastic-agent/diagnose.yml
          ================================================

- import_playbook: docker/diagnose.yml

- import_playbook: nfs/diagnose.yml

- import_playbook: k8s/diagnose.yml

- import_playbook: observability/diagnose.yml

- import_playbook: spark/diagnose.yml

- import_playbook: elastic-agent/diagnose.yml

- name: Display diagnose summary
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [always]
  tasks:
    - name: Display summary message
      ansible.builtin.debug:
        msg: |
          ================================================
          Diagnose playbook complete
          ================================================
          Review task output above. Quick K8s check:
            kubectl get pods -n spark
            kubectl get svc -n spark
          Component quick checks still available, e.g.:
            playbooks/spark/status.yml
            playbooks/observability/status.yml
            playbooks/elastic-agent/status.yml
          Behavior tests:
            playbooks/test.yml
          ================================================
