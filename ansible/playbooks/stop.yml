---
# Global stop playbook - shuts down all components in reverse order
# Usage: cd ansible && ansible-playbook -i inventory.yml playbooks/stop.yml

- name: Display shutdown banner
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Display shutdown information
      debug:
        msg: |
          ================================================
          Spark Observability Platform - Shutdown
          ================================================
          
          This playbook will stop components in reverse order:
          1. Spark on Kubernetes (master, workers, history)
          2. Observability Platform (GaryPC-WSL)
          3. Kubernetes Cluster
          4. NFS Server (Lab2)
          
          Note: Docker and Elastic Agent will remain running
          
          ================================================

# Step 1: Stop Spark
- import_playbook: spark/stop_spark.yml

# Step 2: Stop Observability Platform
- import_playbook: observability/stop.yml

# Step 3: Stop Kubernetes
- import_playbook: k8s/stop_k8s.yml

# Step 4: Stop NFS
- import_playbook: nfs/stop_nfs.yml

# Step 5: Display completion status
- name: Display shutdown completion status
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Display completion message
      debug:
        msg: |
          ================================================
          Spark Observability Platform - Shutdown Complete
          ================================================
          
          All services have been stopped:
          ✓ Spark components stopped
          ✓ Observability platform stopped
          ✓ Kubernetes cluster stopped
          ✓ NFS server stopped
          
          Services still running:
          - Docker (use docker/stop_docker.yml to stop if needed)
          - Elastic Agent (use elastic-agent/restart_elastic_agent.yml to manage)
          
          To restart all services:
            cd ansible && ansible-playbook -i inventory.yml playbooks/start.yml
          
          ================================================

