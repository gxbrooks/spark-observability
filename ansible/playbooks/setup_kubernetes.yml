---
- name: Setup Kubernetes prerequisites
  hosts: linux:!wsl  # Target only native Linux hosts, exclude WSL
  become: true
  tasks:
    - name: Install required system packages
      raw: >
        apt-get update && 
        apt-get install -y apt-transport-https ca-certificates curl software-properties-common gnupg2
      
    - name: Add Kubernetes apt key
      raw: curl -s https://packages.cloud.google.com/apt/doc/apt-key.gpg | apt-key add -

    - name: Add Kubernetes repository
      raw: >
        echo "deb https://apt.kubernetes.io/ kubernetes-xenial main" | 
        tee /etc/apt/sources.list.d/kubernetes.list
      
    - name: Install Kubernetes packages
      raw: >
        apt-get update && 
        apt-get install -y kubelet kubeadm kubectl
        
    - name: Hold Kubernetes packages at current version
      raw: apt-mark hold kubelet kubeadm kubectl
      
    - name: Disable swap
      raw: swapoff -a
      
    - name: Remove swap from fstab
      raw: sed -i '/swap/d' /etc/fstab
      
    - name: Enable required kernel modules
      raw: |
        modprobe overlay
        modprobe br_netfilter
        
    - name: Configure kernel parameters for Kubernetes
      raw: |
        cat <<EOF | tee /etc/sysctl.d/k8s.conf
        net.bridge.bridge-nf-call-iptables  = 1
        net.bridge.bridge-nf-call-ip6tables = 1
        net.ipv4.ip_forward                 = 1
        EOF
        sysctl --system
