---
- name: Setup Kubernetes prerequisites for Spark
  hosts: spark_kubernetes:&linux
  become: true
  vars:
    k8s_group: kubernetes
    control_user: "{{ k8s_control_user | default(lookup('env', 'USER')) }}"
  tasks:
    - name: Create kubernetes group
      group:
        name: "{{ k8s_group }}"
        state: present

    - name: Add users to kubernetes group
      user:
        name: "{{ item }}"
        groups: "{{ k8s_group }}"
        append: yes
      loop:
        - "{{ control_user }}"
        - "{{ ansible_user }}"
        - kubernetes

    - name: Ensure kubernetes operational directories exist with correct permissions
      file:
        path: "{{ item }}"
        state: directory
        group: "{{ k8s_group }}"
        mode: "g+rwX"
        recurse: yes
      loop:
        - "/home/{{ ansible_user }}/.kube"
        - "/home/{{ ansible_user }}/kubernetes"
        - "/etc/kubernetes"
        - "/etc/containerd"
      when: inventory_hostname == groups['spark_kubernetes'][0]

    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg2
          - software-properties-common
          - python3-pip
          - python3-kubernetes  # Use the system package instead of pip
        state: present
        update_cache: yes

    - name: Create Kubernetes apt key directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Kubernetes signing key
      ansible.builtin.shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key | gpg --yes --dearmor -o /etc/apt/keyrings/kubernetes-archive-keyring.gpg
        chmod 644 /etc/apt/keyrings/kubernetes-archive-keyring.gpg

    - name: Add Kubernetes apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-archive-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /"
        state: present
        filename: kubernetes
        update_cache: yes

    - name: Install containerd
      ansible.builtin.apt:
        name: containerd
        state: present
        update_cache: yes

    - name: Create containerd config directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Configure containerd
      ansible.builtin.shell: |
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml

    - name: Restart and enable containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: Install Kubernetes packages
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: Disable swap
      ansible.builtin.command: swapoff -a

    - name: Remove swap from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: 'swap'
        state: absent

    - name: Enable required kernel modules
      ansible.builtin.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Set kernel parameters for Kubernetes
      ansible.builtin.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { name: 'net.bridge.bridge-nf-call-iptables', value: 1 }
        - { name: 'net.bridge.bridge-nf-call-ip6tables', value: 1 }
        - { name: 'net.ipv4.ip_forward', value: 1 }