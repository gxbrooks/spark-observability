---
# Stop Elastic Agent service
# Usage: ansible-playbook -i inventory.yml playbooks/elastic-agent/stop.yml

- name: Stop Elastic Agent
  hosts: linux
  become: true
  gather_facts: false
  
  tasks:
    - name: Stop Elastic Agent service
      systemd:
        name: elastic-agent
        state: stopped
    
    - name: Display status
      debug:
        msg: "Elastic Agent stopped on {{ inventory_hostname }}"

