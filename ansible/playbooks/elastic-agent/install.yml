# Linux (native) — Elastic Agent for host metrics and log shipping
- name: Install Elastic Agent on Native Linux hosts following best practices
  hosts: native
  vars_files:
    - "{{ playbook_dir | dirname | dirname | dirname }}/vars/contexts/elastic_agent_ansible_vars.yml"
  vars:
    elastic_agent_url: "https://artifacts.elastic.co/downloads/beats/elastic-agent/elastic-agent-{{ elastic_agent_version }}-linux-x86_64.tar.gz"
    elastic_agent_temp_base: "/tmp"
    elastic_agent_download_dir: "{{ elastic_agent_temp_base }}/elastic-downloads"
    elastic_agent_extract_dir: "{{ elastic_agent_temp_base }}/elastic-extract"
    elastic_agent_download_file: "{{ elastic_agent_download_dir }}/elastic-agent-{{ elastic_agent_version }}-linux-x86_64.tar.gz"
    elastic_agent_install_dir: "/opt/Elastic/Agent"
    # Use OS-based configuration (linux.yml.j2 template) with host-specific variables
    elastic_agent_config_template: "{{ playbook_dir }}/../../../elastic-agent/elastic-agent.linux.yml.j2"
    elastic_agent_config_dest: "{{ elastic_agent_install_dir }}/elastic-agent.yml"
    elastic_agent_envconf_src: "{{ playbook_dir }}/../../../vars/contexts/elastic_agent_env.conf"
    elastic_agent_envconf_dest: "/etc/elastic-agent/elastic_agent_env.conf"
    gpu_metrics_script_src: "{{ playbook_dir }}/../../../elastic-agent/bin/gpu-metrics.py"
    gpu_metrics_script_path: "{{ elastic_agent_install_dir }}/extensions/gpu-metrics.py"
    elastic_agent_service_name: "elastic-agent"
    elastic_agent_versioned_dir: "{{ elastic_agent_extract_dir }}/elastic-agent-{{ elastic_agent_version }}-linux-x86_64"
    elastic_agent_user: "elastic-agent"
    elastic_agent_group: "elastic-agent"
    elastic_agent_logs: "/var/log/elastic-agent"
    elastic_agent_data: "/var/lib/elastic-agent"
    ops_user: "ansible"

  tasks:
    - name: Install AMD GPU monitoring packages (Linux)
      apt:
        name:
          - radeontop
          - rocm-smi
        state: present
        update_cache: yes
      become: true
      when: ansible_architecture == "x86_64"

    - name: Create elastic-agent user (Linux)
      ansible.builtin.user:
        name: "{{ elastic_agent_user }}"
        system: true
        shell: /bin/false
        home: "{{ elastic_agent_install_dir }}"
        create_home: false
        state: present
      become: true

    - name: Create elastic-agent group (Linux)
      ansible.builtin.group:
        name: "{{ elastic_agent_group }}"
        state: present
      become: true

    - name: Add ops user to elastic-agent group (Linux)
      ansible.builtin.user:
        name: "{{ ops_user }}"
        groups: "{{ elastic_agent_group }}"
        append: true
      become: true

    - name: Add developer user to elastic-agent group (Linux)
      ansible.builtin.user:
        name: "gxbrooks"
        groups: "{{ elastic_agent_group }}"
        append: true
      become: true

    - name: Add elastic-agent user to spark group (Linux)
      ansible.builtin.user:
        name: "{{ elastic_agent_user }}"
        groups: "spark"
        append: true
      become: true

    - name: Create Elastic Agent system directories (Linux)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ elastic_agent_user }}"
        group: "{{ elastic_agent_group }}"
        mode: '0755'
      loop:
        - "{{ elastic_agent_logs }}"
        - "{{ elastic_agent_data }}"
        - "/etc/elastic-agent"
      become: true

    - name: Ensure Elastic Agent logs directory has proper group permissions (Linux)
      ansible.builtin.file:
        path: "{{ elastic_agent_logs }}"
        state: directory
        owner: "{{ elastic_agent_user }}"
        group: "{{ elastic_agent_group }}"
        mode: '0755'
        recurse: true
      become: true

    - name: Ensure Elastic Agent log files are group readable (Linux)
      ansible.builtin.shell:
        cmd: "chmod 644 {{ elastic_agent_logs }}/*.ndjson"
      become: true
      ignore_errors: true

    - name: Create download and extract directories (Linux)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ elastic_agent_download_dir }}"
        - "{{ elastic_agent_extract_dir }}"
      become: true

    - name: Check if Elastic Agent archive already exists (Linux)
      ansible.builtin.stat:
        path: "{{ elastic_agent_download_file }}"
      register: elastic_agent_download_exists_linux

    - name: Download Elastic Agent (Linux)
      ansible.builtin.get_url:
        url: "{{ elastic_agent_url }}"
        dest: "{{ elastic_agent_download_file }}"
      when: not elastic_agent_download_exists_linux.stat.exists
      become: true

    - name: Check if Elastic Agent is already extracted (Linux)
      ansible.builtin.stat:
        path: "{{ elastic_agent_versioned_dir }}/elastic-agent"
      register: elastic_agent_extracted_linux

    - name: Extract Elastic Agent (Linux)
      ansible.builtin.unarchive:
        src: "{{ elastic_agent_download_file }}"
        dest: "{{ elastic_agent_extract_dir }}"
        remote_src: yes
      when: not elastic_agent_extracted_linux.stat.exists
      become: true

    - name: Create Elastic Agent install directory (Linux)
      ansible.builtin.file:
        path: "{{ elastic_agent_install_dir }}"
        state: directory
        owner: "{{ elastic_agent_user }}"
        group: "{{ elastic_agent_group }}"
        mode: '0755'
      become: true

    - name: Copy Elastic Agent to system directory (Linux)
      ansible.builtin.copy:
        src: "{{ elastic_agent_versioned_dir }}/"
        dest: "{{ elastic_agent_install_dir }}"
        owner: "{{ elastic_agent_user }}"
        group: "{{ elastic_agent_group }}"
        mode: '0755'
        remote_src: true
      become: true

    - name: Ensure Elastic Agent extensions directory exists (Linux)
      ansible.builtin.file:
        path: "{{ elastic_agent_install_dir }}/extensions"
        state: directory
        owner: "{{ elastic_agent_user }}"
        group: "{{ elastic_agent_group }}"
        mode: '0755'
      become: true

    - name: Deploy GPU metrics collector script (Linux)
      ansible.builtin.copy:
        src: "{{ gpu_metrics_script_src }}"
        dest: "{{ gpu_metrics_script_path }}"
        owner: "{{ elastic_agent_user }}"
        group: "{{ elastic_agent_group }}"
        mode: '0755'
      become: true

    - name: Create GPU metrics log directory (Linux)
      ansible.builtin.file:
        path: /var/log/gpu-metrics
        state: directory
        owner: "{{ elastic_agent_user }}"
        group: "{{ elastic_agent_group }}"
        mode: '0755'
      become: true

    - name: Create GPU metrics systemd service (Linux)
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=GPU Metrics Collector
          After=network.target

          [Service]
          Type=oneshot
          User={{ elastic_agent_user }}
          Group={{ elastic_agent_group }}
          ExecStart={{ gpu_metrics_script_path }} /var/log/gpu-metrics/gpu.ndjson
          StandardOutput=journal
          StandardError=journal
        dest: /etc/systemd/system/gpu-metrics.service
        mode: '0644'
      become: true

    - name: Create GPU metrics systemd timer (Linux)
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=GPU Metrics Collector Timer
          Requires=gpu-metrics.service

          [Timer]
          OnBootSec=10s
          OnUnitActiveSec=10s
          AccuracySec=1s

          [Install]
          WantedBy=timers.target
        dest: /etc/systemd/system/gpu-metrics.timer
        mode: '0644'
      become: true

    - name: Reload systemd daemon (Linux)
      ansible.builtin.systemd:
        daemon_reload: yes
      become: true

    - name: Enable and start GPU metrics timer (Linux)
      ansible.builtin.systemd:
        name: gpu-metrics.timer
        enabled: yes
        state: started
      become: true

    - name: Find Elastic Agent binary directory
      ansible.builtin.find:
        paths: "{{ elastic_agent_install_dir }}/data"
        patterns: "elastic-agent-*"
        file_type: directory
      register: agent_dirs
      become: true

    - name: Set Elastic Agent binary path
      set_fact:
        elastic_agent_binary_dir: "{{ (agent_dirs.files | sort(attribute='mtime', reverse=True) | first).path }}"
      when: agent_dirs.matched > 0

    - name: Create systemd service for elastic-agent (Linux)
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Elastic Agent
          After=network.target

          [Service]
          Type=simple
          User={{ elastic_agent_user }}
          Group={{ elastic_agent_group }}
          WorkingDirectory={{ elastic_agent_install_dir }}
          ExecStart={{ elastic_agent_install_dir }}/elastic-agent run --path.config {{ elastic_agent_install_dir }} --path.logs {{ elastic_agent_logs }}
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=elastic-agent
          EnvironmentFile={{ elastic_agent_envconf_dest }}

          [Install]
          WantedBy=multi-user.target
        dest: "/etc/systemd/system/{{ elastic_agent_service_name }}.service"
        mode: '0644'
      become: true

    - name: Check if configuration file already exists and get checksum (Linux)
      ansible.builtin.stat:
        path: "{{ elastic_agent_install_dir }}/elastic-agent.yml"
        get_checksum: yes
      register: existing_config_linux
      become: true

    - name: Check if configuration template exists (Linux)
      ansible.builtin.stat:
        path: "{{ elastic_agent_config_template }}"
      register: config_template_check
      delegate_to: localhost

    - name: Stop Elastic Agent service (for configuration) (Linux)
      ansible.builtin.systemd:
        name: "{{ elastic_agent_service_name }}"
        state: stopped
      become: true
      ignore_errors: true

    - name: Deploy Elastic Agent configuration from template (Linux)
      ansible.builtin.template:
        src: "{{ elastic_agent_config_template }}"
        dest: "{{ elastic_agent_config_dest }}"
        owner: "{{ elastic_agent_user }}"
        group: "{{ elastic_agent_group }}"
        mode: '0640'
        backup: yes
      become: true

    - name: Copy Elastic Agent environment file (Linux)
      ansible.builtin.copy:
        src: "{{ elastic_agent_envconf_src }}"
        dest: "{{ elastic_agent_envconf_dest }}"
        owner: "{{ elastic_agent_user }}"
        group: "{{ elastic_agent_group }}"
        mode: '0640'
      become: true

    # Pull-based CA: fetch from Docker volume on observability host (single source of truth)
    # See docs/CA_CERTIFICATE_ARCHITECTURE.md
    - name: Get Docker volume mount point for certs (observability host)
      delegate_to: "{{ groups['observability'][0] }}"
      shell: |
        for vol in $(docker volume ls -q); do
          if echo "$vol" | grep -q certs; then
            docker volume inspect "$vol" --format '{{ "{{" }} .Mountpoint {{ "}}" }}' 2>/dev/null | tr -d '\n'
            exit 0
          fi
        done
        echo ""
      register: cert_volume_path
      changed_when: false
      failed_when: false

    - name: Fetch CA from Docker volume (ca/ca.crt)
      delegate_to: "{{ groups['observability'][0] }}"
      fetch:
        src: "{{ (cert_volume_path.stdout | trim) }}/ca/ca.crt"
        dest: "/tmp/elastic-ca-{{ inventory_hostname }}.crt"
        flat: yes
      when: (cert_volume_path.stdout | trim) != ""
      register: cert_fetch_ca_dir
      ignore_errors: true

    - name: Fetch CA from Docker volume root (ca.crt)
      delegate_to: "{{ groups['observability'][0] }}"
      fetch:
        src: "{{ (cert_volume_path.stdout | trim) }}/ca.crt"
        dest: "/tmp/elastic-ca-{{ inventory_hostname }}.crt"
        flat: yes
      when: (cert_volume_path.stdout | trim) != "" and (cert_fetch_ca_dir is not defined or cert_fetch_ca_dir.failed | default(true))
      register: cert_fetch_root

    - name: Fail if certificate fetch failed
      fail:
        msg: "Could not fetch CA from observability Docker volume. Run observability start.yml first so certs volume exists."
      when: >
        (cert_volume_path.stdout | default('') | trim) == "" or
        (cert_fetch_ca_dir.failed | default(true) and (cert_fetch_root is not defined or cert_fetch_root.failed | default(true)))

    - name: Create Elastic certificate directory
      file:
        path: "/etc/ssl/certs/elastic"
        state: directory
        owner: root
        group: root
        mode: '0755'
      become: true

    - name: Copy CA certificate to host
      copy:
        src: "/tmp/elastic-ca-{{ inventory_hostname }}.crt"
        dest: "/etc/ssl/certs/elastic/ca.crt"
        owner: root
        group: root
        mode: '0644'
        backup: yes
      become: true

    - name: Clean up temporary CA cert
      file:
        path: "/tmp/elastic-ca-{{ inventory_hostname }}.crt"
        state: absent
      delegate_to: localhost
      become: false

    - name: Reload systemd for Elastic Agent (Linux)
      ansible.builtin.systemd:
        daemon_reload: true
      become: true

    - name: Start Elastic Agent service (Linux)
      ansible.builtin.systemd:
        name: "{{ elastic_agent_service_name }}"
        state: started
        enabled: yes
      become: true

    - name: Wait for elastic-agent to start (Linux)
      ansible.builtin.wait_for:
        timeout: 30

    - name: Check elastic-agent status (Linux)
      ansible.builtin.systemd:
        name: "{{ elastic_agent_service_name }}"
      register: elastic_agent_status
      become: true

    - name: Display elastic-agent status (Linux)
      ansible.builtin.debug:
        msg: "Elastic Agent is {{ elastic_agent_status.status.ActiveState }}"

    - name: Verify critical inputs are configured
      ansible.builtin.shell: |
        grep -c "id: {{ item }}" {{ elastic_agent_install_dir }}/elastic-agent.yml || echo "0"
      loop:
        - spark-events
        - spark-app-logs
        - spark-gc  # Correct ID (not spark-gc-logs)
      register: input_checks
      changed_when: false
      become: true

    - name: Display input configuration status
      ansible.builtin.debug:
        msg: |
          Elastic Agent Input Configuration Status:
          - spark-events: {{ 'CONFIGURED' if input_checks.results[0].stdout|int > 0 else 'MISSING' }}
          - spark-app-logs: {{ 'CONFIGURED' if input_checks.results[1].stdout|int > 0 else 'MISSING' }}
          - spark-gc: {{ 'CONFIGURED' if input_checks.results[2].stdout|int > 0 else 'MISSING' }}

    - name: Fail if critical inputs are missing
      ansible.builtin.fail:
        msg: "Critical Elastic Agent input '{{ item.item }}' is not configured in elastic-agent.yml"
      when: item.stdout|int == 0
      loop: "{{ input_checks.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Clean up temporary files (Linux)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ elastic_agent_download_file }}"
        - "{{ elastic_agent_extract_dir }}"
      become: true
