---
# Start Elastic Agent service and GPU metrics timer
# Usage: ansible-playbook -i inventory.yml playbooks/elastic-agent/start.yml
# CA: Pull-based model - tests currency of local CA vs Docker volume and re-fetches if stale (see docs/CA_CERTIFICATE_ARCHITECTURE.md)

- name: Start Elastic Agent
  hosts: linux
  become: true
  gather_facts: true
  
  vars:
    elastic_agent_envconf_dest: "/etc/elastic-agent/elastic_agent_env.conf"
    elastic_agent_envconf_src: "{{ playbook_dir }}/../../../vars/contexts/elastic_agent_env.conf"
    elastic_agent_config_template: "{{ playbook_dir }}/../../../elastic-agent/elastic-agent.linux.yml.j2"
    elastic_agent_config_dest: "/opt/Elastic/Agent/elastic-agent.yml"
    elastic_agent_ca_path: "/etc/ssl/certs/elastic/ca.crt"
  
  tasks:
    # --- CA currency check (pull-based): re-fetch from observability Docker volume if stale ---
    - name: Get CA hash from Docker volume (observability host)
      delegate_to: "{{ groups['observability'][0] }}"
      run_once: true
      shell: |
        for vol in $(docker volume ls -q); do
          if echo "$vol" | grep -q certs; then
            docker run --rm -v "$vol:/certs:ro" alpine sh -c "sha256sum /certs/ca.crt 2>/dev/null || sha256sum /certs/ca/ca.crt 2>/dev/null" | awk '{print $1}'
            exit 0
          fi
        done
        echo ""
      register: volume_ca_hash
      changed_when: false
      failed_when: false

    - name: Get local CA hash (agent host)
      shell: "sha256sum {{ elastic_agent_ca_path }} 2>/dev/null | awk '{print $1}' || echo 'MISSING'"
      register: local_ca_hash
      changed_when: false
      failed_when: false
      when: ansible_os_family == "Debian" or ansible_os_family == "RedHat"

    - name: Fetch and deploy CA from volume when stale
      block:
        - name: Get Docker volume path for CA (observability)
          delegate_to: "{{ groups['observability'][0] }}"
          shell: |
            for vol in $(docker volume ls -q); do
              if echo "$vol" | grep -q certs; then
                docker volume inspect "$vol" --format '{{ "{{" }} .Mountpoint {{ "}}" }}' 2>/dev/null | tr -d '\n'
                exit 0
              fi
            done
            echo ""
          register: cert_vol_path
          changed_when: false

        - name: Fetch CA from volume (ca/ca.crt)
          delegate_to: "{{ groups['observability'][0] }}"
          fetch:
            src: "{{ (cert_vol_path.stdout | trim) }}/ca/ca.crt"
            dest: "/tmp/elastic-ca-{{ inventory_hostname }}.crt"
            flat: yes
          ignore_errors: true
          register: fetch_ca

        - name: Fetch CA from volume root (ca.crt)
          delegate_to: "{{ groups['observability'][0] }}"
          fetch:
            src: "{{ (cert_vol_path.stdout | trim) }}/ca.crt"
            dest: "/tmp/elastic-ca-{{ inventory_hostname }}.crt"
            flat: yes
          when: fetch_ca is defined and fetch_ca.failed
          ignore_errors: true

        - name: Copy CA to agent host (currency update)
          copy:
            src: "/tmp/elastic-ca-{{ inventory_hostname }}.crt"
            dest: "{{ elastic_agent_ca_path }}"
            owner: root
            group: root
            mode: '0644'
            backup: yes

        - name: Remove temp CA from controller
          file:
            path: "/tmp/elastic-ca-{{ inventory_hostname }}.crt"
            state: absent
          delegate_to: localhost
      when: >
        (ansible_os_family == "Debian" or ansible_os_family == "RedHat") and
        (volume_ca_hash.stdout | default('') | trim) != "" and
        ((local_ca_hash.stdout | default('MISSING')) == "MISSING" or (volume_ca_hash.stdout | trim) != (local_ca_hash.stdout | trim))

    - name: Ensure Elastic Agent environment file is up to date
      copy:
        src: "{{ elastic_agent_envconf_src }}"
        dest: "{{ elastic_agent_envconf_dest }}"
        owner: root
        group: root
        mode: '0640'
        backup: yes
      when: ansible_os_family == "Debian" or ansible_os_family == "RedHat"
    
    - name: Redeploy Elastic Agent configuration (ensure Spark inputs are current)
      template:
        src: "{{ elastic_agent_config_template }}"
        dest: "{{ elastic_agent_config_dest }}"
        owner: elastic-agent
        group: elastic-agent
        mode: '0640'
        backup: yes
      when: ansible_os_family == "Debian" or ansible_os_family == "RedHat"
    
    - name: Stop Elastic Agent service (to reload environment)
      systemd:
        name: elastic-agent
        state: stopped
      when: ansible_os_family == "Debian" or ansible_os_family == "RedHat"
      ignore_errors: yes
    
    - name: Reload systemd daemon (to pick up environment file changes)
      systemd:
        daemon_reload: yes
      when: ansible_os_family == "Debian" or ansible_os_family == "RedHat"
    
    - name: Start Elastic Agent service
      systemd:
        name: elastic-agent
        state: started
        enabled: yes
    
    - name: Wait for Elastic Agent to start
      wait_for:
        timeout: 10
      changed_when: false
    
    - name: Start GPU metrics timer (Linux only)
      systemd:
        name: gpu-metrics.timer
        state: started
        enabled: yes
      when: ansible_os_family == "Debian" or ansible_os_family == "RedHat"
      ignore_errors: yes  # Timer may not exist on all hosts
    
    - name: Manually trigger GPU metrics collection (ensure it starts)
      systemd:
        name: gpu-metrics.service
        state: started
      when: ansible_os_family == "Debian" or ansible_os_family == "RedHat"
      ignore_errors: yes
    
    - name: Verify Elastic Agent is running
      systemd:
        name: elastic-agent
      register: agent_status
    
    - name: Verify GPU metrics timer is running (Linux only)
      systemd:
        name: gpu-metrics.timer
      register: gpu_timer_status
      when: ansible_os_family == "Debian" or ansible_os_family == "RedHat"
      ignore_errors: yes
    
    - name: Display status
      debug:
        msg: |
          Elastic Agent is {{ agent_status.status.ActiveState }} on {{ inventory_hostname }}
          {% if gpu_timer_status is defined and not gpu_timer_status.failed %}
          GPU metrics timer is {{ gpu_timer_status.status.ActiveState }} on {{ inventory_hostname }}
          {% endif %}

