# Spark version
spark_version: "4.0.1"

# Registry and image configuration (using local registry on Lab2)
registry_host: "lab2.lan:5000"
spark_image: "{{ registry_host }}/spark"
spark_tag: "{{ spark_version }}"

# Paths and directories
spark_events_dir: "/var/log/spark/events"
spark_home: "/opt/spark"

# Kubernetes-specific settings
k8s_namespace: "spark"
