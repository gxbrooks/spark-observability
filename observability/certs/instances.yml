instances:
  - name: "es01"
    dns:
      # Service names
      - "es01"
      - "kibana"
      # Short hostnames (observability host)
      - "__OBSERVABILITY_HOST_SHORT_UPPER__"
      - "__OBSERVABILITY_HOST_SHORT_LOWER__"
      # .lan FQDNs (DNS for home network)
      - "__OBSERVABILITY_HOST_FQDN__"
      # Standard names
      - "localhost"
    ip:
      # Loopback
      - "127.0.0.1"
      # Primary network IP (update to Lab3 DHCP reservation if using IP SANs)
      - "__OBSERVABILITY_HOST_IP__"
  - name: "kibana"
    dns:
      # Service names
      - "kibana"
      - "es01"
      - "__OBSERVABILITY_HOST_SHORT_UPPER__"
      - "__OBSERVABILITY_HOST_SHORT_LOWER__"
      - "__OBSERVABILITY_HOST_FQDN__"
      - "localhost"
    ip:
      - "127.0.0.1"
      - "__OBSERVABILITY_HOST_IP__"
