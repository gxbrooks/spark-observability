instances:
  - name: "es01"
    dns:
      # Service names
      - "es01"
      - "kibana"
      # Short hostnames (observability host)
      - "Lab3"
      - "lab3"
      # .lan FQDNs (DNS for home network)
      - "Lab3.lan"
      # Standard names
      - "localhost"
    ip:
      # Loopback
      - "127.0.0.1"
      # Primary network IP (update to Lab3 DHCP reservation if using IP SANs)
      - "192.168.1.49"
  - name: "kibana"
    dns:
      # Service names
      - "kibana"
      - "es01"
      - "Lab3"
      - "lab3"
      - "Lab3.lan"
      - "localhost"
    ip:
      - "127.0.0.1"
      - "192.168.1.49"
