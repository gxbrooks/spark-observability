x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

volumes:
  esdata:
    driver: local
  kibanadata:
    driver: local
  prometheus-data:
    driver: local
  tempo-data:
    driver: local
  # where private keys and associated certs are stored
  certs:
    driver: local


networks:
  default:
    name: elastic
    external: true

services:

  init-certs:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: init-certs
    labels:
      role: "Init Certs"
    volumes:
      # Xpack expects all certs to be rooted in config, so we standardize on 
      # that for all elasaticsearch images
      - certs:/usr/share/elasticsearch/config/certs
      # scripts and Elasticsearch cert config file
      - ./certs:/usr/share/elasticsearch/certs
      # CA_CERT path where certificate is published (inside container)
      # Certificate is also available in certs volume at /usr/share/elasticsearch/config/certs/ca/ca.crt
    environment:
      CA_CERT: "${CA_CERT}"
      FORCE_REGEN: "${FORCE_REGEN}"
      TZ: ${TZ}
    user: "0"
    entrypoint: ["bash", "-c", "./certs/init-certs.sh $${FORCE_REGEN:+--force}"]
    # env_file:
    #   - .env
    
  es01:
    container_name: es
    build: 
      context: ./elasticsearch
      dockerfile: Dockerfile
      args:
        STACK_VERSION: ${STACK_VERSION}
    image: elasticsearch-python
    restart: unless-stopped
    labels:
      co.elastic.logs/module: elasticsearch
      role: Elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - certs:/usr/share/elasticsearch/config/certs:ro
      - ./elasticsearch:/usr/share/elasticsearch/elasticsearch
    environment:
      # Map ES_* variables to ELASTIC_* for Elasticsearch service expectations
      # ES_* variables for scripts that may be run inside the container (esapi, kapi, etc.)
      ES_HOST: ${ES_HOST}
      ES_PORT: ${ES_PORT}
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      KIBANA_PORT: ${KB_PORT}
      KIBANA_PASSWORD: ${KB_PASSWORD}
      # Elasticsearch environment variables. See observability\docs\Elastic_Stack_Environment_Variables.md
      ELASTIC_PASSWORD: ${ES_PASSWORD}
      ELASTIC_USERNAME: ${ES_USER}      
      node.name: es01 # this one is questionable
      # are cluster.name and discovery.type needed?
      cluster.name: "${CLUSTER_NAME}"
      discovery.type: "single-node"
      bootstrap.memory_lock: "true"
      # Xpack is rooted at /usr/share/elasticsearch/config, so start all certificate 
      # paths with "certs/"!!!
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "true"
      xpack.security.http.ssl.key: "certs/es01/es01.key"
      xpack.security.http.ssl.certificate: "certs/es01/es01.crt"
      xpack.security.http.ssl.certificate_authorities: "certs/ca/ca.crt"
      xpack.security.transport.ssl.enabled: "true"
      xpack.security.transport.ssl.key: "certs/es01/es01.key"
      xpack.security.transport.ssl.certificate: "certs/es01/es01.crt"
      xpack.security.transport.ssl.certificate_authorities: "certs/ca/ca.crt"
      xpack.security.transport.ssl.verification_mode: "certificate"
      xpack.license.self_generated.type: "${LICENSE}"
      # For using Watcher as an HTTPS client
      # SSL resources must be in /usr/share/elasticsearch/config directory
      # The certs volume is mounted at /usr/share/elasticsearch/config/certs
      xpack.http.ssl.certificate_authorities: "certs/ca/ca.crt"
      # CA_CERT for scripts that may be run inside the container (esapi, kapi, etc.)
      CA_CERT: ${CA_CERT}
      TZ: ${TZ}    
    # ES_MEM_LIMIT=1GB is too tight. Let's see where it floats...    
    deploy:
      resources:
        limits:
          memory: 4g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    logging: *default-logging
    depends_on:
      init-certs:
        condition: service_completed_successfully 
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120
      


  set-kibana-password:
    image: elasticsearch-python
    container_name: set-kibana-password
    labels:
      role: "Set Kibana Password"
    volumes:
      - ./elasticsearch:/usr/share/elasticsearch/elasticsearch
      - certs:/usr/share/elasticsearch/config/certs:ro
    command:
      - bash
      - -c
      - |
        SCRIPT_DIR=/usr/share/elasticsearch/elasticsearch/bin
        PATH=$$PATH:$$SCRIPT_DIR
        cat > /tmp/kibana-password.json <<EOF
        {"password": "$$KB_PASSWORD"}
        EOF
        esapi POST /_security/user/kibana_system/_password /tmp/kibana-password.json
        rm -f /tmp/kibana-password.json
    environment:
      TZ: ${TZ}
      # ES_* variables for esapi/kapi commands (CA path must match volume mount)
      ES_DIR: /usr/share/elasticsearch/elasticsearch
      ES_CONFIG_DIR: /usr/share/elasticsearch/elasticsearch/config
      ES_OUTPUTS_DIR: /usr/share/elasticsearch/elasticsearch/outputs
      ES_BIN_DIR: /usr/share/elasticsearch/elasticsearch/bin
      CA_CERT: /usr/share/elasticsearch/config/certs/ca.crt
      ES_HOST: ${ES_HOST}
      ES_PORT: ${ES_PORT}
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      KIBANA_HOST: ${KB_HOST}
      KIBANA_PORT: ${KB_PORT}
      KIBANA_PASSWORD: ${KB_PASSWORD}
      KB_PASSWORD: ${KB_PASSWORD}
    depends_on:
      es01:
        condition: service_healthy
      init-certs:
        condition: service_completed_successfully

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION} 
    container_name: kibana
    restart: unless-stopped
    volumes:
      - kibanadata:/usr/share/kibana/data
      - certs:/etc/ssl/private/elastic/certs:ro
      - certs:/etc/ssl/certs/elastic:ro
    labels:
      co.elastic.logs/module: kibana
      role: "Kibana"
    ports:
      - ${KB_PORT}:5601
    environment:
       # should be = https://es01:9200
      ELASTICSEARCH_HOSTS: "https://${ES_HOST}:${ES_PORT}"
      # FIXME: ELASTICSEARCH_USERNAME and ELASTICSEARCH_PASSWORD should be ${ES_USER} and ${ES_PASSWORD}
      ELASTICSEARCH_USERNAME: ${KB_USER}
      ELASTICSEARCH_PASSWORD: ${KB_PASSWORD}
      # Kibana: CA at standard path (certs volume mounted at /etc/ssl/certs/elastic)
      ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES: "/etc/ssl/certs/elastic/ca.crt"
      XPACK_SECURITY_ENCRYPTIONKEY: ${EB_ENCRYPTION_KEY}
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: ${EB_ENCRYPTION_KEY}
      XPACK_REPORTING_ENCRYPTIONKEY: ${EB_ENCRYPTION_KEY}
      SERVER_PUBLICBASEURL: "http://${KB_HOST}:${KB_PORT}"
      NODE_OPTIONS: "--max-old-space-size=1536"
      TZ: ${TZ}    
    mem_limit: 2147483648
    logging: *default-logging
    depends_on:
      es01:
        condition: service_healthy
      set-kibana-password:
        condition: service_completed_successfully
      init-certs:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:${KB_PORT} | grep -q 'HTTP/1.1'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120    

  grafana:
    image: grafana/grafana-enterprise:${GRAFANA_VERSION}
    labels:
      role: "Grafana"
    container_name: grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - certs:/etc/ssl/private/elastic/certs
      - "./grafana/data:/var/lib/grafana/data"
      - "./grafana/provisioning:/etc/grafana/provisioning"
      - "./grafana/plugins:/var/lib/grafana/plugins"
      - "./grafana/grafana.ini:/etc/grafana/grafana.ini"
      - certs:/etc/ssl/certs/elastic:ro
    environment:
      # Must match vars/contexts/observability_docker.env (from secrets.yaml / generate_contexts)
      # Required for provisioning interpolation in grafana/provisioning/datasources/datasources.yaml
      # (${ES_PASSWORD}, ${STACK_VERSION} in secureJsonData / jsonData)
      ES_PASSWORD: ${ES_PASSWORD}
      STACK_VERSION: ${STACK_VERSION}
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-mysecretpassword}
      # GF_SERVER_HOST: localhost
      GF_SERVER_HTTP_PORT: ${GF_SERVER_HTTP_PORT}
      # GF_INSTALL_PLUGINS: "marcusolsson-dynamictext-panel"  # Disabled due to permission issues
      # Grafana should not need the CA cert
      CA_CERT: "${CA_CERT}"
      TZ: ${TZ}    
    deploy:
        resources:
          limits:
            memory: 2g
    logging: *default-logging
    depends_on:
      es01:
        condition: service_healthy 
      init-index:
        condition: service_completed_successfully
      prometheus:
        condition: service_healthy
      # tempo optional: Grafana can run without Tempo (trace features disabled)

  init-index:
    image: elasticsearch-python
    user: "0:0"
    command: bash -f ./elasticsearch/bin/init-index.sh
    labels:
      role: "Init Index and Kibana"
      description: "Unified initialization for Elasticsearch and Kibana"
    volumes:
      - ./elasticsearch:/usr/share/elasticsearch/elasticsearch
      - certs:/usr/share/elasticsearch/config/certs:ro
    environment:
      TZ: ${TZ}
      # variables for esapi and kapi commands (CA path must match volume mount)
      ES_DIR: /usr/share/elasticsearch/elasticsearch
      ES_CONFIG_DIR: /usr/share/elasticsearch/elasticsearch/config
      ES_OUTPUTS_DIR: /usr/share/elasticsearch/elasticsearch/outputs
      ES_BIN_DIR: /usr/share/elasticsearch/elasticsearch/bin
      CA_CERT: /usr/share/elasticsearch/config/certs/ca.crt
      ES_HOST: ${ES_HOST}
      ES_PORT: ${ES_PORT}
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      # Echoed in init-index.sh Step 4 (must match es01 xpack.license.self_generated.type intent)
      LICENSE: ${LICENSE}
      # Use Docker service name so init-index can reach Kibana on the same network
      KB_HOST: kibana
      KB_PORT: ${KB_PORT}
      KB_PASSWORD: ${KB_PASSWORD}
    depends_on:
      es01:
        condition: service_healthy
      set-kibana-password:
        condition: service_completed_successfully
      kibana:
        condition: service_healthy
      init-certs:
        condition: service_completed_successfully

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    labels:
      co.elastic.logs/module: otel-collector
      role: "OpenTelemetry Collector"
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "9201:9201"   # Prometheus remote write receiver (K8s metrics -> ES)
      - "8888:8888"   # Prometheus metrics
      - "13133:13133" # Health check
    volumes:
      - "./otel-collector/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro"
      - certs:/etc/ssl/certs/elastic:ro
    environment:
      ES_URL: "${ES_URL}"
      ES_USER: "elastic"
      ES_PASSWORD: "${ES_PASSWORD}"
      CA_CERT: ${CA_CERT}
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 384m
    depends_on:
      es01:
        condition: service_healthy
      init-index:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  # Prometheus remote write adapter: receives Prometheus remote write and indexes to Elasticsearch
  prometheus-es-adapter:
    # DISABLED: incompatible with ES 8.x mapping API (mapper_parsing_exception on root-level 'sample' mapping).
    # Prometheus metrics are now forwarded via OTel Collector prometheusremotewrite receiver (port 9201).
    # Preserved here for reference. To start manually: docker compose --profile legacy up prometheus-es-adapter
    profiles: ["legacy"]
    image: pwillie/prometheus-es-adapter:latest
    container_name: prometheus-es-adapter
    labels:
      role: "Prometheus ES Adapter"
    ports:
      - "9202:8000"   # /write and /read
      - "9203:9000"   # /metrics, /live, /ready
    environment:
      ES_URL: "${ES_URL}"
      ES_USER: "${ES_USER}"
      ES_PASSWORD: "${ES_PASSWORD}"
      ES_ALIAS: "metrics-kubernetes-default"
      ES_INDEX_DAILY: "false"
      ES_INDEX_SHARDS: "1"
      ES_INDEX_REPLICAS: "1"
      ES_INDEX_MAX_AGE: "1d"
      ES_BATCH_MAX_DOCS: "1000"
      ES_BATCH_MAX_AGE: "10"
      ES_WORKERS: "2"
      STATS: "true"
      # Go HTTP client: use Elastic CA for HTTPS connection to Elasticsearch
      SSL_CERT_FILE: "/etc/ssl/certs/elastic/ca.crt"
      TZ: ${TZ}
    volumes:
      - certs:/etc/ssl/certs/elastic:ro
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.25'
    depends_on:
      es01:
        condition: service_healthy
      init-index:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9000/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    # Pin to 3.8+ for Remote Write v2 (OTel prometheusremotewrite receiver)
    image: prom/prometheus:v3.8.0
    container_name: prometheus
    restart: unless-stopped
    labels:
      role: "Prometheus"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - "./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "./prometheus/rules:/etc/prometheus/rules:ro"
      - prometheus-data:/prometheus
      # Elastic CA (for ES TLS if needed)
      - certs:/etc/ssl/certs/elastic:ro
      # Kubernetes API client certs for scraping K8s (populated by observability deploy from K8s master)
      - "./k8s-certs:/etc/ssl/certs/kubernetes:ro"
    environment:
      ES_URL: "${ES_URL}"
      ES_USER: "${ES_USER}"
      ES_PASSWORD: "${ES_PASSWORD}"
      KUBERNETES_API_SERVER: "${KUBERNETES_API_SERVER}"
      CA_CERT: ${CA_CERT}
      TZ: ${TZ}
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: '0.5'
    logging: *default-logging
    depends_on:
      es01:
        condition: service_healthy
      init-index:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 10

  tempo:
    image: grafana/tempo:2.7.0
    container_name: tempo
    restart: unless-stopped
    labels:
      role: "Grafana Tempo"
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "3200:3200"   # HTTP server (Grafana queries)
      - "9095:9095"   # gRPC server (Grafana trace queries)
      # 4317/4318 not exposed on host; OTel Collector receives OTLP and forwards to tempo:4317
    volumes:
      - "./tempo/tempo.yml:/etc/tempo/tempo.yml:ro"
      - tempo-data:/var/lib/tempo
      - certs:/etc/ssl/certs/elastic:ro
    environment:
      ES_URL: "${ES_URL}"
      ES_USER: "${ES_USER}"
      ES_PASSWORD: "${ES_PASSWORD}"
      CA_CERT: ${CA_CERT}
      TZ: ${TZ}
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '0.4'
    logging: *default-logging
    depends_on:
      es01:
        condition: service_healthy
      init-index:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  logstash01:
    image: docker.elastic.co/logstash/logstash:${LOGSTASH_VERSION} 
    container_name: logstash01
    labels:
      co.elastic.logs/module: logstash
      role: "Logstash"
    # TODO: Logstash should not run as root, but it may need elevated permissions
    # for certain operations (depends on log directory permissions)
    user: root
    ports: 
        - "${LS_SPARK_EVENTS_PORT}:${LS_SPARK_EVENTS_PORT}"
        - "5051:5051"  # System metrics rate computation
        # Port 9201 removed: Prometheus remote write now handled by otel-collector
        # TODO: Evantually metrics should be sent to reginal Logstash servers
        # and then fed up into Elasticsearch
        # - "${LS_DOCKER_METRICS_PORT}:${LS_DOCKER_METRICS_PORT}"
        - "9600:9600"
    volumes:
      - "./logstash/pipeline:/usr/share/logstash/pipeline:ro"
      - "./logstash/config/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro"
      - "./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml"
      - certs:/etc/ssl/certs/elastic:ro
    environment:
      CA_CERT: "${CA_CERT}"
      xpack.monitoring.enabled: "false"
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_HOST: ${ES_HOST}
      ES_PORT: ${ES_PORT}
      ES_URL: ${ES_URL}
      LS_HOST: ${LS_HOST}
      LS_SPARK_EVENTS_PORT: ${LS_SPARK_EVENTS_PORT}
      LS_DOCKER_METRICS_PORT: ${LS_DOCKER_METRICS_PORT}
      # TODO: environment variables to include time zone. 
      TZ: ${TZ}
      LS_JAVA_OPTS: "-Xms1g -Xmx1500m"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3g
    logging: *default-logging
    depends_on:
      es01:
        condition: service_healthy
      init-index:
        condition: service_completed_successfully
      init-certs:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:9600",
        ]
      interval: 10s
      timeout: 10s
      retries: 120
