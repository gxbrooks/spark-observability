# Prometheus recording rules for Kubernetes metrics
# Pre-aggregates metrics before remote write to Elasticsearch

groups:
  - name: kubernetes.rules
    interval: 30s
    rules:
      # CPU utilization per pod
      - record: kubernetes_pod:container_cpu_usage:sum
        expr: |
          sum(rate(container_cpu_usage_seconds_total{container!="POD",container!=""}[5m])) by (namespace, pod, container)

      # Memory usage per pod
      - record: kubernetes_pod:container_memory_working_set_bytes:sum
        expr: |
          sum(container_memory_working_set_bytes{container!="POD",container!=""}) by (namespace, pod, container)

      # Network receive bytes per pod
      - record: kubernetes_pod:container_network_receive_bytes_total:sum
        expr: |
          sum(rate(container_network_receive_bytes_total[5m])) by (namespace, pod)

      # Network transmit bytes per pod
      - record: kubernetes_pod:container_network_transmit_bytes_total:sum
        expr: |
          sum(rate(container_network_transmit_bytes_total[5m])) by (namespace, pod)

      # Pod restart count
      - record: kubernetes_pod:container_spec_restart_policy:count
        expr: |
          count(container_spec_restart_policy{container!="POD",container!=""}) by (namespace, pod)

      # Node CPU utilization
      - record: kubernetes_node:node_cpu_usage:sum
        expr: |
          1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance)

      # Node memory utilization
      - record: kubernetes_node:node_memory_utilisation:ratio
        expr: |
          1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)

      # Pod creation rate
      - record: kubernetes_pod:pod_creation_time:count
        expr: |
          count(kube_pod_created) by (namespace)

      # Failed pod count
      - record: kubernetes_pod:pod_status_phase:failed:count
        expr: |
          count(kube_pod_status_phase{phase="Failed"}) by (namespace)


