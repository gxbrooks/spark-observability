# Prometheus configuration for Kubernetes metrics collection
# Scrapes K8s API, kube-state-metrics, and node-exporter
# Exports metrics to Elasticsearch via remote write for long-term storage

global:
  scrape_interval: 30s      # Scrape interval for targets
  scrape_timeout: 10s       # Scrape timeout per target
  evaluation_interval: 30s  # Rule evaluation interval
  external_labels:
    cluster: 'spark-cluster'
    environment: 'production'

# Alertmanager configuration (disabled for now)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # Kubernetes API server metrics
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
      - role: endpoints
        api_server: 'https://lab2.lan:6443'
        tls_config:
          ca_file: '/etc/ssl/certs/kubernetes/ca.crt'
          cert_file: '/etc/ssl/certs/kubernetes/client.crt'
          key_file: '/etc/ssl/certs/kubernetes/client.key'
          insecure_skip_verify: false
    scheme: https
    tls_config:
      ca_file: '/etc/ssl/certs/kubernetes/ca.crt'
      cert_file: '/etc/ssl/certs/kubernetes/client.crt'
      key_file: '/etc/ssl/certs/kubernetes/client.key'
      insecure_skip_verify: false
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_service_name]
        target_label: kubernetes_service
      - source_labels: [__meta_kubernetes_endpoint_address_target_name]
        target_label: kubernetes_pod_name

  # Kubernetes nodes (kubelet metrics)
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
        api_server: 'https://lab2.lan:6443'
        tls_config:
          ca_file: '/etc/ssl/certs/kubernetes/ca.crt'
          cert_file: '/etc/ssl/certs/kubernetes/client.crt'
          key_file: '/etc/ssl/certs/kubernetes/client.key'
          insecure_skip_verify: false
    scheme: https
    tls_config:
      ca_file: '/etc/ssl/certs/kubernetes/ca.crt'
      cert_file: '/etc/ssl/certs/kubernetes/client.crt'
      key_file: '/etc/ssl/certs/kubernetes/client.key'
      insecure_skip_verify: false
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: 'lab2.lan:10250'
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics
      - source_labels: [__meta_kubernetes_node_name]
        target_label: kubernetes_node

  # Kubernetes pods
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
        api_server: 'https://lab2.lan:6443'
        tls_config:
          ca_file: '/etc/ssl/certs/kubernetes/ca.crt'
          cert_file: '/etc/ssl/certs/kubernetes/client.crt'
          key_file: '/etc/ssl/certs/kubernetes/client.key'
          insecure_skip_verify: false
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name

  # Kube-state-metrics (if deployed as service)
  - job_name: 'kube-state-metrics'
    kubernetes_sd_configs:
      - role: endpoints
        api_server: 'https://lab2.lan:6443'
        tls_config:
          ca_file: '/etc/ssl/certs/kubernetes/ca.crt'
          cert_file: '/etc/ssl/certs/kubernetes/client.crt'
          key_file: '/etc/ssl/certs/kubernetes/client.key'
          insecure_skip_verify: false
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name]
        action: keep
        regex: kube-system;kube-state-metrics
      - source_labels: [__meta_kubernetes_endpoint_address_target_name]
        target_label: kubernetes_pod_name

  # Node exporter (per-node metrics via DaemonSet)
  - job_name: 'node-exporter'
    kubernetes_sd_configs:
      - role: pod
        api_server: 'https://lab2.lan:6443'
        tls_config:
          ca_file: '/etc/ssl/certs/kubernetes/ca.crt'
          cert_file: '/etc/ssl/certs/kubernetes/client.crt'
          key_file: '/etc/ssl/certs/kubernetes/client.key'
          insecure_skip_verify: false
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: node-exporter
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: kubernetes_node
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

