# OpenTelemetry Collector Configuration for Spark Telemetry
# Uses Data Streams for efficient trace storage

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Prometheus remote write: receives K8s metrics from Prometheus and forwards to Elasticsearch
  prometheusremotewrite:
    endpoint: 0.0.0.0:9201

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  attributes/k8s_prom_ns:
    actions:
      - key: kubernetes.namespace
        from_attribute: kubernetes_namespace
        action: insert
      - key: kubernetes.namespace
        from_attribute: namespace
        action: insert

  attributes/cadvisor_rename_id:
    actions:
      - key: container_cgroup_path
        from_attribute: id
        action: insert
      - key: id
        action: delete

  transform/k8s_prom_job:
    error_mode: ignore
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["scrape_job"], resource.attributes["service.name"]) where resource.attributes["service.name"] != nil

  transform/force_ecs_es_mapping:
    error_mode: ignore
    metric_statements:
      - context: scope
        statements:
          - set(attributes["elastic.mapping.mode"], "ecs")

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Dynatrace OTLP requires delta temporality for Counter instruments (not cumulative).
  # (cumulativetodelta processor defined below filter/keep_spark_stage_for_dt)
  filter/drop_spark_from_default:
    error_mode: ignore
    metric_conditions:
      - 'IsMatch(metric.name, "^executions\\.") or IsMatch(metric.name, "^spark\\.")'

  filter/keep_spark_only:
    error_mode: ignore
    metric_conditions:
      - 'not (IsMatch(metric.name, "^executions\\.") or IsMatch(metric.name, "^spark\\."))'

  # Dynatrace rejects cumulative Counter for opened/closed; active UpDownCounter and stage counters only.
  filter/drop_spark_exec_counters_for_dt:
    error_mode: ignore
    metric_conditions:
      - 'IsMatch(metric.name, "^spark\\.executions\\.(opened|closed)\\.") and not IsMatch(metric.name, "^spark\\.executions\\.(opened|closed)\\.(app|job|stage|task|sql)$")'

  filter/keep_spark_active_for_dt:
    error_mode: ignore
    metric_conditions:
      - 'not (IsMatch(metric.name, "^spark\\.executions\\.") or IsMatch(metric.name, "^spark\\.stage\\.outcomes\\.(failures|spill\\.memory\\.bytes|spill\\.disk\\.bytes)$"))'

  filter/keep_spark_stage_for_dt:
    error_mode: ignore
    metric_conditions:
      - 'not (IsMatch(metric.name, "^spark\\.stage\\.shuffle\\.") or IsMatch(metric.name, "^spark\\.stage\\.outcomes\\.completed$"))'

  cumulativetodelta: {}

  transform:
    trace_statements:
      - context: span
        statements:
          - set(resource.attributes["application"], Split(attributes["span.kind"], ".")[0]) where attributes["span.kind"] != nil
          - set(resource.attributes["operation.type"], Split(attributes["span.kind"], ".")[1]) where attributes["span.kind"] != nil

exporters:
  # BEGIN DYNATRACE_OTEL_EXPORTER
  otlphttp/dynatrace:
    endpoint: "https://pdt20158.live.dynatrace.com/api/v2/otlp"
    headers:
      Authorization: "Api-Token ${DT_INGEST_TOKEN}"
  # END DYNATRACE_OTEL_EXPORTER
  elasticsearch/traces:
    endpoints:
      - https://es01:9200
    user: elastic
    password: ${ES_PASSWORD}
    traces_index: traces-otel-default
    mapping:
      mode: ecs
    tls:
      ca_file: /etc/ssl/certs/elastic/ca.crt
      insecure_skip_verify: false

  elasticsearch/metrics:
    endpoints:
      - https://es01:9200
    user: elastic
    password: ${ES_PASSWORD}
    metrics_index: metrics-kubernetes-default
    mapping:
      mode: ecs
    tls:
      ca_file: /etc/ssl/certs/elastic/ca.crt
      insecure_skip_verify: false

  elasticsearch/metrics-spark:
    endpoints:
      - https://es01:9200
    user: elastic
    password: ${ES_PASSWORD}
    metrics_index: metrics-spark-default
    mapping:
      mode: ecs
    tls:
      ca_file: /etc/ssl/certs/elastic/ca.crt
      insecure_skip_verify: false

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  debug:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: :13133

service:
  extensions: [health_check]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, transform, batch]
      exporters: [elasticsearch/traces, otlp/tempo, otlphttp/dynatrace, debug]

    metrics:
      receivers: [otlp, prometheusremotewrite]
      processors: [memory_limiter, filter/drop_spark_from_default, attributes/k8s_prom_ns, attributes/cadvisor_rename_id, transform/k8s_prom_job, transform/force_ecs_es_mapping, batch]
      exporters: [elasticsearch/metrics, otlphttp/dynatrace, debug]

    metrics/spark:
      receivers: [otlp]
      processors: [memory_limiter, filter/keep_spark_only, transform/force_ecs_es_mapping, batch]
      exporters: [elasticsearch/metrics-spark]

    # Spark active execution gauges → Dynatrace (UpDownCounter cumulative maps to Gauge).
    metrics/spark/dynatrace/active:
      receivers: [otlp]
      processors: [memory_limiter, filter/keep_spark_only, filter/keep_spark_active_for_dt, batch]
      exporters: [otlphttp/dynatrace]

    # Spark stage counters → Dynatrace (delta conversion required for Counter instruments).
    metrics/spark/dynatrace/stage:
      receivers: [otlp]
      processors: [memory_limiter, filter/keep_spark_only, filter/keep_spark_stage_for_dt, cumulativetodelta, batch]
      exporters: [otlphttp/dynatrace]

  telemetry:
    logs:
      level: info
    metrics:
      level: basic
