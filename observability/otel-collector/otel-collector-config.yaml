# OpenTelemetry Collector Configuration for Spark Telemetry
# Uses Data Streams for efficient trace storage

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Extract application and operation.type from span.kind for efficient querying
  transform:
    trace_statements:
      - context: span
        statements:
          # Extract application from span.kind (e.g., "Spark.job" → "spark")
          # Store as resource attribute so ECS exporter maps it to top-level field
          - set(resource.attributes["application"], Split(attributes["span.kind"], ".")[0]) where attributes["span.kind"] != nil
          # Extract operation.type from span.kind (e.g., "Spark.job" → "job")
          - set(resource.attributes["operation.type"], Split(attributes["span.kind"], ".")[1]) where attributes["span.kind"] != nil

exporters:
  # Elasticsearch exporter using data streams
  elasticsearch:
    endpoints:
      - https://es01:9200
    user: elastic
    password: ${ES_PASSWORD}
    traces_index: traces-otel-default
    mapping:
      mode: ecs
    tls:
      ca_file: /etc/ssl/certs/elastic/ca.crt
      insecure_skip_verify: false

  # Debug exporter for troubleshooting
  debug:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: :13133

service:
  extensions: [health_check]
  
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, transform, batch]
      exporters: [elasticsearch, debug]
      
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
  
  telemetry:
    logs:
      level: info
    metrics:
      level: detailed
