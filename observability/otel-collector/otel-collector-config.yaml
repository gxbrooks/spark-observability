# OpenTelemetry Collector Configuration for Spark Telemetry
# Uses Data Streams for efficient trace storage

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Prometheus remote write: receives K8s metrics from Prometheus and forwards to Elasticsearch
  prometheusremotewrite:
    endpoint: 0.0.0.0:9201

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Map Prometheus label names to ECS-style kubernetes.namespace for Elasticsearch / Grafana
  attributes/k8s_prom_ns:
    actions:
      - key: kubernetes.namespace
        from_attribute: kubernetes_namespace
        action: insert
      - key: kubernetes.namespace
        from_attribute: namespace
        action: insert

  # cAdvisor uses label "id" (cgroup path). Top-level "id" in ECS docs can confuse ES/Grafana; use a dedicated field.
  attributes/cadvisor_rename_id:
    actions:
      - key: container_cgroup_path
        from_attribute: id
        action: insert
      - key: id
        action: delete

  # PRW maps Prometheus "job" to resource service.name; ECS metrics flatten datapoint attrs only.
  # Copy to scrape_job so Grafana/Lucene can filter scrape_job.keyword:kubernetes-cadvisor (pre-Lab3 shape).
  transform/k8s_prom_job:
    error_mode: ignore
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["scrape_job"], resource.attributes["service.name"]) where resource.attributes["service.name"] != nil

  # elasticsearchexporter v0.145+ ignores exporters.*.mapping.mode; default is OTel (nested metrics.* / bulk 400s).
  # ECS mode = flat Prometheus metric names + numeric values (matches Grafana k8s-namespace dashboard).
  transform/force_ecs_es_mapping:
    error_mode: ignore
    metric_statements:
      - context: scope
        statements:
          - set(attributes["elastic.mapping.mode"], "ecs")

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Extract application and operation.type from span.kind for efficient querying
  transform:
    trace_statements:
      - context: span
        statements:
          # Extract application from span.kind (e.g., "Spark.job" → "spark")
          # Store as resource attribute so ECS exporter maps it to top-level field
          - set(resource.attributes["application"], Split(attributes["span.kind"], ".")[0]) where attributes["span.kind"] != nil
          # Extract operation.type from span.kind (e.g., "Spark.job" → "job")
          - set(resource.attributes["operation.type"], Split(attributes["span.kind"], ".")[1]) where attributes["span.kind"] != nil

exporters:
  # Traces: ECS mapping matches APM-style traces and existing dashboards.
  # PRW K8s metrics: force ECS via scope attribute elastic.mapping.mode (exporter ignores YAML mapping.mode ≥0.145).
  elasticsearch/traces:
    endpoints:
      - https://es01:9200
    user: elastic
    password: ${ES_PASSWORD}
    traces_index: traces-otel-default
    mapping:
      mode: ecs
    tls:
      ca_file: /etc/ssl/certs/elastic/ca.crt
      insecure_skip_verify: false

  elasticsearch/metrics:
    endpoints:
      - https://es01:9200
    user: elastic
    password: ${ES_PASSWORD}
    metrics_index: metrics-kubernetes-default
    mapping:
      mode: ecs # ignored by exporter ≥0.145; kept for documentation only
    tls:
      ca_file: /etc/ssl/certs/elastic/ca.crt
      insecure_skip_verify: false

  # Grafana Tempo exporter for distributed tracing
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Debug exporter for troubleshooting
  debug:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: :13133

service:
  extensions: [health_check]
  
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, transform, batch]
      exporters: [elasticsearch/traces, otlp/tempo, debug]
      
    metrics:
      receivers: [otlp, prometheusremotewrite]
      processors: [memory_limiter, attributes/k8s_prom_ns, attributes/cadvisor_rename_id, transform/k8s_prom_job, transform/force_ecs_es_mapping, batch]
      exporters: [elasticsearch/metrics, debug]
  
  telemetry:
    logs:
      level: debug
    metrics:
      level: detailed
