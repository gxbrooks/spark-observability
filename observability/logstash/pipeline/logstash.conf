

input {
	beats {
		port => 5050
	}
}
# TODOs
#   - migrate field names to underscores instead of dashes
#   - better error handling for unknown event types in the else clause. 
#   - validate UIDs


filter {

	json {
		source => "message"
		target => "spark"
	}
	
	ruby {
		code => '
			require "time"
			
			# eventBody = event.to_s
			# puts "Debug: Post json Event=|#{eventBody}|"
		puts "DEBUG: Ruby filter executed - checking for spark field"
		if event.get("[spark]")
			puts "DEBUG: Found spark field, processing event"
			
				event_type = event.get("[spark][Event]")
				  
				# puts "Debug: Running filter on Event=#{event_type}............"
				# puts "Debug: path -" + event.get("[log][file][path]").to_s
				# puts "Debug: host -" + event.get("[host][name]").to_s
				case event_type
				# These events do not have any application timestamps, so we discard them. 
				when "SparkListenerBlockManagerAdded", "SparkListenerEnvironmentUpdate", \
					"SparkListenerLogStart", "SparkListenerResourceProfileAdded",\
					"org.apache.spark.sql.execution.ui.SparkListenerDriverAccumUpdates",\
					"org.apache.spark.sql.execution.ui.SparkListenerSQLAdaptiveExecutionUpdate" then
					event.cancel
				else				
					# puts "Debug: Event=#{event_type}"
					# apps are distinguished by their file name and logger host
					# Such log files can only have one application in the file.
					appBaseUid = event.get("[host][name]") \
							+ ":" + event.get("[log][file][path]")
					eventKind = "eventKind Undefined"
					eventClass = "eventClass Undefined"
					traceClass = "traceClass Undefined"
					eventName = "eventName Undefined"
					eventId = "eventId Undefined"
					traceBaseUid = "traceBaseUid Undefined"
					eventBaseUid = "eventBaseUid Undefined"	
					parentClass = "parentClass Undefined"
					parentBase = "parentBase Undefined"
					traceParentBaseUid = "traceParentBaseUid Undefined"
							
					case event_type
					when "SparkListenerApplicationStart" then
						# puts "Debug: Start ApplicationStart"
						tsMillis = event.get("[spark][Timestamp]")
						timeStamp = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))	
						eventKind = "Start"
						eventClass = "App"
						traceClass = "App"
						eventName = event.get("[spark][App Name]")
						eventId = event.get("[spark][App ID]").to_s
						traceBaseUid = appBaseUid
						eventBaseUid = appBaseUid						
						# Applications have no parents, so we include only for completeness
						parentClass = "None"
						parentBase = ""
						traceParentBaseUid = ""
					when "SparkListenerApplicationEnd" then
						# puts "Debug: Start SparkListenerApplicationEnd"
						tsMillis = event.get("[spark][Timestamp]")
						timeStamp = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
						eventKind = "End"
						eventClass = "App"
						traceClass = "App"
						# Name and ID are empty for application ends
						eventName = "NO_APP_END_NAME"
						eventId = "NO_APP_END_ID"
						# because there is no App ID on the end event, the UID must
						# not contain an App ID and there can be only one App per file
						traceBaseUid = appBaseUid
						eventBaseUid = appBaseUid
					when "SparkListenerExecutorAdded" then
						# puts "Debug: Start SparkListenerExecutorAdded"
						tsMillis = event.get("[spark][Timestamp]")
						timeStamp = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
						eventClass = "ExecutorAdded"
						traceClass = "App"
						# Point in time event with no matching start or end event
						eventKind = "Point"
						eventName = event.get("[spark][Executor ID]").to_s
						eventId = event.get("[spark][Executor ID]").to_s
						traceBaseUid = appBaseUid
						eventBaseUid = traceBaseUid + ":" + eventId
						# we tie Executors to an application batch
					when "SparkListenerJobStart" then
						# puts "Debug: Start SparkListenerJobStart"
						tsMillis = event.get("[spark][Submission Time]")
						timeStamp = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
						eventClass = "Job"
						traceClass = "Job"
						eventKind = "Start"
						eventName = event.get("[spark][Job ID]").to_s
						eventId = event.get("[spark][Job ID]").to_s
						# right now Jobs do not have any children do to lack of Job
						# information in Stage events, so we are forced to use App as 
						# a base
						traceBaseUid = appBaseUid + ":" + eventId
						eventBaseUid = traceBaseUid
						parentClass = "App"
						traceParentBaseUid = appBaseUid
					when "SparkListenerJobEnd" then
						# puts "Debug: Start SparkListenerJobEnd"
						# No start time on JobEnd, so will need to fill in the duration when we match events. 
						tsMillis = event.get("[spark][Completion Time]")
						timeStamp = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
						eventClass = "Job"
						traceClass = "Job"
						# ideally parent would be "App"
						eventKind = "End"
						eventName = event.get("[spark][Job ID]").to_s
						eventId = event.get("[spark][Job ID]").to_s
						traceBaseUid = appBaseUid + ":" + eventId
						eventBaseUid = traceBaseUid
					when "SparkListenerStageSubmitted" then
						# puts "Debug: Start SparkListenerStageSubmitted"
						tsMillis = event.get("[spark][Stage Info][Submission Time]")
						timeStamp = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
						eventClass = "Stage"
						traceClass = "Stage"
						eventKind = "Start"
						eventName = event.get("[spark][Stage Info][Stage Name]")
						eventId = event.get("[spark][Stage Info][Stage ID]").to_s
						attempt = event.get("[spark][Stage Info][Stage Attempt ID]").to_s
						# Parent class should probably should be "Job", but we do not have requisite
						# information to tie stages to Jobs. We hack for now.
						# Job ID is not available in Stages, so we can only tie to Apps
						# [App ID] is not always  available in the Properties attribute
						traceParentBaseUid = appBaseUid
						traceBaseUid = traceParentBaseUid + ":" + eventId + ":" + attempt
						eventBaseUid = traceBaseUid
						parentClass = "App"
					when "SparkListenerStageCompleted" then
						# puts "Debug: Start SparkListenerStageCompleted"
						tsMillis = event.get("[spark][Stage Info][Completion Time]")
						timeStamp = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
						eventClass = "Stage"
						traceClass = "Stage"
						eventKind = "End"
						eventName = event.get("[spark][Stage Info][Stage Name]")
						eventId = event.get("[spark][Stage Info][Stage ID]").to_s
						traceBaseUid = appBaseUid\
							+ ":" + eventId\
							+ ":" + event.get("[spark][Stage Info][Stage Attempt ID]").to_s
						eventBaseUid = traceBaseUid
					when "SparkListenerTaskStart" then
						# puts "Debug: Start SparkListenerTaskStart"
						tsMillis = event.get("[spark][Task Info][Launch Time]")
						timeStamp = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
						eventClass = "Task"
						traceClass = "Task"
						eventKind = "Start"
						eventName = event.get("[spark][Task Info][Task ID]").to_s
						eventId = event.get("[spark][Task Info][Task ID]").to_s
						traceParentBaseUid = appBaseUid \
							+ ":" + event.get("[spark][Stage ID]").to_s \
							+ ":" + event.get("[spark][Stage Attempt ID]").to_s 
						traceBaseUid = traceParentBaseUid \
							+ ":" + event.get("[spark][Task Info][Task ID]").to_s \
							+ ":" + event.get("[spark][Task Info][Attempt]").to_s
						eventBaseUid = traceBaseUid
						parentClass = "Stage"
					when "SparkListenerTaskEnd" then
						# puts "Debug: Start SparkListenerTaskEnd"
						tsMillis = event.get("[spark][Task Info][Finish Time]")
						timeStamp = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
						eventClass = "Task"
						traceClass = "Task"
						eventKind = "End"
						eventName = event.get("[spark][Task Info][Task ID]").to_s
						eventId = event.get("[spark][Task Info][Task ID]").to_s
						traceParentBaseUid = appBaseUid \
							+ ":" + event.get("[spark][Stage ID]").to_s \
							+ ":" + event.get("[spark][Stage Attempt ID]").to_s 
						traceBaseUid = traceParentBaseUid \
							+ ":" + eventId \
							+ ":" + event.get("[spark][Task Info][Attempt]").to_s
						eventBaseUid = traceBaseUid
						# one of the few durations available. We keep for now and should cross check
						# not set in document
						duration = event.get("[spark][Task Info][Finish Time]") - event.get("[spark][Task Info][Launch Time]")
						parentClass = "Stage"
					when "org.apache.spark.sql.execution.ui.SparkListenerSQLExecutionStart" then
						# puts "Debug: Start SparkListenerSQLExecutionStart"
						tsMillis = event.get("[spark][time]")
						timeStamp = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
						eventClass = "SQLQuery"
						traceClass = "SQLQuery"
						eventKind = "Start"
						eventName = event.get("[spark][executionId]").to_s
						eventId = event.get("[spark][executionId]").to_s
						traceBaseUid = appBaseUid + ":" + eventId
						eventBaseUid = traceBaseUid
						parentClass = "App"
						traceParentBaseUid = appBaseUid
					when "org.apache.spark.sql.execution.ui.SparkListenerSQLExecutionEnd" then
						# puts "Debug: Start SparkListenerSQLExecutionEnd"
						# No start time on SQLExecutionEnd, so will need to fill in the duration when we match events. 
						tsMillis = event.get("[spark][time]")
						timeStamp = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
						eventClass = "SQLQuery"
						traceClass = "SQLQuery"
						eventKind = "End"
						eventName = event.get("[spark][executionId]").to_s
						eventId = event.get("[spark][executionId]").to_s
						traceParentBaseUid = appBaseUid
						traceBaseUid = traceParentBaseUid + ":" + eventId
						eventBaseUid = traceBaseUid
					else
						puts "WARNING: Unknown Event=|#{event_type}|"
						# these events should be cancelled and not stubbed out if they ever occcur
						tsMillis = 0
						timeStamp = LogStash::Timestamp.new(Time.at(tsMillis/1000.0))
						eventClass = "Indeterminable"
						parentClass = "None"
						eventKind = "Indeterminable"
						eventName = "Indeterminable"
						eventId = "Indeterminable"
						eventBaseUid = "Indeterminable"
						traceClass = "Indeterminable"
						traceBaseUid = "Indeterminable"
						
					end					
					
								
					# we could have used a mutate statement and rename clause, but since we have to sweep through 
					# all the events in Ruby, we do the rename the Ruby way. This will eliminate a full sweep through 
					# the events using a mutate statement
					case event_type 
					when "SparkListenerJobStart", "SparkListenerStageSubmitted"  then
						scope = event.get("[spark][Properties][spark.rdd.scope]")
						if !scope.nil? then 
							#puts "Debug: found RDD scope" + scope.to_s
							event.remove("[spark][Properties][spark.rdd.scope]")
							event.set("[spark][Properties][spark.rdd.scope][id]", scope)
						end
					end

					# puts "Debug: Finished filter on Event=#{event_type}............"
					# fix  Spark composite field names that are incompatible with nested 
					# field behaviors in Elastic

					case event_type 
					when "SparkListenerTaskEnd", "SparkListenerStageCompleted" then
						if event.get("[spark][Task Info][Accumulables]")
							# puts "Debug: Found Task Info "
							array = event.get("[spark][Task Info][Accumulables]")
							array.each_with_index do |item, index|
								if item["Value"]
									v = item["Value"].class
									# puts "Filter Task Info Debug: Found Value #{v}"
									event.set("[spark][Task Info][Accumulables][#{index}][Value]", item["Value"].to_i)	
								end
								if item["Update"]			
									v = item["Update"].class
									# puts "Filter Debug Info Debug: Found Update #{v}"
									event.set("[spark][Task Info][Accumulables][#{index}][Update]", item["Update"].to_i)
								end
							end
						end
						if event.get("[spark][Stage Info][Accumulables]")
							# puts "Debug: Found Stage Info"
							array = event.get("[spark][Stage Info][Accumulables]")
							array.each_with_index do |item, index|
								if item["Value"]
									v = item["Value"].class
									# puts "Debug: Found Stage Info Value #{v}"
									event.set("[spark][Stage Info][Accumulables][#{index}][Value]", item["Value"].to_i)	
								end
								if item["Update"]
									v = item["Update"].class
									# puts "Debug: Found Stage Info Update" #{v}"
									event.set("[spark][Stage Info][Accumulables][#{index}][Update]", item["Update"].to_i)
								end
							end
						end
					end
					
					# Finalize processiong of the Spark event and the Batch Info event
					batch_info = {}
					realm = "Spark"
					batch_info["@timestamp"] = timeStamp
					batch_info["realm"] = realm
					batch_info["class"] = eventClass
					batch_info["event_kind"] = eventKind
					batch_info["service_name"] = eventName
					batch_info["service_id"] = eventId
					batch_info["event"] = event_type
					# Extract app_id from SparkListenerApplicationStart event
					if event_type == "SparkListenerApplicationStart"
						batch_info["app_id"] = event.get("[spark][App ID]") || "unknown"
					else
						# For other events, try to get app_id from Properties or use unknown
						batch_info["app_id"] = event.get("[spark][Properties][spark.app.id]") || "unknown"
					end
					puts "DEBUG: Ruby filter executed for event_type: " + event_type.to_s
					batch_info["matched"] = false
					# preserve the beats-logstash timestamp so we can measure latency
					fileBeatTimeStamp = event.get("[@timestamp]")
					batch_info["log_timestamp"] = fileBeatTimeStamp
					
					# change the timestamp of the event to when the event happened, 
					# not when Filebeat first sees the event.
					event.set("[@timestamp]", timeStamp)
					batch_info["start_millis"] = tsMillis
					
					batch_info["trace_uid"] = realm + ":" + traceClass + ":" + traceBaseUid
					event_uid = eventKind + ":" + realm + ":" + eventClass + ":" + eventBaseUid
					batch_info["event_uid"] = event_uid
					
					# Routing ID should be @metadata and not propogated to Elastic
					# The metadata ID (_id) of a Start event is the parent of an End event.
					# The start_end parent fieldt contains the SHA-1 hash of the start_event_uid to use as start_end parent and as
					# the routing id for end events. If the event is not and end event, [@metadata][start_event_uid] does
					# get Defined
					if eventKind == "End" 
						# start_event_uid is how we match start events to end events. 
						start_event_uid = "Start" + ":" + realm + ":" + eventClass + ":" + eventBaseUid
						batch_info["start_event_uid"] = start_event_uid
						batch_info["start_end"] = {"name" => "end", "parent" => "placeholder ID"}
						routing_uid = start_event_uid						
					elsif eventKind == "Start"
						batch_info["start_end"] = { "name" => "start" }
						# the parent batch span of the start-end pair is carried only on the start events
						# as we do not need it on both start and end events.
						unless parentClass == "None"
							batch_info["trace_parent_uid"] = realm + ":" + parentClass + ":" + traceParentBaseUid
						end
						routing_uid = event_uid
					else 
						routing_uid = event_uid		
					end
					batch_info["routing_uid"] = routing_uid
					
					# puts "Debug: Batch: #{batch_info}"
					# Create the batch active event
					batch_event = LogStash::Event.new(batch_info)
					batch_event.set("[@metadata][doc_type]", "batch-events")
					# batch_event.tag("batch-events")
					batch_event.set("[@metadata][routing_uid]", routing_uid)
					batch_event.set("[@metadata][event_uid]", event_uid)
					new_event_block.call(batch_event)
					
					# add batch_info to the Spark event for convience, if need be
					event.set("[batch_info]", batch_info)
					event.set("[@metadata][doc_type]", "spark-events")
					#
					# event.tag("spark-events")
				# end case event_type
				end
			else
				event = event.get("") 
				puts "WARNING: No [spark] tag in |#{event}|"				
			end
		'
	}
	
	if [@metadata][doc_type] == "batch-events" {
		# the routing_uid is either the event_uid of the point or start event
		# or for end events, the event_uid of corresponding start event (i.e. start_event_uid)
		fingerprint {
			source => ["[@metadata][routing_uid]"]  
			target => "[@metadata][routing_id]"
			method => "SHA1"
		}
		mutate {
			copy => { "[@metadata][routing_id]" => "routing_id" }
		}
		fingerprint {
			source => ["[@metadata][event_uid]"]  
			target => "[@metadata][document_id]"
			method => "SHA1"
		}
		mutate {
			copy => { "[@metadata][document_id]" => "event_id" }
		}
		if [start_event_uid] {
			fingerprint {
				source => ["[start_event_uid]"]
				target => "[start_end][parent]"
				method => "SHA1"
			}
			mutate {
				copy => { "[start_end][parent]" => "start_event_id" }
			}			
		}
		if [trace_parent_uid] {
			fingerprint {
				source => ["[trace_parent_uid]"]
				target => "[trace_parent_id]"
				method => "SHA1"
			}	
		}
		if [trace_uid] {
			# There should always be a trace_uid, except with undefined event_types
			fingerprint {
				source => ["[trace_uid]"]
				target => "[trace_id]"
				method => "SHA1"
			}	
		}
	}
}

output {
  # stdout { 
	# codec  => rubydebug {
	  # @metadata => true
	# }
  # }

	if [@metadata][doc_type] == "spark-events" {
		elasticsearch {
			#manage_template => false  # Ensure Logstash does not override your custom template
			hosts => ["${ELASTIC_URL}"]
			user => "${ELASTIC_USER}"
			password => "${ELASTIC_PASSWORD}"
			ssl => true
			ssl_certificate_authorities => [ "/etc/ssl/certs/elastic/ca.crt" ]
			
			data_stream => "true"
			# data_stream attributes are set in the Elasatic Agent YML file
			# data_stream_type => "logs"
			# data_stream_dataset => "spark"
			# data_stream_namespace => "spark"
		}
	}
	
	if [@metadata][doc_type] == "batch-events" {
		  file {
			path => "/usr/share/logstash/logs/batch-events.ndjson"
			codec => json_lines  # Optional: specify the format
		  }
		elasticsearch {
			hosts => ["${ELASTIC_URL}"]
			user => "${ELASTIC_USER}"
			password => "${ELASTIC_PASSWORD}"
			ssl => true
			ssl_certificate_authorities => [ "/etc/ssl/certs/elastic/ca.crt" ]
			
			document_id => "%{[@metadata][document_id]}"
			routing => "%{[@metadata][routing_id]}"		
			index => "batch-events"
		}
	} else {
		stdout {	
			id => "Unexpected event"
			codec => json 
		}
	}
}
