# Logstash Pipeline: System Metrics Rate Calculation
# 
# Computes rates for cumulative (monotonically increasing) metrics:
# - Network I/O (system.network)
# - Disk I/O (system.diskio)
# 
# Each metric type has its own aggregate filter with isolated state.
# Uses composite task_id pattern: <metric_type>_<host>|<dimension>

input {
  beats {
    port => 5051  # Port for system metrics rate computation (configured via docker-compose)
    # Survives merge with logstash.conf so Spark JSON/Ruby filters can skip these events
    tags => ["system_metrics_rates"]
  }
}

filter {
  # Only process system metrics (not Spark events)
  if [data_stream][type] == "metrics" {
    
    # ============================================================
    # Network Metrics (system.network)
    # ============================================================
    if [data_stream][dataset] == "system.network" {
      # Create composite key: network_<host>|<interface>
      ruby {
        code => "
          host = event.get('[host][name]')
          interface = event.get('[system][network][name]')
          if host && interface
            event.set('_network_key', 'network_' + host + '|' + interface)
          end
        "
      }
      
      # Aggregate filter: Maintain state per network interface and compute rates
      aggregate {
        task_id => "%{[_network_key]}"
        code => "
          # Get previous state
          prev_in_bytes = map['prev_in_bytes']
          prev_out_bytes = map['prev_out_bytes']
          prev_in_packets = map['prev_in_packets']
          prev_out_packets = map['prev_out_packets']
          prev_in_dropped = map['prev_in_dropped']
          prev_out_dropped = map['prev_out_dropped']
          prev_in_errors = map['prev_in_errors']
          prev_out_errors = map['prev_out_errors']
          prev_time = map['prev_time']
          
          # Get current values
          current_in_bytes = event.get('[system][network][in][bytes]')
          current_out_bytes = event.get('[system][network][out][bytes]')
          current_in_packets = event.get('[system][network][in][packets]')
          current_out_packets = event.get('[system][network][out][packets]')
          current_in_dropped = event.get('[system][network][in][dropped]')
          current_out_dropped = event.get('[system][network][out][dropped]')
          current_in_errors = event.get('[system][network][in][errors]')
          current_out_errors = event.get('[system][network][out][errors]')
          current_time = event.get('@timestamp')
          
          if current_time
            current_time_i = current_time.to_i
            
            # Compute rates if we have previous values
            if prev_time
              time_delta = current_time_i - prev_time
              
              if time_delta > 0
                # Bytes rates
                if current_in_bytes != nil && prev_in_bytes != nil
                  if current_in_bytes >= prev_in_bytes
                    rate = (current_in_bytes - prev_in_bytes).to_f / time_delta
                    event.set('[system][network][in][bytes_rate]', rate)
                  end
                  map['prev_in_bytes'] = current_in_bytes
                elsif current_in_bytes != nil
                  map['prev_in_bytes'] = current_in_bytes
                end
                
                if current_out_bytes != nil && prev_out_bytes != nil
                  if current_out_bytes >= prev_out_bytes
                    rate = (current_out_bytes - prev_out_bytes).to_f / time_delta
                    event.set('[system][network][out][bytes_rate]', rate)
                  end
                  map['prev_out_bytes'] = current_out_bytes
                elsif current_out_bytes != nil
                  map['prev_out_bytes'] = current_out_bytes
                end
                
                # Packets rates
                if current_in_packets != nil && prev_in_packets != nil
                  if current_in_packets >= prev_in_packets
                    rate = (current_in_packets - prev_in_packets).to_f / time_delta
                    event.set('[system][network][in][packets_rate]', rate)
                  end
                  map['prev_in_packets'] = current_in_packets
                elsif current_in_packets != nil
                  map['prev_in_packets'] = current_in_packets
                end
                
                if current_out_packets != nil && prev_out_packets != nil
                  if current_out_packets >= prev_out_packets
                    rate = (current_out_packets - prev_out_packets).to_f / time_delta
                    event.set('[system][network][out][packets_rate]', rate)
                  end
                  map['prev_out_packets'] = current_out_packets
                elsif current_out_packets != nil
                  map['prev_out_packets'] = current_out_packets
                end
                
                # Dropped rates
                if current_in_dropped != nil && prev_in_dropped != nil
                  if current_in_dropped >= prev_in_dropped
                    rate = (current_in_dropped - prev_in_dropped).to_f / time_delta
                    event.set('[system][network][in][dropped_rate]', rate)
                  end
                  map['prev_in_dropped'] = current_in_dropped
                elsif current_in_dropped != nil
                  map['prev_in_dropped'] = current_in_dropped
                end
                
                if current_out_dropped != nil && prev_out_dropped != nil
                  if current_out_dropped >= prev_out_dropped
                    rate = (current_out_dropped - prev_out_dropped).to_f / time_delta
                    event.set('[system][network][out][dropped_rate]', rate)
                  end
                  map['prev_out_dropped'] = current_out_dropped
                elsif current_out_dropped != nil
                  map['prev_out_dropped'] = current_out_dropped
                end
                
                # Errors rates
                if current_in_errors != nil && prev_in_errors != nil
                  if current_in_errors >= prev_in_errors
                    rate = (current_in_errors - prev_in_errors).to_f / time_delta
                    event.set('[system][network][in][errors_rate]', rate)
                  end
                  map['prev_in_errors'] = current_in_errors
                elsif current_in_errors != nil
                  map['prev_in_errors'] = current_in_errors
                end
                
                if current_out_errors != nil && prev_out_errors != nil
                  if current_out_errors >= prev_out_errors
                    rate = (current_out_errors - prev_out_errors).to_f / time_delta
                    event.set('[system][network][out][errors_rate]', rate)
                  end
                  map['prev_out_errors'] = current_out_errors
                elsif current_out_errors != nil
                  map['prev_out_errors'] = current_out_errors
                end
              end
              
              # Always update timestamp
              map['prev_time'] = current_time_i
            else
              # First document for this interface - initialize state
              map['prev_time'] = current_time_i
              map['prev_in_bytes'] = current_in_bytes if current_in_bytes != nil
              map['prev_out_bytes'] = current_out_bytes if current_out_bytes != nil
              map['prev_in_packets'] = current_in_packets if current_in_packets != nil
              map['prev_out_packets'] = current_out_packets if current_out_packets != nil
              map['prev_in_dropped'] = current_in_dropped if current_in_dropped != nil
              map['prev_out_dropped'] = current_out_dropped if current_out_dropped != nil
              map['prev_in_errors'] = current_in_errors if current_in_errors != nil
              map['prev_out_errors'] = current_out_errors if current_out_errors != nil
            end
          end
        "
        timeout => 3600  # Keep state for 1 hour (in case interface disappears temporarily)
        timeout_tags => ['_aggregatetimeout']
      }
    }
    
    # ============================================================
    # Disk I/O Metrics (system.diskio)
    # ============================================================
    else if [data_stream][dataset] == "system.diskio" {
      # Create composite key: disk_<host>|<device>
      ruby {
        code => "
          host = event.get('[host][name]')
          device = event.get('[system][diskio][name]')
          if host && device
            event.set('_disk_key', 'disk_' + host + '|' + device)
          end
        "
      }
      
      # Aggregate filter: Maintain state per disk device and compute rates
      aggregate {
        task_id => "%{[_disk_key]}"
        code => "
          # Get previous state
          prev_read_bytes = map['prev_read_bytes']
          prev_write_bytes = map['prev_write_bytes']
          prev_read_time = map['prev_read_time']
          prev_write_time = map['prev_write_time']
          prev_read_count = map['prev_read_count']
          prev_write_count = map['prev_write_count']
          prev_io_ops = map['prev_io_ops']
          prev_io_time = map['prev_io_time']
          prev_time = map['prev_time']
          
          # Get current values
          current_read_bytes = event.get('[system][diskio][read][bytes]')
          current_write_bytes = event.get('[system][diskio][write][bytes]')
          current_read_time = event.get('[system][diskio][read][time]')
          current_write_time = event.get('[system][diskio][write][time]')
          current_read_count = event.get('[system][diskio][read][count]')
          current_write_count = event.get('[system][diskio][write][count]')
          current_io_ops = event.get('[system][diskio][io][ops]')
          current_io_time = event.get('[system][diskio][io][time]')
          current_time = event.get('@timestamp')
          
          if current_time
            current_time_i = current_time.to_i
            
            # Compute rates if we have previous values and time delta
            if prev_time
              time_delta = current_time_i - prev_time
              if time_delta > 0
                # Read bytes rate
                if current_read_bytes != nil && prev_read_bytes != nil
                  if current_read_bytes >= prev_read_bytes
                    rate = (current_read_bytes - prev_read_bytes).to_f / time_delta
                    event.set('[system][diskio][read][bytes_rate]', rate)
                  end
                  map['prev_read_bytes'] = current_read_bytes
                elsif current_read_bytes != nil
                  map['prev_read_bytes'] = current_read_bytes
                end
                
                # Write bytes rate
                if current_write_bytes != nil && prev_write_bytes != nil
                  if current_write_bytes >= prev_write_bytes
                    rate = (current_write_bytes - prev_write_bytes).to_f / time_delta
                    event.set('[system][diskio][write][bytes_rate]', rate)
                  end
                  map['prev_write_bytes'] = current_write_bytes
                elsif current_write_bytes != nil
                  map['prev_write_bytes'] = current_write_bytes
                end
                
                # Read time (latency) rate
                if current_read_time != nil && prev_read_time != nil
                  if current_read_time >= prev_read_time
                    rate = (current_read_time - prev_read_time).to_f / time_delta
                    event.set('[system][diskio][read][time_rate]', rate)
                  end
                  map['prev_read_time'] = current_read_time
                elsif current_read_time != nil
                  map['prev_read_time'] = current_read_time
                end
                
                # Write time (latency) rate
                if current_write_time != nil && prev_write_time != nil
                  if current_write_time >= prev_write_time
                    rate = (current_write_time - prev_write_time).to_f / time_delta
                    event.set('[system][diskio][write][time_rate]', rate)
                  end
                  map['prev_write_time'] = current_write_time
                elsif current_write_time != nil
                  map['prev_write_time'] = current_write_time
                end
                
                # Read count rate
                if current_read_count != nil && prev_read_count != nil
                  if current_read_count >= prev_read_count
                    rate = (current_read_count - prev_read_count).to_f / time_delta
                    event.set('[system][diskio][read][count_rate]', rate)
                  end
                  map['prev_read_count'] = current_read_count
                elsif current_read_count != nil
                  map['prev_read_count'] = current_read_count
                end
                
                # Write count rate
                if current_write_count != nil && prev_write_count != nil
                  if current_write_count >= prev_write_count
                    rate = (current_write_count - prev_write_count).to_f / time_delta
                    event.set('[system][diskio][write][count_rate]', rate)
                  end
                  map['prev_write_count'] = current_write_count
                elsif current_write_count != nil
                  map['prev_write_count'] = current_write_count
                end
                
                # IO ops rate
                if current_io_ops != nil && prev_io_ops != nil
                  if current_io_ops >= prev_io_ops
                    rate = (current_io_ops - prev_io_ops).to_f / time_delta
                    event.set('[system][diskio][io][ops_rate]', rate)
                  end
                  map['prev_io_ops'] = current_io_ops
                elsif current_io_ops != nil
                  map['prev_io_ops'] = current_io_ops
                end
                
                # IO time rate
                if current_io_time != nil && prev_io_time != nil
                  if current_io_time >= prev_io_time
                    rate = (current_io_time - prev_io_time).to_f / time_delta
                    event.set('[system][diskio][io][time_rate]', rate)
                  end
                  map['prev_io_time'] = current_io_time
                elsif current_io_time != nil
                  map['prev_io_time'] = current_io_time
                end
              end
              
              # Always update timestamp
              map['prev_time'] = current_time_i
            else
              # First document for this device - initialize state
              map['prev_time'] = current_time_i
              map['prev_read_bytes'] = current_read_bytes if current_read_bytes != nil
              map['prev_write_bytes'] = current_write_bytes if current_write_bytes != nil
              map['prev_read_time'] = current_read_time if current_read_time != nil
              map['prev_write_time'] = current_write_time if current_write_time != nil
              map['prev_read_count'] = current_read_count if current_read_count != nil
              map['prev_write_count'] = current_write_count if current_write_count != nil
              map['prev_io_ops'] = current_io_ops if current_io_ops != nil
              map['prev_io_time'] = current_io_time if current_io_time != nil
            end
          end
        "
        timeout => 3600  # Keep state for 1 hour
        timeout_tags => ['_aggregatetimeout']
      }
    }
    
    # Remove temporary key fields
    mutate {
      remove_field => ["_network_key", "_disk_key"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["${ES_URL}"]
    user => "${ES_USER}"
    password => "${ES_PASSWORD}"
    ssl => true
    ssl_certificate_authorities => ["/etc/ssl/certs/elastic/ca.crt"]
    data_stream => true
    # data_stream fields (type, dataset, namespace) are preserved from input
  }
}

